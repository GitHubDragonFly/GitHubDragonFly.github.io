      function highlightFeatureInstanced( instanceId ) {
        // 1. REUSE EVERYTHING
        // Instead of a new mesh every time, we just reposition the one we have
        if (!featureHighlightMesh || featureHighlightMesh?.geometry !== pickedObject.geometry) {
          if (featureHighlightMesh) {
            // Detach it from the old parent
            if (featureHighlightMesh.parent) {
              featureHighlightMesh.parent.remove( featureHighlightMesh );
            }

            featureHighlightMesh.traverse( ( child ) => {
              if (child.geometry) child.geometry.dispose();
              if (child.material) child.material.dispose();
            });

            featureHighlightMesh = null;
          }

          const highlightGeo = pickedObject.geometry;

          featureHighlightMesh = new THREE.Mesh(
            highlightGeo,
            new THREE.MeshBasicMaterial({
              color: 0xf08080,
              transparent: true,
              opacity: 0.5,
              depthTest: true,
              depthWrite: false, 
              polygonOffset: true,
              polygonOffsetFactor: -1,
              polygonOffsetUnits: -1
            })
          );

          // Add the wireframe once
          const wireframe = new THREE.LineSegments(
            new THREE.EdgesGeometry( highlightGeo, 30 ),
            new THREE.LineBasicMaterial( { color: 0xffffff } )
          );

          featureHighlightMesh.add( wireframe );
        }

        // THE TELEPORTATION
        // Copy the specific instance's transform from the InstancedMesh
        const matrix = new THREE.Matrix4();
        pickedObject.getMatrixAt( instanceId, matrix );

        // SYNC WITH PARENT
        // If the InstancedMesh itself has a position/rotation, 
        // we must account for it so the highlight doesn't fly off to space
        featureHighlightMesh.matrix.copy( matrix );
        featureHighlightMesh.matrixAutoUpdate = false; // We handle the matrix manually now
        featureHighlightMesh.updateWorldMatrix( true, true );

        // ATTACH
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );

        featureHighlightMesh.visible = true;
        featureHighlightMesh.frustumCulled = false;
        featureHighlightMesh.children.forEach( child => child.frustumCulled = false );
      }

      function highlightFeature( featureId, attrName ) {
        if (!attrName) return;

        const geometry = pickedObject.geometry;

        const indexAttr = geometry.index;
        const featureIdAttr = geometry.getAttribute( attrName );
        const positionAttr = geometry.getAttribute( 'position' );

        if (!featureIdAttr || !indexAttr || !positionAttr) return;

        // Find all triangles that belong to this featureId
        const activeIndices = [];

        for ( let i = 0; i < indexAttr.count; i += 3 ) {
          const a = indexAttr.getX( i );
          const b = indexAttr.getX( i + 1 );
          const c = indexAttr.getX( i + 2 );

          // If the first vertex of the triangle matches the ID, we take the whole triangle
          if ( a < featureIdAttr.count ) {
            if (featureIdAttr.getX( a ) === featureId) {
              activeIndices.push( a, b, c );
            }
          }
        }

        if (activeIndices.length === 0) return;

        // Create a new "Slice" geometry
        const highlightGeo = new THREE.BufferGeometry();
        highlightGeo.setAttribute( 'position', positionAttr );
        highlightGeo.setIndex( activeIndices );

        // Create the overlay mesh
        featureHighlightMesh = new THREE.Mesh(
          highlightGeo,
          new THREE.MeshBasicMaterial({
            color: 0xf08080,
            transparent: true,
            opacity: 0.5,
            side: THREE.DoubleSide,
            depthTest: true,
            depthWrite: false,   // Keeps the highlight from messing up the depth buffer for other transparents
            polygonOffset: true, // Physically pushes the quad slightly toward the camera
            polygonOffsetFactor: -1,
            polygonOffsetUnits: -1
          })
        );

        // Create the Wireframe Outline (The "Border")
        const wireframeGeo = new THREE.EdgesGeometry( highlightGeo, 30 );
        const wireframe = new THREE.LineSegments(
          wireframeGeo,
          new THREE.LineBasicMaterial( { color: 0xffffff, linewidth: 3 } ) // White border
        );

        // Add the wireframe to our highlight mesh so they move together
        featureHighlightMesh.add( wireframe );

        featureHighlightMesh.position.set( 0, 0, 0 );
        featureHighlightMesh.rotation.set( 0, 0, 0 );
        featureHighlightMesh.scale.set( 1, 1, 1 );
        featureHighlightMesh.updateWorldMatrix( true, true );

        // Sync transformation with the parent object
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      function highlightPoint( pointIndex ) {
        const geometry = pickedObject.geometry;
        const positionAttr = geometry.getAttribute( 'position' );

        if (!positionAttr || pointIndex === -1) return;

        // 1. Get the local position of the clicked point
        const x = positionAttr.getX( pointIndex );
        const y = positionAttr.getY( pointIndex );
        const z = positionAttr.getZ( pointIndex );

        // 2. Create a small Cube (Box) to represent the highlight
        // Adjust the size (0.05) based on your tileset scale
        const boxSize = 0.05; 
        const highlightGeo = new THREE.BoxGeometry( boxSize, boxSize, boxSize );

        const highlightMat = new THREE.MeshBasicMaterial({
          color: 0xf08080,
          transparent: true,
          opacity: 0.8,
          depthTest: false // Makes it visible even if partially buried in other points
        });

        featureHighlightMesh = new THREE.Mesh( highlightGeo, highlightMat );

        // 3. Position the cube at the point's coordinates
        featureHighlightMesh.position.set( x, y, z );

        // 4. Add a white wireframe outline for better visibility
        const wireframeGeo = new THREE.EdgesGeometry( highlightGeo );

        const wireframe = new THREE.LineSegments(
          wireframeGeo,
          new THREE.LineBasicMaterial( { color: 0xffffff } )
        );

        featureHighlightMesh.add( wireframe );
        featureHighlightMesh.updateWorldMatrix( true, true );

        // 5. Attach it to the picked object so it moves with the tileset
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      function highlightLine( lineIndex ) {
        const geometry = pickedObject.geometry;
        const positionAttr = geometry.getAttribute( 'position' );
        const indexAttr = geometry.index;

        if (!positionAttr || lineIndex === undefined) return;

        const activePositions = [];

        // 1. Identify the segment vertices
        // If the geometry is indexed (common in 3D Tiles), we use the index buffer
        if (indexAttr) {
          // For LineSegments, a segment is [ i, i + 1 ]
          // We find the start of the segment based on the click index
          const startIdx = Math.floor( lineIndex / 2.0 ) * 2;
          const idxA = indexAttr.getX( startIdx );
          const idxB = indexAttr.getX( startIdx + 1 );

          const vA = new THREE.Vector3().fromBufferAttribute( positionAttr, idxA );
          const vB = new THREE.Vector3().fromBufferAttribute( positionAttr, idxB );

          activePositions.push( vA.x, vA.y, vA.z, vB.x, vB.y, vB.z );
        } else {
          // Non-indexed: the click index is the vertex itself
          const startIdx = Math.floor( lineIndex / 2.0 ) * 2;

          activePositions.push(
            positionAttr.getX( startIdx ), positionAttr.getY( startIdx ), positionAttr.getZ( startIdx ),
            positionAttr.getX( startIdx + 1 ), positionAttr.getY( startIdx + 1 ), positionAttr.getZ( startIdx + 1 )
          );
        }

        // 2. Create the highlight geometry
        const highlightGeo = new THREE.BufferGeometry();
        highlightGeo.setAttribute( 'position', new THREE.Float32BufferAttribute( activePositions, 3 ) );

        // 3. Create a thick, glowing Line material
        // Note: Standard LineBasicMaterial doesn't support 'linewidth' > 1 in many browsers (WebGL limitation)
        // But we'll use a bright color and depthTest: false to make it pop.
        const highlightMat = new THREE.LineBasicMaterial({
          color: 0xf08080,
          linewidth: 5, // Works on some systems, ignored on others
          transparent: true,
          opacity: 1.0,
          depthTest: false 
        });

        featureHighlightMesh = new THREE.LineSegments( highlightGeo, highlightMat );
        featureHighlightMesh.updateWorldMatrix( true, true );

        // 4. Attach to the parent
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      function popup_card_cleanup() {
        const card = document.getElementById('metadata-card');

        if (card) {
          card.scrollTop = 0;
          card.scrollLeft = 0;
          card.innerHTML = '';
          card.style.display = 'none';
        }

        // Clean up previous highlight
        if (featureHighlightMesh) {
          // Detach it from the old parent
          if (featureHighlightMesh.parent) {
            featureHighlightMesh.parent.remove( featureHighlightMesh );
          }

          if (pickedObject?.isInstancedMesh) {
            featureHighlightMesh.visible = false;
          } else {
            // Clean up the children (the wireframe)
            featureHighlightMesh.traverse( ( child ) => {
              if (child.geometry) child.geometry.dispose();
              if (child.material) child.material.dispose();
            });

            if (featureHighlightMesh.geometry) featureHighlightMesh.geometry.dispose();
            if (featureHighlightMesh.material) featureHighlightMesh.material.dispose();
            featureHighlightMesh = null;
          }
        }

        // --- RESTORE PREVIOUS SELECTION ---
        if (selectedObject) {
          if (selectedObject.material?.emissive !== undefined) {
            const oldColor = selectedObject.userData.originalEmissive || new THREE.Color( 0x000000 );
            selectedObject.material.emissive.copy( oldColor );
          }

          selectedObject.material.dispose();
          delete selectedObject.userData.originalEmissive;
          delete selectedObject.userData.hasUniqueMaterial;
        }

        selectedObject = null;
        mouse_wheel = true;
        return;
      }

      function handle_raycast_click( event ) {
        popup_card_cleanup();

        // Exit the function if pointer is on the fixed menu or gui
        if (event.target.closest( '#fixed_menu' ) || event.target.closest( '#right_gui_position' )) {
          return;
        }

        // Calculate how far the mouse moved
        const deltaX = Math.abs( event.clientX - mouseDownPos.x );
        const deltaY = Math.abs( event.clientY - mouseDownPos.y );

        // If moved more than 5 pixels, it was likely a camera drag, not a click
        if (deltaX > 5 || deltaY > 5) return;

        if (!raycaster) {
          raycaster = new THREE.Raycaster();
          raycaster.params.Points.threshold = 0.05;
        }

        if (!mouse) mouse = new THREE.Vector2();

        const HIGHLIGHT_COLOR = new THREE.Color( 0xf08080 );

        // Calculate mouse position in normalized device coordinates
        mouse.x = ( event.clientX / window.innerWidth ) * 2 - 1;
        mouse.y = -( event.clientY / window.innerHeight ) * 2 + 1;

        tileset_obj.tilesRenderer.group.updateMatrixWorld( true );

        // Raycast against raycastableObjects or the scene
        raycaster.setFromCamera( mouse, camera );
        const intersects = raycaster.intersectObjects( raycastableObjects.length > 0 ? raycastableObjects : scene.children, true );

        if (intersects.length === 0) return;

        const visibleIntersects = intersects.filter( hit => hit.object.visible );
        if (visibleIntersects.length === 0) return;

        // --- HANDLE NEW SELECTION ---
        const intersect = visibleIntersects[ 0 ];
        pickedObject = intersect.object;
        selectedObject = pickedObject;

        // QUICK GUARD: Ensure geometry and attributes exist before we dig in
        if (!pickedObject.geometry) return;

        // Prepare Material for highlighting
        if (selectedObject.material && selectedObject.material.emissive) {
          if (selectedObject.userData.originalEmissive === undefined) {
            selectedObject.userData.originalEmissive = selectedObject.material.emissive.clone();
          }

          // Ensure we only highlight this specific instance
          if (!selectedObject.userData.hasUniqueMaterial) {
            selectedObject.material = selectedObject.material.clone();
            selectedObject.userData.hasUniqueMaterial = true;
          }

          selectedObject.material.emissive.copy( HIGHLIGHT_COLOR );
        }

        const isInstanced = pickedObject.isInstancedMesh;

        const userData = pickedObject.userData;
        const meshFeatures = userData.meshFeatures || userData.gltfExtensions?.EXT_instance_features;
        const structuralMetadata = userData.structuralMetadata;
        const schema = structuralMetadata?.schema || tileset_obj.userData?.schema;

        let primaryFeatureId = null;
        let primaryAttributeName = '';
        let featureMetadataList = [];
        let highlightId = null;
        let vertexIndex = -1;
        let barycoord;

        if (pickedObject.isPoints || pickedObject.isLine) {
          vertexIndex = intersect.index;
        } else if (intersect.face) {
          vertexIndex = intersect.face.a;
        }

        if (meshFeatures && ( meshFeatures.featureIds || meshFeatures.data?.featureIds )) {
          const featureIds = meshFeatures.featureIds || meshFeatures.data?.featureIds;

          for (let i = 0; i < featureIds.length; i++) {
            let featureId, featureIdAttr;
            const info = featureIds[ i ];
            let tableIndices, features;
            featureId = -1;

            const attrName1 = `_feature_id_${ info.attribute }`;
            const attrName2 = `_FEATURE_ID_${ info.attribute }`;

            featureIdAttr = pickedObject.geometry.hasAttribute( attrName1 )
              ? attrName1
              : pickedObject.geometry.hasAttribute( attrName2 )
                ? attrName2
                : '';

            // 1. STRATEGY: ATTRIBUTE and/or TEXTURE
            if (meshFeatures && !isInstanced && intersect.face) {
              if (intersect.faceIndex !== undefined) {
                barycoord = new THREE.Vector3();

                // Get the Barycentric coordinates of the hit

                const posAttr = intersect.object.geometry.getAttribute( 'position' );

                const vA = new THREE.Vector3();
                const vB = new THREE.Vector3();
                const vC = new THREE.Vector3();

                vA.fromBufferAttribute( posAttr, intersect.face.a );
                vB.fromBufferAttribute( posAttr, intersect.face.b );
                vC.fromBufferAttribute( posAttr, intersect.face.c );

                const localPoint = intersect.object.worldToLocal( intersect.point.clone() );

                THREE.Triangle.getBarycoord( localPoint, vA, vB, vC, barycoord );

                // Call getFeatures (synchronous)

                // Get the ID from the current feature set, texture includes propertyTable
                features = meshFeatures.getFeatures( intersect.faceIndex, barycoord );
                if (features) featureId = features[ info.attribute || info.propertyTable || 0 ];

                // MANUAL FALLBACK: If getFeatures failed but we have a raw attribute, grab it.

                if ((featureId === null || featureId === undefined || featureId === -1) && featureIdAttr && intersect.face) {
                  const attr = pickedObject.geometry.getAttribute( featureIdAttr );
                  if (attr) featureId = attr.getX( intersect.face.a );
                }
              }
            }
            // 2. STRATEGY: INSTANCE
            else if (featureIdAttr && isInstanced) {
              highlightId = intersect.instanceId;
              const attr = pickedObject.geometry.getAttribute( featureIdAttr );
              if (attr) featureId = attr.getX( intersect.instanceId );
            }

            // --- DATA RETRIEVAL ---
            if (featureId !== -1 && featureId !== null && featureId !== undefined && featureId !== info.nullFeatureId) {
              let metadataRow = {};
              let className = info.label || `Feature ${ i }`;

              // Only set the primary highlight data ONCE (the first valid set)
              if (primaryFeatureId === null && featureIdAttr) {
                primaryFeatureId = featureId;
                primaryAttributeName = featureIdAttr; 
              }

              if (structuralMetadata.tableAccessors) {
                const accessor = structuralMetadata.tableAccessors[ info.propertyTable ];

                if (accessor) {
                  metadataRow = accessor.getData( featureId, metadataRow );

                  // Decorate with the helpful UI context
                  metadataRow[ 'Attribute' ] = info.propertyTable;
                  metadataRow[ 'VertexId' ] = vertexIndex;

                  if (metadataRow.id === undefined && metadataRow.ID === undefined)
                    metadataRow[ 'ID' ] = featureId;

                  featureMetadataList.push({
                    class: accessor.className || className,
                    properties: metadataRow
                  });
                }
              } else {
                // Fallback for "Blind" IDs
                featureMetadataList.push({
                  class: className,
                  properties: { 'VertexId': vertexIndex, 'ID': featureId }
                });
              }
            }
          }
        }

        // --- STRUCTURAL METADATA ATTRIBUTE ---
        if (vertexIndex !== -1 && structuralMetadata?.attributeAccessors?.length > 0) {
          // Loop through Attribute Accessors (Classes defined per vertex)
          structuralMetadata.attributeAccessors.forEach( accessor => {
            const className = accessor.className;
            let properties = {};

            const _vA = new THREE.Vector3();
            const _vB = new THREE.Vector3();
            const _vC = new THREE.Vector3();
            const _interp = new THREE.Vector3();

            // 3. Each property in this class points to a vertex attribute
            for ( const [ propName, propertyAccessor ] of Object.entries( accessor.properties ) ) {
              let finalValue = null;

              if (barycoord && propertyAccessor.isAttribute) {
                const attr = pickedObject.geometry.getAttribute( propertyAccessor.attribute );

                if (attr) {
                  // Get values for all three vertices of the face
                  _vA.fromBufferAttribute( attr, intersect.face.a );
                  _vB.fromBufferAttribute( attr, intersect.face.b);
                  _vC.fromBufferAttribute( attr, intersect.face.c);

                  // Weighted sum based on barycentric coordinates
                  _interp.set( 0, 0, 0 )
                  .addScaledVector( _vA, barycoord.x )
                  .addScaledVector( _vB, barycoord.y )
                  .addScaledVector( _vC, barycoord.z );

                  finalValue = (propertyAccessor.type === 'SCALAR') ? _interp.x : _interp.clone();
                }
              }

              if (finalValue === null) {
                if (propertyAccessor.isTexture && intersect.uv) {
                  // 2026 Spec: Read metadata from a pixel at the UV coordinate
                  finalValue = propertyAccessor.sample( intersect.uv );
                } else if (propertyAccessor.get) {
                  // The loader usually provides a .get(index) method on the propertyAccessor
                  finalValue = propertyAccessor.get( vertexIndex );
                } else {
                  // Fallback: look at the attribute directly if the accessor is raw
                  const attrName = propertyAccessor.attribute?.toLowerCase();
                  const attrib = pickedObject.geometry.getAttribute( attrName );
                  if (attrib) finalValue = attrib.getX( vertexIndex );
                }
              }

              properties[ propName ] = finalValue;
            }

            // Check if meshFeatures already added a table-row for this class
            let existingEntry = featureMetadataList.find( item => item.class === className );

            if (existingEntry) {
              // Append/Overwrite with vertex-specific metadata
              Object.assign( existingEntry.properties, properties );

              // Update the ID to show the vertex index if it was a general feature ID before
              existingEntry.properties[ 'VertexId' ] = vertexIndex;
            } else {
              properties[ 'VertexId' ] = vertexIndex;

              featureMetadataList.push({
                class: className,
                properties: properties
              });
            }

            highlightId = vertexIndex;
          });
        }

        // --- STRUCTURAL METADATA TEXTURE ---
        if (structuralMetadata?.textureAccessors?.length > 0 && intersect.uv) {
          // Loop through Property Textures (Classes defined via textures)
          structuralMetadata.textureAccessors.forEach( accessor => {
            const className = accessor.className;
            const propNames = Object.keys( accessor.properties );

            if (!barycoord && intersect.face) {
              barycoord = new THREE.Vector3();
              const _vA = new THREE.Vector3();
              const _vB = new THREE.Vector3();
              const _vC = new THREE.Vector3();

              const attrPos = pickedObject.geometry.getAttribute( 'position' );

              _vA.fromBufferAttribute( attrPos, intersect.face.a );
              _vB.fromBufferAttribute( attrPos, intersect.face.b );
              _vC.fromBufferAttribute( attrPos, intersect.face.c );

              const localPoint = intersect.object.worldToLocal( intersect.point.clone() );

              THREE.Triangle.getBarycoord( localPoint, _vA, _vB, _vC, barycoord );
            }

            // Sample the texture at the intersection UV
            // getPropertyValuesAtTexel(properties, uv, geometry, targetArray)
            // Note: We pass the uv and the geometry of the picked object
            const values = accessor.getPropertyValuesAtTexel(
              propNames, 
              intersect.faceIndex,
              barycoord, 
              pickedObject.geometry
            );

            let properties = {};

            propNames.forEach( ( name, index ) => {
              // Map the array of values back to their property names
              properties[ name ] = values[ index ];
            });

            // Check if entry already exists to avoid duplicates
            let existingEntry = featureMetadataList.find( item => item.class === className );

            if (existingEntry) {
              Object.assign( existingEntry.properties, properties );
            } else {
              // Since textures vary per-pixel, UV is our unique identifier here
              properties[ 'UV_Coord' ] = new THREE.Vector2( intersect.uv.x, intersect.uv.y );

              featureMetadataList.push({
                class: className,
                properties: properties
              });
            }
          });
        }

        if (featureMetadataList.length > 0) {
          // Restore color
          if (selectedObject?.material?.emissive) {
            selectedObject.material.emissive.copy( selectedObject.userData.originalEmissive );
          }

          // Trigger the geometry-based highlight for the primary ID
          isInstanced
            ? highlightFeatureInstanced( highlightId )
            : pickedObject.isPoints
              ? highlightPoint( highlightId )
              : pickedObject.isLine
                ? highlightLine( highlightId )
                : highlightFeature( primaryFeatureId, primaryAttributeName );

          showUiPanel( { ...pickedObject.userData.metadata, featureMetadata: featureMetadataList }, event, schema, pickedObject.name, false );

          return;
        }

        if (vertexIndex !== -1 && ( pickedObject.geometry.hasAttribute( '_batchid' ) || pickedObject.geometry.hasAttribute( '_BATCHID' ) )) {
          const attr_name = pickedObject.geometry.hasAttribute( '_batchid' )
            ? '_batchid'
            : '_BATCHID';

          // Get the ID for this specific building/feature
          const batchId = pickedObject.geometry.attributes[ attr_name ].getX( vertexIndex );

          const properties = { VertexId: vertexIndex };
          let className = 'BatchId'; // Fallback

          let batchTable;
          let curr = pickedObject;

          // Climb parents to find the batch table

          while ( curr ) {
            if ( curr.batchTable !== undefined ) {
              batchTable = curr.batchTable;
              break;
            }

            curr = curr.parent;
          }

          if (batchTable !== undefined) {
            className = 'Batch Table';

            if (batchTable.header) { // B3DM
              // Iterate through all keys in the header (Height, Latitude, Longitude, etc.)
              for ( const key in batchTable.header ) {
                const attributeArray = batchTable.header[ key ];

                // Check if it's an array and has a value for our batchId
                if (Array.isArray( attributeArray ) && attributeArray.length > batchId) {
                  properties[ key ] = attributeArray[ batchId ];
                }
              }
            } else if (typeof batchTable.getPropertyNames === 'function') {
              // Extract all available properties from the batch table for this specific ID
              const keys = batchTable.getPropertyNames(); 

              keys.forEach( key => {
                const val = batchTable.getProperty( batchId, key );
                if (val !== undefined && val !== null) {
                  properties[ key ] = val;
                }
              });
            }
          }

          // Wrap in the format showUiPanel expects
          featureMetadataList.push({
            class: className,
            properties: properties
          });

          // Restore color
          if (selectedObject?.material?.emissive) {
            selectedObject.material.emissive.copy( selectedObject.userData.originalEmissive );
          }

          // Trigger the geometry-based highlight for the primary ID
          highlightFeature( batchId, attr_name );

          showUiPanel( { ...pickedObject.userData.metadata, featureMetadata: featureMetadataList }, event, schema, pickedObject.name, false );

          return;
        }

        // Fallback to standard metadata
        let tilesetMetadataOnly = !pickedObject.userData.metadata && !!pickedObject.parent;
        const data = pickedObject.userData.metadata;

        if (data || tilesetMetadataOnly) {
          showUiPanel( data, event, schema, pickedObject.name, tilesetMetadataOnly, pickedObject.type );
        } else {
          // If no metadata found, remove highlight
          if (selectedObject.material?.emissive) {
            selectedObject.material.emissive.copy( selectedObject.userData.originalEmissive );
          }

          selectedObject = null;
        }
      }

      async function showUiPanel( data, event, schema = null, meshName = '', tilesetMetadataOnly = false, type = '' ) {
        const card = document.getElementById('metadata-card');
        if (!card) return;

        /**
         * Helper: Formats arrays (simple or object-based) into HTML
         */
        function formatArray( arr ) {
          if (!arr || arr.length === 0) return '[]';

          // Force TypedArrays (Float32Array, etc.) into standard Arrays 
          // so .map() and .join() behave predictably
          const arrayData = ArrayBuffer.isView( arr ) ? Array.from( arr ) : arr;

          // If it's an array of objects (like matrix elements or custom structs)
          if (typeof arrayData[ 0 ] === 'object' && arrayData[ 0 ] !== null) {
            return arrayData.map( ( item, idx ) => {
              let itemHtml = `<div style="margin: 4px 0 4px 5px; padding-left: 8px; border-left: 2px solid #00d4ff; background: rgba(0,212,255,0.05);">`;
              itemHtml += `<div style="font-size: 9px; color: #00d4ff; opacity: 0.7;">Part ${idx + 1}</div>`;

              // --- Check for Matrix/Vector objects to flatten them ---
              if (item.elements && (Array.isArray( item.elements ) || ArrayBuffer.isView( item.elements ))) {
                // Just show the numbers, skip the "elements:" label
                itemHtml += `<div style="font-size: 11px;">${formatArray( item.elements )}</div>`;
              } else if (item.x !== undefined && item.y !== undefined) {
                // Just show the coordinate tuple, skip "x:", "y:", "z:" labels
                const zVal = item.z !== undefined ? `, ${item.z.toFixed( 2 )}` : '';
                itemHtml += `<div style="font-size: 11px;">(${item.x.toFixed( 2 )}, ${item.y.toFixed( 2 )}${zVal})</div>`;
              } else {
                // Fallback for normal custom structs/objects
                for ( const [ sk, sv ] of Object.entries( item ) ) {
                  const cleanSv = resolveValue( null, sk, sv );
                  itemHtml += `<div style="font-size: 11px;"><span style="color: #888;">${sk}:</span> ${cleanSv}</div>`;
                }
              }

              itemHtml += `</div>`;
              return itemHtml;
            }).join('');
          }

          // Standard simple array (numbers, strings, booleans)
          return `[ ${arr.map( v => {
            if (typeof v === 'number') return Number.isInteger( v ) ? v : v.toFixed( 2 );
            if (typeof v === 'bigint') return v.toString();
            return String( v );
          }).join(', ')} ]`;
        }

        /**
         * Helper: Resolves any value type into a UI-friendly string/HTML
         */
        function resolveValue( className, propName, val, depth = 0 ) {
          if (depth > 3) return '<span style="color:#666;">[Max Depth]</span>';

          let processedVal = val;

          if (processedVal === null || processedVal === undefined) return 'N/A';

          // Handle Three.js Math Objects / Matrices
          if (typeof processedVal === 'object') {
            if (processedVal.isVector3) return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )}, ${processedVal.z.toFixed( 2 )})`;
            if (processedVal.isVector2) return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )})`;
            if (processedVal.isColor) return `RGB(${processedVal.r.toFixed( 2 )}, ${processedVal.g.toFixed( 2 )}, ${processedVal.b.toFixed( 2 )})`;

            // Matrix4 / Matrix3 elements
            if (processedVal.elements && Array.isArray( processedVal.elements )) {
              return formatArray( processedVal.elements );
            }
          }

          const propDef = schema?.classes?.[ className ]?.properties?.[ propName ];

          // Pre-check: If it's a string that looks like an array but isn't parsed
          // This handles the "[One, Two]" or "[true, false]" strings
          if (typeof processedVal === 'string' &&
            ((processedVal.startsWith( '{' ) && processedVal.endsWith( '}' )) ||
             (processedVal.startsWith( '[' ) && processedVal.endsWith( ']' )))) {

            try {
              // Try JSON parse first (handles [ "One", "Two" ])
              processedVal = JSON.parse( processedVal );
            } catch ( e ) {
              // Manual fallback for unquoted strings (like [ One, Two ])
              processedVal = processedVal.slice( 1, -1 ).split( ',' ).map( s => s.trim() );
            }
          }

          if (processedVal === null || processedVal === undefined) return 'N/A';

          // Handle Arrays (The core of EXT_structural_metadata)
          if (Array.isArray( processedVal ) || ArrayBuffer.isView( processedVal )) {
            if (processedVal.length === 0) return '[]';

            // Handle ENUM Arrays
            if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
              const enumValues = schema.enums[ propDef.enumType ].values;
              return `[ ${processedVal.map( v => {
                // Look up by integer value (0, 1, 2) or by string name
                const entry = enumValues.find( e => e.value == v || e.name === v );
                return entry ? entry.name : v;
              }).join(', ')} ]`;
            }

            // General Array (Booleans, Strings, etc.)
            return formatArray( processedVal );
          } else {
            if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
              const entry = schema.enums[ propDef.enumType ].values.find( v => v.value == processedVal || v.name === processedVal );
              return entry ? entry.name : processedVal;
            }

            if (propDef?.type === 'BOOLEAN') {
              const isTrue = (processedVal === true || processedVal === 'true' || processedVal === 1);
              return isTrue ? 'Yes' : 'No';
            }
          }

          // Final Formatting based on Type
          if (typeof processedVal === 'object' && processedVal !== null) {
            // 1. CATCH NESTED MATRICES/ELEMENTS OBJECTS
            if (processedVal.elements && ( Array.isArray( processedVal.elements ) || ArrayBuffer.isView( processedVal.elements ) )) {
              return formatArray( processedVal.elements );
            }

            // 2. CATCH NESTED VECTORS (x, y, z)
            if (processedVal.x !== undefined && processedVal.y !== undefined) {
              const zStr = processedVal.z !== undefined ? `, ${processedVal.z.toFixed( 2 )}` : '';
              return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )}${zStr})`;
            }

            // 3. FALLBACK: Generic Nested Object loop
            let subHtml = '<div style="margin-left: 10px; font-size: 0.9em; color: #ccc;">';

            for ( const [ k, v ] of Object.entries( processedVal ) ) {
              subHtml += `<div><span style="color: #888;">${k}:</span> ${resolveValue( null, k, v, depth + 1 )}</div>`;
            }

            return subHtml + '</div>';
          }

          if (typeof processedVal === 'number') return Number.isInteger( processedVal ) ? processedVal : processedVal.toFixed( 2 );
          if (typeof processedVal === 'bigint') return processedVal.toString();
          if (typeof processedVal === 'boolean') return processedVal ? 'Yes' : 'No';

          return processedVal;
        }

        // --- HTML Assembly ---
        let html = '';
        let show_copy_to_clipboard = true;
        const tileset = tilesetMetadataOnly ? tileset_obj.userData?.tileset : data?.tileset;

        // 1. Tileset Section
        if (tileset?.class) {
          html += `<div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                     <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">TILESET: ${tileset.class}</div>
                   </div>`;

          if (tileset.properties) {
            for ( const [ key, val ] of Object.entries( tileset.properties ) ) {
              html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${resolveValue(tileset.class, key, val)}</span></div>`;
            }
          }
        } else if (tilesetMetadataOnly) {
          show_copy_to_clipboard = false;
          const description = (type === 'Box3Helper') ? 'No Data (turn off bounding box)' : 'No Data';
          html += `<div style="color: #fff; font-size: 11px;">${description}</div>`;
        }

        // 2. Feature / Tile / Group / Content Sections
        if (data && !tilesetMetadataOnly) {
          if (tileset) html += '<br>';

          // Tile Class
          if (data.tile?.class) {
            html += `<div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                       <div style="font-size: 10px; color: #00d4ff;">TILE: ${data.tile.class}</div>
                     </div>`;

            for ( const [ k, v ] of Object.entries( data.tile.properties || {} ) ) {
              html += `<div class="prop-row"><span class="prop-label">${k}:</span><span class="prop-value">${resolveValue( data.tile.class, k, v )}</span></div>`;
            }

            html += '<br>';
          }

          if (meshName) {
            html += `<div style="font-size: 12px; font-weight: bold; color: #fff;">Selected: ${meshName}</div><br>`;
          }

          // Group Metadata - Maybe entries like color, priority...

          if (data.group?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.group.class}</div>
              </div>`;

            if (data.group.properties) {
              for ( const [ key, val ] of Object.entries( data.group.properties ) ) {
                const display = resolveValue( data.group.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }

            html += `<br>`;
          }

          // Content Metadata - Maybe entries like vertices, materials...

          if (data.content?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 8px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.content.class}</div>
              </div>`;

            if (data.content.properties) {
              for ( const [ key, val ] of Object.entries( data.content.properties ) ) {
                const display = resolveValue( data.content.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }
          }

          // Feature Metadata (Structural Metadata)
          if (data.featureMetadata) {
            const fms = Array.isArray( data.featureMetadata ) ? data.featureMetadata : [ data.featureMetadata ];

            fms.forEach( fm => {
              html += `<div style="border-bottom: 1px solid #00d4ff; margin-top: 10px; padding-bottom: 4px;">
                         <div style="font-size: 10px; color: #00d4ff; font-weight: bold;">${fm.class}</div>
                       </div>`;

              for ( const [ k, v ] of Object.entries( fm.properties || {} ) ) {
                html += `<div class="prop-row"><span class="prop-label">${k}:</span><span class="prop-value">${resolveValue( fm.class, k, v )}</span></div>`;
              }

              html += '<br>';
            });
          }

          // 6. FeatureId - Maybe entries from EXT_mesh_features, EXT_structural_metadata...
          // Only show if not already merged into metadata

          if (data.featureId && Array.isArray( data.featureId ) && !data.featureMetadata) {
            data.featureId.forEach( ( fid_class, index ) => {
              // Use the class name if found, otherwise use a readable layer index
              const label = fid_class.class || `Feature Layer ${index}`;
              const idValue = fid_class.id !== undefined ? fid_class.id : 'N/A';

              html += `
                <div class="feature-group" style="margin-top: 10px; border-left: 2px solid #00d4ff; padding-left: 8px;">
                  <div style="font-size: 10px; color: #aaa; font-weight: bold;">${ label }</div>
                  <div class="prop-row" style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="prop-label" style="color: #00d4ff;">ID:</span><span class="prop-value">${ idValue }</span>
                  </div>
                </div>`;
            });
          }
        }

        // 3. Clipboard Button
        if (show_copy_to_clipboard) {
          html += `
            <div style="padding-top: 8px; border-top: 1px solid #444; text-align: center;">
              <button id="copy-btn" style="background: #111; color: #00d4ff; border: 1px solid #00d4ff; border-radius: 4px; padding: 5px; cursor: pointer; font-size: 11px; width: 100%;">
                📋 Copy Metadata (JSON)
              </button>
            </div>`;

          card.innerHTML = html;

          // --- Post-Render Logic: Clipboard & Positioning ---
          const btn = document.getElementById('copy-btn');

          // Create a "Deep Clean" copy for the clipboard
          const dataForClipboard = data
            ? { ...data }
            : tileset_obj.userData?.tileset
              ? { ...tileset_obj.userData.tileset }
              : {};

          btn.onclick = () => {
            // 1. Deep copy and BigInt handling
            const cleanData = JSON.parse( JSON.stringify( dataForClipboard, ( k, v ) => 
              typeof v === 'bigint' ? v.toString() : v
            ));

            // 2. Promotion: Convert stringified JSON into actual objects
            const deepUnescape = ( obj ) => {

              for ( const key in obj ) {
                if (typeof obj[ key ] === 'string' && ( obj[ key ].startsWith( '{' ) || obj[ key ].startsWith( '[' ) )) {
                  try {
                    obj[ key ] = JSON.parse( obj[ key ] );
                    deepUnescape( obj[ key ] );
                  } catch ( e ) {}
                } else if (obj[ key ] && typeof obj[ key ] === 'object') {
                  deepUnescape( obj[ key ] );
                }
              }
            };

            deepUnescape( cleanData );

            // 3. Metadata cleanup
            if (meshName && meshName !== 'metadata_proxy_mesh') cleanData[ 'Selected' ] = meshName;
            delete cleanData.schema;

            // 4. Formatting: Pretty-print with "airy" compact arrays
            let text = JSON.stringify( cleanData, null, 2 );
            text = text.replace(/\[\s+([\d\.\-\"\'\w\s,]+)\s+\]/g, ( match, content ) => {
              return `[ ${content.replace(/\s+/g, ' ')} ]`;
            });

            navigator.clipboard.writeText( text ).then( () => alert( '✅ Copied Airy JSON!' ) );
          };
        } else {
          card.innerHTML = html;
        }

        // Display and Measurement
        card.style.visibility = 'hidden';
        card.style.display = 'block';

        const rect = card.getBoundingClientRect();
        const vw = window.innerWidth, vh = window.innerHeight;
        let x = event.clientX + 15, y = event.clientY + 15;

        if (x + rect.width > vw) x = event.clientX - rect.width - 15;
        if (y + rect.height > vh) y = vh - rect.height - 15;

        card.style.left = Math.max( 5, x ) + 'px';
        card.style.top = Math.max( 5, y ) + 'px';
        card.style.visibility = 'visible';
      }

      function hideUiPanel() {
        // Restore color
        if (selectedObject?.material?.emissive) {
          selectedObject.material.emissive.copy( selectedObject.userData.originalEmissive );
        }

        popup_card_cleanup();
      }

      function set_bounding_box() {
          if (!tileset_obj) return;
          bbox_enabled = !bbox_enabled;

          if (box_helper_added) {
            bbox_enabled ? scene.add( boxHelper ) : scene.remove( boxHelper );
          } else {
            tileset_obj.traverse( ( child ) => {
              if (child.isLineSegments && ( child.parent.bbox?.uuid === child.uuid )) child.visible = bbox_enabled;
            });
          }

          const bbox_color = bbox_enabled ? 'lightgreen' : 'transparent';
          document.getElementById('btn_bounding_box').style.backgroundColor = bbox_color;
          mouse_wheel = true;
      }

      function set_wireframe() {
          if (!tileset_obj) return;
          wireframe_enabled = !wireframe_enabled;

          tileset_obj.setWireframe( wireframe_enabled );

          const w_color = wireframe_enabled ? 'lightgreen' : 'transparent';
          document.getElementById('btn_wireframe').style.backgroundColor = w_color;
          mouse_wheel = true;
      }

      function render( timestamp ) {
        if (tileset_obj) {
          const isLoading = tileset_obj.tilesRenderer.isLoading;

          if (animation_running || mouse_down || mouse_wheel || extended_render || isLoading) {
            if (stats_enabled) stats.begin();

            if (animation_running) {
              clock.update( timestamp );
              animation_mixer.update( clock.getDelta() );
            }

            tileset_obj.tilesRenderer.update();

            controls.update();

            renderer.clear();
            renderer.render( scene, camera );

            if (stats_enabled) stats.end();

            if (isLoading) {
              // Keep extended render in check
              extended_count = -1;
              count = -1;
            } else {
              if (extended_render) {
                if (extended_count > 20) {
                  extended_render = false;
                  extended_count = 0;
                  mouse_wheel = true;
                  count = 0;
                  finish_loading();
                } else {
                  extended_count ++;
                }
              } else if (mouse_wheel) {
                if (count > 20) {
                  mouse_wheel = false;
                  count = 0;
                } else {
                  count ++;
                }
              }
            }
          }
        }

        if (render_requested) requestAnimationFrame( render );
      }

      async function reset_all( reset = false ) {
        if (stats) stats.dom.style.visibility = 'hidden';
        document.getElementById('metadata_message').style.visibility = 'hidden';
        document.getElementById('tilesRenderer_error_message').style.visibility = 'hidden';
        document.getElementById('btn_stats').style.backgroundColor = 'transparent';
        document.getElementById('btn_variants').style.backgroundColor = 'transparent';
        document.getElementById('btn_variants').style.display = 'none';

        init_running = false;

        // Reset the view
        if (reset === true) {
          if (scene) {
            controls.reset();
          }
        } else {
          // Page (re)loading
          document.getElementById('btn_load').disabled = false;
          document.getElementById('btn_url').style.backgroundColor = 'transparent';
          document.getElementById('btn_lod').style.backgroundColor = 'transparent';
          document.getElementById('btn_token').style.backgroundColor = 'transparent';
          document.getElementById('btn_assetID').style.backgroundColor = 'transparent';
          document.getElementById('btn_animate').style.backgroundColor = 'transparent';

          if (scene) {
            set_back_color();

            if (tileset_obj) await scene_cleanup();

            if (gui) gui.dispose();

            while (scene.children.length > 0) {
              scene.remove( scene.children[ 0 ] );
            }

            renderer.clear();
            renderer.dispose();
          }

          document.getElementById('btn_animate').style.display = 'none';
          document.getElementById('div_error').style.display = 'none';
          document.getElementById('assetID_entry').value = '';
          document.getElementById('token_entry').value = '';
          document.getElementById('url_entry').value = '';
          selected_url_file = '';
          currentMaxTiles = '100';
          currentDepth = '4';

          enable_disable( true );
        }

        mouse_wheel = true;
      }

      async function scene_cleanup() {
        if (!tileset_obj) return;

        mouse_wheel = true;

        hideUiPanel();

        if (bbox_enabled) await set_bounding_box();
        if (wireframe_enabled) await set_wireframe();

        if (animation_mixer) {
          animation_mixer.stopAllAction();

          for ( let i = 0; i < animations.length; i++ ) {
            animation_mixer.uncacheAction( animations[ i ] );
            animation_mixer.uncacheClip( animations[ i ] );
          }

          animation_mixer.uncacheRoot( animation_mixer.getRoot() );
        }

        if (stats_enabled) set_statistics();

        if (stats && stats.dom && stats.dom.parentNode) {
          stats.dom.parentNode.removeChild( stats.dom );
          stats = null;
        }

        if (featureHighlightMesh) {
          if (featureHighlightMesh.parent) {
            featureHighlightMesh.parent.remove( featureHighlightMesh );
          }

          featureHighlightMesh.traverse( ( child ) => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
          });

          featureHighlightMesh = null;
        }

        if (ghostMesh) {
          if (ghostMesh.parent) {
            ghostMesh.parent.remove( ghostMesh );
          }

          ghostMesh.traverse( ( child ) => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
          });

          ghostMesh = null;
        }

        scene.remove( tileset_obj );

        renderer.clear();
        render_requested = false;

        if (clock) {
          clock.disconnect();
          clock.dispose();
          clock = undefined;
        }

        if (tileset_obj.dispose) tileset_obj.dispose();
        if (boxHelper?.dispose) boxHelper.dispose();

        tileset_obj = null;

        if (isMobile === false) {
          renderer.info.reset();
          renderer.resetState();
        }
      }

      function enable_disable( disable = false ) {
        document.getElementById('btn_file_image_input').disabled = disable;
        document.getElementById('file_image_input').disabled = disable;
        document.getElementById('back_color').disabled = disable;
        document.getElementById('btn_stats').disabled = disable;
        document.getElementById('btn_quick_x').disabled = disable;
        document.getElementById('btn_wireframe').disabled = disable;
        document.getElementById('btn_bounding_box').disabled = disable;
        disabled_changed();

        mouse_wheel = true;
      }
    </script>

    <script>
      function document_ready() {
        isNewiPad = (/iPad/.test( navigator.platform ) && (/Mac OS X/i.test( navigator.userAgent ))) ||
          (navigator.maxTouchPoints !== undefined && navigator.maxTouchPoints > 2 && /MacIntel/.test( navigator.platform ));

        isMobile = (isNewiPad === false) && ((/iPhone|iPad|iPod/.test( navigator.platform )) ||
          (/Android|webOS|iPhone|iPad|iPod|BlackBerry|CriOS|IEMobile|Opera Mini/i.test( navigator.userAgent )));

        $('#cache_level').keypress( function( event ) { if (event.key === 'Enter') $(this).children(':selected').click(); });
        $('#depth_level').keypress( function( event ) { if (event.key === 'Enter') $(this).children(':selected').click(); });
        $('#assetID_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_set_assetID').click(); });
        $('#token_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_set_token').click(); });
        $('#url_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_load').click(); });

        if (navigator.userAgent.indexOf('Chrome') > -1 || navigator.userAgent.indexOf('Safari') > -1 || isMobile) {
          $('#cache_level').change( function() { $(this).children(':selected').click(); });
          $('#depth_level').change( function() { $(this).children(':selected').click(); });
        }

        document.getElementById('cache_level').selectedIndex = 0;
        document.getElementById('depth_level').selectedIndex = 0;

        alert('If 3D tileset is not visible, maybe one of the following applies:\n- If bounding box is visible maybe only metadata was loaded\n- The model might be in a land far far away:\n   - Click quick rotation button multiple times\n- Its features require use of token and asset ID\n- Its features are not implemented in the viewer\n- Its features are not supported by internal loader\n- Check console, if possible, for any silent errors\n- Use different LOD settings to see if that changes anything');
      }

      function disabled_changed() {
        $('button').each( function() {
          if (this.disabled === false ) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });

        $('select').each( function() {
          if (this.disabled === false) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });

        $('input[type=color]').each( function() {
          if (this.disabled === false ) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px whitesmoke'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });
      }
    </script>
  </body>
</html>
