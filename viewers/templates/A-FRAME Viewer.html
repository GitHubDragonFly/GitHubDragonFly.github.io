<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="encoding" content="utf-8" charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A-Frame Viewer - Single Model or Scene">
    <link rel="stylesheet" href="../static/css/mobile-viewers.css">
    <link rel="shortcut icon" href="../../images/favicon.ico" type="image/x-icon"/>

    <script>
      // Resource Loading Failures (404 or similar)
      window.addEventListener( 'error', function ( event ) {
        // We check if the target has a 'src' or 'href' to identify it as a resource
        if (event.target.src || event.target.href) {
          console.error( 'RESOURCE ERROR: ', {
            element: event.target.tagName,
            url: event.target.src || event.target.href,
            html: event.target.outerHTML
          });

          // If the failed resource is jQuery, show the alert immediately
          if ((event.target.src || '').includes('jquery')) {
            alert('jQuery failed to load. Limited functionality. Check your internet connection!');
          }
        }
      }, true); // The 'true' here is vital; it enables the "capturing" phase

      // Standard JavaScript Runtime Errors
      window.onerror = function ( message, source, lineno, colno, error ) {
        console.log( 'RUNTIME ERROR CAUGHT' );

        console.log({
          message: message, // Error message
          file: source,     // The script file where it happened
          line: lineno,     // Line number
          column: colno,    // Column number
          errorObj: error   // The actual Error object (includes stack trace)
        });

        // Returning 'true' prevents the error from showing up in the browser console
        return false; 
      };

      // Unhandled Promise Rejections (Async Errors)
      window.addEventListener( 'unhandledrejection', function ( event ) {
        console.warn( 'UNHANDLED PROMISE: ', event.reason );

        // event.promise is the promise that failed
        // event.reason is usually the error object or message
      });
    </script>

    <script async src="https://cdn.jsdelivr.net/npm/es-module-shims@2.8.0/dist/es-module-shims.min.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.min.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
          "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
          "aframe": "https://cdn.jsdelivr.net/npm/aframe@1.7.1/dist/aframe-v1.7.1.module.min.js",
          "meshoptimizer": "https://esm.sh/meshoptimizer@1.1.1"
        }
      }
    </script>

    <script>
      // Workaround for Immersive Web Emulator XRWebGLBinding crash
      if (typeof XRWebGLBinding !== 'undefined' && XRWebGLBinding.prototype) {
        try {
          // Deleting this property forces Three.js to fallback to standard WebXR rendering
          delete XRWebGLBinding.prototype.createProjectionLayer;
          console.log( 'Successfully bypassed XRWebGLBinding compatibility issue' );
        } catch ( e ) {
          console.warn( 'Could not patch XRWebGLBinding: ', e);
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js" defer></script>

    <script>
      var selected_url_file = '', url_displayed = false, url_loading = false;
      var manager, loaded_model, material, extension, animations, vertex_colors;
      var isMobile, activeMixers = [], raycaster, mouse, mouseDownPos, pickedObject;
    </script>

    <script type="module">
      import * as AFRAME from 'aframe';
    </script>

    <style>
      /* Force A-Frame's button UI layer to sit on top of everything */
      .a-enter-vr {
        position: fixed !important;
        bottom: 20px !important;
        right: 20px !important;
        z-index: 99999 !important;
      }

      /* --- 1. Default Style for Landscape / Desktop (Hidden) --- */
      #vr_message {
        display: none;
        position: absolute;
        font-family: Monospace, Arial;
        color: #d1cefc;
        background: rgba(0, 0, 0, 0.85);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #ff4a4a;
        pointer-events: auto;
        text-align: center;
        --safe-bottom: calc(100vh - 100svh);
        bottom: calc(var(--safe-bottom, env(safe-area-inset-bottom, 0px)) + 15px);
        left: 5px;
        right: 5px;
      }

      /* --- 2. Action Selectors (Triggered by JS classes on the body) --- */

      /* While the model is loading, forcefully hide the VR button container */
      .vr-loading-locked .a-enter-vr {
        display: none !important;
      }

      /* ALSO hide the warning message during the loading phase */
      .vr-loading-locked.vr-capable.in-portrait #vr_message {
        display: none !important;
      }

      /* Hides the VR button only when device is VR-capable AND in portrait */
      .vr-capable.in-portrait .a-enter-vr {
        display: none !important;
      }

      /* Displays the warning box only when device is VR-capable AND in portrait */
      .vr-capable.in-portrait #vr_message {
        display: block !important;
      }

      /* Warning text styling inside the visible box */
      .orientation-warning .msg-text {
        color: #ff4a4a;
        font-weight: bold;
      }

      .orientation-warning .msg-text::before {
        content: "🔄 Rotate your device for VR";
      }
    </style>

    <!-- Using A-Frame Library from: https://aframe.io -->

    <title>A-Frame Viewer</title>
  </head>
  <body onload="reset_all(); enable_disable( true ); document_ready();">
    <div id="fixed_menu" class="fixed-menu">
      <div class="fm">
        <button title="URL of the remote 3D model" id="btn_url" onclick="show_url();" style="background-color: transparent; min-width: 34px;">URL</button>
        <button title="Browse Local Files" id="btn_file_input" style="min-width: 54px;" onclick="document.getElementById('file_input').click();">Browse</button>
        <label for="btn_file_input" title="Browse Local Files"></label>
        <input type="file" id="file_input" style="display: none;" onchange="init()" accept=".bim, .dae, .fbx, .glb, .gltf, .ply, .usd, .usda, .usdc, .usdz" />
        <select title="Scale" id="model_scale" disabled>
          <option title="Model Scale" value="scale" selected disabled>Scale</option>
          <option title="Scale 0.05x" value="0.05x" onclick="set_model_scale( '0.05x' );">0.05x</option>
          <option title="Scale 0.1x" value="0.1x" onclick="set_model_scale( '0.1x' );">0.1x</option>
          <option title="Scale 0.2x" value="0.2x" onclick="set_model_scale( '0.2x' );">0.2x</option>
          <option title="Scale 0.5x" value="0.5x" onclick="set_model_scale( '0.5x' );">0.5x</option>
          <option title="Scale 2x" value="2x" onclick="set_model_scale( '2x' );">2x</option>
          <option title="Scale 5x" value="5x" onclick="set_model_scale( '5x' );">5x</option>
          <option title="Scale 10x" value="10x" onclick="set_model_scale( '10x' );">10x</option>
          <option title="Scale 20x" value="20x" onclick="set_model_scale( '20x' );">20x</option>
        </select>
        <button title="Quick -90 degree X-Axis Rotation" id="btn_quick_x" onclick="quick_x_rotation();" style="min-width: 15px;" disabled>&#x2191</button>
      </div>
      <div class="fm" id="url" style="display: none;">
        <label for="url_entry" title="Remote URL"></label>
        <input type="text" id="url_entry" value="" style="width: calc(75% - 12px);" />
        <button title="Load" id="btn_load" onclick="load_url_file();" style="min-width: 8.5%;">Load</button>
        <button title="Clear" id="btn_clear" onclick="clear_url();" style="min-width: 8.5%;">Clear</button>
      </div>
    </div>

    <a-scene id="a_scene" scene-animation-runner vr-session-monitor vr-button-gate vr-mode-ui="enabled: true;" webxr="referenceSpaceType: local-floor; optionalFeatures: local-floor, bounded-floor;">
      <a-sky color="#87CEEB"></a-sky>

      <a-light type="ambient" color="#FFF" intensity="1.5" position="1 1 1"></a-light>
      <a-light type="directional" color="#FFF" intensity="3.0" position="-1 1 1"></a-light>

      <a-entity id="rig" position="0 0 4" wheel-zoom>
        <a-camera look-controls="magicWindowTrackingEnabled: false;" wasd-controls position="0 1.6 0"></a-camera>

        <a-entity id="model-container" manual-model-raycast raycast-listen position="0 0 -3"></a-entity>

        <a-entity laser-controls="hand: right" raycaster="objects: .raycastable"></a-entity>
        <a-entity laser-controls="hand: left" raycaster="objects: .raycastable"></a-entity>
      </a-entity>
    </a-scene>

    <div id="vr_message" class="orientation-warning"><span class="msg-text"></span></div>

    <div id="div_error" class="error_msg">E R R O R !</div>
    <div id="div_loading" class="loading_msg">A-FRAME Viewer</div>

    <script>
      function show_url() {
        if (url_displayed) {
          url_displayed = false;
          document.getElementById('url').style.display = 'none';
          document.getElementById('btn_url').style.backgroundColor = 'transparent';
        } else {
          document.getElementById('btn_url').style.backgroundColor = 'lightgreen';
          document.getElementById('url').style.display = 'block';
          url_displayed = true;
        }
      }

      function load_url_file() {
        let url = document.getElementById('url_entry').value.trim();
        if (url !== '') { selected_url_file = url; url_loading = true; init(); }
      }

      function clear_url() { document.getElementById('url_entry').value = ''; }

      function clear_highlight() {
        if (pickedObject?.material?._isCloned && pickedObject?.userData?.originalMaterial) {
          pickedObject.material.dispose();
          pickedObject.material = pickedObject.userData.originalMaterial;

          const mtls = Array.isArray( pickedObject.userData.originalMaterial )
            ? pickedObject.userData.originalMaterial
            : [ pickedObject.userData.originalMaterial ];

          mtls.forEach( m => m.dispose() );
          delete pickedObject.userData.originalMaterial;
        }
      }

      function initialize_event_listeners() {
        window.addEventListener( 'pointerdown', ( event ) => {
          mouseDownPos.x = event.clientX;
          mouseDownPos.y = event.clientY;
        }, false);

        window.addEventListener( 'pointerup', ( event ) => {
          // Calculate how far the mouse moved
          const deltaX = Math.abs( event.clientX - mouseDownPos.x );
          const deltaY = Math.abs( event.clientY - mouseDownPos.y );

          // If moved more than 5 pixels, it was likely a camera drag, not a click
          if (deltaX > 5 || deltaY > 5) return;

          clear_highlight();

          if (event.target.closest( '#fixed_menu' )) return;

          // 1. Safety check: make sure a model is actually loaded
          if (!loaded_model) return;

          // 2. Calculate normalized mouse coordinates (-1 to +1) for the viewport
          mouse.x = ( event.clientX / window.innerWidth ) * 2 - 1;
          mouse.y = - ( event.clientY / window.innerHeight ) * 2 + 1;

          // 3. Grab the active camera from the A-Frame scene component
          const sceneEl = document.getElementById( 'a_scene' );
          const camera = sceneEl ? sceneEl.camera : null;

          if (camera) {
            // 4. Project the ray from the camera lens through the mouse point
            raycaster.setFromCamera( mouse, camera );

            // 5. Check intersections. 'true' tells three.js to look deep into sub-meshes
            const intersects = raycaster.intersectObject( loaded_model, true );

            if (intersects.length > 0) {
              const hit = intersects[ 0 ];
              pickedObject = hit.object;

              console.log( 'Clicked Part Name: ', pickedObject.name );

              // Read baked-in file metadata
              if (pickedObject.userData && Object.entries( pickedObject.userData ).length > 0) {
                console.log( '--- Metadata Found --- ', pickedObject.userData );
              }

              // --- OPTIONAL TEST ACTION ---
              // Change the clicked sub-mesh material color to neon red to prove it works
              if (pickedObject.material) {
                // If the material is shared, clone it so only the clicked piece gets colored
                if (!pickedObject.material._isCloned) {
                  if (!pickedObject.userData.originalMaterial) {
                    pickedObject.userData.originalMaterial = pickedObject.material;
                  }

                  pickedObject.material = Array.isArray( pickedObject.material )
                    ? pickedObject.material[ 0 ].clone()
                    : pickedObject.material.clone();

                  pickedObject.material._isCloned = true;
                }

                pickedObject.material.color.setHex( 0xff0000 );
                pickedObject.material.needsUpdate = true;
              }
            }
          }
        }, false);

        window.addEventListener( 'wheel', ( event ) => {}, false );
      }
    </script>

    <script>
      function set_model_scale( scale ) {
        document.getElementById('model_scale').selectedIndex = 0;
        loaded_model.scale.multiplyScalar( parseFloat( scale.slice( 0, -1 ) ) );
        loaded_model.updateMatrix();
        loaded_model.updateMatrixWorld( true );

        // RECOMPUTE BOUNDING VOLUMES
        loaded_model.traverse( ( child ) => {
          if (child.isMesh || child.isPoints || child.isLine) {
            if (child.geometry) {
              child.geometry.computeBoundingBox();
              child.geometry.computeBoundingSphere();
            }
          }
        });
      }

      function quick_x_rotation() {
        loaded_model.rotateX( - Math.PI / 2.0 );
      }

      function clear_current_animations() {
        // Stop all active clips before clearing references
        activeMixers.forEach( mixer => {
          mixer.stopAllAction();

          for ( let i = 0; i < animations.length; i++ ) {
            mixer.uncacheAction( animations[ i ] );
            mixer.uncacheClip( animations[ i ] );
          }

          mixer.uncacheRoot( mixer.getRoot() );
        });

        animations = [];
        activeMixers = [];
      }

      function normalize_and_center_global_model() {
        if (!loaded_model) return;

        // Reset the parent wrapper's transformations so calculations start at true zero
        loaded_model.scale.set( 1, 1, 1 );
        loaded_model.position.set( 0, 0, 0 );
        loaded_model.rotation.set( 0, 0, 0 );
        loaded_model.updateMatrixWorld( true );

        // Create a clean bounding box
        const box = new THREE.Box3();
        let hasVisibleMesh = false;

        // Traversal: ONLY measure active visual Meshes/Points (ignores hidden cameras, bones, and lights)
        loaded_model.traverse( ( child ) => {
          if (child.isMesh || child.isPoints) {
            // Compute bounding settings for this specific geometry if not ready
            if (!child.geometry.boundingBox) child.geometry.computeBoundingBox();

            // Expand our master bounding box to include this mesh
            box.expandByObject( child );
            hasVisibleMesh = true;
          }
        });

        // Fallback: If no meshes were found in traversal, fallback to the entire object structure
        if (!hasVisibleMesh) {
          box.setFromObject( loaded_model );
        }

        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize( size );
        box.getCenter( center );

        // 3. Fallback protection if model dimensions are zero
        const maxDimension = Math.max( size.x, size.y, size.z );

        if (maxDimension === 0) {
          console.warn( 'Model size calculated as 0. Resetting to defaults.' );
          loaded_model.scale.set( 1, 1, 1 );
          loaded_model.position.set( 0, 1.6, -3 );
          return;
        }

        // 4. Scale down/up so the visible asset is exactly 2 A-Frame meters wide/tall
        const targetSize = 2.0; 
        const scaleFactor = targetSize / maxDimension;
        loaded_model.scale.set( scaleFactor, scaleFactor, scaleFactor );

        // 5. Center and shift the model up to eye-level (1.6) and forward (-3)
        const targetX = ( center.x * scaleFactor );
        const targetY = 1.6 - ( center.y * scaleFactor );
        const targetZ = -3 - ( center.z * scaleFactor );

        if (!isNaN( targetX ) && !isNaN( targetY ) && !isNaN( targetZ )) {
          loaded_model.position.set( targetX, targetY, targetZ );
        } else {
          loaded_model.position.set( 0, 1.6, -3 );
        }

        const mc = document.getElementById( 'model-container' );

        // Set raw Three.js object to the entity
        mc.setObject3D( 'mesh', loaded_model );

        // Tell A-Frame the object changed so the raycaster updates!
        mc.emit( 'model-loaded' , { type: 'mesh' } );

        return;
      }

      async function load_model( url = '', extension = '' ) {
        if (extension === '') {
          handle_error( 'Invalid extension!' );
          return;
        }

        await clear_current_animations();

        if (loaded_model === undefined) loaded_model = new THREE.Object3D();

        if (raycaster === undefined) raycaster = new THREE.Raycaster();
        if (mouse === undefined) mouse = new THREE.Vector2();

        initialize_event_listeners();

        await new Promise( async resolve => {
          switch ( extension ) {
            case '.BIM':
              const { BIMLoader } = await import( '../static/dotbim/loader/module/BIMLoader.js' );

              const bim_loader = new BIMLoader( manager );

              bim_loader.load( url, function( bim_meshes ) {
                loaded_model.add( bim_meshes );
                loaded_model.name = 'loaded_model';

                loaded_model.traverse( ( child ) => {
                  if (child.isMesh) {
                    if (!child.geometry.attributes.normal) child.geometry.computeVertexNormals();
                    child.geometry.normalizeNormals();
                    child.geometry.computeBoundingBox();
                    child.geometry.computeBoundingSphere();

                    vertex_colors = child.geometry.hasAttribute( 'color' );

                    const mtls = Array.isArray( child.material ) ? child.material : [ child.material ];

                    mtls.forEach( m => {
                      set_texture_colorSpace( m );
                      m.vertexColors = vertex_colors;
                      m.side = THREE.DoubleSide;
                      m.flatShading = true;

                      m.needsUpdate = true;
                    });
                  }
                });

                normalize_and_center_global_model();

                resolve( finish_loading() );
              }, function ( xhr ) { // onProgress
              }, function ( error ) { handle_error( error ); }); // onError

              break;

            case '.DAE':
              const { ColladaLoader } = await import( '../static/jsm/loaders/ColladaLoader.js' );

              const dae_loader = new ColladaLoader( manager );

              dae_loader.load( url, function( collada ) {
                loaded_model.add( collada.scene );
                loaded_model.name = 'loaded_model';

                loaded_model.traverse( ( child ) => {
                  if (child.isMesh || child.isPoints) {
                    if (!child.geometry.attributes.normal) child.geometry.computeVertexNormals();
                    child.geometry.normalizeNormals();
                    child.geometry.computeBoundingBox();
                    child.geometry.computeBoundingSphere();

                    vertex_colors = child.geometry.hasAttribute( 'color' );

                    const mtls = Array.isArray( child.material ) ? child.material : [ child.material ];

                    mtls.forEach( m => {
                      if (child.isMesh) set_texture_colorSpace( m );
                      if (child.isPoints) m.size = isMobile ? 0.001 : 0.005;
                      m.vertexColors = vertex_colors;
                      m.side = THREE.DoubleSide;
                      m.flatShading = false;

                      if (child.isMesh && m.transparent) {
                        m.polygonOffset = true;
                        m.polygonOffsetFactor = -1;
                        m.polygonOffsetUnits = -2;
                      }

                      m.needsUpdate = true;
                    });
                  }
                });

                normalize_and_center_global_model();

                resolve( finish_loading() );
              }, function ( xhr ) { // onProgress
              }, function ( error ) { handle_error( error ); }); // onError

              break;

            case '.FBX':
              const { DDSLoader } = await import( 'three/addons/loaders/DDSLoader.min.js' );
              const { TGALoader } = await import( 'three/addons/loaders/TGALoader.min.js' );
              const { FBXLoader } = await import( '../static/jsm/loaders/FBXLoader.js' );

              const fbx_loader = new FBXLoader( manager );

              const dds_loader = new DDSLoader( manager );
              manager.addHandler( /\.dds$/i, dds_loader );

              const tga_loader = new TGALoader( manager );
              manager.addHandler( /\.tga$/i, dds_loader );

              fbx_loader.load( url, function( fbx_scene ) {
                loaded_model.add( fbx_scene );
                loaded_model.name = 'loaded_model';

                if (fbx_scene.animations?.length > 0) {
                  animations = fbx_scene.animations;
                  const mixer = new THREE.AnimationMixer( loaded_model );
                  const action = mixer.clipAction( fbx_scene.animations[ 0 ] );
                  action.play();
                  activeMixers.push( mixer );
                }

                loaded_model.traverse( ( child ) => {
                  if (child.isMesh || child.isPoints) {
                    if (!child.geometry.attributes.normal) child.geometry.computeVertexNormals();
                    child.geometry.normalizeNormals();
                    child.geometry.computeBoundingBox();
                    child.geometry.computeBoundingSphere();

                    vertex_colors = child.geometry.hasAttribute( 'color' );

                    const mtls = Array.isArray( child.material ) ? child.material : [ child.material ];

                    mtls.forEach( m => {
                      if (child.isMesh) set_texture_colorSpace( m );
                      if (child.isPoints) m.size = isMobile ? 0.001 : 0.005;
                      m.vertexColors = vertex_colors;
                      m.side = THREE.DoubleSide;

                      if (child.isMesh && m.transparent) {
                        m.polygonOffset = true;
                        m.polygonOffsetFactor = -1;
                        m.polygonOffsetUnits = -2;
                      }

                      m.needsUpdate = true;
                    });
                  }
                });

                normalize_and_center_global_model();

                resolve( finish_loading() );
              }, function ( xhr ) { // onProgress
              }, function ( error ) { handle_error( error ); }); // onError

              break;

            case '.GLB':
            case '.GLTF':
              const { MeshoptDecoder } = await import( 'meshoptimizer' );
              const { KTX2Loader } = await import( 'three/addons/loaders/KTX2Loader.min.js' );
              const { DRACOLoader } = await import( 'three/addons/loaders/DRACOLoader.min.js' );
              const { GLTFLoader } = await import( '../static/jsm/loaders/GLTFLoader.js' );

              const gltf_loader = new GLTFLoader( manager );

              const draco_loader = new DRACOLoader( manager );
              draco_loader.setDecoderPath( 'https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/libs/draco/' );
              draco_loader.setDecoderConfig( { type: 'js' } );
              draco_loader.preload();

              const ktx2_loader = new KTX2Loader( manager );
              ktx2_loader.setTranscoderPath( 'https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/libs/basis/' );
              ktx2_loader.detectSupport( new THREE.WebGLRenderer( { antialias: true, alpha: true } ) );
              manager.addHandler( /\.ktx2$/i, ktx2_loader );

              gltf_loader.setKTX2Loader( ktx2_loader );
              gltf_loader.setDRACOLoader( draco_loader );
              gltf_loader.setMeshoptDecoder( MeshoptDecoder );

              gltf_loader.load( url, async function( gltf ) {
                loaded_model.add( gltf.scene );
                loaded_model.name = 'loaded_model';

                if (gltf.animations?.length > 0) {
                  animations = gltf.animations;
                  const mixer = new THREE.AnimationMixer( loaded_model );

                  // Play the first animation clip found by default
                  const action = mixer.clipAction( gltf.animations[ 0 ] );
                  action.play();

                  // Push to global array so the loop runner updates it
                  activeMixers.push( mixer );
                }

                await normalize_and_center_global_model();

                resolve( finish_loading() );

                gltf_loader.dracoLoader.dispose();
                gltf_loader.ktx2Loader.dispose();
              }, function ( xhr ) { // onProgress
              }, function ( error ) { handle_error( error ); }); // onError

              break;

            case '.PLY':
              const { PLYLoader } = await import( 'three/addons/loaders/PLYLoader.min.js' );
              const { mergeVertices } = await import( 'three/addons/utils/BufferGeometryUtils.min.js' );

              const ply_loader = new PLYLoader( manager );

              ply_loader.load( url, function( geometry ) {
                (geometry.hasAttribute( 'color' )) ? vertex_colors = true : vertex_colors = false;

                if ( geometry.index !== null ) {
                  geometry.deleteAttribute('normal');
                  geometry = mergeVertices( geometry );
                  geometry.computeVertexNormals();
                  geometry.normalizeNormals();
                  geometry.center();

                  material.vertexColors = vertex_colors;

                  loaded_model.add( new THREE.Mesh( geometry, material ) );
                } else {
                  let points_material = new THREE.PointsMaterial( { size: isMobile ? 0.001 : 0.005, color: 0xcccccc, transparent: true, blending: THREE.AdditiveBlending } );

                  points_material.vertexColors = vertex_colors;

                  const p_model = new THREE.Points( geometry, points_material );
                  p_model.sizeAttenuation = true;
                  p_model.sortPoints = true;
                  loaded_model.add( p_model );
                }

                loaded_model.name = 'loaded_model';

                normalize_and_center_global_model();

                resolve( finish_loading() );
              }, function ( xhr ) { // onProgress
              }, function ( error ) { handle_error( error ); }); // onError

              break;

            case '.USD':
            case '.USDA':
            case '.USDC':
            case '.USDZ':
              const { USDLoader } = await import( 'three/addons/loaders/USDLoader.js' );

              const usd_loader = new USDLoader( manager );

              usd_loader.load( url, function( usd ) {
                loaded_model.add( usd );
                loaded_model.name = 'loaded_model';

                if (usd.animations?.length > 0) {
                  animations = usd.animations;
                  const mixer = new THREE.AnimationMixer( loaded_model );

                  // Play the first animation clip found
                  const action = mixer.clipAction( usd.animations[ 0 ] );
                  action.play();

                  activeMixers.push( mixer );
                }

                normalize_and_center_global_model();

                loaded_model.traverse( ( child ) => {
                  if (child.isMesh) {
                    const mtls = Array.isArray( child.material ) ? child.material : [ child.material ];

                    mtls.forEach( m => {
                      set_texture_colorSpace( m );
                      m.side = THREE.DoubleSide;
                      m.flatShading = false;
                      m.needsUpdate = true;
                    });
                  }
                });

                resolve( finish_loading() );
              }, function ( xhr ) { // onProgress
              }, function ( error ) { handle_error( error ); }); // onError

              break;

            default:
              break;

          }
        });
      }

      async function init() {
        if (!url_loading && document.getElementById('file_input').files.length === 0) return;

        document.getElementById('btn_load').disabled = true;
        document.getElementById('btn_file_input').disabled = true;

        if (manager === undefined) {
          const { LoadingManager } = await import( 'three' );
          manager = new LoadingManager();
        }

        await reset_all( true );

        if (material === undefined) {
          material = new THREE.MeshPhongMaterial( {
            side: THREE.DoubleSide,
            vertexColors: false,
            specular: 0xA0A0A0,
            flatShading: true,
            color: 0xCFCFCF,
            shininess: 30,
            opacity: 1,
            fog: true
          });
        }

        mouseDownPos = { x: 0, y: 0 };

        document.getElementById('div_loading').style.display = 'block';
        document.getElementById('div_loading').innerHTML = 'Load & Visualize';

        enable_disable( true );

        const model_extensions = [ '.BIM', '.DAE', '.FBX', '.GLB', '.GLTF', '.PLY', '.USD', '.USDA', '.USDC', '.USDZ' ];

        if (!url_loading) {
          // Load local model file
          let fi = document.getElementById('file_input');

          console.time( 'Loading Time' );

          let fn_uc = fi.files[ 0 ].name.toUpperCase();
          extension = fn_uc.substring( fn_uc.lastIndexOf( '.' ) );

          if ( model_extensions.some( ext => fn_uc.endsWith( ext ) ) ) {
            let url = URL.createObjectURL( fi.files[ 0 ] );
            await load_model( url, extension );
            URL.revokeObjectURL( fi.files[ 0 ] );
          } else {
            console.log( 'No valid model file selected!' );
            document.getElementById('div_loading').style.display = 'none';
            document.getElementById('div_error').style.display = 'block';
            return;
          }

          selected_url_file = '';
        } else {
          // Reset the file input
          document.getElementById('file_input').value = '';
          url_loading = false;

          if (selected_url_file.indexOf( ',' ) > -1 || selected_url_file.indexOf( ';' ) > -1) {
            handle_error( 'Only a single URL is allowed!' );
            return;
          }

          if (selected_url_file.startsWith('https://github.com') === true) {
            selected_url_file = ( selected_url_file.replace('github.com', 'raw.githubusercontent.com') ).replace('blob/', '');
          }

          let url_uc = selected_url_file.toUpperCase();
          extension = url_uc.substring( url_uc.lastIndexOf( '.' ) );

          if ( model_extensions.some( ext => url_uc.endsWith( ext ) ) ) {
            console.time( 'Loading Time' );
            await load_model( selected_url_file, extension );
          } else {
            console.log( 'Not a valid URL for supported models!' );
            document.getElementById('div_loading').style.display = 'none';
            document.getElementById('div_error').style.display = 'block';
            return;
          }
        }
      }

      function set_texture_colorSpace( material ) {
        if (material.map && (!material.map.colorSpace || material.map.colorSpace === 'NoColorSpace')) {
          material.map.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.aoMap && (!material.aoMap.colorSpace || material.aoMap.colorSpace === 'NoColorSpace')) {
          material.aoMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.alphaMap && (!material.alphaMap.colorSpace || material.alphaMap.colorSpace === 'NoColorSpace')) {
          material.alphaMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.bumpMap && (!material.bumpMap.colorSpace || material.bumpMap.colorSpace === 'NoColorSpace')) {
          material.bumpMap.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.lightMap && (!material.lightMap.colorSpace || material.lightMap.colorSpace === 'NoColorSpace')) {
          material.lightMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.emissiveMap && (!material.emissiveMap.colorSpace || material.emissiveMap.colorSpace === 'NoColorSpace')) {
          material.emissiveMap.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.normalMap && (!material.normalMap.colorSpace || material.normalMap.colorSpace === 'NoColorSpace')) {
          material.normalMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.specularMap && (!material.specularMap.colorSpace || material.specularMap.colorSpace === 'NoColorSpace')) {
          material.specularMap.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.metalnessMap && (!material.metalnessMap.colorSpace || material.metalnessMap.colorSpace === 'NoColorSpace')) {
          material.metalnessMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.roughnessMap && (!material.roughnessMap.colorSpace || material.roughnessMap.colorSpace === 'NoColorSpace')) {
          material.roughnessMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.anisotropyMap && (!material.anisotropyMap.colorSpace || material.anisotropyMap.colorSpace === 'NoColorSpace')) {
          material.anisotropyMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.clearcoatMap && (!material.clearcoatMap.colorSpace || material.clearcoatMap.colorSpace === 'NoColorSpace')) {
          material.clearcoatMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.clearcoatNormalMap && (!material.clearcoatNormalMap.colorSpace || material.clearcoatNormalMap.colorSpace === 'NoColorSpace')) {
          material.clearcoatNormalMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.clearcoatRoughnessMap && (!material.clearcoatRoughnessMap.colorSpace || material.clearcoatRoughnessMap.colorSpace === 'NoColorSpace')) {
          material.clearcoatRoughnessMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.iridescenceMap && (!material.iridescenceMap.colorSpace || material.iridescenceMap.colorSpace === 'NoColorSpace')) {
          material.iridescenceMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.iridescenceThicknessMap && (!material.iridescenceThicknessMap.colorSpace || material.iridescenceThicknessMap.colorSpace === 'NoColorSpace')) {
          material.iridescenceThicknessMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.sheenColorMap && (!material.sheenColorMap.colorSpace || material.sheenColorMap.colorSpace === 'NoColorSpace')) {
          material.sheenColorMap.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.sheenRoughnessMap && (!material.sheenRoughnessMap.colorSpace || material.sheenRoughnessMap.colorSpace === 'NoColorSpace')) {
          material.sheenRoughnessMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.specularColorMap && (!material.specularColorMap.colorSpace || material.specularColorMap.colorSpace === 'NoColorSpace')) {
          material.specularColorMap.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.specularIntensityMap && (!material.specularIntensityMap.colorSpace || material.specularIntensityMap.colorSpace === 'NoColorSpace')) {
          material.specularIntensityMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.thicknessMap && (!material.thicknessMap.colorSpace || material.thicknessMap.colorSpace === 'NoColorSpace')) {
          material.thicknessMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.transmissionMap && (!material.transmissionMap.colorSpace || material.transmissionMap.colorSpace === 'NoColorSpace')) {
          material.transmissionMap.colorSpace = THREE.LinearSRGBColorSpace;
        }
      }

      function finish_loading() {
        console.timeEnd( 'Loading Time' );

        enable_disable( false );

        document.getElementById('btn_load').disabled = false;
        document.getElementById('btn_file_input').disabled = false;

        document.getElementById('div_loading').style.display = 'none';
        document.getElementById('div_error').style.display = 'none';
      }

      function handle_error( error ) {
        console.timeEnd( 'Loading Time' );
        console.log( 'Error loading model!' );
        console.log( error );

        document.getElementById('btn_load').disabled = false;
        document.getElementById('btn_file_input').disabled = false;

        document.getElementById('div_loading').style.display = 'none';
        document.getElementById('div_error').style.display = 'block';
      }

      async function reset_all( no_reload = false ) {
        if (!no_reload) {
          document.getElementById('file_input').value = '';
          document.getElementById('url_entry').value = '';
          selected_url_file = '';
        }

        document.getElementById('div_loading').innerHTML = '';
        document.getElementById('div_loading').style.display = 'none';
        document.getElementById('div_error').innerHTML = '';
        document.getElementById('div_error').style.display = 'none';
        vertex_colors = false;
        extension = '';

        let scene = document.getElementById( 'a_scene' ).object3D;

        if (scene) {
          await clear_current_animations();

          if (loaded_model?.name === 'loaded_model') {
            if (loaded_model.parent) loaded_model.parent.remove( loaded_model );

            if (loaded_model.skeleton && loaded_model.skeleton.boneTexture)
              loaded_model.skeleton.boneTexture.dispose();

            loaded_model.traverse( ( child ) => {
              if (child.isMesh || child.isPoints || child.isLineSegments) {
                if (child.skeleton && child.skeleton.boneTexture)
                  child.skeleton.boneTexture.dispose();

                if (child.material) {
                  const mtls = Array.isArray( child.material ) ? child.material : [ child.material ];

                  mtls.forEach( m => {
                    if (m.uniforms) {
                      Object.keys( m.uniforms ).forEach( ( key ) => {
                        if (m.uniforms[ key ].value) {
                          if (Array.isArray( m.uniforms[ key ].value ) && m.uniforms[ key ].value.length > 0) {
                            m.uniforms[ key ].value.forEach( val => { if (val?.isTexture) val.dispose(); } );
                          } else {
                            if (m.uniforms[ key ]?.value?.isTexture) m.uniforms[ key ].value.dispose();
                          }
                        }
                      });
                    } else {
                      for (const prop in m) {
                        if (m[ prop ]?.isTexture) m[ prop ].dispose();
                      };
                    }

                    m.dispose();
                  });
                }

                child.geometry.dispose();
              }
            });

            loaded_model = undefined;
          }
        }
      }

      function enable_disable( disable = false ) {
        document.getElementById('btn_quick_x').disabled = disable;
        document.getElementById('model_scale').disabled = disable;
        disabled_changed();
      }
    </script>

    <script>
      function document_ready() {
        isNewiPad = (/iPad/.test( navigator.platform ) && (/Mac OS X/i.test( navigator.userAgent ))) ||
          (navigator.maxTouchPoints !== undefined && navigator.maxTouchPoints > 2 && /MacIntel/.test( navigator.platform ));

        isMobile = !isNewiPad && ((/iPhone|iPad|iPod/.test( navigator.platform )) ||
          (/Android|webOS|iPhone|iPad|iPod|BlackBerry|CriOS|IEMobile|Opera Mini/i.test( navigator.userAgent )));

        $('#model_scale').keypress( function( event ) { if (event.key === 'Enter') $(this).children(':selected').click(); });
        $('#url_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_load').click(); });

        if (navigator.userAgent.indexOf('Chrome') > -1 || navigator.userAgent.indexOf('Safari') > -1 || isMobile) {
          $('#model_scale').change( function() { $(this).children(':selected').click(); });
        }

        document.getElementById('model_scale').selectedIndex = 0;

        AFRAME.registerComponent( 'vr-session-monitor', {
          init: function() {
            const sceneEl = this.el;

            this.resetCamera = function( reason ) {
              console.log( `Executing strict hardware-sensor reset due to: ${reason}` );

              const cameraEl = document.querySelector('a-camera') || document.querySelector('[camera]');
              const rigEl = document.querySelector('#rig');

              if (cameraEl && cameraEl.components[ 'look-controls' ]) {
                const lookControls = cameraEl.components[ 'look-controls' ];

                // 1. Force state updates back to flat-screen mode
                if (cameraEl.object3D) cameraEl.object3D.matrixAutoUpdate = true;

                // 2. Clear out the stale pose memory so it doesn't loop back
                lookControls.hasSavedPose = false;

                // 3. ZERO OUT THE MAGIC WINDOW GYRO CALCULATIONS
                lookControls.magicWindowAbsoluteEuler.set( 0, 0, 0 );
                lookControls.magicWindowDeltaEuler.set( 0, 0, 0 );
                lookControls.previousMagicWindowYaw = 0; // Forces gyro recalibration next frame

                // Force the internal device orientation controls to grab a fresh baseline
                if (lookControls.magicWindowControls && typeof lookControls.magicWindowControls.update === 'function') {
                  lookControls.magicWindowControls.update();
                }

                // 4. Reset manual touch/drag layers
                lookControls.pitchObject.rotation.x = 0;
                lookControls.yawObject.rotation.y = 0;

                // 5. Force positions onto the absolute Three.js layers
                if (cameraEl.object3D) {
                  cameraEl.object3D.position.set( 0, 0, 0 );
                  cameraEl.object3D.rotation.set( 0, 0, 0 );
                }

                cameraEl.setAttribute( 'position', '0 0 0' );
                cameraEl.setAttribute( 'rotation', '0 0 0' );

                if (rigEl) {
                  if (rigEl.object3D) {
                    rigEl.object3D.position.set( 0, 0, 4 );
                    rigEl.object3D.rotation.set( 0, 0, 0 );
                  }

                  rigEl.setAttribute( 'position', '0 0 4' );
                }

                // 6. Recalculate projection matrices for the active window aspect ratio
                if (cameraEl.components.camera && cameraEl.components.camera.camera) {
                  const threeCamera = cameraEl.components.camera.camera;
                  threeCamera.aspect = window.innerWidth / window.innerHeight;
                  threeCamera.updateProjectionMatrix();
                }

                // 7. Final canvas layout rebuild
                if (sceneEl.resize) sceneEl.resize();

                if (sceneEl.renderer) {
                  sceneEl.renderer.setSize( window.innerWidth, window.innerHeight, true );
                }

                if (sceneEl.object3D) {
                  sceneEl.object3D.updateMatrixWorld( true );
                }
              }
            };

            // Listen for VR exit, but bypass the native execution race condition
            sceneEl.addEventListener( 'exit-vr', () => {
              // requestAnimationFrame forces our reset logic to run on the very next render tick,
              // strictly AFTER look-controls has finished executing its native onExitVR routine.
              requestAnimationFrame( () => {
                this.resetCamera( 'Exit VR Session (Post-Native)' );
              });
            });
          }
        });

        AFRAME.registerComponent( 'vr-button-gate', {
          init: function () {
            const sceneEl = this.el;
            const modelContainer = document.querySelector('#model-container');

            // 1. Immediately lock the VR button by adding the class to the body on boot
            document.body.classList.add( 'vr-loading-locked' );
            console.log( 'VR Button locked via CSS until model loading is complete.');

            // 2. Listen for your custom loading event from normalize_and_center_global_model()
            if (modelContainer) {
              modelContainer.addEventListener( 'model-loaded', () => {
                // Remove the lock class, returning control entirely back to your standard orientation CSS
                document.body.classList.remove( 'vr-loading-locked' );
                console.log( 'Model ready and centered. VR Button unlocked!' );
              });
            }
          }
        });

        // Register an A-Frame component to serve as global loop runner
        AFRAME.registerComponent( 'scene-animation-runner', {
          tick: function ( time, timeDelta ) {
            if (activeMixers.length === 0) return;

            // Convert A-Frame's millisecond delta to three.js seconds delta
            const delta = timeDelta / 1000; 

            // Update every running animation mixer in the scene
            for ( let i = 0; i < activeMixers.length; i++ ) {
              activeMixers[ i ].update( delta );
            }
          }
        });

        AFRAME.registerComponent( 'manual-model-raycast', {
          init: function() {
            // Listen for when custom loading logic is complete
            this.el.addEventListener( 'model-loaded', () => {
              // 1. Ensure the entity has the raycastable class
              this.el.classList.add( 'raycastable' );

              // 2. FORCE the scene's raycaster system to refresh its object list
              if (this.el.sceneEl?.systems?.raycaster) {
                this.el.sceneEl.systems.raycaster.refreshObjects();
                console.log( 'Raycaster refreshed for manually loaded model!' );
              }
            });
          }
        });

        AFRAME.registerComponent( 'raycast-listen', {
          init: function () {
            // Listen for the passive event on the model itself
            this.el.addEventListener( 'raycaster-intersected', ( evt ) => {
              const sceneEl = this.el.sceneEl;

              if (!sceneEl.is( 'vr-mode' )) {
                // Ignoring 2D/mouse intersection
                return;
              }

              //console.log('Laser hit the model!');

              // The event detail contains the raycaster component that hit it
              const raycasterEl = evt.detail.el; 

              // Example: Change the laser color to red on hover
              raycasterEl.setAttribute( 'raycaster', 'lineColor', '#ff0000' );

              const raycasterComponent = raycasterEl.components.raycaster;

              // Get the raw Three.js intersection details for this specific target
              const intersection = raycasterComponent.getIntersection( this.el );

              if (intersection) {
                //console.log( 'Exact 3D Hit Point:', intersection.point ); 
                //console.log( 'Distance from controller:', intersection.distance );
              }
            });

            // Clean up when the laser leaves!
            this.el.addEventListener( 'raycaster-intersected-cleared', ( evt ) => {
              //console.log( 'Laser left the model' );

              const raycasterEl = evt.detail.el;
              // Reset laser color back to default
              raycasterEl.setAttribute( 'raycaster', 'lineColor', '#cccccc' );
            });
          }
        });

        AFRAME.registerComponent( 'wheel-zoom', {
          schema: {
            speed: { type: 'number', default: 0.2 },
            minZ: { type: 'number', default: 1.0 },
            maxZ: { type: 'number', default: 12.0 },
            damping: { type: 'number', default: 0.15 } // Lower = smoother/slower slide, Higher = snappier
          },

          init: function () {
            // 1. Set up tracking vectors using Three.js instances provided by A-Frame
            this.currentPosition = new THREE.Vector3();
            this.el.object3D.position.copy( this.el.getAttribute( 'position' ) );

            // TargetZ holds where the camera *wants* to go
            this.targetZ = this.el.object3D.position.z;

            this.onWheel = this.onWheel.bind( this );
            this.el.sceneEl.canvas.addEventListener( 'wheel', this.onWheel );
          },

          onWheel: function ( event ) {
            event.preventDefault();

            let zoomDirection = event.deltaY > 0 ? 1 : -1;

            // Update intended target position
            this.targetZ += zoomDirection * this.data.speed;

            // Constrain the target within min/max boundaries
            this.targetZ = Math.max(this.data.minZ, Math.min(this.data.maxZ, this.targetZ));
          },

          // The tick function runs automatically on every single frame rendering pass
          tick: function (time, timeDelta) {
            let currentZ = this.el.object3D.position.z;

            // If we haven't reached our target yet, smoothly slide towards it
            if (Math.abs( currentZ - this.targetZ ) > 0.001) {
              // Linear interpolation formula: current + (target - current) * damping
              let newZ = currentZ + ( this.targetZ - currentZ ) * this.data.damping;

              // Apply the raw transformation directly to the underlying Three.js object
              this.el.object3D.position.z = newZ;
            }
          },

          remove: function () {
            if (this.el.sceneEl.canvas) {
              this.el.sceneEl.canvas.removeEventListener( 'wheel', this.onWheel );
            }
          }
        });

        // 1. THE PORTRAIT TRACKING FUNCTION
        function initOrientationTracker() {
          function checkOrientation() {
            const isPortrait = window.innerWidth < window.innerHeight;

            if (isMobile && isPortrait) {
              document.body.classList.add( 'in-portrait' );
            } else {
              document.body.classList.remove( 'in-portrait' );
            }
          }

          // 2. RUN THE CHECK & ATTACH THE EVENT LISTENERS
          if (navigator.xr && typeof navigator.xr.isSessionSupported === 'function') {
            navigator.xr.isSessionSupported( 'immersive-vr' ).then( ( supported ) => {
              if (supported || isMobile) {
                document.body.classList.add( 'vr-capable' );
                checkOrientation();
                window.addEventListener( 'resize', checkOrientation );
              }
            });
          } else if (isMobile) {
            document.body.classList.add( 'vr-capable' );
            checkOrientation();
            window.addEventListener( 'resize', checkOrientation );
          }
        }

        // Safety Check: If DOM is already interactive/complete, run immediately. Otherwise, wait.
        if (document.readyState === 'loading') {
          document.addEventListener( 'DOMContentLoaded', initOrientationTracker );
        } else {
          initOrientationTracker();
        }
      }

      function disabled_changed() {
        $('button').each( function() {
          if (!this.disabled) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }
        });

        $('select').each( function() {
          if (!this.disabled) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }
        });
      }
    </script>
