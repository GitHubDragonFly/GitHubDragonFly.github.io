                if (val !== undefined && val !== null) {
                  properties[ key ] = val;
                }
              }
            }
          }

          featureMetadataList.push( { class: className, properties } );
          highlightFeatureSimple( batchId, '_batchid' );

          showUiPanel(
            { ...pickedObject.userData.metadata, featureMetadata: featureMetadataList },
            event,
            schema,
            pickedObject.name,
            false
          );

          return;
        }

        const data = object_userData.metadata;
        const tilesetMetadataOnly = !data && !!pickedObject.parent;

        if (( data && !data.empty ) || tilesetMetadataOnly) {
          showUiPanel( data, event, schema, pickedObject.name, tilesetMetadataOnly, pickedObject.type );
        }
      }

      function showUiPanel( data, event, schema = null, meshName = '', tilesetMetadataOnly = false, type = '' ) {
        const card = document.getElementById('metadata-card');
        if (!card) return;

        // Enhanced resolver to handle the complex types in new JSON

        function formatArray( arr ) {
          if (arr.length === 0) return '[]';

          // If it's an array of objects
          if (typeof arr[ 0 ] === 'object' && arr[ 0 ] !== null) {
            return arr.map( ( item, idx ) => {
              let itemHtml = `<div style="margin: 4px 0 4px 5px; padding-left: 8px; border-left: 2px solid #00d4ff; background: rgba(0,212,255,0.05);">`;
              itemHtml += `<div style="font-size: 9px; color: #00d4ff; opacity: 0.7;">Part ${idx + 1}</div>`;

              for ( const [ sk, sv ] of Object.entries( item ) ) {
                const cleanSv = ( typeof sv === 'number' )
                  ? ( Number.isInteger( sv ) ? sv : sv.toFixed( 2 ) )
                  : sv;

                itemHtml += `<div style="font-size: 11px;"><span style="color: #666;">${sk}:</span> ${cleanSv}</div>`;
              }

              itemHtml += `</div>`;
              return itemHtml;
            }).join('');
          }
    
          // If it's a simple array (like [1, 2, 3])
          return `[ ${arr.map( v => {
            if ( typeof v === 'number' ) {
              return ( Number.isInteger( v ) ? v : v.toFixed( 2 ) );
            }

            return String( v );
          }).join( ', ' )} ]`;
        }

        const resolveValue = ( className, propName, val ) => {
          let processedVal = val;

          // Handle Three.js math objects (from interpolation)
          if (processedVal && typeof processedVal === 'object') {
            if (processedVal.isVector3) {
              return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )}, ${processedVal.z.toFixed( 2 )})`;
            }

            if (processedVal.isVector2) {
              return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )})`;
            }

            if (processedVal.isColor) {
              return `RGB(${processedVal.r.toFixed( 2 )}, ${processedVal.g.toFixed( 2 )}, ${processedVal.b.toFixed( 2 )})`;
            }
          }

          const propDef = schema?.classes?.[ className ]?.properties?.[ propName ];

          // Pre-check: If it's a string that looks like an array but isn't parsed
          // This handles the "[One, Two]" or "[true, false]" strings
          if (typeof processedVal === 'string' &&
            ((processedVal.startsWith( '{' ) && processedVal.endsWith( '}' )) ||
             (processedVal.startsWith( '[' ) && processedVal.endsWith( ']' )))) {

            try {
              // Try JSON parse first (handles ["One", "Two"])
              processedVal = JSON.parse( processedVal );
            } catch ( e ) {
              // Manual fallback for unquoted strings like [One, Two]
              processedVal = processedVal.slice( 1, -1 ).split( ',' ).map( s => s.trim() );
            }
          }

          if (processedVal === null || processedVal === undefined) return 'N/A';

          // A. Handle Arrays (The core of EXT_structural_metadata)
          if (Array.isArray( processedVal )) {
            if (processedVal.length === 0) return '[]';

            // Handle ENUM Arrays
            if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
              const enumValues = schema.enums[ propDef.enumType ].values;
              return `[ ${processedVal.map( v => {
                // Look up by integer value (0, 1, 2) or by string name
                const entry = enumValues.find( e => e.value == v || e.name === v );
                return entry ? entry.name : v;
              }).join(', ')} ]`;
            }

            // General Array (Booleans, Strings, etc.)
            return formatArray( processedVal );
          }

          // B. Handle Nested Objects
          if (typeof processedVal === 'object' && !Array.isArray( processedVal ) && !processedVal.isVector3 && !processedVal.isVector2 && !processedVal.isColor) {
            let subHtml = '<div style="margin-left: 10px; font-size: 0.9em; color: #ccc;">';

            for ( const [ k, v ] of Object.entries( processedVal ) ) {
              let displayV = v;

              // 1. If it's a string, try to "un-stringify" it first
              if (typeof displayV === 'string' && ( displayV.startsWith( '[' ) || displayV.startsWith( '{' ) )) {
                try {
                  displayV = JSON.parse( displayV );
                } catch ( e ) {
                  // If it's the unquoted Cesium style [One, Two], manual split
                  if (displayV.startsWith( '[' ) && displayV.endsWith( ']' )) {
                    displayV = displayV.slice( 1, -1 ).split( ',' ).map( s => s.trim() );
                  }
                }
              }

              // 2. Now that we have the "truest" form of the data, format it for the UI
              if (Array.isArray( displayV )) {
                displayV = formatArray( displayV );
              } else if (typeof displayV === 'object' && displayV !== null) {
                // If it's still an object (deep nesting), stringify it as a fallback
                displayV = JSON.stringify( displayV );
              } else if (typeof displayV === 'number') {
                displayV = ( Number.isInteger( displayV ) ? displayV : displayV.toFixed( 2 ) );
              } else if (typeof displayV === 'boolean') {
                displayV = displayV ? 'Yes' : 'No';
              }

              subHtml += `<div><span style="color: #888;">${k}:</span> ${displayV}</div>`;
            }

            subHtml += '</div>';
            return subHtml;
          }

          // C. Handle Single Values (Non-Arrays)

          // Single Enums
          if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
            const entry = schema.enums[ propDef.enumType ].values.find( v => v.value == processedVal || v.name === processedVal );
            return entry ? entry.name : processedVal;
          }

          // Single Booleans
          if (propDef?.type === 'BOOLEAN') {
            // Treat "true", true, or non-zero numbers as "Yes"
            const isTrue = (processedVal === true || processedVal === 'true' || processedVal === 1);
            return isTrue ? 'Yes' : 'No';
          }

          // Single Numbers
          if (typeof processedVal === 'number') {
            return Number.isInteger( processedVal ) ? processedVal : processedVal.toFixed( 2 );
          }

          // Handle BigInt / Numbers
          if (typeof processedVal === 'bigint') return processedVal.toString();

          return processedVal;
        };

        let show_copy_to_clipboard = true;

        let html = '';

        // 1. Tileset Metadata - Maybe entries like author, date, tile count...

        const tileset = tilesetMetadataOnly ? pickedObject.userData?.tileset : data?.tileset;

        if (tileset?.class) {
          html += `
            <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
              <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${tileset.class}</div>
            </div>`;

          if (tileset.properties) {
            for ( const [ key, val ] of Object.entries( tileset.properties ) ) {
              const display = resolveValue( tileset.class, key, val );
              html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
           }
          }
        } else if (tilesetMetadataOnly) {
          show_copy_to_clipboard = false;

          const description = (type === 'Box3Helper') ? 'No Data (turn off bounding box)' : 'No Data';

          html += `
            <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
              <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${ description }</div>
            </div>`;
        }

        if (data && !tilesetMetadataOnly) {
          if (tileset) html += `<br>`;

          // 2. Tile Metadata - Maybe entries like district, population...

          if (data.tile?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.tile.class}</div>
              </div>`;

            if (data.tile.properties) {
              for ( const [ key, val ] of Object.entries( data.tile.properties ) ) {
                const display = resolveValue( data.tile.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }

            html += `<br>`;
          }

          // 3. Selected Object

          if (meshName !== '') {
            html += `<div style="font-size: 12px; font-weight: bold; color: #fff; line-height: 1.0;">Selected: ${meshName}</div><br>`;
          }

          // 4. Group Metadata - Maybe entries like color, priority...

          if (data.group?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.group.class}</div>
              </div>`;

            if (data.group.properties) {
              for ( const [ key, val ] of Object.entries( data.group.properties ) ) {
                const display = resolveValue( data.group.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }

            html += `<br>`;
          }

          // 5. Content Metadata - Maybe entries like vertices, materials...

          if (data.content?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 8px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.content.class}</div>
              </div>`;

            if (data.content.properties) {
              for ( const [ key, val ] of Object.entries( data.content.properties ) ) {
                const display = resolveValue( data.content.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }
          }

          // 5.5 Feature-Specific Metadata (EXT_structural_metadata)

          if (data.featureMetadata) {
            const fms = Array.isArray( data.featureMetadata ) ? data.featureMetadata : [ data.featureMetadata ];

            fms.forEach( ( fm ) => {
              html += `
                <div style="border-bottom: 1px solid #00d4ff; margin-top: 10px; padding-bottom: 4px;">
                  <div style="font-size: 10px; color: #00d4ff; font-weight: bold;">${fm.class}</div>
                </div>`;

              if (fm.properties) {
                for ( const [ key, val ] of Object.entries( fm.properties ) ) {
                  const display = resolveValue( fm.class, key, val );
                  html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
                }
              }

              html += `<br>`;
            });
          }

          // 6. FeatureId - Maybe entries from EXT_mesh_features, EXT_structural_metadata...
          // Only show if not already merged into metadata

          if (data.featureId && Array.isArray( data.featureId ) && !data.featureMetadata) {
            data.featureId.forEach( ( fid_class, index ) => {
              // Use the class name if found, otherwise use a readable layer index
              const label = fid_class.class || `Feature Layer ${index}`;
              const idValue = fid_class.id !== undefined ? fid_class.id : 'N/A';

              html += `
                <div class="feature-group" style="margin-top: 10px; border-left: 2px solid #00d4ff; padding-left: 8px;">
                  <div style="font-size: 10px; color: #aaa; font-weight: bold;">${ label }</div>
                  <div class="prop-row" style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="prop-label" style="color: #00d4ff;">ID:</span><span class="prop-value">${ idValue }</span>
                  </div>
                </div>`;
            });
          }
        }

        if (show_copy_to_clipboard) {
          // Create a shallow copy so we don't accidentally delete the real schema from the viewer
          const dataForClipboard = data
            ? { ...data }
            : object_userData?.tileset
              ? { ...object_userData.tileset }
              : {};

          // Remove the heavy schema part for popup card, it will be included for clipboard
          delete dataForClipboard.schema;

          // Add selected mesh name
          if (data && meshName) data[ 'Selected' ] = meshName;

          // A helper to make JSON.stringify handle BigInt
          const bigintReplacer = ( key, value ) => typeof value === 'bigint' ? value.toString() : value;

          const rawJson = JSON.stringify( data ? data : dataForClipboard, bigintReplacer, 2 );
          if (!rawJson) return;

          // Example 1.
          // Set a hidden attribute on the card itself
          //card.dataset.clipboard = rawJson;

          //html += `
          //  <button
          //    onclick="navigator.clipboard.writeText( this.closest('#metadata-card').dataset.clipboard ).then( () => alert( 'Copied!' ) );">
          //    📋 Copy To Clipboard
          //  </button>`;

          // Example 2.
          // Encode it so it's 100% safe inside an HTML attribute
          const safeUrlJson = encodeURIComponent( rawJson );

          html += `
            <div style="padding: 3px; border-top: 1px solid #444; text-align: center;">
              <button
                style="vertical-align: middle; background: #111; color: white; border: 1px solid #00d4ff; padding: 2px; cursor: pointer; font-size: 11px; border-radius: 4px; width: 100%;"
                onclick="navigator.clipboard.writeText( decodeURIComponent('${safeUrlJson}') ).then( () => alert( 'Metadata copied!' ) );">
                📋 Copy To Clipboard
              </button>
            </div>`;
        }

        card.innerHTML = html;

        // Position Logic
        const padding = 15;

        // 1. Force the card to render invisibly so we can measure its dynamic size
        card.style.visibility = 'hidden';
        card.style.display = 'block';

        // 2. Get the actual dimensions the browser calculated (based on your CSS and content)
        const rect = card.getBoundingClientRect();
        const actualWidth = rect.width;
        const actualHeight = rect.height;

        // 3. Get viewport boundaries
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;

        // 4. Horizontal Logic (Flip if it hits the right edge)
        let x = event.clientX + padding;

        if (x + actualWidth > viewportWidth) {
          // Flip to the left of the cursor
          x = event.clientX - actualWidth - padding;
        }

        // 5. Vertical Logic (Slide up if it hits the bottom)
        let y = event.clientY + padding;

        if (y + actualHeight > viewportHeight) {
          y = viewportHeight - actualHeight - padding;
        }

        // 6. Final Safety Bumpers (Keep it at least 5px from any edge)
        x = Math.max( 5, Math.min( x, viewportWidth - actualWidth - 5 ) );
        y = Math.max( 5, Math.min( y, viewportHeight - actualHeight - 5 ) );

        // 7. Apply and Reveal
        card.style.left = x + 'px';
        card.style.top = y + 'px';
        card.style.visibility = 'visible';
      }

      async function decodeBase64ToPixels( uri = null, ab = null ) {
        if ( !uri && !ab ) return null;

        if (png_decode === undefined) {
          const { decode } = await import( 'fast-png' );
          png_decode = decode;
        }

        let buff = ab;

        if ( uri ) {
          const response = await fetch( uri );

          if (!response.ok) {
            console.warn( 'Failed to fetch url: ' + uri );
            return null;
          }

          buff = await response.arrayBuffer();
        }

        const imgData = await png_decode( buff );  // imported fast-png decoder

        return {
          data: imgData.data,
          width: imgData.width,
          height: imgData.height
        };
      }

      async function setCamera() {
        // Look for the Symbol-based 'model' property
        const sceneSymbol = Object.getOwnPropertySymbols( mdl_viewer )
        .find( s => s.description === 'scene' );

        if (sceneSymbol) {
          const scene = mdl_viewer[ sceneSymbol ];
          scene.camera.far = 1e9;
          scene.camera.updateProjectionMatrix();

          scene.traverse( ( child ) => {
            if (child.isPoints && child.material) child.material.size = 2.0; 
          });

          refreshScene();
        }

        return;
      }

      async function getInternalGLTFData() {
        // Look for the Symbol-based 'model' property
        const currentGLTFSymbol = Object.getOwnPropertySymbols( mdl_viewer )
        .find( s => s.description === 'currentGLTF' );

        const gltf = mdl_viewer[ currentGLTFSymbol ];

        // Inside gltf, we look for 'preparedGLTF'
        const preparedGLTFSymbol = Object.getOwnPropertySymbols( gltf )
        .find( s => s.description === 'preparedGLTF' );

        // This returns the object containing { parser, scene, animations, etc. }
        return gltf[ preparedGLTFSymbol ];
      }

      async function process_gltf_metadata( parser, modelKey ) {
        if (!userData[ modelKey ]) userData[ modelKey ] = {};

        // Skip if we already hydrated this specific model
        if ((userData[ modelKey ].textures !== undefined || userData[ modelKey ].structuralMetadata !== undefined) &&
            (userData[ modelKey ].textures?.length > 0 || userData[ modelKey ].structuralMetadata !== null)) {

          // console.log( 'Using cached metadata for: ', modelKey);
          return;
        }

        const json = parser.json;
        const images = json.images;
        let texture_indexes = [];

        if (json.meshes?.length > 0) {
          json.meshes.forEach( mesh => {
            if (mesh.primitives?.length > 0) {
              mesh.primitives.forEach( prim => {
                if (prim.extensions?.EXT_mesh_features?.featureIds?.length > 0) {
                  userData[ modelKey ].hasGLTFExtensions = true;

                  prim.extensions.EXT_mesh_features.featureIds.forEach( fid => {
                    if (fid.texture?.index !== undefined) texture_indexes.push( fid.texture.index );
                  });
                }
              });
            }
          });
        }

        if (texture_indexes.length > 0 && (!userData[ modelKey ].textures || userData[ modelKey ].textures?.length === 0)) {
          const cleanSorted = texture_indexes.length === 1
            ? texture_indexes
            : [ ...new Set( texture_indexes ) ].sort( ( a, b ) => a - b );

          if ( !userData[ modelKey ].textures ) userData[ modelKey ][ 'textures' ] = [];

          for ( const indx of cleanSorted ) {
            if (images[ indx ] !== undefined && !userData[ modelKey ].textures?.[ indx ]) {
              let pixelData;
              let uri = images[ indx ].uri;

              // If the data is in a bufferView, not a URI

              if (!uri && images[ indx ].bufferView !== undefined) {
                // Use parser to get the actual array buffer object

                const ab = await parser.getDependency( 'bufferView', images[ indx ].bufferView );
                pixelData = await decodeBase64ToPixels( null, ab );
              } else {
                pixelData = await decodeBase64ToPixels( uri, null );
              }

              userData[ modelKey ].textures[ indx ] = pixelData
                ? {
                    data: pixelData.data,
                    width: pixelData.width,
                    height: pixelData.height,
                    format: 'RGBA'
                  }
                : null;
            }
          }
        }

        if (json.extensions?.EXT_structural_metadata) {
          const ext = json.extensions.EXT_structural_metadata;

          if (!ext.schema && ext.schemaUri !== undefined && ext.schemaUri.endsWith( '.json' )) {
            try {
              let response;

              if (other_files[ ext.schemaUri ]) {
                response = await fetch( other_files[ ext.schemaUri ] );
              } else {
                // Create a base URL from the model's source to handle relative paths
                const baseUrl = new URL( mdl_viewer.src, window.location.href );
                const schemaUrl = new URL( ext.schemaUri, baseUrl ).href;

                response = await fetch( schemaUrl );
              }

              if (!response.ok) {
                console.warn( 'Could not fetch schema!' );
              } else {
                const schema = await response.json();
                ext[ 'schema' ] = schema;
                delete ext.schemaUri;
              }
            } catch ( err ) {
              console.warn( 'GM Viewer: Error fetching schema: ' + err.message );
            }
          }

          if (ext.propertyTables?.length > 0) {
            for ( const table of ext.propertyTables ) {
              // ATTACH DATA
              for ( const [ propName, prop ] of Object.entries( table.properties ) ) {
                // Hydrate Array Offsets
                if (typeof prop.arrayOffsets === 'number') {
                  const offsetIndex = prop.arrayOffsets;
                  const offsetView = json.bufferViews[ offsetIndex ];
                  prop.hydratedArrayOffsets = await parser.getDependency( 'bufferView', offsetIndex );
                }

                // Hydrate String Offsets
                if (typeof prop.stringOffsets === 'number') {
                  const offsetIndex = prop.stringOffsets;
                  const offsetView = json.bufferViews[ offsetIndex ];
                  prop.hydratedStringOffsets = await parser.getDependency( 'bufferView', offsetIndex );
                }

                // Hydrate the Values
                if (typeof prop.values === 'number') {
                  const bufferViewIndex = prop.values;
                  const bufferView = json.bufferViews[ bufferViewIndex ];
                  const bufferData = await parser.getDependency( 'bufferView', bufferViewIndex );
                  prop.hydratedArray = bufferData;
                }
              }
            }
          }

          if (ext.propertyTextures?.length > 0 && !ext.textures) {
            ext[ 'textures' ] = [];

            for ( const tex of ext.propertyTextures ) {
              if (tex.properties && Object.entries( tex.properties ).length > 0) {
                for ( const value of Object.values( tex.properties ) ) {
                  if (value.index !== undefined && images[ value.index ] !== undefined && !ext.textures[ value.index ]) {
                    let pixelData;
                    let uri = images[ value.index ].uri;

                    // If the data is in a bufferView, not a URI

                    if (!uri && images[ value.index ].bufferView !== undefined) {
                      // Use parser to get the actual array buffer object

                      const ab = await parser.getDependency( 'bufferView', images[ value.index ].bufferView );
                      pixelData = await decodeBase64ToPixels( null, ab );
                    } else {
                      pixelData = await decodeBase64ToPixels( uri, null );
                    }

                    ext.textures[ value.index ] = pixelData
                      ? {
                          data: pixelData.data,
                          width: pixelData.width,
                          height: pixelData.height,
                          format: 'RGBA'
                        }
                      : null;
                  }
                }
              }
            }
          }

          userData[ modelKey ][ 'structuralMetadata' ] = ext;
        }

        return Promise.resolve();
      }

      function refreshScene() {
        const symbols = Object.getOwnPropertySymbols( mdl_viewer );
        const sceneSymbol = symbols.find( s => s.description === 'scene' );

        if (sceneSymbol && mdl_viewer[ sceneSymbol ]) {
          // This forces the internal Three.js loop to run once
          mdl_viewer[ sceneSymbol ].queueRender();
        }
      }

      function highlightFeatureSimple( highlight_id, attrName ) {
        if (!pickedObject || pickedObject.material?.isShaderMaterial || !attrName) return;

        // 1. Borrow Three.js constructor via the object's prototype
        const MeshConstructor = pickedObject.constructor;
        const GeometryConstructor = pickedObject.geometry.constructor;
        const MaterialConstructor = pickedObject.material.constructor;

        const geometry = pickedObject.geometry;
        const indexAttr = geometry.index;
        const featureAttr = geometry.getAttribute( attrName );
        const positionAttr = geometry.getAttribute( 'position' );

        if (!featureAttr || !indexAttr || !positionAttr) return;

        // 2. Filter indices for the specific feature
        const activeIndices = [];

        for ( let i = 0; i < indexAttr.count; i += 3 ) {
          const a = indexAttr.getX( i );
          const b = indexAttr.getX( i + 1 );
          const c = indexAttr.getX( i + 2 );

          if (a < featureAttr.count && featureAttr.getX( a ) === highlight_id) {
            activeIndices.push( a, b, c );
          }
        }

        if (activeIndices.length === 0) return;

        // 3. Cleanup: Remove any existing highlight to prevent "stacking"
        const existing = pickedObject.children.find( c => c.isHighlight );

        if (existing) {
          pickedObject.remove( existing );
          if (existing.geometry) existing.geometry.dispose();
          if (existing.material) existing.material.dispose();
          refreshScene();
        }

        // 4. Construct the overlay
        const highlightGeo = new GeometryConstructor();
        highlightGeo.setAttribute( 'position', positionAttr );
        highlightGeo.setIndex( activeIndices );

        const highlightMat = new MaterialConstructor();
        highlightMat.color.setHex( 0xf08080 ); // Light coral
        highlightMat.transparent = true;
        highlightMat.opacity = 0.5;
        highlightMat.side = 2;               // DoubleSide
        highlightMat.depthWrite = false;     // Don't obscure other objects
        highlightMat.polygonOffset = true;   // Shift it slightly towards camera
        highlightMat.polygonOffsetFactor = -1;
        highlightMat.polygonOffsetUnits = -1;

        // If the borrowed material is MeshStandardMaterial (default for model-viewer),
        // we turn off metalness/roughness so it looks like a flat highlight
        if (highlightMat.metalness !== undefined) highlightMat.metalness = 0.15;
        if (highlightMat.roughness !== undefined) highlightMat.roughness = 0.85;

        highlightMat.needsUpdate = true;

        const highlightMesh = new MeshConstructor( highlightGeo, highlightMat );
        highlightMesh.isHighlight = true; // Tag for later cleanup
        highlightMesh.receiveShadow = false;
        highlightMesh.castShadow = false;
        highlightMesh.renderOrder = 999;

        // 5. Add to the local coordinate system of the picked object
        pickedObject.add( highlightMesh );
        pickedObject.updateWorldMatrix( true, true );

        refreshScene();
      }

      function highlightInstancedFeature( instance_id ) {
        if (!pickedObject || !pickedObject.isInstancedMesh || pickedObject.material?.isShaderMaterial) return;

        // 1. Borrow Three.js constructor via the object's prototype
        const InstancedMeshConstructor = pickedObject.constructor;
        const matrix4Constructor = pickedObject.matrixWorld.constructor;

        // 2. Create a new InstancedMesh with a count of exactly 1
        // We reuse the geometry and create a unique highlight material
        const highlightMat = pickedObject.material.clone();
        highlightMat.color.setHex( 0xf08080 );
        highlightMat.transparent = true;
        highlightMat.opacity = 0.3;
        highlightMat.depthWrite = false;
        highlightMat.polygonOffset = true;
        highlightMat.polygonOffsetFactor = -1;

        const highlightInstance = new InstancedMeshConstructor(
          pickedObject.geometry, 
          highlightMat, 
          1
        );

        highlightInstance.receiveShadow = false;
        highlightInstance.castShadow = false;

        // 3. Extract the matrix of the specific instance we want to highlight
        const tempMatrix = new matrix4Constructor();
        pickedObject.getMatrixAt( instance_id, tempMatrix );

        // 4. Set our new "group of one" to that exact position
        highlightInstance.setMatrixAt( 0, tempMatrix );
        highlightInstance.instanceMatrix.needsUpdate = true;
        highlightInstance.isHighlight = true;

        // 5. Cleanup and Add
        const existing = pickedObject.children.find( c => c.isHighlight );

        if (existing) {
          pickedObject.remove( existing );
          existing.geometry.dispose();
          existing.material.dispose();
          refreshScene();
        }

        pickedObject.add( highlightInstance );

        refreshScene();
      }

      async function highlightPoints( highlight_id, attrName ) {
        if (!pickedObject || !attrName || pickedObject.material?.isShaderMaterial) return;

        // 1. Borrow Three.js constructor via the object's prototype
        const PointsConstructor = pickedObject.geometry.constructor;
        const PointsMaterialConstructor = pickedObject.material.constructor; 

        const geometry = pickedObject.geometry;
        const featureAttr = geometry.getAttribute( attrName );
        const positionAttr = geometry.getAttribute( 'position' );

        if (!featureAttr || !positionAttr) return;

        // 2. Filter vertices for the specific feature
        const pointIndices = [];

        for ( let i = 0; i < featureAttr.count; i++ ) {
          if (featureAttr.getX( i ) === highlight_id) {
            pointIndices.push(i);
          }
        }
        if (pointIndices.length === 0) return;

        // 3. Cleanup existing point highlights
        const existing = pickedObject.children.find( c => c.isHighlight );

        if (existing) {
          pickedObject.remove( existing );
          existing.geometry.dispose();
          existing.material.dispose();
        }

        // 4. Construct Point Geometry
        // We reuse the buffer attributes but use a specific index for the points
        const pointGeo = new PointsConstructor();
        pointGeo.setAttribute( 'position', positionAttr );
        pointGeo.setIndex( pointIndices );

        // 5. Construct Point Material
        const pointMat = new PointsMaterialConstructor();
        pointMat.color.setHex( 0xf08080 );
        pointMat.size = 0.2;               // Adjust based on model scale
        pointMat.sizeAttenuation = true;   // Dots get smaller with zoom out
        pointMat.transparent = true;
        pointMat.opacity = 0.4;
        pointMat.depthTest = false;        // See points through the mesh!

        // 6. Create the Points object
        const points = new (window.THREE?.Points || pickedObject.constructor)(pointGeo, pointMat);
        points.isHighlight = true;
        points.renderOrder = 1000;

        pickedObject.add( points );

        refreshScene();
      }
    </script>

    <script>
      function hide_metadata_message() {
        document.getElementById('metadata_message').style.visibility = 'hidden';
      }

      async function document_ready() {
        isMobile = (/iPad|iPhone|iPod/.test( navigator.platform )) ||
          (/Android|webOS|iPhone|iPad|iPod|CriOS|BlackBerry|IEMobile|Opera Mini/i.test( navigator.userAgent )) ||
          (navigator.maxTouchPoints !== undefined && navigator.maxTouchPoints > 2 && /MacIntel/.test( navigator.platform ));

        $('#export_tex_fmt').keypress( function( event ) { if (event.key === 'Enter') $(this).children(':selected').click(); });
        $('#export_tex_res').keypress( function( event ) { if (event.key === 'Enter') $(this).children(':selected').click(); });
        $('#export_names').keypress( function( event ) { if (event.key === 'Enter') $(this).children(':selected').click(); });
        $('#url_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_load').click(); });

        if(navigator.userAgent.indexOf('Chrome') > -1 || navigator.userAgent.indexOf('Safari') > -1 || isMobile === true) {
          $('#export_tex_fmt').change( function() { $(this).children(':selected').click(); });
          $('#export_tex_res').change( function() { $(this).children(':selected').click(); });
          $('#export_names').change( function() { $(this).children(':selected').click(); });
        }

        document.getElementById('export_names').selectedIndex = 0;
        document.getElementById('export_tex_res').selectedIndex = 0;
        document.getElementById('export_tex_fmt').selectedIndex = 0;

        const menu = document.getElementById('fixed_menu');

        // Handle clicks (Buttons)
        menu.addEventListener( 'click', ( event ) => {
          popup_card_cleanup();
        }, true); 

        // Handle changes (Color inputs, Select boxes, Sliders)
        menu.addEventListener( 'input', ( event ) => {
          popup_card_cleanup();
        }, true);

        const { ModelViewerElement } = await import( "https://cdn.jsdelivr.net/npm/@google/model-viewer@4.2.0/dist/model-viewer.min.js" );

        self.ModelViewerElement = ModelViewerElement || {};
        self.ModelViewerElement.meshoptDecoderLocation = 'https://cdn.jsdelivr.net/npm/meshoptimizer@0.25.0/meshopt_decoder.min.js';
        self.ModelViewerElement.lottieLoaderLocation = 'https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/loaders/LottieLoader.min.js';

        const m_viewer = document.createElement('model-viewer');

        m_viewer.setAttribute( 'id', 'mv' );
        m_viewer.setAttribute( 'ar', 'true' );
        m_viewer.setAttribute( 'autoplay', 'true' );
        m_viewer.setAttribute( 'loading', 'eager' );
        m_viewer.setAttribute( 'exposure', '0.85' );
        m_viewer.setAttribute( 'modelCacheSize', '3' );
        m_viewer.setAttribute( 'disable-tap', 'true' );
        m_viewer.setAttribute( 'touch-action', 'none' );
        //m_viewer.setAttribute( 'shadow-intensity', '1' );
        m_viewer.setAttribute( 'class', 'model_viewer' );
        m_viewer.setAttribute( 'xr-environment', 'true' );
        m_viewer.setAttribute( 'camera-controls', 'true' );
        m_viewer.setAttribute( 'auto-rotate-delay', '100' );
        m_viewer.setAttribute( 'zoom-sensitivity', '0.15' );
        m_viewer.setAttribute( 'interpolation-decay', '250' );
        m_viewer.setAttribute( 'min-field-of-view', '0deg' );
        m_viewer.setAttribute( 'max-field-of-view', '110deg' );
        m_viewer.setAttribute( 'rotation-per-second', '30.5deg' );
        m_viewer.setAttribute( 'environment-image', 'legacy' );
        m_viewer.setAttribute( 'tone-mapping', 'neutral' );
        m_viewer.setAttribute( 'ar', '');
        //m_viewer.setAttribute( 'ar-placement', 'wall');
        m_viewer.setAttribute( 'ar-modes', 'webxr scene-viewer quick-look');

        const ar_button = document.createElement('button');

        ar_button.innerText = 'AR';
        ar_button.setAttribute( 'class', 'hide' );
        ar_button.setAttribute( 'id', 'ar-button' );
        ar_button.setAttribute( 'slot', 'ar-button' );
        ar_button.setAttribute( 'style', 'min-width: 30px; margin: 10px 0 0 5px;' );

        m_viewer.appendChild( ar_button );

        document.body.appendChild( m_viewer );

        document.getElementById( 'mv' ).style.display = 'block';
        set_viewer_position();

        if (isMobile === false) initialize_dragndrop_listeners();

        window.addEventListener( 'keydown', ( event ) => {
          if (event.key === 'Escape') popup_card_cleanup();
        }, false);

        mdl_viewer = document.getElementById( 'mv' );

        const gltfs = {};

        let pointerDownPos = { x: 0, y: 0 };
        const CLICK_THRESHOLD = 5; // pixels of movement allowed for a "click"

        mdl_viewer.addEventListener( 'pointerdown', ( event ) => {
          pointerDownPos = { x: event.clientX, y: event.clientY };
          popup_card_cleanup();
        });

        mdl_viewer.addEventListener( 'pointerup', ( event ) => {
          // Calculate movement delta
          const deltaX = Math.abs( event.clientX - pointerDownPos.x );
          const deltaY = Math.abs( event.clientY - pointerDownPos.y );

          // If movement is greater than threshold, user was rotating/panning
          if (deltaX > CLICK_THRESHOLD || deltaY > CLICK_THRESHOLD) {
            return; // It's a drag/rotate, do nothing
          }

          if (mdl_viewer.modelIsVisible) {
            const sceneSymbol = Object.getOwnPropertySymbols( mdl_viewer ).find( s => s.description === 'scene' );
            const mvScene = mdl_viewer[ sceneSymbol ];

            // 2. Use the internal getHit function
            const rect = mdl_viewer.getBoundingClientRect();
            const ndcPosition = {
              x: ( ( event.clientX - rect.left ) / rect.width ) * 2 - 1,
              y: -( ( event.clientY - rect.top ) / rect.height) * 2 + 1
            }

            const intersect = mvScene.hitFromPoint( ndcPosition );
            if (!intersect) return;

            // 3. Extract the "Hydrated" data stored in userData

            const modelKey = gltf_filenames[ models[ current_model ] ];
            const hydratedStore = userData[ modelKey ];

            if (!intersect.object?.userData?.gltfExtensions &&
                hydratedStore?.textures?.length === 0 &&
                hydratedStore?.structuralMetadata === null) {

              return;
            }

            // 4. Inject the hydrated metadata into the picked object's userData 

            pickedObject = intersect.object;

            if (hydratedStore?.structuralMetadata)
              pickedObject.userData.structuralMetadata = hydratedStore.structuralMetadata;

            if (hydratedStore?.textures?.length > 0)
              pickedObject.userData.textures = hydratedStore.textures;

            handle_raycast_click( event, intersect );
          }
        });

        mdl_viewer.onerror = function( event ) {
          mdl_viewer.removeAttribute( 'src' );
          document.getElementById('div_error').style.color = 'red';
          document.getElementById('div_error').innerHTML = 'E R R O R !';
          document.getElementById('div_error').style.display = 'block';
          return;
        }

        mdl_viewer.onload = async function() {
          document.getElementById('div_error').style.display = 'none';

          await setCamera();

          const currentKey = gltf_filenames[ models[ current_model ] ];

          if (currentKey) {
            if (!userData[ currentKey ]) {
              userData[ currentKey ] = {
                textures: [],
                structuralMetadata: null
              };
            }

            filename = currentKey.substring( 0, currentKey.lastIndexOf('.') );
          } else {
            filename = 'Model';
          }

          try {
            if (!gltfs[ currentKey ]) gltfs[ currentKey ] = await getInternalGLTFData();
            const parser = gltfs[ currentKey ].parser;
            if (parser) await process_gltf_metadata( parser, currentKey );
          } catch ( err ) {
            console.warn( 'Metadata processing failed', err );
          }

          if (mdl_viewer.availableAnimations.length > 0) {
            if (animations[ current_model ].length === 0) animations[ current_model ] = mdl_viewer.availableAnimations;
            current_animation = animations[ current_model ].length - 1;
            mdl_viewer.currentTime = 0;
            document.getElementById('btn_animate').style.backgroundColor = 'lightgreen';
            document.getElementById('btn_animate').innerHTML = 'A0';
            document.getElementById('btn_animate').disabled = false;
            animation_running = false;
            current_animation = 0;
            animate_gltf();
          } else {
            document.getElementById('btn_animate').style.backgroundColor = 'transparent';
            document.getElementById('btn_animate').innerHTML = 'A';
            document.getElementById('btn_animate').disabled = true;
            animation_running = false;
          }

          if (mdl_viewer.availableVariants.length > 0) {
            if (variants[ current_model ].length === 0) variants[ current_model ] = mdl_viewer.availableVariants;
            current_variant = variants[ current_model ].length - 1;
            document.getElementById('btn_variants').style.backgroundColor = 'lightgreen';
            document.getElementById('btn_variants').innerHTML = 'V0';
            document.getElementById('btn_variants').disabled = false;
            variants_available = false;
            current_variant = 0;
            switch_variant();
          } else {
            document.getElementById('btn_variants').style.backgroundColor = 'transparent';
            document.getElementById('btn_variants').innerHTML = 'V';
            document.getElementById('btn_variants').disabled = true;
            variants_available = false;
          }

          enable_disable( false );

          const hydratedStore = userData[ currentKey ];

          if (hydratedStore?.textures?.length > 0 || hydratedStore?.structuralMetadata !== null || hydratedStore?.hasGLTFExtensions) {
            document.getElementById('metadata_message').style.visibility = 'visible';
            await new Promise( resolve => setTimeout( hide_metadata_message, 5000 ) );
          }
        }
      }

      function disabled_changed() {
        $('button').each( function() {
          if (this.disabled === false) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }
        });

        $('select').each( function() {
          if (this.disabled === false) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }
        });

        $('input[type=color]').each( function() {
          if (this.disabled === false) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px whitesmoke'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }
        });
      }
    </script>
  </body>
