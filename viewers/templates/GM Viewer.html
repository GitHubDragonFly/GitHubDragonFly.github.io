    <script>
      // Resource Loading Failures (404 or similar)
      window.addEventListener( 'error', function ( event ) {
        // We check if the target has a 'src' or 'href' to identify it as a resource
        if (event.target.src || event.target.href) {
          console.error( 'RESOURCE ERROR: ', {
            element: event.target.tagName,
            url: event.target.src || event.target.href,
            html: event.target.outerHTML
          });

          // If the failed resource is jQuery, show the alert immediately
          if ((event.target.src || '').includes('jquery')) {
            alert('jQuery failed to load. Limited functionality. Check your internet connection!');
          }
        }
      }, true); // The 'true' here is vital; it enables the "capturing" phase

      // Standard JavaScript Runtime Errors
      window.onerror = function ( message, source, lineno, colno, error ) {
        console.log( 'RUNTIME ERROR CAUGHT' );

        console.log({
          message: message, // Error message
          file: source,     // The script file where it happened
          line: lineno,     // Line number
          column: colno,    // Column number
          errorObj: error   // The actual Error object (includes stack trace)
        });

        // Returning 'true' prevents the error from showing up in the browser console
        return false; 
      };

      // Unhandled Promise Rejections (Async Errors)
      window.addEventListener( 'unhandledrejection', function ( event ) {
        console.warn( 'UNHANDLED PROMISE: ', event.reason );

        // event.promise is the promise that failed
        // event.reason is usually the error object or message
      });
    </script>

    <script>
      function show_url() {
        if (url_displayed === true) {
          url_displayed = false;
          document.getElementById('url').style.display = 'none';
          document.getElementById('btn_url').style.backgroundColor = 'transparent';
        } else {
          document.getElementById('btn_url').style.backgroundColor = 'lightgreen';
          document.getElementById('url').style.display = 'block';
          url_displayed = true;
        }

        set_viewer_position();
      }

      function load_url_file() {
        let url = document.getElementById('url_entry').value.trim();
        if (url !== '') { selected_url_file = url; url_loading = true; init(); }
      }

      function clear_url() { document.getElementById('url_entry').value = ''; }

      function set_back_color() {
        document.body.style.backgroundColor = document.getElementById('back_color').value;
      }

      function resize() {
        if (document.fullscreenElement || document.mozFullScreenElement ||
          document.msFullscreenElement || document.webkitFullscreenElement) {

          document.getElementById('btn_full_screen').style.backgroundColor = '#FFFF00';
        } else {
          document.getElementById('btn_full_screen').style.backgroundColor = 'transparent';
        }

        set_viewer_position();
      }

      function set_viewer_position() {
        if (self.ModelViewerElement) {
          let fixed_menu_bottom = ( parseInt( $('#fixed_menu').outerHeight( true ) ) + 2 ).toString() + 'px';
          document.getElementById( 'mv' ).style.marginTop = fixed_menu_bottom;
        }
      }

      function full_screen() {
        if (document.fullscreenEnabled) {
          document.fullscreenElement ? document.exitFullscreen() : document.body.requestFullscreen();
        } else if (document.mozFullScreenEnabled) {
          document.mozFullScreenElement ? document.mozCancelFullScreen() : document.body.mozRequestFullScreen();
        } else if (document.msFullscreenEnabled) {
          document.msFullscreenElement ? document.msExitFullscreen() : document.body.msRequestFullscreen();
        } else if (document.webkitFullscreenEnabled) {
          document.webkitFullscreenElement ? document.webkitExitFullscreen() : document.body.webkitRequestFullscreen();
        }
      }
    </script>

    <script>
      function start_export() {
        document.getElementById('export_names').selectedIndex = 0;
        document.getElementById('fixed_menu').style.display = 'none';
        document.getElementById('div_error').innerHTML = pw;
        document.getElementById('div_error').style.display = 'block';

        if (!link) {
          link = document.createElement('a');
          link.style.display = 'none';
          document.body.appendChild( link );
        }

        if (!filename || filename === '') {
          filename = 'Model';
        } else {
          filename = filename.replaceAll( '%20', ' ' );
        }
      }

      function handle_export_error( error ) {
        if (error.message === 'No textures found to export!') {
          alert( error.message );
        } else {
          alert( 'Export error!' );
          console.log( error );
        }

        finish_export();
      }

      function finish_export() {
        document.getElementById('div_error').innerHTML = '';
        document.getElementById('div_error').style.display = 'none';
        document.getElementById('fixed_menu').style.display = 'block';

        document.getElementById('export_tex_res').selectedIndex = 0;
        document.getElementById('export_tex_fmt').selectedIndex = 0;

        tex_res = Infinity;
        tex_flip = false;
        tex_fmt = '';

        zip = new JSZip();

        if (link) {
          document.body.removeChild( link );
          link = undefined;
        }
      }

      async function process_export_zip( ext = '' ) {
        await zip.generateAsync( { type: 'blob', compression: "DEFLATE", compressionOptions: { level: 9 } } )
        .then( function( zipped_file ) {
          link.href = URL.createObjectURL( zipped_file );
          URL.revokeObjectURL( zipped_file );
          link.download = ext + '.zip';
          link.click();

          finish_export();
        });
      }

      async function export_maps() {
        await start_export();

        let file_name = filename;

        let glTF = await mdl_viewer.exportScene( {	binary: true } );
        let glTF_arrayBuffer = await glTF.arrayBuffer();
        let glTF_array = new Uint8Array( glTF_arrayBuffer );

        try {
          await texture_only_export( glTF_array );
        } catch (error) {
          handle_export_error( error );
          return;
        }

        file_name += '_MAPS';
        if (tex_flip === true) file_name += '_Y';
        if (tex_fmt !== '') file_name += ' ' + tex_fmt;
        if (tex_res !== Infinity) file_name += ' (' + tex_res + ')';

        await process_export_zip( file_name );
      }

      async function export_image( type = 'png' ) {
        await start_export();

        let image, blob, data;

        if (type === 'avif') {
          // Use PNG format and then encode it to AVIF
          image = await mdl_viewer.toDataURL( 'image/png', encoderOptions = 1.0 );
        } else {
          image = await mdl_viewer.toDataURL( 'image/' + type, encoderOptions = 1.0 );
        }

        // Get the base64 encoded data
        let base64data = image.split( ',' )[ 1 ];

        // Convert data to Uint8Array
        let b = atob( base64data );
        data = new Uint8Array( b.length );

        for ( let i = 0, l = data.length; i < l; i ++ ) {
          data[ i ] = b.charCodeAt( i );
        }

        blob = new Blob( [ data ], { type: 'image/' + (type === 'avif' ? 'png' : type) } );

        if (type === 'avif') {
          const { encode } = await import( '@jsquash/avif' );

          data = await transform_texture( blob, 'image/png', type );
          let avif = await encode( data[ 1 ] );
          blob = new Blob( [ avif ], { type: 'image/avif' } );
        }

        let file = new File( [ blob ], filename + '.' + type );

        link.download = file.name;
        link.href = URL.createObjectURL( file );
        URL.revokeObjectURL( file );
        link.click();

        finish_export();
      }

      async function export_glb( draco = false, meshopt = false ) {
        await start_export();

        let file_name = filename;

        let glTF = await mdl_viewer.exportScene( {	binary: true } );
        let glTF_arrayBuffer = await glTF.arrayBuffer();
        let glTF_array = new Uint8Array( glTF_arrayBuffer );

        if (draco === true) file_name += ' DRACO';
        else if (meshopt === true) file_name += ' MESHOPT';

        if (tex_flip === true) file_name += '_Y';
        if (tex_fmt !== '') file_name += ' ' + tex_fmt;
        if (tex_res !== Infinity) file_name += ' (' + tex_res + ')';

        let file;

        try {
          if (draco === true) {
            file = new File( [ await draco_compress( glTF_array ) ], file_name + '.glb' );
          } else if (meshopt === true) {
            file = new File( [ await meshopt_compress( glTF_array ) ], file_name + '.glb' );
          } else if (tex_fmt !== '' || tex_res !== Infinity || tex_flip === true) {
            file = new File( [ await texture_compress( glTF_array ) ], file_name + '.glb' );
          } else {
            file = new File( [ await simplify( glTF_array ) ], file_name + '.glb' );
          }
        } catch ( error ) {
          handle_export_error( error );
          return;
        }

        link.download = file.name;
        link.href = URL.createObjectURL( file );
        URL.revokeObjectURL( file );
        link.click();

        finish_export();
      }

      /* Simplify */

      async function simplify( arrayBuffer ) {
        const { WebIO } = await import( "@gltf-transform/core" );
        const { ALL_EXTENSIONS } = await import( "@gltf-transform/extensions" );
        const { dedup, flatten, instance, join, prune, resample, sparse } = await import( "@gltf-transform/functions" );

        const io = new WebIO().registerExtensions( ALL_EXTENSIONS );

        const doc = await io.readBinary( arrayBuffer ); // read GLB from ArrayBuffer

        await doc.transform(
          dedup(),
          instance( { min: 5 } ),
          flatten(),
          join(),
          resample(),
          prune(),
          sparse( { ratio: 0.2 } )
        );

        const compressedArrayBuffer = await io.writeBinary( doc );

        for (const texture of doc.getRoot().listTextures()) { texture.dispose(); }
        for (const material of doc.getRoot().listMaterials()) { material.dispose(); }
        for (const mesh of doc.getRoot().listMeshes()) { mesh.dispose(); }

        return compressedArrayBuffer;
      }

      /* Encode with draco compression - geometry */

      async function draco_compress( arrayBuffer ) {
        const { WebIO } = await import( "@gltf-transform/core" );
        const { ALL_EXTENSIONS } = await import( "@gltf-transform/extensions" );
        const { dedup, flatten, instance, join, prune, resample, sparse } = await import( "@gltf-transform/functions" );

        const io = new WebIO().registerExtensions( ALL_EXTENSIONS );

        io.registerDependencies({
          'draco3d.encoder': DracoEncoderModule(),
        });

        const doc = await io.readBinary( arrayBuffer ); // read GLB from ArrayBuffer

        await doc.transform(
          dedup(),
          instance( { min: 5 } ),
          flatten(),
          join(),
          resample(),
          prune(),
          sparse( { ratio: 0.2 } )
        );

        const textures = doc.getRoot().listTextures();

        if (textures.length > 0 && (tex_fmt !== '' || tex_res !== Infinity || tex_flip === true)) {
          await process_textures( textures, doc, ALL_EXTENSIONS );
        }

        const KHRDracoMeshCompression = ALL_EXTENSIONS.find( ( Extension ) => Extension.EXTENSION_NAME === 'KHR_draco_mesh_compression' );

        doc.createExtension( KHRDracoMeshCompression )
        .setRequired( true )
        .setEncoderOptions({
          method: KHRDracoMeshCompression.EncoderMethod.EDGEBREAKER,
          encodeSpeed: 5,
        });

        const compressedArrayBuffer = io.writeBinary( doc );

        for (const texture of doc.getRoot().listTextures()) { texture.dispose(); }
        for (const material of doc.getRoot().listMaterials()) { material.dispose(); }
        for (const mesh of doc.getRoot().listMeshes()) { mesh.dispose(); }

        return compressedArrayBuffer;
      }

      /* Encode with meshopt compression - geometry, morphs, animations */

      async function meshopt_compress( arrayBuffer ) {
        const { WebIO } = await import( "@gltf-transform/core" );
        const { ALL_EXTENSIONS } = await import( "@gltf-transform/extensions" );
        const { MeshoptEncoder } = await import( "meshoptimizer_encoder" );
        const { dedup, flatten, instance, join, meshopt, prune, resample, sparse } = await import( "@gltf-transform/functions" );

        await MeshoptEncoder.ready;

        const io = new WebIO().registerExtensions( ALL_EXTENSIONS );

        io.registerDependencies({
          'meshopt.encoder': MeshoptEncoder,
        });

        const doc = await io.readBinary( arrayBuffer ); // read GLB from ArrayBuffer

        await doc.transform(
          dedup(),
          instance( { min: 5 } ),
          flatten(),
          join(),
          resample(),
          prune(),
          sparse( { ratio: 0.2 } ),
          meshopt( { encoder: MeshoptEncoder, level: 'high' } )
        );

        const textures = doc.getRoot().listTextures();

        if (textures.length > 0 && (tex_fmt !== '' || tex_res !== Infinity || tex_flip === true)) {
          await process_textures( textures, doc, ALL_EXTENSIONS );
        }

        const EXTMeshoptCompression = ALL_EXTENSIONS.find( ( Extension ) => Extension.EXTENSION_NAME === 'EXT_meshopt_compression' );

        doc.createExtension( EXTMeshoptCompression )
        .setRequired( true )
        .setEncoderOptions({
          method: EXTMeshoptCompression.EncoderMethod.QUANTIZE,  // or EncoderMethod.FILTER
        });

        const compressedArrayBuffer = await io.writeBinary( doc );

        for (const texture of doc.getRoot().listTextures()) { texture.dispose(); }
        for (const material of doc.getRoot().listMaterials()) { material.dispose(); }
        for (const mesh of doc.getRoot().listMeshes()) { mesh.dispose(); }

        return compressedArrayBuffer;
      }

      /* Encode textures only */

      async function texture_compress( arrayBuffer ) {
        const { WebIO } = await import( "@gltf-transform/core" );
        const { ALL_EXTENSIONS } = await import( "@gltf-transform/extensions" );
        const { dedup, flatten, instance, join, prune, resample, sparse } = await import( "@gltf-transform/functions" );

        const io = new WebIO().registerExtensions( ALL_EXTENSIONS );

        const doc = await io.readBinary( arrayBuffer ); // read GLB from ArrayBuffer

        await doc.transform(
          dedup( { textures: true } ),
          instance( { min: 5 } ),
          flatten(),
          join(),
          resample(),
          prune(),
          sparse( { ratio: 0.2 } )
        );

        const textures = doc.getRoot().listTextures();

        if (textures.length > 0 && (tex_fmt !== '' || tex_res !== Infinity || tex_flip === true)) {
          await process_textures( textures, doc, ALL_EXTENSIONS );
        }

        const compressedArrayBuffer = await io.writeBinary( doc );

        for (const texture of doc.getRoot().listTextures()) { texture.dispose(); }
        for (const material of doc.getRoot().listMaterials()) { material.dispose(); }
        for (const mesh of doc.getRoot().listMeshes()) { mesh.dispose(); }

        return compressedArrayBuffer;
      }

      /* Export textures only as either AVIF or PNG or WEBP or KTX2 */

      async function texture_only_export( arrayBuffer ) {
        const { WebIO } = await import( "@gltf-transform/core" );
        const { dedup } = await import( "@gltf-transform/functions" );
        const { ALL_EXTENSIONS } = await import( "@gltf-transform/extensions" );

        const io = new WebIO().registerExtensions( ALL_EXTENSIONS );

        const doc = await io.readBinary( arrayBuffer ); // read GLB from ArrayBuffer

        await doc.transform(
          dedup( { textures: true } )
        );

        const textures = doc.getRoot().listTextures();

        if (textures.length === 0) {
          throw new Error( 'No textures found to export!' );
        }

        await process_textures( textures, doc, ALL_EXTENSIONS, true );

        for (const texture of doc.getRoot().listTextures()) { texture.dispose(); }
        for (const material of doc.getRoot().listMaterials()) { material.dispose(); }
        for (const mesh of doc.getRoot().listMeshes()) { mesh.dispose(); }
      }

      async function process_textures( textures, doc, ALL_EXTENSIONS, export_textures = false ) {
        let file_reader, i = 1;

        for (const texture of textures) {
          let data;

          // Flip and scale the texture
          let mime_type = await texture.getMimeType();
          let blob = new Blob( [ texture.getImage() ], { type: mime_type } );

          data = await transform_texture( blob, mime_type, tex_fmt );
          texture.setImage( data[ 0 ] );
          texture.setMimeType( mime_type );

          if (tex_fmt.startsWith( 'ktx' )) {
            const { listTextureSlots } = await import( "@gltf-transform/functions" );
            const { encodeToKTX2 } = await import( "ktx2-encoder" );

            const KHRTextureBasisu = ALL_EXTENSIONS.find( ( Extension ) => Extension.EXTENSION_NAME === 'KHR_texture_basisu' );

            const uastc_textures = [ 'normalTexture', 'occlusionTexture', 'metallicRoughnessTexture' ];

            const slots = await listTextureSlots( texture );
            const size = data[ 2 ];

            let fmt_e = tex_fmt.endsWith( 'e' ) === true;
            let fmt_u = tex_fmt.endsWith( 'u' ) === true;

            const uastc = (fmt_e === false) && (uastc_textures.some( k => k === slots[ 0 ] ) || fmt_u === true);

            // check if texture dimensions are multiples of 4
            const width_is_m4 = size[ 0 ] % 4 === 0;
            const height_is_m4 = size[ 1 ] % 4 === 0;

            if (!width_is_m4 || !height_is_m4) {
              if (file_reader === undefined) file_reader = new FileReader();

              await new Promise( resolve => {
                file_reader.onload = function( e ) {
                  const img = new Image();

                  img.onload = async function() {
                    const canvas = document.createElement( 'canvas' );

                    // This should produce minimal scale down
                    canvas.width = width_is_m4 === true ? size[ 0 ] : Math.max( 4, ( size[ 0 ] - ( size[ 0 ] % 4 ) ) );
                    canvas.height = height_is_m4 === true ? size[ 1 ] : Math.max( 4, ( size[ 1 ] - ( size[ 1 ] % 4 ) ) );

                    const ctx = canvas.getContext( '2d', { willReadFrequently: true } );
                    ctx.drawImage( img, 0, 0, canvas.width, canvas.height );

                    let type = texture.getMimeType();

                    const base64data = canvas.toDataURL( `image/${type}`, 1 ).split( ',' )[ 1 ];
                    const a2b = atob( base64data );
                    const buff = new Uint8Array( a2b.length );

                    for ( let i = 0, l = buff.length; i < l; i ++ ) {
                      buff[ i ] = a2b.charCodeAt( i );
                    }

                    await encodeToKTX2( buff, { isUASTC: uastc } )
                    .then( ktx_texture => {
                      if (export_textures === false) {
                        texture.setImage( ktx_texture );
                        texture.setMimeType( 'image/ktx2' );
                        resolve( doc.createExtension( KHRTextureBasisu ).setRequired( true ) );
                      } else {
                        let blob = new Blob( [ ktx_texture ], { type: 'image/ktx2' } );
                        resolve( zip.file( 'image' + i + '.ktx2', blob ) );
                      }
                    });
                  }

                  img.src = e.target.result;
                }

                file_reader.readAsDataURL( new Blob( [ texture.getImage() ], { type: texture.getMimeType() } ));
              });
            } else {
              await encodeToKTX2( texture.getImage(), { isUASTC: uastc } )
              .then( ktx_texture => {
                if (export_textures === false) {
                  texture.setImage( ktx_texture );
                  texture.setMimeType( 'image/ktx2' );
                  doc.createExtension( KHRTextureBasisu ).setRequired( true );
                } else {
                  let blob = new Blob( [ ktx_texture ], { type: 'image/ktx2' } );
                  zip.file( 'image' + i + '.ktx2', blob );
                }
              });
            }

            i ++;
          } else {
            if (tex_fmt === 'avif') {
              const { encode } = await import( '@jsquash/avif' );

              let avif = await encode( data[ 1 ] );

              if (export_textures === false) {
                texture.setImage( new Uint8Array( avif ) );
                texture.setMimeType( 'image/avif' );

                const EXTTextureAVIF = ALL_EXTENSIONS.find( ( Extension ) => Extension.EXTENSION_NAME === 'EXT_texture_avif' );
                doc.createExtension( EXTTextureAVIF ).setRequired( true );
              } else {
                let blob = new Blob( [ avif ], { type: 'image/avif' } );
                zip.file( 'image' + i + '.avif', blob );
              }
            } else {
              const { compressTexture } = await import( "@gltf-transform/functions" );

              await compressTexture( texture, { targetFormat: (tex_fmt === '') ? 'png' : tex_fmt } );

              if (export_textures === false) {
                if (tex_fmt === 'webp') {
                  const EXTTextureWebP = ALL_EXTENSIONS.find( ( Extension ) => Extension.EXTENSION_NAME === 'EXT_texture_webp' );
                  doc.createExtension( EXTTextureWebP ).setRequired( true );
                }
              } else {
                let blob = new Blob( [ texture.getImage() ], { type: 'image/' + (tex_fmt === '' ? 'png' : tex_fmt) } );
                zip.file( 'image' + i + (tex_fmt === '' ? '.png' : '.' + tex_fmt), blob );
              }
            }

            i ++;
          }
        }
      }

      async function transform_texture( blob, mimeType = 'image/png', export_fmt = 'png' ) {
        let buff, size, image_data, img = new Image();

        await new Promise( resolve => {
          img.onload = function() {
            let canvas = document.createElement('canvas');

            let scale;

            if (export_fmt === 'avif' && tex_res === Infinity && (img.naturalWidth > 4096 || img.naturalHeight > 4096)) {
              console.warn( 'AVIF encoder is limited to 4k resolution and will resize the image!' );
              scale = 4096 / Math.max( img.naturalWidth, img.naturalHeight );
            } else if (img.naturalWidth > 16384 || img.naturalHeight > 16384) {
              console.warn( 'THREE.WebGLRenderer is limited to 16k resolution and will resize the image!' );
              scale = 16384 / Math.max( img.naturalWidth, img.naturalHeight );
            } else {
              scale = tex_res / Math.max( img.naturalWidth, img.naturalHeight );
            }

            canvas.width = img.naturalWidth * Math.min( 1, scale );
            canvas.height = img.naturalHeight * Math.min( 1, scale );

            size = [ canvas.width, canvas.height ];

            let ctx = canvas.getContext( '2d', { willReadFrequently: true } );

            // Flip image vertically
            if (tex_flip === true) {
              ctx.translate( 0, canvas.height );
              ctx.scale( 1, -1 );
            }

            ctx.drawImage( img, 0, 0, canvas.width, canvas.height );

            image_data = ctx.getImageData( 0, 0, canvas.width, canvas.height );

            canvas.toBlob( blob => {
              let reader = new FileReader();
 
              reader.onloadend = function() {
                buff = new Uint8Array( reader.result );
                resolve( [ buff, image_data, size] );
              };

              reader.readAsArrayBuffer( blob );
            }, mimeType, 1 );
          }

          img.src = URL.createObjectURL( blob );
          URL.revokeObjectURL( blob );
        });

        return [ buff, image_data, size ];
      }

      async function init() {
        if (models && models.length > 0) reset_all( false );

        selected_file = null;
        pickedObject = null;
        other_files = {};
        animations = {};
        variants = {};
        tex_fmt = '';
        tex_flip = false;
        tex_res = Infinity;
        filename = null;
        gltf_filenames = {};
        models = [];
        userData = {};

        enable_disable( true );

        if (zip === undefined) zip = new JSZip();

        if (url_loading === false) {
          const extensions = [ '.BIN', '.JSON', '.AVIF', '.BMP', '.GIF', '.KTX2', '.PNG', '.JPG', '.JPEG',
            '.JFIF', '.PJPEG', '.PJP', '.SVG', '.WEBP'
          ];

          // Locally loaded files
          var fi = document.getElementById('file_input');

          for (let i = 0; i < fi.files.length; i++) {
            let fn_uc = fi.files[ i ].name.toUpperCase();

            if (fn_uc.endsWith('.GLB') || fn_uc.endsWith('.GLTF') || fn_uc.endsWith('.VRM')) {
              let url = URL.createObjectURL( fi.files[ i ] );

              animations[ i ] = [];
              variants[ i ] = [];

              models.push( url );

              gltf_filenames[ url ] = fi.files[ i ].name;

              // Set filename and selected_file
              if (filename === null) filename = gltf_filenames[ url ].substring( 0, gltf_filenames[ url ].lastIndexOf('.') );
              if (selected_file === null) selected_file = url;

              URL.revokeObjectURL( fi.files[ i ] );
            } else if (extensions.some( ext => fn_uc.endsWith( ext ) )) {
              other_files[ fi.files[ i ].name ] = URL.createObjectURL( fi.files[ i ] );
              URL.revokeObjectURL( fi.files[ i ] );
            }
          };

          if (models.length > 0) {
            document.getElementById('btn_current_model').innerHTML = 'M0';

            if (models.length > 1) {
              document.getElementById('btn_current_model').disabled = false;
              document.getElementById('btn_current_model').style.backgroundColor = 'lightgreen';
            } else {
              document.getElementById('btn_current_model').disabled = true;
              document.getElementById('btn_current_model').style.backgroundColor = 'transparent';
            }

            disabled_changed();
          } else {
            alert( 'No valid GLTF or GLB or VRM file selected!' );
            console.log( 'No valid GLTF or GLB or VRM file selected!' );
            enable_disable( false );
            return;
          }

          selected_url_file = '';
        } else {
          // Reset the file input
          document.getElementById('file_input').value = '';
          url_loading = false;
        }

        self.ModelViewerElement.mapURLs( ( url ) => {
          let file_name = url.substring( url.lastIndexOf( '/' ) + 1 );

          if (other_files[ file_name ]) {
            return other_files[ file_name ];
          } else {
            return url;
          }
        });

        document.getElementById('div_error').style.display = 'none';

        selected_file !== null ? loadFile() : loadURLFile();
      }

      function loadFile() {
        if (gltf_filenames[ selected_file ]) {
          mdl_viewer.setAttribute( 'src', selected_file );
        }
      }

      async function loadURLFile() {
        if (selected_url_file !== '') {
          if (selected_url_file.indexOf( ',' ) > -1) {

              }

              let url_uc = url.toUpperCase();

              if (url_uc.endsWith('.GLB') || url_uc.endsWith('.GLTF') || url_uc.endsWith('.VRM')) {
                animations[ i ] = [];
                variants[ i ] = [];

                models.push( url );
                gltf_filenames[ url ] = url.substring( url.lastIndexOf( '/' ) + 1 );

                // Set filename and selected_file
                if (filename === null) filename = gltf_filenames[ url ].substring( 0, gltf_filenames[ url ].lastIndexOf('.') );
                if (selected_file === null) selected_file = url;
              }
            }
          } else {
            if (selected_url_file.startsWith('https://github.com') === true) {
              selected_url_file = ( selected_url_file.replace('github.com', 'raw.githubusercontent.com') ).replace('blob/', '');
            }

            let url_uc = selected_url_file.toUpperCase();

            if (url_uc.endsWith('.GLB') || url_uc.endsWith('.GLTF') || url_uc.endsWith('.VRM')) {
              animations[ 0 ] = [];
              variants[ 0 ] = [];

              models.push( selected_url_file );
              gltf_filenames[ selected_url_file ] = selected_url_file.substring( selected_url_file.lastIndexOf( '/' ) + 1 );

              // Set filename and selected_file
              if (filename === null) filename = gltf_filenames[ selected_url_file ].substring( 0, gltf_filenames[ selected_url_file ].lastIndexOf('.') );
              if (selected_file === null) selected_file = selected_url_file;
            }
          }

          if (models.length > 0) {
            document.getElementById('btn_current_model').innerHTML = 'M0';

            if (models.length > 1) {
              document.getElementById('btn_current_model').disabled = false;
              document.getElementById('btn_current_model').style.backgroundColor = 'lightgreen';

              document.getElementById('btn_current_model').disabled = true;

          if (gltf_filenames[ selected_file ]) {
            mdl_viewer.setAttribute( 'src', selected_file );
          }
        }

        if (gltf_filenames[ models[ current_model ] ]) {
          mdl_viewer.setAttribute( 'src', models[ current_model ] );

      function animate_gltf() {
        let ani = document.getElementById('btn_animate');

        if (animation_running === true) {
          mdl_viewer.pause();
          mdl_viewer.currentTime = 0;

          if (current_animation === animations[ current_model ].length - 1) {
            mdl_viewer.animationName = '';

            animation_running = false;

            ani.innerHTML = 'A' + current_animation;
            mdl_viewer.animationName = animations[ current_model ][ current_animation ];
            mdl_viewer.play();
          }
        } else {
          ani.innerHTML = 'A0';
          mdl_viewer.animationName = animations[ current_model ][ 0 ];
          mdl_viewer.play();

      function handle_raycast_click( event, intersect ) {
        // QUICK GUARD: Ensure geometry and attributes exist before we dig in
        if (!pickedObject.geometry) return;

        const isInstanced = pickedObject.isInstancedMesh;

        const object_userData = pickedObject.userData || {};
        const extensions = object_userData.gltfExtensions || {};
        const structuralMetadata = object_userData.structuralMetadata;

        const schema = object_userData.schema || structuralMetadata?.schema;

        const meshFeatures = extensions.EXT_mesh_features || extensions.EXT_instance_features;

        const featureMetadataList = [];
        let highlightId = null;
        let highlightAttributeName = null;

        let vertexIndex = -1;

        if (pickedObject.isPoints || pickedObject.isLine) {
          vertexIndex = intersect.index;
        } else if (isInstanced) {
          vertexIndex = intersect.instanceId;
        } else if (intersect.face) {
          vertexIndex = intersect.face.a;
        }

        /**
         * Detects and reads the correct integer type from an offset buffer.
         * @param {ArrayBuffer|Uint8Array} buffer - The hydrated offset buffer.
         * @param {number} index - The feature index to read.
         * @param {number} totalFeatures - The count of features in the table (to infer type).
         */
        function getOffsetValue( buffer, index, totalFeatures ) {
          if ( !buffer ) return 0;

          const view = new DataView( 
            buffer.buffer || buffer, 
            buffer.byteOffset || 0, 
            buffer.byteLength 
          );

          // Calculate bytes per entry: total length / (N + 1)
          const bytesPerEntry = buffer.byteLength / ( totalFeatures + 1 );

          switch ( bytesPerEntry ) {
            case 1:
              return view.getUint8( index );
            case 2:
              return view.getUint16( index * 2, true );
            case 4:
              return view.getUint32( index * 4, true );
            case 8:
              // Handle BigInt for UINT64, converting to Number for offset use
              return Number( view.getUint64( index * 8, true ) );
            default:
              return view.getUint32( index * 4, true );
          }
        }

        function getStride( type, componentType ) {
          const numComponents = TYPE_COUNT_MAP[ type ] || 1;
          const bytesPerComponent = COMPONENT_COUNT_MAP[ componentType ] || 1;
          return numComponents * bytesPerComponent;
	}

        function getMetadataString( prop, featureId, numFeatures ) {
          if ( !prop.hydratedArray || !prop.hydratedStringOffsets ) return 'No Data';

          const data    = prop.hydratedArray;
          const offsets = prop.hydratedStringOffsets;

          // 1. Use the helper for both start and end to handle variable-width offsets
          const start = getOffsetValue( offsets, featureId, numFeatures );
          const end   = getOffsetValue( offsets, featureId + 1, numFeatures );

          if ( start === end || start < 0 || end > data.byteLength ) {
            return 'No Data';
          }

          // 2. Slice data[ start : end ] as UTF-8
          const stringBuffer = new Uint8Array( data, start, end - start );
          return new TextDecoder().decode( stringBuffer );
        }

        function readBooleanValue( propData, featureId ) {
          const rawBuffer = propData.hydratedArray;
          if ( !rawBuffer ) return false;

          const view = new Uint8Array( rawBuffer.buffer || rawBuffer, rawBuffer.byteOffset || 0, rawBuffer.byteLength );

          // Each byte holds 8 booleans.
          const byteIndex = Math.floor( featureId / 8 );
          const bitIndex = featureId % 8;

          if ( byteIndex >= view.length ) {
            console.warn( `Boolean Overflow: featureId ${featureId} leads to byte ${byteIndex}, but buffer is only ${view.length} bytes.` );
            return false;
          }

          const byte = view[ byteIndex ];

          // Mask the specific bit and return as true/false
          return ( ( byte >> bitIndex ) & 1 ) === 1;
        }

        function readBinaryValue( binary, offset, type, componentType, rowIndex = 0 ) {
          // 1. Ensure we use the sliced buffer view correctly
          const view = new DataView( binary.buffer, binary.byteOffset, binary.byteLength );

          // 2. Handle Booleans (Bitstream)
          if ( type === 'BOOLEAN' ) {
            const byteOffset = offset + Math.floor( rowIndex / 8 );
            const bitIndex = rowIndex % 8;
            return ( ( view.getUint8( byteOffset ) >> bitIndex ) & 1 ) === 1;
          }

          // 3. Lookup mapping
          const cType = componentType.toUpperCase();
          const bytesPerComponent = COMPONENT_COUNT_MAP[ cType ] || 1;
          const numComponents = TYPE_COUNT_MAP[ type ] || 1;
          const stride = bytesPerComponent * numComponents;
          const method = DATAVIEW_GETTER_MAP[ cType ];

          if ( !method ) return null;

          // 4. Calculate absolute byte position in the slice
          const rowStart = offset + ( rowIndex * stride );
          const results = [];

          for ( let i = 0; i < numComponents; i++ ) {
            const currentOffset = rowStart + ( i * bytesPerComponent );

            // Safety check for buffer overflow
            if ( currentOffset + bytesPerComponent > view.byteLength ) {
              results.push( 0 );
              continue;
            }

            // Use the map to call the DataView method
            results.push( view[ method ]( currentOffset, true ) ); // true = Little Endian
          }

          return type === 'SCALAR' ? results[ 0 ] : results;
        }

        function readArrayProperty( propDef, propData, featureId, numFeatures ) {
          const rawBuffer = propData.hydratedArray;
          if (!rawBuffer) return 'N/A';

          const rawBytes = rawBuffer instanceof ArrayBuffer
            ? new Uint8Array( rawBuffer )
            : rawBuffer;

          const view = new DataView( rawBytes.buffer, 0, rawBytes.length );
          const stride = getStride( propDef.type, propDef.componentType );

          let numElements = 0;
          let startElement = 0;

          // 1. Variable-length arrays: element‑index offsets
          if (propData.hydratedArrayOffsets) {
            const offsets = propData.hydratedArrayOffsets;

            const start = getOffsetValue( offsets, featureId, numFeatures );
            const end   = getOffsetValue( offsets, featureId + 1, numFeatures );

            startElement = start;
            numElements = end - start;
          }
          // 2. Fixed-length arrays
          else if (propDef.array && propDef.count !== undefined) {
            numElements = propDef.count;
            startElement = featureId * numElements;
          }

          if (numElements <= 0) return [];

          const values = [];

          // 3. STRING array
          if (propDef.type === 'STRING' && propData.hydratedStringOffsets) {
            const stringOffsets = propData.hydratedStringOffsets;

            for ( let i = 0; i < numElements; i++ ) {
              const idx = startElement + i;
              const s = getOffsetValue( stringOffsets, idx, numFeatures );
              const e = getOffsetValue( stringOffsets, idx + 1, numFeatures ) || rawBytes.length;

              if (s >= rawBytes.length || e > rawBytes.length) continue;

              const stringBuffer = new Uint8Array( rawBytes.buffer, s, e - s );
              values.push( new TextDecoder().decode( stringBuffer ) );
            }

            return values;
          }

          // 4. BOOLEAN array
          if (propDef.type === 'BOOLEAN') {
            for ( let i = 0; i < numElements; i++ ) {
              const elementIndex = startElement + i;
              const val = readBinaryValue( rawBytes, 0, propDef.type, 'UINT8', elementIndex );
              values.push( val );
            }

            return values;
          }

          // 5. ENUM array
          if (propDef.type === 'ENUM') {
            const enumDef = schema.enums?.[ propDef.enumType ];

            // If componentType is missing default to UINT8 or UINT16
            const cType = propDef.componentType || (rawBytes.byteLength >= (numFeatures * numElements * 2) ? 'UINT16' : 'UINT8');

            for ( let i = 0; i < numElements; i++ ) {
              const elementIndex = startElement + i;
              const enumIndex = readBinaryValue( rawBytes, 0, 'SCALAR', cType, elementIndex );

              // Map the index to the Name string
              const entry = enumDef?.values.find( v => v.value === enumIndex );
              values.push( entry ? entry.name : `Unknown(${ enumIndex })` );
            }

            return values; 
          }

          // 6. Generic numeric array (SCALAR / VEC / MAT)
          for ( let i = 0; i < numElements; i++ ) {
            const elementIndex = startElement + i;
            const val = readBinaryValue( rawBytes, 0, propDef.type, propDef.componentType, elementIndex );

            // Normalize if needed
            if (propDef.normalized) {
              const divisor = NORMALIZATION_DIVISORS[ propDef.componentType ] || 255.0;

              const normalized = Array.isArray( val )
                ? val.map( v => Math.round( ( v / divisor ) * 100 ) / 100 )
                : Math.round( ( val / divisor ) * 100 ) / 100;

              values.push( normalized );
            } else {
              values.push( val );
            }
          }

          return values;
        }

        function readBinaryPropertyValue( propDef, propData, featureId, propName, numFeatures ) {
          const rawBuffer = propData.hydratedArray;
          if (!rawBuffer) return 'N/A';

          // BOOLEAN PROPERTIES
          if (propDef?.type === 'BOOLEAN') {
            return readBooleanValue( propData, featureId );
          }

          // STRING PROPERTIES
          if (propDef?.type === 'STRING' || propData.stringOffsets !== undefined) {
            return getMetadataString( propData, featureId, numFeatures );
          }

          // NUMERIC PROPERTIES
          const elementCount = TYPE_COUNT_MAP[ propDef?.type ] || 1;
          let bytesPerElement = 4; // Float32 default

          if (propDef?.componentType) {
            bytesPerElement = COMPONENT_TYPE_MAP[ propDef.componentType ].BYTES_PER_ELEMENT;
          }

          const view = new DataView( rawBuffer );
          const byteOffset = featureId * bytesPerElement * elementCount;

          if (byteOffset + ( bytesPerElement * elementCount ) > view.byteLength) {
            console.warn( `Overflow: ${ propName } offset=${ byteOffset }, len=${ view.byteLength }` );
            return 'N/A';
          }

          const method = propDef?.componentType ? DATAVIEW_GETTER_MAP[ propDef.componentType ] : 'getFloat32';
          if (!method) return 'N/A';

          const values = [];

          for ( let i = 0; i < elementCount; i++ ) {
            const offset = byteOffset + ( i * bytesPerElement );
            values.push( view[ method ]( offset, true ) );
          }

          return propDef?.type === 'SCALAR' ? values[ 0 ] : values;
        }

        function getFeatureIdFromTexture( texture, uv, channel ) {
          const buffer = texture.data;
          if (!buffer) return 0;

          const w = texture.width;
          const h = texture.height;

          const x = Math.floor( uv.x * ( w - 0.001 ) );
          const y = Math.floor( uv.y * ( h - 0.001 ) );

          // RGBA = 4 bytes per pixel
          const index = ( y * w + x ) * 4;

          const rawValue = buffer[ index + channel ];

          return rawValue;
        }

        function getPropertyFromTexture( metadata, propertyName, uv, className ) {
          if (!metadata.structuralMetadata) return 0;
          if (!metadata.structuralMetadata.textures) return 0;
          if (!metadata.structuralMetadata.propertyTextures) return 0;

          const propertyTextures = metadata.structuralMetadata.propertyTextures;
          const propTex = propertyTextures.find( pt => pt.properties[ propertyName ] );

          const sm_textures = metadata.structuralMetadata.textures;
          const sm_texture = sm_textures[ propTex.properties[ propertyName ].index ];
          if (!sm_texture) return 0;

          const buffer = sm_texture.data;
          if (!buffer) return 0;

          const w = sm_texture.width;
          const h = sm_texture.height;

          const x = Math.floor( uv.x * ( w - 0.001 ) );
          const y = Math.floor( uv.y * ( h - 0.001 ) );

          // RGBA = 4 bytes per pixel
          const index = ( y * w + x ) * 4;

          const channels = propTex.properties[ propertyName ].channels || [ 0 ];
          let rawValue = buffer[ index + channels[ 0 ] ];

          // Normalize if needed
          const propDef = schema?.classes?.[ className ]?.properties?.[ propertyName ];

          if (propDef?.normalized) {
            const divisor = NORMALIZATION_DIVISORS[ propDef.componentType ] || 255.0;

            rawValue = Array.isArray( rawValue )
              ? rawValue.map( v => Math.round( ( v / divisor ) * 100 ) / 100 )
              : Math.round( ( rawValue / divisor ) * 100 ) / 100;
          }

          return rawValue * ( propDef?.scale ?? 1 ) + ( propDef?.offset ?? 0 );
        }

        function addPropertyTableMetadata( tableIndex, attributeIndex = null, featureId, numFeatures ) {
          const table = structuralMetadata?.propertyTables?.[ tableIndex ];
          if (!table || featureId === undefined || featureId === null) return;

          // BOUNDS CHECK - prevent reading past table.count
          if (featureId < 0 || featureId >= table.count) {
            console.warn( `Feature ID ${ featureId } out of bounds for table ${ tableIndex } (count: ${ table.count })` );
            return;
          }

          const className = table.class || `PropertyTable ${ tableIndex }`;
          const properties = {};

          if (table.properties && schema?.classes?.[ table.class ]) {
            const classDef = schema.classes[ table.class ];

            for ( const [ key, propData ] of Object.entries( table.properties ) ) {
              const propDef = classDef.properties?.[ key ];
              if (!propDef) continue;

              // Safe read with bounds check
              try {
                if (propDef.array) {
                  properties[ key ] = readArrayProperty( propDef, propData, featureId, table.count );
                } else if (propDef.type === 'STRING' || propData.stringOffsets !== undefined) {
                  properties[ key ] = getMetadataString( propData, featureId, numFeatures );
                } else {
                  properties[ key ] = readBinaryPropertyValue( propDef, propData, featureId, key, numFeatures );
                }
              } catch ( err ) {
                console.warn( `Failed to read property ${ key } for feature ${ featureId }: `, err.message );
                properties[ key ] = 'N/A';
              }
            }

            if (attributeIndex !== null) properties.Attribute = attributeIndex;
            isInstanced ? properties.InstanceId = vertexIndex : properties.VertexId = vertexIndex;
            properties.ID = featureId;
          }

          featureMetadataList.push( { class: className, properties } );
        }

        let featureId, attributeName, smAttrName, smHighlightId, featureId_ok = false;

        if (meshFeatures?.featureIds?.length > 0) {
          for ( let i = 0; i < meshFeatures.featureIds.length; i++ ) {
            const info = meshFeatures.featureIds[ i ];
            const numFeatures = info.featureCount;
            const featureIdIndex = info.attribute;
            const className = info.label || ((featureIdIndex !== undefined && featureIdIndex !== null) ? `Feature ${ featureIdIndex }` : 'Feature');

            const attrName1 = `_feature_id_${ featureIdIndex }`;
            const attrName2 = `_FEATURE_ID_${ featureIdIndex }`;

            attributeName = pickedObject.geometry.hasAttribute( attrName1 )
              ? attrName1
              : pickedObject.geometry.hasAttribute( attrName2 )
                ? attrName2
                : '';

            const featureIdAttr = pickedObject.geometry.getAttribute( attributeName );

            if (info.texture !== undefined) {
              const texInfo = info.texture;
              const idTexture = object_userData.textures?.[ texInfo.index ];

              if (idTexture && intersect.uv) {
                featureId = getFeatureIdFromTexture( idTexture, intersect.uv, texInfo.channels?.[ 0 ] || 0 );
              }
            } else if (featureIdAttr) {
              if (isInstanced && intersect.instanceId !== undefined) {
                featureId = featureIdAttr.getX( intersect.instanceId );
              } else if (intersect.face) {
                featureId = featureIdAttr.getX( intersect.face.a );
              } else if (intersect.index !== undefined) {
                featureId = featureIdAttr.getX( intersect.index );
              }
            }

            featureId_ok = (featureId !== null && featureId !== undefined && featureId !== info.nullFeatureId);

            if (!highlightAttributeName && attributeName && featureId_ok) {
              highlightAttributeName = attributeName;
              if (highlightId === null || highlightId === undefined) highlightId = isInstanced ? vertexIndex : featureId;
            }

            if (info.propertyTable !== undefined) {
              addPropertyTableMetadata( info.propertyTable, featureIdIndex, featureId, numFeatures );

              if (featureId_ok && featureMetadataList.length === 0) {
                featureMetadataList.push({
                  class: className + ': Property Table Not Found',
                  properties: { ID: featureId }
                });
              }
            } else {
              const fid_properties = {};
              if (featureIdIndex !== undefined && featureIdIndex !== null) fid_properties.Attribute = featureIdIndex;
              isInstanced ? fid_properties.InstanceId = vertexIndex : fid_properties.VertexId = vertexIndex;
              if (featureId_ok) fid_properties.ID = featureId;

              if (info.texture !== undefined && intersect.uv) {
                fid_properties.UV_Coord = { x: intersect.uv.x, y: intersect.uv.y, isVector2: true };
              }

              featureMetadataList.push({
                class: className,
                properties: fid_properties
              });
            }
          }
        }

        if (structuralMetadata) {
          if (vertexIndex !== -1 && structuralMetadata.propertyAttributes?.length > 0) {
            structuralMetadata.propertyAttributes.forEach( attrib => {
              const className = attrib.class || 'PropertyAttribute';
              const pa_properties = {};

              for ( const [ key, value ] of Object.entries( attrib.properties || {} ) ) {
                const vAttr = value.attribute;
                if (!vAttr) continue;

                const vAttrLower = vAttr.toLowerCase();
                const vAttrUpper = vAttr.toUpperCase();

                const aName = pickedObject.geometry.hasAttribute( vAttrLower )
                  ? vAttrLower
                  : pickedObject.geometry.hasAttribute( vAttrUpper )
                    ? vAttrUpper
                    : '';

                // Default to first attribute for highlight

                if (smAttrName === undefined || smAttrName === null) smAttrName = aName;

                const attr = pickedObject.geometry.getAttribute( aName );

                if (attr) {
                  pa_properties[ key ] = attr.getX( vertexIndex );
                  if (smHighlightId === undefined || smHighlightId === null) smHighlightId = pa_properties[ key ];
                }
              }

              if (Object.keys( pa_properties).length > 0) {
                pa_properties.VertexId = vertexIndex;
                if (featureId_ok) pa_properties.ID = featureId;
                featureMetadataList.push( { class: className, properties: pa_properties } );
              }

              if (highlightId === null || highlightId === undefined) highlightId = vertexIndex;
            });
          }

          if (vertexIndex !== -1 && structuralMetadata.propertyTextures?.length > 0 && intersect.uv) {
            structuralMetadata.propertyTextures.forEach( texture => {
              const className = texture.class || 'PropertyTexture';
              const pt_properties = {};

              for ( const propName of Object.keys( texture.properties || {} ) ) {
                const val = getPropertyFromTexture( object_userData, propName, intersect.uv, className );
                if (val !== undefined) pt_properties[ propName ] = val;
              }

              if (Object.keys( pt_properties ).length > 0) {
                if (featureId_ok) pt_properties.ID = featureId;
                pt_properties.UV_Coord = { x: intersect.uv.x, y: intersect.uv.y, isVector2: true };
                featureMetadataList.push( { class: className, properties: pt_properties } );
              }
            });
          }
        }

        if (featureMetadataList.length > 0) {
          if (isInstanced) {
            highlightInstancedFeature( vertexIndex );
          } else if (featureId_ok && attributeName && pickedObject.isMesh) {
            highlightFeatureSimple( featureId, attributeName );
          } else if (smHighlightId !== undefined && smAttrName !== undefined && pickedObject.isMesh) {
            highlightFeatureSimple( smHighlightId, smAttrName );
          } else if (smHighlightId !== undefined && smAttrName !== undefined && pickedObject.isPoints) {
            highlightPoints( smHighlightId, smAttrName );
          }

          showUiPanel(
            { ...pickedObject.userData.metadata, featureMetadata: featureMetadataList },
            event,
            schema,
            pickedObject.name,
            false
          );

          return;
        }

        if (pickedObject.geometry.hasAttribute( '_batchid' )) {
          if (vertexIndex === undefined || vertexIndex === null) return;

          const batchId = pickedObject.geometry.attributes._batchid.getX( vertexIndex );
          const batchTable = pickedObject.batchTable || pickedObject.parent?.batchTable;
