    <script>
      // Resource Loading Failures (404 or similar)
      window.addEventListener( 'error', function ( event ) {
        // We check if the target has a 'src' or 'href' to identify it as a resource
        if (event.target.src || event.target.href) {
          console.error( 'RESOURCE ERROR: ', {
            element: event.target.tagName,
            url: event.target.src || event.target.href,
            html: event.target.outerHTML
          });

          // If the failed resource is jQuery, show the alert immediately
          if ((event.target.src || '').includes('jquery')) {
            alert('jQuery failed to load. Limited functionality. Check your internet connection!');
          }

          if (init_running === true) {
            handle_error( 'RESOURCE ERROR' );
          } else {
            document.getElementById('div_loading').innerHTML = '!!! Resource Error !!!';
          }
        }
      }, true); // The 'true' here is vital; it enables the "capturing" phase

      // Standard JavaScript Runtime Errors
      window.onerror = function ( message, source, lineno, colno, error ) {
        console.log( 'RUNTIME ERROR CAUGHT' );

        console.log({
          message: message, // Error message
          file: source,     // The script file where it happened
          line: lineno,     // Line number
          column: colno,    // Column number
          errorObj: error   // The actual Error object (includes stack trace)
        });

        // Returning 'true' prevents the error from showing up in the browser console
        return false; 
      };

      // Unhandled Promise Rejections (Async Errors)
      window.addEventListener( 'unhandledrejection', function ( event ) {
        console.warn( 'UNHANDLED PROMISE: ', event.reason );

        // event.promise is the promise that failed
        // event.reason is usually the error object or message

        if (init_running === true) handle_error( 'UNHANDLED PROMISE ' + event.reason );
      });
    </script>

    <script>
      function set_tiles_cache( val ) {
        tiles_loader.setMaxCacheSize( parseInt( val ) );
      }

      function set_tiles_depth( val ) {
        tiles_loader.setMaxDepthLevel( parseInt( val ) );
      }

      function show_lod() {
        if (lod_displayed === true) {
          document.getElementById('lod').style.display = 'none';
          document.getElementById('btn_lod').style.backgroundColor = 'transparent';
          lod_displayed = false;
        } else {
          document.getElementById('lod').style.display = 'block';
          document.getElementById('btn_lod').style.backgroundColor = 'lightgreen';
          lod_displayed = true;

          if (!warning_displayed) {
            alert( '3D data could eventually use a lot of memory.\nCache Size defines max number of tiles kept in ready state (default 100).\nDepth Level defines how many subtrees are processed (default 4).\nSet proper cache & depth before loading the model.\nChanging cache & depth does not update already‑loaded model.');

            warning_displayed = true;
          }
        }

        resize();
      }

      function show_keyAPI() {
        if (keyAPI_displayed === true) {
          keyAPI_displayed = false;
          document.getElementById('keyAPI').style.display = 'none';
          document.getElementById('btn_keyAPI').style.backgroundColor = 'transparent';
        } else {
          document.getElementById('btn_keyAPI').style.backgroundColor = 'lightgreen';
          document.getElementById('keyAPI').style.display = 'block';
          keyAPI_displayed = true;
        }

        resize();
      }

      function set_keyAPI() {
        let key = document.getElementById('keyAPI_entry').value.trim();
        tiles_loader.setAPIKey( key );
      }

      function clear_keyAPI() { document.getElementById('keyAPI_entry').value = ''; }

      function show_token() {
        if (token_displayed === true) {
          token_displayed = false;
          document.getElementById('token').style.display = 'none';
          document.getElementById('btn_token').style.backgroundColor = 'transparent';
        } else {
          document.getElementById('btn_token').style.backgroundColor = 'lightgreen';
          document.getElementById('token').style.display = 'block';
          token_displayed = true;
        }

        resize();
      }

      function set_token() {
        let token = document.getElementById('token_entry').value.trim();
        tiles_loader.setToken( token );
      }

      function clear_token() { document.getElementById('token_entry').value = ''; }

      function show_url() {
        if (url_displayed === true) {
          url_displayed = false;
          document.getElementById('url').style.display = 'none';
          document.getElementById('btn_url').style.backgroundColor = 'transparent';
        } else {

          document.getElementById('url').style.display = 'block';
          url_displayed = true;
        }

        resize();
      }

      function load_url_file() {
        let url = document.getElementById('url_entry').value.trim();
        if (url !== '') {
          document.getElementById('btn_load').disabled = true;
          selected_url_file = url;
          init();
        }
      }

      function clear_url() { document.getElementById('url_entry').value = ''; }

      function initialize_event_listeners() {
        const arrow_keys = [ 'ArrowUp', 'ArrowDown', 'ArrowRight', 'ArrowLeft' ];
        const activeKeys = new Set();

        window.addEventListener( 'pointerdown', ( event ) => {
          mouse_down = true;
          mouseDownPos.x = event.clientX;
          mouseDownPos.y = event.clientY;
        }, false);
        window.addEventListener( 'pointerup', ( event ) => { mouse_down = false; mouse_wheel = true; }, false);
        window.addEventListener( 'wheel', ( event ) => { mouse_wheel = true; }, false);
        window.addEventListener( 'keydown', ( event ) => {
          if (event.key === 'Escape') hideUiPanel();

          if (arrow_keys.some( k => k === event.key ) || event.ctrlKey || event.metaKey || event.shiftKey) {
            controls.listenToKeyEvents( window );
            activeKeys.add( event.key ); // Track this key
            mouse_wheel = true;
          }
        }, false);
        window.addEventListener( 'keyup', ( event ) => {
          activeKeys.delete( event.key ); // Remove this key

          if (controls && activeKeys.size === 0) {
            controls.stopListenToKeyEvents();
            mouse_wheel = false;
          }
        }, false);
      }

      function set_fps_stats() {
        if (stats) {
          let fixed_menu_bottom = ( parseInt( $('#fixed_menu').outerHeight( true ) ) + 2 ).toString() + 'px';
          stats.dom.style.top = fixed_menu_bottom;
          stats.dom.style.left = '5px';
        }
      }

      function set_statistics() {
        stats_enabled = !stats_enabled;
        document.getElementById('btn_stats').style.backgroundColor = stats_enabled ? 'lightgreen' : 'transparent';
        stats.dom.style.visibility = stats_enabled ? 'visible' : 'hidden';
        set_fps_stats();
      }

      function gui_reset() {
        params.brightness = 2.5;
        params.multiplier = 0.5;
        params.pointSize = 1.0;
        params.bias = 1.0;

        gui.reset();

        gui_container.style.display = 'none';
      }

      function set_gui_position() {
        let fixed_menu_bottom = ( parseInt( $('#fixed_menu').outerHeight( true ) ) + 2 ).toString() + 'px';
        gui_container.style.marginTop = fixed_menu_bottom;
      }

      function resize() {
        if (scene !== undefined) {
          mouse_wheel = true;

          ww = window.innerWidth;
          wh = window.innerHeight;

          renderer.setSize( ww, wh );

          camera.aspect = ww / wh;
          camera.updateProjectionMatrix();

          if (stats && stats_enabled) set_fps_stats();
          if (gui) set_gui_position();

          mouse_wheel = true;
        }
      }

      async function set_scene_image() {
        if (!scene) return;

        if (scene.background) {
          scene.background.dispose();
          scene.background = null;
        }

        document.body.style.backgroundColor = '#000000';
        document.getElementById('back_color').value = '#000000';

        let fii = document.getElementById('file_image_input').files[ 0 ];

        if (fii) {
          let fn_uc = fii.name.toUpperCase();

          const exclude_extensions = [ 'EXR', 'HDR', 'KTX2', 'TIF', 'TIFF' ];

          if (fii.type.startsWith('image/') && ! (exclude_extensions.some( ext => fn_uc.endsWith( ext ) ))) {
            texture_loader.load( URL.createObjectURL( fii ) , async function( texture ) {
              URL.revokeObjectURL( fii );
              scene.background = texture;
            }, function ( xhr ) {
            }, function ( error ) {
              document.getElementById('div_message').innerText = 'Error loading image: ' + error.message;
              console.log( 'Error loading Background Image File!' );
              console.log( error );

              URL.revokeObjectURL( fii );
            });
          } else {
            console.log( 'Not a valid image file!' );
            document.getElementById('file_image_input').value = '';
          }
        }

        mouse_wheel = true;
      }

      function set_back_color() {
        if (scene.background) {
          scene.background.dispose();
          scene.background = null;
        }

        document.body.style.backgroundColor = document.getElementById('back_color').value;
        mouse_wheel = true;
      }

      function switch_variant() {
        if (variants_available) {
          raycastableObjects.forEach( ( obj ) => {
            if (obj.material) {
              const mat = Array.isArray( obj.material ) ? obj.material : [ obj.material ];
              mat.forEach( m => m.dispose() );
            }

            if (obj.geometry) obj.geometry.dispose();
          });

          raycastableObjects.length = 0;

          if (current_variant === tileset_obj.userData.variantLookup.size - 1) {
            current_variant = 0;
          } else {
            current_variant ++;
          }

          document.getElementById('btn_variants').innerText = 'V' + current_variant;

          // Get the root path
          const rootPath = tileset_obj.userData.rootPath || '';

          let points_present_and_visible = false;

          tileset_obj.traverse( ( child ) => {
            if (child.isMesh || child.isPoints) {
              let fullURL = child.parent?.contentURL || child.parent?.parent?.contentURL || '';

              // If it's an array, take the first element; otherwise, use the string
              if (Array.isArray( fullURL )) fullURL = fullURL[ 0 ] || '';

              const uri = fullURL.replace( rootPath, '' );

              if ( tileset_obj.userData.variantLookup && tileset_obj.userData.variantLookup.has( uri ) ) {
                const vId = tileset_obj.userData.variantLookup.get( uri );
                if (vId === current_variant) {
                  child.visible = true;
                  raycastableObjects.push( child );
                } else {
                  child.visible = false;
                }

                if (child.isPoints && child.visible)
                  points_present_and_visible = true;
              }
            }
          });

          if (gui_pointSize !== null) {
            gui_pointSize.show( points_present_and_visible );
          }

          mouse_wheel = true;
        }
      }

      function animate_gltf() {
        if (animation_running === true) {
          animation_mixer.clipAction( animations[ current_animation ] ).stop();
          animation_mixer.clipAction( animations[ current_animation ] ).reset();

          if (current_animation === animations.length - 1) {
            document.getElementById('btn_animate').style.backgroundColor = 'transparent';
            current_animation = 0;
            animation_running = false;
          } else {
            current_animation += 1;
            animation_mixer.clipAction( animations[ current_animation ] ).play();
          }
        } else {
          animation_mixer.clipAction( animations[ current_animation ] ).play();
          document.getElementById('btn_animate').style.backgroundColor = 'lightgreen';
          animation_running = true;
        }

        mouse_wheel = true;
      }

      function quick_x_rotation( angle = undefined ) {
        const oldCenter = new THREE.Vector3();
        tileset_obj.boundingBox.getCenter( oldCenter );

        tileset_obj.rotateOnWorldAxis( xAxis, angle !== undefined ? angle : -Math.PI / 2.0 );
        tileset_obj.updateMatrixWorld( true );

        // Get the center AFTER rotation
        const newBox = new THREE.Box3().setFromObject( tileset_obj );
        const newCenter = new THREE.Vector3();
        newBox.getCenter( newCenter );

        // Calculate the 'swing' offset and move it back
        const offset = new THREE.Vector3().subVectors( oldCenter, newCenter );

        tileset_obj.position.add( offset );
        tileset_obj.updateMatrixWorld( true );

        if (boxHelper) box.setFromObject( tileset_obj );
        mouse_wheel = true;
      }

      async function init() {
        init_running = true;

        if (scene) {
          mouse_wheel = true;

          if (tileset_obj) await scene_cleanup();

          await reset_all( true );
        }

        if (!stats) {
          stats = new Stats();
          stats.dom.style.visibility = 'hidden';
          document.body.appendChild( stats.dom );
          stats.showPanel( 0 ); // 0: FPS, 1: ms, 2: mb
          set_fps_stats();
        }

        enable_disable( true );

        mouse_down = false;
        mouse_wheel = true;
        needsRender = false;
        animations = [];
        animation_mixer = null;
        animation_running = false;
        last_tile = 0;
        last_uuid = '';
        last_level = 0;
        count = 0;
        gui_pointSize = null;
        boxHelper = null;
        bbox_enabled = false;
        stats_enabled = false;
        halt_on_error = false;
        extended_render = false;
        render_requested = false;
        raycastableObjects = [];
        variants = null;
        current_variant = 0;
        variants_available = false;
        wireframe_enabled = false;
        box_helper_added = false;
        bounding_box = new THREE.Box3();
        featureHighlightMesh = null;
        mouseDownPos = { x: 0, y: 0 };
        xAxis = new THREE.Vector3( 1, 0, 0 );

        if (!params) params = { brightness: 2.5, pointSize: 1.0, multiplier: 0.5, bias: 1.0 };

        console.time( 'Loading Time' );
        document.body.style.backgroundImage = 'none';
        document.getElementById('div_error').style.display = 'none';
        document.getElementById('div_loading').style.display = 'block';
        document.getElementById('div_loading').innerHTML = 'Load & Visualize';

        if (renderer === undefined) {
          renderer = new THREE.WebGLRenderer( { antialias: true, alpha: true } );
          renderer.setPixelRatio( window.devicePixelRatio );
          renderer.toneMapping = THREE.NeutralToneMapping;
          renderer.toneMappingExposure = 1.5;
          renderer.setSize( ww, wh );
          renderer.shadowMap.enabled = true;
          renderer.shadowMap.type = THREE.PCFSoftShadowMap;
          renderer.setClearColor( 0xFFFFFF, 0 ); // Allow setting the background color
          renderer.autoClear = false;

          // Consider removing this for a production build
          renderer.debug.onShaderError = ( gl, program, glVertexShader, glFragmentShader ) => {
            const errorLog = gl.getProgramInfoLog( program );
            const vertexSource = gl.getShaderSource( glVertexShader );
            const fragmentSource = gl.getShaderSource( glFragmentShader );

            halt_on_error = true;

            handle_error( 'CRITICAL SHADER ERROR: ' + errorLog );
          };

          document.body.appendChild( renderer.domElement );
        }

        if (clock === undefined) {
          clock = new THREE.Timer();
          clock.connect( document );
        }

        if (scene === undefined) scene = new THREE.Scene();

        if (!events_initialized) { initialize_event_listeners(); events_initialized = true; }

        if (camera === undefined) {
          camera = new THREE.PerspectiveCamera( 60, ww / wh, 0.01, 1e9 );
          camera.position.set( 0, 0, 2000 );
          scene.add( camera );
        }

        camera.lookAt( 0, 0, 0 );

        // Add DirectionalLight to the camera
        if (directionalLight === undefined) {
          directionalLight = new THREE.DirectionalLight( 0xFFFFFF, 2.5 );
          directionalLight.position.set( 0, 100, 250 );
          directionalLight.lookAt( new THREE.Vector3( 0, 0, 0 ) );
          camera.add( directionalLight );
        }

        if (controls === undefined) {
          const { OrbitControls } = await import( 'three/addons/controls/OrbitControls.min.js' );

          controls = new OrbitControls( camera, renderer.domElement );
          controls.enableZoom = true;
          controls.zoomToCursor = true;
          controls.zoomSpeed = 0.5;
          controls.rotateSpeed = 0.5;
          controls.keyPanSpeed = 0.5; 
          controls.panSpeed = 0.5;
          controls.minDistance = 0;
          controls.maxDistance = Infinity;
          //controls.enableDamping = true;
          //controls.dampingFactor = 0.3;
          //controls.enableKeys = false;
          //controls.maxPolarAngle = 2.2;
          //controls.minPolarAngle = 1.1;
        }

        if (tiles_loader) {
          tiles_loader.setRenderer( renderer );
        }

        // Start flashing indicator
        document.getElementById('status_indicator').style.display = 'inline-block';

        // Load tiles
        loadURLFile();
      }

      function add_pickable_ghost_volume() {
        if (!tileset_obj) return;

        // Create geometry that matches the screen dimensions
        const ghostGeo = new THREE.BoxGeometry( ww, wh, ww );

        // Create an invisible material
        const ghostMat = new THREE.MeshBasicMaterial({
          side: THREE.DoubleSide, // Pickable from either side
          transparent: true,
          opacity: 0,             // Invisible to the user
          color: 0xffffff,
          depthTest: true,
          depthWrite: false       // Don't block other objects from rendering
        });

        ghostMesh = new THREE.Mesh( ghostGeo, ghostMat );
        ghostMesh.raycast = THREE.Mesh.prototype.raycast;
        ghostMesh.name = "metadata_proxy_mesh";

        // Position it at the center of tileset bounding box
        tileset_obj.boundingBox.getCenter( ghostMesh.position );

        tileset_obj.add( ghostMesh );
      }

      async function loadURLFile() {
        if (selected_url_file !== '') {
          if (selected_url_file.startsWith('https://github.com') === true) {
            selected_url_file = ( selected_url_file.replace('github.com', 'raw.githubusercontent.com') ).replace('blob/', '');
          }

          // URL has to point to tileset.json file

          let url_lc = selected_url_file.toLowerCase();

          if (!(url_lc.startsWith( 'http' )) || !(url_lc.endsWith( '.json' ))) {
            handle_error( 'Invalid URL!' );
            return;
          }

          try {
            tileset_obj = await tiles_loader.loadAsync( selected_url_file );
          } catch ( err ) {
            handle_error( err );
            return;
          }

          scene.add( tileset_obj );
          tileset_obj.frameCamera( camera );

          // Start rendering
          render_requested = true;
          extended_render = true;
          extended_count = 0;
          render();
        }
      }

      async function finish_loading() {
        if (halt_on_error) return;

        document.getElementById('div_loading').style.display = 'none';

        // >>> MAGIC TRICK <<<
        // Some ECEF tilesets might not be visible initially
        // due to the nature of dynamic loading of tilesets.
        // We force transform updates to get them on screen.
        // No rotation is supposed to happen with 0.0 angle:
        await quick_x_rotation( 0.0 );

        // Stop flashing indicator
        document.getElementById('btn_load').disabled = false;
        document.getElementById('status_indicator').style.display = 'none';

        if (gui_set === false) {
          // Add Brightness control
          gui.add( params, 'brightness', 0, 30 ).name( 'Brightness' )
          .onChange( ( value ) => {
            directionalLight.intensity = value;
            needsRender = true;
          });

          // Add LOD Multiplier control (Geometric Error Correction)
          gui.add( params, 'multiplier', 0.5, 20.0, 0.1 ).name( 'LOD Multiplier' )
          .onChange( ( value ) => {
            if (tileset_obj) {
              tileset_obj.setGeometricErrorMultiplier( parseFloat( value ) );
              needsRender = true;
            }
          });

          // Add LOD Distance Bias control
          gui.add( params, 'bias', 1.0, 5.0, 0.1 ).name( 'LOD Distance Bias' )
          .onChange( ( value ) => {
            if (tileset_obj) {
              tileset_obj.setDistanceBias( parseFloat( value ) );
              needsRender = true;
            }
          });

          // Add LOD Point Size control
          gui.add( params, 'pointSize', 1.0, 10.0, 0.25 ).name( 'LOD Point Size' )
          .onChange( ( value ) => {
            if (tileset_obj) {
              tileset_obj.setPointSize( parseFloat( value ) );
              needsRender = true;
            }
          });

          set_gui_position();

          gui.open();
          gui_set = true;
        }

        gui_pointSize = gui.controllersRecursive().find( c => c.property === 'pointSize' );

        gui_container.style.display = 'block';
        set_gui_position();

        let points_present_and_visible = false;

        // Get the root path
        const rootPath = tileset_obj.userData.rootPath || '';

        let bbox_found = false;

        tileset_obj.traverse( ( child ) => {
          if (child.isLineSegments && ( child.parent.bbox?.uuid === child.uuid )) bbox_found = true;
          else if (child.isMesh || child.isPoints || child.isLine) {
            if (child.isMesh) {
              if (child.userData.gltfExtensions) {
                // Currently only EXT_mesh_features with attributes is partially functional
                const ext = child.userData.gltfExtensions.EXT_mesh_features ||
                            child.userData.gltfExtensions.EXT_instance_features;

                // Currently metadata texture is not provided by internal OGC3D loader
                if (ext && ext.featureIds && !ext.featureIds.find( f => f.texture !== undefined )) {
                  tileset_obj.hasGLTFExtensions = true;
                }
              } else if (child.geometry.hasAttribute( '_batchid' )) {
                tileset_obj.hasHybridImplicit = true;
              }
            }

            if (tileset_obj.hasMultipleContents) {
              let fullURL;
              let curr = child;

              // Climb parents to find the contentURL

              while ( curr ) {
                if ( curr.contentURL?.length > 0 ) {
                  fullURL = curr.contentURL;
                  break;
                }

                curr = curr.parent;
              }

              // If it's an array, take the first element; otherwise, use the string
              if (Array.isArray( fullURL )) fullURL = fullURL[ 0 ] || '';

              const uri = fullURL.replace( rootPath, '' );

              if ( tileset_obj.userData.variantLookup && tileset_obj.userData.variantLookup.has( uri ) ) {
                const vId = tileset_obj.userData.variantLookup.get( uri );
                if (vId === 0) {
                  child.visible = true;
                  raycastableObjects.push( child );
                } else {
                  child.visible = false;
                }
              }
            }

            if (child.isPoints && child.visible) points_present_and_visible = true;
          }
        });

        if (!bbox_found) {
          box = new THREE.Box3().setFromObject( tileset_obj );
          boxHelper = new THREE.Box3Helper( box, 0xFFFF00 );
          box_helper_added = true;
          scene.add( boxHelper );
        }

        if (tileset_obj.hasMultipleContents) {
          variants_available = true;
          variants = tileset_obj.userData.contentsVariants;
          document.getElementById('btn_variants').innerText = 'V0';
          document.getElementById('btn_variants').style.display = 'inline-block';
          document.getElementById('btn_variants').style.backgroundColor = 'lightgreen';
        }

        if (tileset_obj.hasMetadata || tileset_obj.hasGLTFExtensions || tileset_obj.hasHybridImplicit) {
          document.getElementById('metadata_message').style.visibility = 'visible';

          if (click_listener_added === false) {
            window.addEventListener( 'click', handle_raycast_click );
            click_listener_added = true;
          }
        } else {
          if (click_listener_added) {
            window.removeEventListener( 'click', handle_raycast_click );
            click_listener_added = false;
          }
        }

        document.getElementById('btn_bounding_box').style.backgroundColor = 'lightgreen';
        bbox_enabled = true;

        animations = tileset_obj.animations;

        if (animations.length > 0) {
          animation_mixer = new THREE.AnimationMixer( scene );
          current_animation = 0;
          animations.forEach( clip => { animation_mixer.clipAction( clip ).loop = THREE.LoopRepeat; } );
          animation_mixer.clipAction( animations[ 0 ] ).play();
          document.getElementById('btn_animate').style.display = 'inline-block';
          document.getElementById('btn_animate').style.backgroundColor = 'lightgreen';
          animation_running = true;
        }

        if (points_present_and_visible) {
          if (tileset_obj) tileset_obj.setPointSize( 1.0 );

          if (gui_pointSize !== null) {
            gui_pointSize.reset();
            gui_pointSize.show( true );
          }
        } else {
          if (gui_pointSize !== null) gui_pointSize.show( false );
        }

        if (tileset_obj.copyrightVisible) {
          tileset_obj.hideCopyright();
          tileset_obj.displayCopyright = false;
        }

        if (tileset_obj.hasMetadata && tileset_obj.children.length === 0) {
          add_pickable_ghost_volume();
        }

        resize();

        enable_disable( false );

        init_running = false;

        console.timeEnd( 'Loading Time' );

        if (!isMobile) {
          await new Promise( resolve => setTimeout( log_info, 1000 ) );
        } else {
          await new Promise( resolve => setTimeout( hide_metadata_message, 3000 ) );
        }
      }

        console.log( 'Memory: ', renderer.info.memory );
        console.log( 'Render: ', renderer.info.render );

        if (document.getElementById('metadata_message').style.visibility === 'visible')
          await new Promise( resolve => setTimeout( hide_metadata_message, 3000 ) );

        console.timeEnd( 'Loading Time' );

      function highlightFeatureInstanced( instanceId ) {
        // 1. REUSE EVERYTHING
        // Instead of a new mesh every time, we just reposition the one we have
        if (!featureHighlightMesh || featureHighlightMesh?.geometry !== pickedObject.geometry) {
          if (featureHighlightMesh) {
            // Detach it from the old parent
            if (featureHighlightMesh.parent) {
              featureHighlightMesh.parent.remove( featureHighlightMesh );
            }

            featureHighlightMesh.traverse((child) => {
              if (child.geometry) child.geometry.dispose();
              if (child.material) child.material.dispose();
            });

            featureHighlightMesh = null;
          }

          const highlightGeo = pickedObject.geometry;

          featureHighlightMesh = new THREE.Mesh(
            highlightGeo,
            new THREE.MeshBasicMaterial({
              color: 0xf08080,
              transparent: true,
              opacity: 0.5,
              depthTest: true,
              depthWrite: false, 
              polygonOffset: true,
              polygonOffsetFactor: -1,
              polygonOffsetUnits: -1
            })
          );

          // Add the wireframe once
          const wireframe = new THREE.LineSegments(
            new THREE.EdgesGeometry( highlightGeo, 30 ),
            new THREE.LineBasicMaterial( { color: 0xffffff } )
          );

          featureHighlightMesh.add( wireframe );
        }

        // THE TELEPORTATION
        // Copy the specific instance's transform from the InstancedMesh
        const matrix = new THREE.Matrix4();
        pickedObject.getMatrixAt( instanceId, matrix );

        // SYNC WITH PARENT
        // If the InstancedMesh itself has a position/rotation, 
        // we must account for it so the highlight doesn't fly off to space
        featureHighlightMesh.matrix.copy( matrix );
        featureHighlightMesh.matrixAutoUpdate = false; // We handle the matrix manually now

        // ATTACH
        pickedObject.add( featureHighlightMesh );

        featureHighlightMesh.visible = true;
        featureHighlightMesh.frustumCulled = false;
        featureHighlightMesh.children.forEach( child => child.frustumCulled = false );
      }

      function highlightFeature( featureId, attrName ) {
        const geometry = pickedObject.geometry;
        const featureIdAttr = geometry.getAttribute( attrName );
        const indexAttr = geometry.index;
        const positionAttr = geometry.getAttribute( 'position' );

        if (!featureIdAttr || !indexAttr || !positionAttr) return;

        // Find all triangles that belong to this featureId
        const activeIndices = [];

        for ( let i = 0; i < indexAttr.count; i += 3 ) {
          const a = indexAttr.getX( i );
          const b = indexAttr.getX( i + 1 );
          const c = indexAttr.getX( i + 2 );

          // If the first vertex of the triangle matches the ID, we take the whole triangle
          if ( a < featureIdAttr.count ) {
            if (featureIdAttr.getX( a ) === featureId) {
              activeIndices.push( a, b, c );
            }
          }
        }

        if (activeIndices.length === 0) return;

        // Create a new "Slice" geometry
        const highlightGeo = new THREE.BufferGeometry();
        highlightGeo.setAttribute( 'position', positionAttr );
        highlightGeo.setIndex( activeIndices );

        // Create the overlay mesh
        featureHighlightMesh = new THREE.Mesh(
          highlightGeo,
          new THREE.MeshBasicMaterial({
            color: 0xf08080,
            transparent: true,
            opacity: 0.5,
            side: THREE.DoubleSide,
            depthTest: true,
            depthWrite: false,   // Keeps the highlight from messing up the depth buffer for other transparents
            polygonOffset: true, // Physically pushes the quad slightly toward the camera
            polygonOffsetFactor: -1,
            polygonOffsetUnits: -1
          })
        );

        // Create the Wireframe Outline (The "Border")
        const wireframeGeo = new THREE.EdgesGeometry( highlightGeo, 30 );
        const wireframe = new THREE.LineSegments(
          wireframeGeo,
          new THREE.LineBasicMaterial( { color: 0xffffff, linewidth: 3 } ) // White border
        );

        // Add the wireframe to our highlight mesh so they move together
        featureHighlightMesh.add( wireframe );

        featureHighlightMesh.position.set( 0, 0, 0 );
        featureHighlightMesh.rotation.set( 0, 0, 0 );
        featureHighlightMesh.scale.set( 1, 1, 1 );

        // Sync transformation with the parent object
        pickedObject.add( featureHighlightMesh );
      }

      function popup_card_cleanup() {
        const card = document.getElementById('metadata-card');

        if (card) {
          card.scrollTop = 0;
          card.scrollLeft = 0;
          card.innerHTML = '';
          card.style.display = 'none';
        }

        // Clean up previous highlight
        if (featureHighlightMesh) {
          // Detach it from the old parent
          if (featureHighlightMesh.parent) {
            featureHighlightMesh.parent.remove( featureHighlightMesh );
          }

          if (pickedObject?.isInstancedMesh) {
            featureHighlightMesh.visible = false;
          } else {
            // Clean up the children (the wireframe)
            featureHighlightMesh.traverse( ( child ) => {
              if (child.geometry) child.geometry.dispose();
              if (child.material) child.material.dispose();
            });

            featureHighlightMesh = null;
          }
        }

        // --- RESTORE PREVIOUS SELECTION ---
        if (selectedObject && selectedObject.material && selectedObject.material.emissive) {
          const oldColor = selectedObject.userData.originalEmissive || new THREE.Color( 0x000000 );
          selectedObject.material.emissive.copy( oldColor );
        }

        selectedObject = null;
        mouse_wheel = true;
        return;
      }

      function handle_raycast_click( event ) {
        popup_card_cleanup();

        // Exit the function if pointer is on the fixed menu or gui
        if (event.target.closest( '#fixed_menu' ) || event.target.closest( '#right_gui_position' )) {
          return;
        }

        // Calculate how far the mouse moved
        const deltaX = Math.abs( event.clientX - mouseDownPos.x );
        const deltaY = Math.abs( event.clientY - mouseDownPos.y );

        // If moved more than 5 pixels, it was likely a camera drag, not a click
        if (deltaX > 5 || deltaY > 5) return;

        if (!raycaster) {
          raycaster = new THREE.Raycaster();
          raycaster.params.Points.threshold = 0.1;
        }

        if (!mouse) mouse = new THREE.Vector2();

        const HIGHLIGHT_COLOR = new THREE.Color( 0xf08080 );

        // Calculate mouse position in normalized device coordinates
        mouse.x = ( event.clientX / window.innerWidth ) * 2 - 1;
        mouse.y = -( event.clientY / window.innerHeight ) * 2 + 1;

        // Raycast against raycastableObjects or the scene
        raycaster.setFromCamera( mouse, camera );
        const intersects = raycaster.intersectObjects( raycastableObjects.length > 0 ? raycastableObjects : scene.children, true );

        if (intersects.length === 0) return;

        const visibleIntersects = intersects.filter( hit => hit.object.visible );
        if (visibleIntersects.length === 0) return;

        // --- HANDLE NEW SELECTION ---
        const intersect = visibleIntersects[ 0 ];
        pickedObject = intersect.object;
        selectedObject = pickedObject;

        // QUICK GUARD: Ensure geometry and attributes exist before we dig in
        if (!pickedObject.geometry) return;

        // Prepare Material for highlighting
        if (selectedObject.material && selectedObject.material.emissive) {
          if (selectedObject.userData.originalEmissive === undefined) {
            selectedObject.userData.originalEmissive = selectedObject.material.emissive.clone();
          }

          // Ensure we only highlight this specific instance
          if (!selectedObject.userData.hasUniqueMaterial) {
            selectedObject.material = selectedObject.material.clone();
            selectedObject.userData.hasUniqueMaterial = true;
          }

          selectedObject.material.emissive.copy( HIGHLIGHT_COLOR );
        }

        const extensions = pickedObject.userData.gltfExtensions;

        const schema = tileset_obj.userData.schema;
        let primaryFeatureId = null;
        let primaryAttributeName = '';
        const featureMetadataList = [];
        let vertexIndex = -1;

        if (pickedObject.isPoints || pickedObject.isLine) {
          vertexIndex = intersect.index;
        } else if (intersect.face) {
          vertexIndex = intersect.face.a;
        }

        if (extensions) {
          const isInstanced = pickedObject.isInstancedMesh;
          const meshFeatures = extensions.EXT_mesh_features || extensions?.EXT_instance_features;

          // Get ALL attribute-based feature sets
          const attributeSets = meshFeatures.featureIds?.filter( f => f.attribute !== undefined ) || [];

          if (attributeSets.length > 0) {
            for ( let i = 0; i < attributeSets.length; i++ ) {
              const attributeInfo = attributeSets[ i ];
              const featureIdIndex = attributeInfo.attribute;

              const attrName1 = `_feature_id_${ featureIdIndex }`;
              const attrName2 = `_FEATURE_ID_${ featureIdIndex }`;

              const featureIdAttr = pickedObject.geometry.getAttribute( attrName1 ) ||
                                    pickedObject.geometry.getAttribute( attrName2 );

              if (featureIdAttr && !isInstanced && intersect.face) {
                const featureId = featureIdAttr.getX( intersect.face.a );

                // Check for nullFeatureId (The "empty" space check)
                // Important: attributeInfo.nullFeatureId is often undefined
                const isNull = attributeInfo.nullFeatureId !== undefined && featureId === attributeInfo.nullFeatureId;

                if (!isNull) {
                  // --- Identify the Metadata Class ---
                  let className = 'FeatureId ' + featureIdIndex; // Fallback

                  // Check if this feature set points to a property table
                  if (attributeInfo.propertyTable !== undefined) {
                    const tableIndex = attributeInfo.propertyTable;

                    // Metadata usually lives in the gltfExtensions of the model or tileset
                    const structuralMetadata = extensions.EXT_structural_metadata;

                    if (structuralMetadata?.propertyTables?.[ tableIndex ]) {
                      className = structuralMetadata.propertyTables[ tableIndex ].class;
                    }
                  }

                  featureMetadataList.push( { class: className, id: featureId } );
                } else {
                  if (attributeSets.length === 1) {
                    console.log( 'Hit a null feature area.' );
                    return; // Don't highlight or show UI for 'nothing'
                  }
                }

                // Only set the primary highlight data ONCE (the first valid set)
                if (primaryFeatureId === null) {
                  primaryFeatureId = featureId;
                  primaryAttributeName = featureIdAttr; 
                }
              } else if (featureIdAttr && isInstanced) {
                const instanceId = intersect.instanceId; // Only exists if it's an InstancedMesh

                if (instanceId !== undefined) {
                  const featureId = featureIdAttr.getX( instanceId );
                  featureMetadataList.push( { class: 'Instance Feature', id: featureId, isInstance: true, instanceId: instanceId } );
                }
              }
            }

            if (featureMetadataList.length > 0) {
              // Restore color
              if (selectedObject?.material?.emissive) {
                selectedObject.material.emissive.copy( selectedObject.userData.originalEmissive );
              }

              // Trigger the geometry-based highlight for the primary ID
              isInstanced
                ? highlightFeatureInstanced( featureMetadataList[ 0 ].instanceId )
                : highlightFeature( primaryFeatureId, primaryAttributeName );

              showUiPanel(
                { ...pickedObject.userData.metadata, featureId: featureMetadataList },
                event, schema, pickedObject.name, false
              );
            }

            return;
          }
        }

        if (vertexIndex !== -1 && pickedObject.geometry.hasAttribute( '_batchid' )) {
          // Get the ID for this specific building/feature
          const batchId = pickedObject.geometry.attributes._batchid.getX( vertexIndex );

          let className = 'BatchId'; // Fallback

          let properties = {};
          properties.VertexId = vertexIndex;
          properties.ID = batchId;

          let batchTable;
          let curr = pickedObject;

          // Climb parents to find the batch table

          while ( curr ) {
            if ( curr.batchTable !== undefined ) {
              batchTable = curr.batchTable;
              break;
            }

            curr = curr.parent;
          }

          if (batchTable !== undefined) {
            className = 'Batch Table';

            if (batchTable.header) { // B3DM
              // Iterate through all keys in the header (Height, Latitude, Longitude, etc.)
              for ( const key in batchTable.header ) {
                const attributeArray = batchTable.header[ key ];

                // Check if it's an array and has a value for our batchId
                if (Array.isArray( attributeArray ) && attributeArray.length > batchId) {
                  properties[ key ] = attributeArray[ batchId ];
                }
              }
            } else if (typeof batchTable.getPropertyNames === 'function') {
              // Extract all available properties from the batch table for this specific ID
              const keys = batchTable.getPropertyNames(); 

              keys.forEach( key => {
                const val = batchTable.getProperty( batchId, key );

                if (val !== undefined && val !== null) {
                  properties[ key ] = val;
                }
              });
            }
          }

          // Wrap in the format showUiPanel expects
          featureMetadataList.push({
            class: className,
            properties: properties
          });

          // Restore color
          if (selectedObject?.material?.emissive) {
            selectedObject.material.emissive.copy( selectedObject.userData.originalEmissive );
          }

          // Trigger the geometry-based highlight for the primary ID
          highlightFeature( batchId, '_batchid' );

          showUiPanel( { ...pickedObject.userData.metadata, featureMetadata: featureMetadataList }, event, schema, pickedObject.name, false );

          return;
        }

        // Fallback to standard metadata
        let tilesetMetadataOnly = !pickedObject.userData.metadata && !!pickedObject.parent;
        const data = pickedObject.userData.metadata;

        if (( data && !data.empty ) || tilesetMetadataOnly) {
          showUiPanel( data, event, schema, pickedObject.name, tilesetMetadataOnly, pickedObject.type );
        } else {
          // If no metadata found, remove highlight
          if (selectedObject.material?.emissive) {
            selectedObject.material.emissive.copy( selectedObject.userData.originalEmissive );
          }

          selectedObject = null;
        }
      }

      function showUiPanel( data, event, schema = null, meshName = '', tilesetMetadataOnly = false, type = '' ) {
        const card = document.getElementById('metadata-card');
        if (!card) return;

        // Enhanced resolver to handle the complex types in new JSON

        function formatArray( arr ) {
          if (arr.length === 0) return '[]';

          // If it's an array of objects
          if (typeof arr[ 0 ] === 'object' && arr[ 0 ] !== null) {
            return arr.map( ( item, idx ) => {
              let itemHtml = `<div style="margin: 4px 0 4px 5px; padding-left: 8px; border-left: 2px solid #00d4ff; background: rgba(0,212,255,0.05);">`;
              itemHtml += `<div style="font-size: 9px; color: #00d4ff; opacity: 0.7;">Part ${idx + 1}</div>`;

              for ( const [ sk, sv ] of Object.entries( item ) ) {
                const cleanSv = ( typeof sv === 'number' )
                  ? ( Number.isInteger( sv ) ? sv : sv.toFixed( 2 ) )
                  : sv;

                itemHtml += `<div style="font-size: 11px;"><span style="color: #666;">${sk}:</span> ${cleanSv}</div>`;
              }

              itemHtml += `</div>`;
              return itemHtml;
            }).join('');
          }
    
          // If it's a simple array (like [1, 2, 3])
          return `[ ${arr.map( v => {
            if ( typeof v === 'number' ) {
              return ( Number.isInteger( v ) ? v : v.toFixed( 2 ) );
            }

            return String( v );
          }).join( ', ' )} ]`;
        }

        const resolveValue = ( className, propName, val ) => {
          let processedVal = val;
          const propDef = schema?.classes?.[ className ]?.properties?.[ propName ];

          // Pre-check: If it's a string that looks like an array but isn't parsed
          // This handles the "[One, Two]" or "[true, false]" strings
          if (typeof processedVal === 'string' && processedVal.startsWith( '[' ) && processedVal.endsWith( ']' )) {
            try {
              // Try JSON parse first (handles ["One", "Two"])
              processedVal = JSON.parse( processedVal );
            } catch ( e ) {
              // Manual fallback for unquoted strings like [One, Two]
              processedVal = processedVal.slice( 1, -1 ).split( ',' ).map( s => s.trim() );
            }
          }

          if (processedVal === null || processedVal === undefined) return 'N/A';

          // A. Handle Arrays (The core of EXT_structural_metadata)
          if (Array.isArray( processedVal )) {
            if (processedVal.length === 0) return '[]';

            // Handle ENUM Arrays
            if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
              const enumValues = schema.enums[ propDef.enumType ].values;
              return `[ ${processedVal.map( v => {
                // Look up by integer value (0, 1, 2) or by string name
                const entry = enumValues.find( e => e.value == v || e.name === v );
                return entry ? entry.name : v;
              }).join(', ')} ]`;
            }

            // General Array (Booleans, Strings, etc.)
            return formatArray( processedVal );
          }

          // B. Handle Nested Objects
          if (typeof processedVal === 'object' && !Array.isArray( processedVal ) && !processedVal.isVector3) {
            let subHtml = '<div style="margin-left: 10px; font-size: 0.9em; color: #ccc;">';

            for ( const [ k, v ] of Object.entries( processedVal ) ) {
              let displayV = v;

              // 1. If it's a string, try to "un-stringify" it first
              if (typeof displayV === 'string' && ( displayV.startsWith( '[' ) || displayV.startsWith( '{' ) )) {
                try {
                  displayV = JSON.parse( displayV );
                } catch ( e ) {
                  // If it's the unquoted Cesium style [One, Two], manual split
                  if (displayV.startsWith( '[' ) && displayV.endsWith( ']' )) {
                    displayV = displayV.slice( 1, -1 ).split( ',' ).map( s => s.trim() );
                  }
                }
              }

              // 2. Now that we have the "truest" form of the data, format it for the UI
              if (Array.isArray( displayV )) {
                displayV = formatArray( displayV );
              } else if (typeof displayV === 'object' && displayV !== null) {
                // If it's still an object (deep nesting), stringify it as a fallback
                displayV = JSON.stringify( displayV );
              } else if (typeof displayV === 'number') {
                displayV = ( Number.isInteger( displayV ) ? displayV : displayV.toFixed( 2 ) );
              } else if (typeof displayV === 'boolean') {
                displayV = displayV ? 'Yes' : 'No';
              }

              subHtml += `<div><span style="color: #888;">${k}:</span> ${displayV}</div>`;
            }

            subHtml += '</div>';
            return subHtml;
          }

          // C. Handle Single Values (Non-Arrays)

          // Single Enums
          if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
            const entry = schema.enums[ propDef.enumType ].values.find( v => v.value == processedVal || v.name === processedVal );
            return entry ? entry.name : processedVal;
          }

          // Single Booleans
          if (propDef?.type === 'BOOLEAN') {
            // Treat "true", true, or non-zero numbers as "Yes"
            const isTrue = (processedVal === true || processedVal === 'true' || processedVal === 1);
            return isTrue ? 'Yes' : 'No';
          }

          // Single Numbers
          if (typeof processedVal === 'number') {
            return Number.isInteger( processedVal ) ? processedVal : processedVal.toFixed( 2 );
          }

          // Handle BigInt / Numbers
          if (typeof processedVal === 'bigint') return processedVal.toString();

          return processedVal;
        };

        let show_copy_to_clipboard = true;

        let html = '';

        // 1. Tileset Metadata - Maybe entries like author, date, tile count...

        const tileset = tilesetMetadataOnly ? tileset_obj.userData?.tileset : data?.tileset;

        if (tileset?.class) {
          html += `
            <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
              <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${tileset.class}</div>
            </div>`;

          if (tileset.properties) {
            for ( const [ key, val ] of Object.entries( tileset.properties ) ) {
              const display = resolveValue( tileset.class, key, val );
              html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
           }
          }
        } else if (tilesetMetadataOnly) {
          show_copy_to_clipboard = false;

          const description = (type === 'Box3Helper') ? 'No Data (turn off bounding box)' : 'No Data';

          html += `
            <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
              <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${ description }</div>
            </div>`;
        }

        if (data && !tilesetMetadataOnly) {
          if (tileset) html += `<br>`;

          // 2. Tile Metadata - Maybe entries like district, population...

          if (data.tile?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.tile.class}</div>
              </div>`;

            if (data.tile.properties) {
              for ( const [ key, val ] of Object.entries( data.tile.properties ) ) {
                const display = resolveValue( data.tile.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }

            html += `<br>`;
          }

          // 3. Selected Object

          if (meshName !== '') {
            html += `<div style="font-size: 12px; font-weight: bold; color: #fff; line-height: 1.0;">Selected: ${meshName}</div><br>`;
          }

          // 4. Group Metadata - Maybe entries like color, priority...

          if (data.group?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.group.class}</div>
              </div>`;

            if (data.group.properties) {
              for ( const [ key, val ] of Object.entries( data.group.properties ) ) {
                const display = resolveValue( data.group.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }

            html += `<br>`;
          }

          // 5. Content Metadata - Maybe entries like vertices, materials...

          if (data.content?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 8px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.content.class}</div>
              </div>`;

            if (data.content.properties) {
              for ( const [ key, val ] of Object.entries( data.content.properties ) ) {
                const display = resolveValue( data.content.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }
          }

          // 5.5 Feature-Specific Metadata (EXT_structural_metadata)

          if (data.featureMetadata) {
            const fms = Array.isArray( data.featureMetadata ) ? data.featureMetadata : [ data.featureMetadata ];

            fms.forEach( ( fm ) => {
              html += `
                <div style="border-bottom: 1px solid #00d4ff; margin-top: 10px; padding-bottom: 4px;">
                  <div style="font-size: 10px; color: #00d4ff; font-weight: bold;">${fm.class}</div>
                </div>`;

              if (fm.properties) {
                // Sort keys so ID is always at the top if it exists
                const keys = Object.keys( fm.properties ).sort( ( a, b ) => {
                  if (a === 'ID' || a === 'id' || a === 'VertexId') return -1;
                  if (b === 'ID' || b === 'id' || b === 'VertexId') return 1;
                  return 0;
                });

                for ( const [ key, val ] of Object.entries( fm.properties ) ) {
                  const display = resolveValue( fm.class, key, val );
                  html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
                }
              }

              html += `<br>`;
            });
          }

          // 6. FeatureId - Maybe entries from EXT_mesh_features, EXT_structural_metadata...
          // Only show if not already merged into metadata

          if (data.featureId && Array.isArray( data.featureId ) && !data.featureMetadata) {
            data.featureId.forEach( ( featureMetadataList, index ) => {
              // Use the class name if found, otherwise use a readable layer index
              const label = featureMetadataList.class || `Feature Layer ${index}`;
              const idValue = featureMetadataList.id !== undefined ? featureMetadataList.id : 'N/A';

              html += `
                <div class="feature-group" style="margin-top: 10px; border-left: 2px solid #00d4ff; padding-left: 8px;">
                  <div style="font-size: 10px; color: #aaa; font-weight: bold;">${ label }</div>
                  <div class="prop-row" style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="prop-label" style="color: #00d4ff;">ID:</span><span class="prop-value">${ idValue }</span>
                  </div>
                </div>`;
            });
          }
        }

        if (show_copy_to_clipboard) {
          // Create a shallow copy so we don't accidentally delete the real schema from the viewer
          const dataForClipboard = data
            ? { ...data }
            : tileset_obj.userData?.tileset
              ? { ...tileset_obj.userData.tileset }
              : {};

          // Remove the heavy schema for popup card, it will be included for clipboard
          delete dataForClipboard.schema;

          // Add selected mesh name
          if (data && meshName) data[ 'Selected' ] = meshName;

          // A helper to make JSON.stringify handle BigInt
          const bigintReplacer = ( key, value ) => typeof value === 'bigint' ? value.toString() : value;

          const rawJson = JSON.stringify( data ? data : dataForClipboard, bigintReplacer, 2 );
          if (!rawJson) return;

          // Escape it for use inside an HTML attribute
          // We replace backslashes first, then single quotes
          safeJson = rawJson
            .replace(/\\/g, '\\\\')   // Escape backslashes
            .replace(/'/g, "\\'")     // Escape single quotes

          html += `
            <div style="padding: 3px; border-top: 1px solid #444; text-align: center;">
              <button
                style="vertical-align: middle; background: #111; color: white; border: 1px solid #00d4ff; padding: 2px; cursor: pointer; font-size: 11px; border-radius: 4px; width: 100%;"
                onclick="navigator.clipboard.writeText( safeJson ).then( () => alert( 'Metadata copied!' ) );">
                📋 Copy To Clipboard
              </button>
            </div>`;
        }

        card.innerHTML = html;
        card.style.display = 'block';

        // 7. Position Logic

        const cardWidth = 220; 
        let x = event.clientX + 15;
        let y = event.clientY + 15;

        if (x + cardWidth > window.innerWidth) x = event.clientX - cardWidth - 15;

        // If the card goes off the bottom of the screen
        if (y + card.offsetHeight > window.innerHeight) {
          y = window.innerHeight - card.offsetHeight - 15;
        }

        card.style.left = x + 'px';
        card.style.top = y + 'px';
      }

      function hideUiPanel() {
        // Restore color
        if (selectedObject?.material?.emissive) {
          selectedObject.material.emissive.copy( selectedObject.userData.originalEmissive );
        }

        pickedObject = null;
        popup_card_cleanup();
      }

      function set_bounding_box() {
          if (!tileset_obj) return;
          bbox_enabled = !bbox_enabled;

          if (box_helper_added) {
            bbox_enabled ? scene.add( boxHelper ) : scene.remove( boxHelper );
          } else {
            tileset_obj.traverse( ( child ) => {
              if (child.isLineSegments && ( child.parent.bbox?.uuid === child.uuid )) child.visible = bbox_enabled;
            });
          }

          const bbox_color = bbox_enabled ? 'lightgreen' : 'transparent';
          document.getElementById('btn_bounding_box').style.backgroundColor = bbox_color;
          needsRender = true;
      }

      function set_wireframe() {
          if (!tileset_obj) return;
          wireframe_enabled = !wireframe_enabled;

          tileset_obj.setWireframe( wireframe_enabled );

          const w_color = wireframe_enabled ? 'lightgreen' : 'transparent';
          document.getElementById('btn_wireframe').style.backgroundColor = w_color;
          needsRender = true;
      }

      function render( timestamp ) {
        if (tileset_obj) {
          // Check if the tileset is still streaming data
          const is_loading = tileset_obj.getStreamingInfo();

          if (animation_running || mouse_down || mouse_wheel || needsRender || extended_render || is_loading) {
            if (stats_enabled) stats.begin();

            if (animation_running) {
              clock.update( timestamp );
              animation_mixer.update( clock.getDelta() );
            }

            controls.update();

            if (tileset_obj.update) tileset_obj.update( camera );
            if (tileset_obj.tileLoader) tileset_obj.tileLoader.update();

            renderer.clear();
            renderer.render( scene, camera );

            if (stats_enabled) stats.end();

            // Reset animation flag AFTER rendering
            needsRender = false;

            if (is_loading) {
              // Keep extended render in check
              extended_count = -1;
              count = -1;
            } else {
              if (extended_render) {
                if (extended_count > 20) {
                  extended_render = false;
                  extended_count = 0;
                  mouse_wheel = true;
                  count = 0;
                  finish_loading();
                } else {
                  extended_count ++;
                }
              } else if (mouse_wheel) {
                if (count > 20) {
                  mouse_wheel = false;
                  count = 0;
                } else {
                  count ++;
                }
              }
            }
          }
        }

        if (render_requested) requestAnimationFrame( render );
      }

      async function reset_all( reset = false ) {
        if (stats) stats.dom.style.visibility = 'hidden';
        document.getElementById('metadata_message').style.visibility = 'hidden';
        document.getElementById('btn_stats').style.backgroundColor = 'transparent';
        document.getElementById('btn_variants').style.backgroundColor = 'transparent';
        document.getElementById('btn_variants').style.display = 'none';

        init_running = false;

        if (gui_set) gui_reset();

        // Reset the view
        if (reset === true) {
          if (scene) {
            controls.reset();
          }
        } else {
          // Page (re)loading
          document.getElementById('btn_load').disabled = false;
          document.getElementById('btn_url').style.backgroundColor = 'transparent';
          document.getElementById('btn_lod').style.backgroundColor = 'transparent';
          document.getElementById('btn_token').style.backgroundColor = 'transparent';
          document.getElementById('btn_keyAPI').style.backgroundColor = 'transparent';
          document.getElementById('btn_animate').style.backgroundColor = 'transparent';

          if (scene) {
            set_back_color();

            if (tileset_obj) await scene_cleanup();

            if (gui) gui.dispose();

            while (scene.children.length > 0) {
              scene.remove( scene.children[ 0 ] );
            }

            renderer.clear();
            renderer.dispose();
          }

          document.getElementById('btn_animate').style.display = 'none';
          document.getElementById('div_error').style.display = 'none';
          document.getElementById('keyAPI_entry').value = '';
          document.getElementById('token_entry').value = '';
          document.getElementById('url_entry').value = '';
          selected_url_file = '';

          enable_disable( true );
        }

        mouse_wheel = true;
      }

      async function scene_cleanup() {
        if (!tileset_obj) return;

        mouse_wheel = true;

        hideUiPanel();

        if (bbox_enabled) await set_bounding_box();
        if (wireframe_enabled) await set_wireframe();

        if (animation_mixer) {
          animation_mixer.stopAllAction();

          for ( let i = 0; i < animations.length; i++ ) {
            animation_mixer.uncacheAction( animations[ i ] );
            animation_mixer.uncacheClip( animations[ i ] );
          }

          animation_mixer.uncacheRoot( animation_mixer.getRoot() );
        }

        if (stats_enabled) set_statistics();

        if (stats && stats.dom && stats.dom.parentNode) {
          stats.dom.parentNode.removeChild( stats.dom );
          stats = null;
        }

        if (featureHighlightMesh) {
          if (featureHighlightMesh.parent) {
            featureHighlightMesh.parent.remove( featureHighlightMesh );
          }

          featureHighlightMesh.traverse( ( child ) => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
          });

          featureHighlightMesh = null;
        }

        if (ghostMesh) {
          if (ghostMesh.parent) {
            ghostMesh.parent.remove( ghostMesh );
          }

          ghostMesh.traverse( ( child ) => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
          });

          ghostMesh = null;
        }

        scene.remove( tileset_obj );

        renderer.clear();
        render_requested = false;

        if (clock) {
          clock.disconnect();
          clock.dispose();
          clock = undefined;
        }

        if (tileset_obj.dispose) tileset_obj.dispose();
        if (boxHelper?.dispose) boxHelper.dispose();

        tileset_obj = null;

        if (isMobile === false) {
          renderer.info.reset();
          renderer.resetState();
        }
      }

      function enable_disable( disable = false ) {
        document.getElementById('btn_file_image_input').disabled = disable;
        document.getElementById('file_image_input').disabled = disable;
        document.getElementById('back_color').disabled = disable;
        document.getElementById('btn_stats').disabled = disable;
        document.getElementById('btn_quick_x').disabled = disable;
        document.getElementById('btn_wireframe').disabled = disable;
        document.getElementById('btn_bounding_box').disabled = disable;
        disabled_changed();

        mouse_wheel = true;
      }
    </script>

    <script>
      function document_ready() {
        isNewiPad = (/iPad/.test( navigator.platform ) && (/Mac OS X/i.test( navigator.userAgent ))) ||
          (navigator.maxTouchPoints !== undefined && navigator.maxTouchPoints > 2 && /MacIntel/.test( navigator.platform ));

        isMobile = (isNewiPad === false) && ((/iPhone|iPad|iPod/.test( navigator.platform )) ||
          (/Android|webOS|iPhone|iPad|iPod|BlackBerry|CriOS|IEMobile|Opera Mini/i.test( navigator.userAgent )));

        $('#cache_level').keypress( function( event ) { if (event.key === 'Enter') $(this).children(':selected').click(); });
        $('#depth_level').keypress( function( event ) { if (event.key === 'Enter') $(this).children(':selected').click(); });
        $('#keyAPI_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_set_keyAPI').click(); });
        $('#token_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_set_token').click(); });
        $('#url_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_load').click(); });

        if (navigator.userAgent.indexOf('Chrome') > -1 || navigator.userAgent.indexOf('Safari') > -1 || isMobile) {
          $('#cache_level').change( function() { $(this).children(':selected').click(); });
          $('#depth_level').change( function() { $(this).children(':selected').click(); });
        }

        document.getElementById('cache_level').selectedIndex = 0;
        document.getElementById('depth_level').selectedIndex = 0;

        alert('If 3D tileset is not visible, maybe one of the following applies:\n- If bounding box is visible maybe only metadata was loaded\n- The model might be in a land far far away:\n   - Click quick rotation button multiple times\n- Its features require API Key or token\n- Its features are not implemented in the viewer\n- Its features are not supported by internal loader:\n   - Only B3DM and GLTF/GLB formats are supported\n- Check console, if possible, for any silent errors\n- Use different LOD settings to see if that changes anything');
      }

      function disabled_changed() {
        $('button').each( function() {
          if (this.disabled === false ) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });

        $('select').each( function() {
          if (this.disabled === false) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });

        $('input[type=color]').each( function() {
          if (this.disabled === false ) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px whitesmoke'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });
      }
    </script>
