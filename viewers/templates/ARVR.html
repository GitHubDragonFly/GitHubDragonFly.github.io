    <script>
      // Resource Loading Failures (404 or similar)
      window.addEventListener( 'error', function ( event ) {
        // We check if the target has a 'src' or 'href' to identify it as a resource
        if (event.target.src || event.target.href) {
          console.error( 'RESOURCE ERROR: ', {
            element: event.target.tagName,
            url: event.target.src || event.target.href,
            html: event.target.outerHTML
          });

          // If the failed resource is jQuery, show the alert immediately
          if ((event.target.src || '').includes('jquery')) {
            alert('jQuery failed to load. Limited functionality. Check your internet connection!');
          }
        }
      }, true); // The 'true' here is vital; it enables the "capturing" phase

      // Standard JavaScript Runtime Errors
      window.onerror = function ( message, source, lineno, colno, error ) {
        console.log( 'RUNTIME ERROR CAUGHT' );

        console.log({
          message: message, // Error message
          file: source,     // The script file where it happened
          line: lineno,     // Line number
          column: colno,    // Column number
          errorObj: error   // The actual Error object (includes stack trace)
        });

        // Returning 'true' prevents the error from showing up in the browser console
        return false; 
      };

      // Unhandled Promise Rejections (Async Errors)
      window.addEventListener( 'unhandledrejection', function ( event ) {
        console.warn( 'UNHANDLED PROMISE: ', event.reason );

        // event.promise is the promise that failed
        // event.reason is usually the error object or message
      });
    </script>

    <script>
      function hide_dropdown_dli() { $('#dc_dli').fadeOut(); }

      function show_hide_dropdown_dli() {
        if ($('#dc_dli')[ 0 ].style.display === 'none') {
          $('#dc_dli').fadeIn();
          $('#directional_light_intensity').focus();
        } else {

      function set_directional_light_intensity() {
        let dli_value = document.getElementById('directional_light_intensity').value;
        document.getElementById('dli_val').innerText = dli_value;
        directionalLight.intensity = parseFloat( dli_value );

      function return_false() { return false; }

      function show_url() {
        if (url_displayed) {
          url_displayed = false;
          document.getElementById('url').style.display = 'none';
          document.getElementById('btn_url').style.backgroundColor = 'transparent';
        } else {
          document.getElementById('btn_url').style.backgroundColor = 'lightgreen';
          document.getElementById('url').style.display = 'block';
          url_displayed = true;
        }
      }

      function load_url_file() {
        let url = document.getElementById('url_entry').value.trim();
        if (url !== '') { selected_url_file = url; url_loading = true; init(); }
      }

      function clear_url() { document.getElementById('url_entry').value = ''; }

      function initialize_event_listeners() {
        const arrow_keys = [ 'ArrowUp', 'ArrowDown', 'ArrowRight', 'ArrowLeft' ];
        const activeKeys = new Set();

        window.addEventListener( 'pointerdown', ( event ) => {}, false);
        window.addEventListener( 'pointerup', ( event ) => {}, false);
        window.addEventListener( 'wheel', ( event ) => {}, false);
        window.addEventListener( 'keydown', ( event ) => {
          if (arrow_keys.some( k => k === event.key ) || event.ctrlKey || event.metaKey || event.shiftKey) {
            if (controls) controls.listenToKeyEvents( window );
            activeKeys.add( event.key ); // Track this key
          }
        }, false);
        window.addEventListener( 'keyup', ( event ) => {
          activeKeys.delete( event.key ); // Remove this key

          if (controls && activeKeys.size === 0) {
            controls.stopListenToKeyEvents();
          }
        }, false);
      }

      function resize() {
        if (document.fullscreenElement || document.mozFullScreenElement ||
          document.msFullscreenElement || document.webkitFullscreenElement) {

          document.getElementById('btn_full_screen').style.backgroundColor = '#FFFF00';
        } else {
          document.getElementById('btn_full_screen').style.backgroundColor = 'transparent';
        }

        // Dynamic Orientation Class
        const isPortrait = window.innerWidth < window.innerHeight;

        if (isMobile && isPortrait) {
          document.body.classList.add( 'in-portrait' );
        } else {
          document.body.classList.remove( 'in-portrait' );
        }

        if (scene !== undefined) {
          ww = window.innerWidth;
          wh = window.innerHeight;

          renderer.setSize( ww, wh );

          camera.aspect = ww / wh;
          camera.updateProjectionMatrix();
        }
      }

      function full_screen() {
        if (document.fullscreenEnabled) {
          document.fullscreenElement ? document.exitFullscreen() : document.body.requestFullscreen();
        } else if (document.mozFullScreenEnabled) {
          document.mozFullScreenElement ? document.mozCancelFullScreen() : document.body.mozRequestFullScreen();
        } else if (document.msFullscreenEnabled) {
          document.msFullscreenElement ? document.msExitFullscreen() : document.body.msRequestFullscreen();
        } else if (document.webkitFullscreenEnabled) {
          document.webkitFullscreenElement ? document.webkitExitFullscreen() : document.body.webkitRequestFullscreen();
        }
      }
    </script>

      function set_rotation() {

          document.getElementById('btn_rotate').style.backgroundColor = 'lightgreen';

      async function set_equi() {
        if (scene) {
          if (scene.environment === null) {
            const { HDRJPGLoader } = await import( '@monogrid/gainmap-js/decode' );

            let url = 'https://raw.githubusercontent.com/GitHubDragonFly/three.js/dev/examples/textures/planets/earth_atmos_4096.jpg';

            new HDRJPGLoader( renderer ).load( url, async function( texture ) {
              let tex = await texture.toDataTexture();

              tex.mapping = THREE.EquirectangularReflectionMapping;
              tex.needsUpdate = true;

              scene.background = tex;
              scene.environment = tex;

              texture.renderTarget.texture.dispose();
              texture.renderTarget.dispose();
              texture.dispose();
              tex.dispose();

              document.getElementById('btn_equi').style.backgroundColor = 'lightgreen';
            }, function ( xhr ) {
            }, function ( error ) {
              console.log( 'Error loading Background Image File!' );
              console.log( error );
            });
          } else {
            if (scene.environment) {
              scene.environment.dispose();
              scene.environment = null;
            }

            if (scene.background) {
              if (!scene.background.isColor) {
                scene.background.dispose();
                scene.background = new THREE.Color();
              }
            }

            document.getElementById('btn_equi').style.backgroundColor = 'transparent';
          }
        }
      }

      function normalize_and_center_global_model() {
        if (!loaded_model || loaded_model.children.length === 0) return;

        // 1. Reset the wrapper's transformations for clean calculations
        loaded_model.scale.set( 1, 1, 1 );
        loaded_model.position.set( 0, 0, 0 );
        loaded_model.rotation.set( 0, 0, 0 );
        loaded_model.updateMatrixWorld( true );

        const box = new THREE.Box3();
        let hasVisibleMesh = false;

        // 2. Compute the bounding box of the meshes inside
        loaded_model.traverse( ( child ) => {
          if (child.isMesh || child.isPoints) {
            if (!child.geometry.boundingBox) child.geometry.computeBoundingBox();
            child.geometry.computeBoundingSphere();
            if (child.isMesh) child.raycast = THREE.Mesh.prototype.raycast;

            box.expandByObject( child );
            hasVisibleMesh = true;
          }
        });

        if (!hasVisibleMesh) {
          box.setFromObject( loaded_model );
        }

        let size = new THREE.Vector3();
        let center = new THREE.Vector3();
        box.getSize( size );
        box.getCenter( center );

        const maxDimension = Math.max( size.x, size.y, size.z );
        if (maxDimension === 0) return;

        // 3. Scale the master wrapper group
        const targetSize = 2.0; 
        const scaleFactor = targetSize / maxDimension;
        loaded_model.scale.set( scaleFactor, scaleFactor, scaleFactor );

        // Shift the immediate imported assets inside the group by the negative center.
        // This drags the actual geometry so its center sits exactly at loaded_model's (0,0,0) local origin.
        loaded_model.children.forEach( ( importedAsset ) => {
          importedAsset.position.sub( center );
        });

        // Place the master wrapper safely in front of the camera space
        loaded_model.position.set( 0, 1.6, -4 );
        loaded_model.updateMatrixWorld( true );
      }

      function set_model_scale( scale ) {
        document.getElementById('model_scale').selectedIndex = 0;
        const val = parseFloat( scale.slice( 0, -1 ) );
        loaded_model.scale.multiplyScalar( val );
        loaded_model.updateMatrix();
        loaded_model.updateMatrixWorld( true );
        loaded_model.originalScale = loaded_model.scale.clone();

        // RECOMPUTE BOUNDING VOLUMES
        loaded_model.traverse( ( child ) => {
          if (child.isMesh) {
            if (child.geometry) {
              child.geometry.computeBoundingBox();
              child.geometry.computeBoundingSphere();
            }
          }
        });
      }

      function quick_x_rotation() {
        loaded_model.rotateX( - Math.PI / 2.0 );

        switch ( current_up ) {
          case '-y':
            current_up = '-z';
            break;

          case 'y':
            current_up = 'z';
            break;

          case '-z':
            current_up = 'y';
            break;

          case 'z':
            current_up = '-y';
            break;

          default:
            break;
        }
      }

      function animate_model() {
        if (animation_running) {
          animation_mixer.clipAction( animations[ current_animation ] ).stop();

          if (current_animation === animations.length - 1) {
            document.getElementById('btn_animate').style.backgroundColor = 'transparent';
            document.getElementById('btn_animate').innerHTML = 'A';
            current_animation = 0;
            animation_running = false;
          } else {
            current_animation += 1;
            animation_mixer.clipAction( animations[ current_animation ] ).play();
            document.getElementById('btn_animate').innerHTML = 'A' + current_animation;
          }
        } else {
          animation_mixer.clipAction( animations[ current_animation ] ).play();
          document.getElementById('btn_animate').style.backgroundColor = 'lightgreen';
          document.getElementById('btn_animate').innerHTML = 'A0';
          animation_running = true;
        }
      }

      async function load_model( url = '', extension = '' ) {
        if (extension === '') {
          handle_error( 'Invalid extension!' );
          return;
        }

        function setupTween() {
          for ( const prop in kinematics.joints ) {
            if ( kinematics.joints.hasOwnProperty( prop ) ) {
              if ( ! kinematics.joints[ prop ].static ) {
                const joint = kinematics.joints[ prop ];
                const old = tweenParameters[ prop ];
                const position = old ? old : joint.zeroPosition;

                tweenParameters[ prop ] = position;

                target[ prop ] = THREE.MathUtils.randInt( joint.limits.min, joint.limits.max );
              }
            }
          }

          kinematicsTween = new tween( tweenParameters ).to( target, duration ).easing( easing.Quadratic.Out );

          kinematicsTween.onUpdate( function( object ) {
            for ( const prop in kinematics.joints ) {
              if ( kinematics.joints.hasOwnProperty( prop ) ) {
                if ( ! kinematics.joints[ prop ].static ) {
                  kinematics.setJointValue( prop, object[ prop ] );
                }
              }
            }
          });

          kinematicsTween.start();
          kinematics_running = true;
          setTimeout( setupTween, duration );
        }

        await new Promise( async resolve => {
          switch ( extension ) {
            case '.3MF':
              const { ThreeMFLoader } = await import( 'three/addons/loaders/3MFLoader.min.js' );

              const tmf_loader = new ThreeMFLoader( manager );

              tmf_loader.load( url, function( object ) {
                loaded_model = object.clone();

                loaded_model.traverse( ( child ) => {
                  if (child.isMesh) {
                    child.geometry.deleteAttribute('normal');
                    child.geometry = merge_vertices( child.geometry, 1e-6 );
                    child.geometry.computeVertexNormals();
                    child.geometry.normalizeNormals();

                    vertex_colors = (child.geometry.hasAttribute( 'color' ) === true);

                    const mtls = Array.isArray( child.material ) ? child.material : [ child.material ];

                    mtls.forEach( m => {
                      set_texture_colorSpace( m );
                      m.vertexColors = vertex_colors;
                      m.side = THREE.DoubleSide;
                      m.flatShading = false;

                      m.needsUpdate = true;
                    });
                  }
                });

                loaded_model.rotation.x -= Math.PI / 2;

                resolve( finish_loading() );
              }, function ( xhr ) { // onProgress
              }, function ( error ) { handle_error( error ); }); // onError

              break;

            case '.BIM':
              const { BIMLoader } = await import( '../static/dotbim/loader/module/BIMLoader.min.js' );

              const bim_loader = new BIMLoader( manager );

              bim_loader.load( url, function( bim_meshes ) {
                loaded_model.add( bim_meshes );

                loaded_model.traverse( ( child ) => {
                  if (child.isMesh) {
                    vertex_colors = (child.geometry.hasAttribute( 'color' ) === true);

                    const mtls = Array.isArray( child.material ) ? child.material : [ child.material ];

                    mtls.forEach( m => {
                      set_texture_colorSpace( m );
                      m.vertexColors = vertex_colors;
                      m.side = THREE.DoubleSide;
                      m.flatShading = true;

                      m.needsUpdate = true;
                    });
                  }
                });

                resolve( finish_loading() );
              }, function ( xhr ) { // onProgress
              }, function ( error ) { handle_error( error ); }); // onError

              break;

            case '.DAE':
              const { ColladaLoader } = await import( '../static/jsm/loaders/ColladaLoader.min.js' );

              const dae_loader = new ColladaLoader( manager );

              dae_loader.load( url, async function( collada ) {
                loaded_model.add( collada.scene );

                animations = collada.scene.animations;

                if (animations?.length > 0) {
                  document.getElementById('btn_animate').style.backgroundColor = 'lightgreen';
                  document.getElementById( 'btn_animate' ).disabled = false;
                  document.getElementById('btn_animate').innerHTML = 'A0';

                  animation_mixer = new THREE.AnimationMixer( collada.scene );
                  animations.forEach( clip => { animation_mixer.clipAction( clip ).loop = THREE.LoopRepeat; } );
                  animation_mixer.clipAction( animations[ 0 ] ).play();
                  animation_running = true;
                }

                loaded_model.traverse( ( child ) => {
                  if (child.isMesh || child.isPoints) {
                    vertex_colors = (child.geometry.hasAttribute( 'color' ) === true);

                    const mtls = Array.isArray( child.material ) ? child.material : [ child.material ];

                    mtls.forEach( m => {
                      if (child.isMesh) set_texture_colorSpace( m );
                      if (child.isPoints) m.size = isMobile ? 0.001 : 0.005;
                      m.vertexColors = vertex_colors;
                      m.side = THREE.DoubleSide;
                      m.flatShading = false;

                      if (child.isMesh && m.transparent) {
                        m.polygonOffset = true;
                        m.polygonOffsetFactor = -1;
                        m.polygonOffsetUnits = -2;
                      }

                      m.needsUpdate = true;
                    });
                  }
                });

                kinematics = collada.kinematics;

                if (!(animations?.length > 0) && Object.keys( kinematics ).length > 0) {
                  if (!tween) {
                    const { Easing, Tween, update } = await import( '@tweenjs' );

                    tween_update = update;
                    easing = Easing;
                    tween = Tween;

                    duration = THREE.MathUtils.randInt( 2500, 5000 );
                  }

                  setupTween();
                }

                resolve( finish_loading() );
              }, function ( xhr ) { // onProgress
              }, function ( error ) { handle_error( error ); }); // onError

              break;

            case '.FBX':
              const { DDSLoader } = await import( 'three/addons/loaders/DDSLoader.min.js' );
              const { TGALoader } = await import( 'three/addons/loaders/TGALoader.min.js' );
              const { FBXLoader } = await import( '../static/jsm/loaders/FBXLoader.min.js' );

              const fbx_loader = new FBXLoader( manager );

              const dds_loader = new DDSLoader( manager );
              manager.addHandler( /\.dds$/i, dds_loader );

              const tga_loader = new TGALoader( manager );

            case '.PLY':
              const { PLYLoader } = await import( 'three/addons/loaders/PLYLoader.min.js' );

              ply_loader.load( url, function( geometry ) {

                  animation_mixer.clipAction( animations[ 0 ] ).play();

      function checkLaserIntersections() {
        if (!renderer.xr.isPresenting) return;

        if (controller1) {
          controller1.updateMatrixWorld( true );

          tempMatrix.identity().extractRotation( controller1.matrixWorld );
          raycaster1.ray.origin.setFromMatrixPosition( controller1.matrixWorld );
          raycaster1.ray.direction.set( 0, 0, -1 ).applyMatrix4( tempMatrix );

          const intersects = raycaster1.intersectObjects( [ loaded_model ], true );

          if ( intersects.length > 0 ) {
            // 🎯 HIT: Change laser line color to bright red or green
            laserMaterial1.color.setHex( 0xFF0000 );

            // Optional: Scale the visual line length so it stops exactly where it hits the model surface!
            const hitDistance = intersects[ 0 ].distance;
            line1.scale.z = hitDistance / 5; // Assumes baseline line geometry was 5 units long
          } else {
            // 💨 MISS: Reset laser to standard dull color
            laserMaterial1.color.setHex( 0xBBBBBB );
          }
        }

        if (controller2) {
          controller2.updateMatrixWorld( true );

          tempMatrix.identity().extractRotation( controller2.matrixWorld );
          raycaster2.ray.origin.setFromMatrixPosition( controller2.matrixWorld );
          raycaster2.ray.direction.set( 0, 0, -1 ).applyMatrix4( tempMatrix );

          const intersects = raycaster2.intersectObjects( [ loaded_model ], true );

          if ( intersects.length > 0 ) {
            // 🎯 HIT: Change laser line color to bright red or green
            laserMaterial2.color.setHex( 0xFF0000 );

            // Optional: Scale the visual line length so it stops exactly where it hits the model surface!
            const hitDistance = intersects[ 0 ].distance;
            line2.scale.z = hitDistance / 5; // Assumes baseline line geometry was 5 units long
          } else {
            // 💨 MISS: Reset laser to standard dull color
            laserMaterial2.color.setHex( 0xBBBBBB );
          }
        }
      }

            vr_btn.style.minHeight = '40px';
            vr_btn.style.verticalAlign = 'middle';
            if (isMobile) vr_btn.style.marginBottom = '20px';
          }

          if (ar_OK && ar_btn === undefined) {
            ar_selected = true;

            const { ARButton } = await import( 'three/addons/webxr/ARButton.min.js' );

            ar_btn = ARButton.createButton( renderer, {
              optionalFeatures: [ 'hand-tracking', 'depth-sensing', 'dom-overlay', 'hit-test', 'local' ]
            } );

            // Assign the utility class to override Three.js defaults via CSS
            ar_btn.classList.add( 'xr-button' );

            ar_btn.addEventListener( 'click', () => {
              resize();
            });

            ar_btn.id = 'btn_ar';
            ar_btn.style.color = 'green';
            ar_btn.style.minHeight = '40px';
            ar_btn.style.verticalAlign = 'middle';
            if (isMobile) ar_btn.style.marginBottom = '20px';
          }

          // 3. Set up Controllers and RAYCASTING Targets
          if (ar_OK || vr_OK) {
            // ACTIVATE ORIENTATION TRACKING
            document.body.classList.add( 'vr-capable' );
            resize(); // Instantly checks if currently in portrait

            renderer.xr.enabled = true;
            renderer.xr.setReferenceSpaceType('local-floor');

            let vrDeltaY = 0;
            let vrDeltaZ = 0;

            renderer.xr.addEventListener( 'sessionstart', () => {
              // Save current rotation state for resetting later
              loaded_model.originalQuaternion = loaded_model.quaternion.clone();

              controls.enabled = false;
              controls.reset();

              // Calculate exactly how far the user zoomed or shifted on desktop 
              // compared to the default VR spawn space
              vrDeltaY = camera.position.y - 1.5;
              vrDeltaZ = camera.position.z + 1.5;

              // Apply the custom dynamic offset to the model wrapper
              loaded_model.position.y += vrDeltaY;
              loaded_model.position.z += vrDeltaZ;
            });

            renderer.xr.addEventListener( 'sessionend', async () => {
              // PRE-EMPTIVE MODEL RESCUE
              // If the user was actively dragging the model when they hit "Exit VR"
              if (activeGrabbedObject && activeController) {
                console.log( 'Pre-emptively pulling model back to scene root...' );

                // Smoothly disconnect from the controller and attach back to the main scene root,
                // automatically preserving its exact world position, rotation, and scale.
                scene.attach( activeGrabbedObject );

                // Clear the global grab states safely
                activeGrabbedObject = null;
                activeController = null;
              }

              // CLEAR NATIVE XR CAMERA POSE REMNANTS
              renderer.xr.getCamera().cameras.forEach( c => {
                c.position.set( 0, 0, 0 );
                c.quaternion.set( 0, 0, 0, 1 );
              });

              // HARD CAMERA RESET
              if (loaded_model.originalPosition) loaded_model.position.copy( loaded_model.originalPosition );
              if (loaded_model.originalScale) loaded_model.scale.copy( loaded_model.originalScale );

              if (loaded_model.originalQuaternion) {
                loaded_model.quaternion.copy( loaded_model.originalQuaternion );
              } else {
                // Wipe out any temporary VR rotation changes on the model wrapper
                loaded_model.rotation.set( 0, 0, 0 );
              }

              if (camera.originalPosition) camera.originalPosition.copy( camera.originalPosition );
              if (camera.originalQuaternion) camera.quaternion.copy( camera.originalQuaternion );

              // RECALCULATE CANVAS PROJECTION
              camera.near = 0.1;
              camera.far = 1e8;
              camera.fov = 60;
              camera.aspect = window.innerWidth / window.innerHeight;
              camera.updateProjectionMatrix();

              // RESTORE ORBITCONTROLS
              controls.enabled = true;
              controls.target.copy( loaded_model.originalPosition || new THREE.Vector3( 0, 1.6, -4 ) );
              controls.update();

              // CANVAS REBUILD & RENDER FLUSH
              renderer.setSize( window.innerWidth, window.innerHeight, true );
              scene.updateMatrixWorld( true );
              renderer.render( scene, camera );

              // Small delay fallback to ensure the browser DOM has rearranged itself 
              // after dropping the fullscreen WebXR layout
              await new Promise( resolve => setTimeout( () => {
                if (typeof resize === 'function') resize();
                resolve();
              }, 50 ) );
            });

            if (raycaster1 === undefined) {
              raycaster1 = new THREE.Raycaster();
              raycaster1.params.Points.threshold = 0.05;
            }

            if (raycaster2 === undefined) {
              raycaster2 = new THREE.Raycaster();
              raycaster2.params.Points.threshold = 0.05;
            }

            if (tempMatrix === undefined) tempMatrix = new THREE.Matrix4();

            if (laserMaterial1 === undefined) laserMaterial1 = new THREE.LineBasicMaterial({ color: 0xBBBBBB }); // Light gray by default
            if (laserMaterial2 === undefined) laserMaterial2 = new THREE.LineBasicMaterial({ color: 0xBBBBBB }); // Light gray by default

            // --- GLOBAL STATE TRACKERS ---
            let activeGrabbedObject = null;
            let activeController = null;

            function handleSelect( controller, raycstr, ctrlNumber ) {
              if (!renderer.xr.isPresenting) return;

              // STATE 1: Release the object if already holding it
              if (activeGrabbedObject && activeController === controller) {
                // Re-attach back to the main scene root, preserving its exact world spot
                scene.attach( activeGrabbedObject );

                activeGrabbedObject = null;
                activeController = null;
                console.log( `Controller ${ctrlNumber}: Released model back to scene root.` );
                return;
              }

              // STATE 2: Grab the object if pointing at it
              if (!activeGrabbedObject) {
                // Dynamic ray setup from controller's current world position
                const tempMatrix = new THREE.Matrix4();
                tempMatrix.identity().extractRotation( controller.matrixWorld );

                raycstr.ray.origin.setFromMatrixPosition( controller.matrixWorld );
                raycstr.ray.direction.set( 0, 0, -1 ).applyMatrix4( tempMatrix );

                // Check intersections against your loaded model wrapper
                const intersects = raycstr.intersectObjects( [ loaded_model ], true );

                if ( intersects.length > 0 ) {
                  activeGrabbedObject = loaded_model; 
                  activeController = controller;

                  // Attach the model directly to the tracking controller.
                  // Three.js seamlessly calculates the exact spatial offset between 
                  // the controller and the model, locking it in mid-air.
                  controller.attach( activeGrabbedObject );

                  console.log( `Controller ${ctrlNumber}: Securely grabbed the model.` );
                }
              }
            }

            function processControllerRay( controller, raycstr, laserMaterial, lineMesh ) {
              if (!controller) return;

              // 🎯 ACTIVE DRAG MANIFESTATION
              // If this controller is currently carrying the model, lock its appearance
              if (activeGrabbedObject && activeController === controller) {
                laserMaterial.color.setHex( 0xFF0000 ); // Keep laser red
                // Do not alter lineMesh.scale.z here so it stays at its last captured length
                return;
              }

              // Setup ray matrices for passive scanning
              const tempMatrix = new THREE.Matrix4();
              tempMatrix.identity().extractRotation( controller.matrixWorld );
              raycstr.ray.origin.setFromMatrixPosition( controller.matrixWorld );
              raycstr.ray.direction.set( 0, 0, -1 ).applyMatrix4( tempMatrix );

              // If another hand is holding the model, don't let this laser interact with it
              const targets = (activeGrabbedObject) ? [] : [ loaded_model ];
              const intersects = raycstr.intersectObjects( targets, true );

              if (intersects.length > 0) {
                // 🎯 HOVERING OVER MODEL
                laserMaterial.color.setHex( 0xFF0000 );
                const hitDistance = intersects[ 0 ].distance;

                // Scale the visual laser line to terminate exactly where it strikes the asset boundary
                // Assumes base line geometry is 1 unit long. Adjust divisor if default line length varies.
                lineMesh.scale.z = hitDistance;
              } else {
                // 💨 SCANNING VACANT SPACE
                laserMaterial.color.setHex( 0xBBBBBB );
                lineMesh.scale.z = 5; // Reset laser to default full pointer length (e.g. 5 meters)
              }
            }

            // Event listeners as clean wrappers
            function onTriggerSelect1() { handleSelect( controller1, raycaster1, 1 ); }
            function onTriggerSelect2() { handleSelect( controller2, raycaster2, 2 ); }

            // Hand 0 (Typically Right or First active controller)
            controller1 = renderer.xr.getController( 0 );

            if (controller1) {
              // 'selectstart' fires the exact millisecond the controller trigger is pulled down
              controller1.addEventListener( 'selectstart', onTriggerSelect1 );
              scene.add( controller1 );
            }

            // Hand 1 (Typically Left or Second active controller)
            controller2 = renderer.xr.getController( 1 );

            if (controller2) {
              // 'selectstart' fires the exact millisecond the controller trigger is pulled down
              controller2.addEventListener( 'selectstart', onTriggerSelect2 );
              scene.add( controller2 );
            }

            // Visual Mesh Controllers (Grips)
            if (factory === undefined) {
              const { XRControllerModelFactory } = await import( 'three/addons/webxr/XRControllerModelFactory.min.js' );
              factory = new XRControllerModelFactory();

              controllerGrip1 = renderer.xr.getControllerGrip( 0 );

              if (controllerGrip1) {
                controllerGrip1.add( factory.createControllerModel( controllerGrip1 ) );
                scene.add( controllerGrip1 );
              }

              controllerGrip2 = renderer.xr.getControllerGrip( 1 );

              if (controllerGrip2) {
                controllerGrip2.add( factory.createControllerModel( controllerGrip2 ) );
                scene.add( controllerGrip2 );
              }
            }

            // 4. Add a visual laser line to the target controllers
            const geometry = new THREE.BufferGeometry().setFromPoints( [ new THREE.Vector3( 0, 0, 0 ), new THREE.Vector3( 0, 0, -5 ) ] );
            line1 = new THREE.Line( geometry, laserMaterial1 );
            line2 = new THREE.Line( geometry, laserMaterial2 );

            // Add line to both ray pointers
            controller1.add( line1 );
            controller2.add( line2 );
          }

          // Orbit controls setup
          if (controls === undefined) {
            const { OrbitControls } = await import( 'three/addons/controls/OrbitControls.min.js' );
            controls = new OrbitControls( camera, renderer.domElement );

        const model_extensions = [ '.3MF', '.BIM', '.DAE', '.FBX', '.GLB', '.GLTF', '.PLY', '.USD', '.USDA', '.USDC', '.USDZ' ];

        if (!url_loading) {
          // Load local model file
          let fi = document.getElementById('file_input');

          console.time( 'Loading Time' );

          let fn_uc = fi.files[ 0 ].name.toUpperCase();
          extension = fn_uc.substring( fn_uc.lastIndexOf( '.' ) );
          current_up = (extension === '.3MF') ? 'z' : 'y';

          if (model_extensions.some( ext => fn_uc.endsWith( ext ) )) {
            let url = URL.createObjectURL( fi.files[ 0 ] );
            await load_model( url, extension );
            URL.revokeObjectURL( fi.files[ 0 ] );
          } else {
            console.log( 'No valid model file selected!' );
            document.getElementById('div_loading').style.display = 'none';
            document.getElementById('div_error').style.display = 'block';
            return;
          }

          selected_url_file = '';
        } else {
          // Reset the file input
          document.getElementById('file_input').value = '';
          url_loading = false;

          if (selected_url_file.indexOf( ',' ) > -1 || selected_url_file.indexOf( ';' ) > -1 || selected_url_file.indexOf( ' ' ) > -1) {
            handle_error( 'Only a single URL is allowed!' );
            return;
          }

          if (selected_url_file.startsWith('https://github.com') === true) {
            selected_url_file = ( selected_url_file.replace('github.com', 'raw.githubusercontent.com') ).replace('blob/', '');
          }

          let url_uc = selected_url_file.toUpperCase();
          extension = url_uc.substring( url_uc.lastIndexOf( '.' ) );

          if ( model_extensions.some( ext => url_uc.endsWith( ext ) ) ) {
            console.time( 'Loading Time' );
            await load_model( selected_url_file, extension );
          } else {
            console.log( 'Not a valid URL for supported models!' );
            document.getElementById('div_loading').style.display = 'none';
            document.getElementById('div_error').style.display = 'block';
            return;
          }
        }

      function set_texture_colorSpace( material ) {
        if (material.map && (!material.map.colorSpace || material.map.colorSpace === 'NoColorSpace')) {
          material.map.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.aoMap && (!material.aoMap.colorSpace || material.aoMap.colorSpace === 'NoColorSpace')) {
          material.aoMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.alphaMap && (!material.alphaMap.colorSpace || material.alphaMap.colorSpace !== 'NoColorSpace')) {
          material.alphaMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.bumpMap && (!material.bumpMap.colorSpace || material.bumpMap.colorSpace === 'NoColorSpace')) {
          material.bumpMap.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.lightMap && (!material.lightMap.colorSpace || material.lightMap.colorSpace === 'NoColorSpace')) {
          material.lightMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.emissiveMap && (!material.emissiveMap.colorSpace || material.emissiveMap.colorSpace === 'NoColorSpace')) {
          material.emissiveMap.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.normalMap && (!material.normalMap.colorSpace || material.normalMap.colorSpace !== 'NoColorSpace')) {
          material.normalMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.specularMap && (!material.specularMap.colorSpace || material.specularMap.colorSpace === 'NoColorSpace')) {
          material.specularMap.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.metalnessMap && (!material.metalnessMap.colorSpace || material.metalnessMap.colorSpace !== 'NoColorSpace')) {
          material.metalnessMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.roughnessMap && (!material.roughnessMap.colorSpace || material.roughnessMap.colorSpace !== 'NoColorSpace')) {
          material.roughnessMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.anisotropyMap && (!material.anisotropyMap.colorSpace || material.anisotropyMap.colorSpace !== 'NoColorSpace')) {
          material.anisotropyMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.clearcoatMap && (!material.clearcoatMap.colorSpace || material.clearcoatMap.colorSpace === 'NoColorSpace')) {
          material.clearcoatMap.colorSpace = THREE.LinearSRGBColorSpace;
        }

        if (material.clearcoatNormalMap && (!material.clearcoatNormalMap.colorSpace || material.clearcoatNormalMap.colorSpace !== 'NoColorSpace')) {
          material.clearcoatNormalMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.clearcoatRoughnessMap && (!material.clearcoatRoughnessMap.colorSpace || material.clearcoatRoughnessMap.colorSpace !== 'NoColorSpace')) {
          material.clearcoatRoughnessMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.iridescenceMap && (!material.iridescenceMap.colorSpace || material.iridescenceMap.colorSpace !== 'NoColorSpace')) {
          material.iridescenceMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.iridescenceThicknessMap && (!material.iridescenceThicknessMap.colorSpace || material.iridescenceThicknessMap.colorSpace !== 'NoColorSpace')) {
          material.iridescenceThicknessMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.sheenColorMap && (!material.sheenColorMap.colorSpace || material.sheenColorMap.colorSpace === 'NoColorSpace')) {
          material.sheenColorMap.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.sheenRoughnessMap && (!material.sheenRoughnessMap.colorSpace || material.sheenRoughnessMap.colorSpace !== 'NoColorSpace')) {
          material.sheenRoughnessMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.specularColorMap && (!material.specularColorMap.colorSpace || material.specularColorMap.colorSpace === 'NoColorSpace')) {
          material.specularColorMap.colorSpace = THREE.SRGBColorSpace;
        }

        if (material.specularIntensityMap && (!material.specularIntensityMap.colorSpace || material.specularIntensityMap.colorSpace !== 'NoColorSpace')) {
          material.specularIntensityMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.thicknessMap && (!material.thicknessMap.colorSpace || material.thicknessMap.colorSpace !== 'NoColorSpace')) {
          material.thicknessMap.colorSpace = THREE.NoColorSpace;
        }

        if (material.transmissionMap && (!material.transmissionMap.colorSpace || material.transmissionMap.colorSpace !== 'NoColorSpace')) {
          material.transmissionMap.colorSpace = THREE.NoColorSpace;
        }
      }

      async function finish_loading() {
        await normalize_and_center_global_model();

        loaded_model.name = 'loaded_model';

        // Point the controls target straight at the center of the model (0, 1.6, -4)
        controls.target.copy( loaded_model.position );

        // Update the controls matrix to register the new layout
        controls.update();

        // Save original states for resetting later
        if (!loaded_model.originalPosition) loaded_model.originalPosition = loaded_model.position.clone();
        if (!loaded_model.originalScale) loaded_model.originalScale = loaded_model.scale.clone();
        if (!camera.originalPosition) camera.originalPosition = camera.position.clone();
        if (!camera.originalQuaternion) camera.originalQuaternion = camera.quaternion.clone();

        renderer.setAnimationLoop( render );
  
        if (!loaded_model.originalPosition) {
          loaded_model.originalPosition = loaded_model.position.clone();
        }

        if (!loaded_model.originalScale) {
          loaded_model.originalScale = loaded_model.scale.clone();
        }

        if (!camera.originalPosition) {
          camera.originalPosition = camera.position.clone();
        }

        if (!camera.originalQuaternion) {
          camera.originalQuaternion = camera.quaternion.clone();
        }

        renderer.setAnimationLoop( render );

        console.timeEnd( 'Loading Time' );

        enable_disable( false );

        if (ar_btn) document.body.appendChild( ar_btn );
        if (vr_btn) document.body.appendChild( vr_btn );

        document.getElementById('btn_load').disabled = false;
        document.getElementById('btn_file_input').disabled = false;

        document.getElementById('div_loading').style.display = 'none';
        document.getElementById('div_error').style.display = 'none';
      }

      function handle_error( error ) {
        console.timeEnd( 'Loading Time' );
        console.log( 'Error loading model!' );
        console.log( error );

        document.getElementById('btn_load').disabled = false;
        document.getElementById('btn_file_input').disabled = false;

        document.getElementById('div_loading').style.display = 'none';
        document.getElementById('div_error').style.display = 'block';
      }

      function render( timestamp ) {
        if (loaded_model) {
          if (animation_mixer) {
            clock.update( timestamp );
            animation_mixer.update( clock.getDelta() );
          }

          if (kinematics_running && kinematicsTween) tween_update();

          if (rotation_enabled) {
            switch ( current_up ) {
              case '-y':
                loaded_model.rotation.y -= 0.001;
                break;

              case 'y':
                loaded_model.rotation.y += 0.001;
                break;

              case '-z':
                loaded_model.rotation.z -= 0.001;
                break;

              case 'z':
                loaded_model.rotation.z += 0.001;
                break;

              default:
                break;
            }
          }

          controls.update();

          renderer.clear();
          renderer.render( scene, camera );

          if (renderer.xr.isPresenting) checkLaserIntersections();
        }
      }

      function reset_all( no_reload = false ) {
        if (!no_reload) {
          document.getElementById('file_input').value = '';
          document.getElementById('url_entry').value = '';
          selected_url_file = '';
        }

        document.getElementById('btn_animate').style.backgroundColor = 'transparent';
        document.getElementById('btn_animate').disabled = true;
        document.getElementById('div_error').innerHTML = '';
        document.getElementById('div_error').style.display = 'none';
        vertex_colors = false;
        extension = '';

        if (scene !== undefined) {
          if (loaded_model && loaded_model.name === 'loaded_model') {
            scene.remove( loaded_model );

            if (kinematics_running && kinematicsTween) kinematicsTween.stop();

            if (animation_mixer) {
              animation_mixer.stopAllAction();

              for ( let i = 0; i < animations.length; i++ ) {
                animation_mixer.uncacheAction( animations[ i ] );
                animation_mixer.uncacheClip( animations[ i ] );
              }

              animation_mixer.uncacheRoot( animation_mixer.getRoot() );

              animations = [];
              animation_mixer = null;
            }

            if (loaded_model.skeleton && loaded_model.skeleton.boneTexture)
              loaded_model.skeleton.boneTexture.dispose();

            loaded_model.traverse( ( child ) => {
              if (child.isMesh || child.isPoints || child.isLineSegments) {
                if (child.skeleton && child.skeleton.boneTexture)
                  child.skeleton.boneTexture.dispose();

                if (child.material) {
                  const mats = Array.isArray( child.material ) ? child.material : [ child.material ];

                  mats.forEach( m => {
                    if (m.uniforms) {
                      Object.keys( m.uniforms ).forEach( ( key ) => {
                        if (m.uniforms[ key ].value) {
                          if (Array.isArray( m.uniforms[ key ].value ) && m.uniforms[ key ].value.length > 0) {
                            m.uniforms[ key ].value.forEach( val => { if (val?.isTexture) val.dispose(); } );
                          } else {
                            if (m.uniforms[ key ]?.value?.isTexture) m.uniforms[ key ].value.dispose();
                          }
                        }
                      });
                    } else {
                      for (const prop in m) {
                        if (m[ prop ]?.isTexture) m[ prop ].dispose();
                      };
                    }

                    m.dispose();
                    m = null;
                  });
                }

                child.geometry.dispose();
                child.geometry = null;
              }
            });

            THREE.Cache.clear();

            loaded_model = new THREE.Group();
            loaded_model.position.set( 0, 0, 1 );
            scene.add( loaded_model );

            document.getElementById('directional_light_intensity').value = 3;
            set_directional_light_intensity();
          }
        }
      }

      function enable_disable( disable = false ) {
        document.getElementById('directional_light_intensity').disabled = disable;
        document.getElementById('model_scale').disabled = disable;
        document.getElementById('btn_dc_dli').disabled = disable;
        document.getElementById('model_scale').disabled = disable;
        document.getElementById('btn_quick_x').disabled = disable;
        document.getElementById('btn_rotate').disabled = disable;
        document.getElementById('btn_equi').disabled = disable;
        disabled_changed();
      }
    </script>

    <script>
      function document_ready() {
        isNewiPad = (/iPad/.test( navigator.platform ) && (/Mac OS X/i.test( navigator.userAgent ))) ||
          (navigator.maxTouchPoints !== undefined && navigator.maxTouchPoints > 2 && /MacIntel/.test( navigator.platform ));

        isMobile = !isNewiPad && ((/iPhone|iPad|iPod/.test( navigator.platform )) ||
          (/Android|webOS|iPhone|iPad|iPod|BlackBerry|CriOS|IEMobile|Opera Mini/i.test( navigator.userAgent )));

        $('#model_scale').keypress( function( event ) { if (event.key === 'Enter') $(this).children(':selected').click(); });
        $('#url_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_load').click(); });

        if (navigator.userAgent.indexOf('Chrome') > -1 || navigator.userAgent.indexOf('Safari') > -1 || isMobile) {
          $('#model_scale').change( function() { $(this).children(':selected').click(); });
        }

        document.getElementById('model_scale').selectedIndex = 0;

        if (!isMobile) $('#btn_full_screen')[ 0 ].style.display = '';
      }

      function disabled_changed() {
        $('button').each( function() {
          if (!this.disabled) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }
        });

        $('select').each( function() {
          if (!this.disabled) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }
        });
      }
    </script>
