    <script>
      // Resource Loading Failures (404 or similar)
      window.addEventListener( 'error', function ( event ) {
        // We check if the target has a 'src' or 'href' to identify it as a resource
        if (event.target.src || event.target.href) {
          console.error( 'RESOURCE ERROR: ', {
            element: event.target.tagName,
            url: event.target.src || event.target.href,
            html: event.target.outerHTML
          });

          // If the failed resource is jQuery, show the alert immediately
          if ((event.target.src || '').includes('jquery')) {
            alert('jQuery failed to load. Limited functionality. Check your internet connection!');
          }

          if (init_running === true) {
            handle_error( 'RESOURCE ERROR' );
          } else {
            document.getElementById('div_loading').innerHTML = '!!! Resource Error !!!';
          }
        }
      }, true); // The 'true' here is vital; it enables the "capturing" phase

      // Standard JavaScript Runtime Errors
      window.onerror = function ( message, source, lineno, colno, error ) {
        console.log( 'RUNTIME ERROR CAUGHT' );

        console.log({
          message: message, // Error message
          file: source,     // The script file where it happened
          line: lineno,     // Line number
          column: colno,    // Column number
          errorObj: error   // The actual Error object (includes stack trace)
        });

        // Returning 'true' prevents the error from showing up in the browser console
        return false; 
      };

      // Unhandled Promise Rejections (Async Errors)
      window.addEventListener( 'unhandledrejection', function ( event ) {
        console.warn( 'UNHANDLED PROMISE: ', event.reason );

        // event.promise is the promise that failed
        // event.reason is usually the error object or message

        if (init_running === true) handle_error( 'UNHANDLED PROMISE: ' + event.reason );
      });
    </script>

    <script>
      function hide_dropdown_dli() { $('#dc_dli').fadeOut(); mouse_wheel = true; }

      function show_hide_dropdown_dli() {
        if ($('#dc_dli')[ 0 ].style.display === 'none') {
          $('#dc_dli').fadeIn();

          $('#dc_dli')[ 0 ].style.marginTop = '2px';

          $('#directional_light_intensity').focus();
        } else {
          $('#dc_dli').fadeOut();
        }

        mouse_wheel = true;
      }

      function return_false() { return false; }

      function switch_to_desktop() {
        let link = document.createElement( 'a' );
        link.style.display = 'none';
        link.href = "../GLTF WebGPU.html";
        link.click();
      }

      function show_url() {
        if (url_displayed === true) {
          document.getElementById('url').style.display = 'none';
          document.getElementById('btn_url').style.backgroundColor = 'transparent';
          url_displayed = false;
        } else {
          document.getElementById('url').style.display = 'block';
          document.getElementById('btn_url').style.backgroundColor = 'lightgreen';
          url_displayed = true;
        }

        mouse_wheel = true;
      }

      function load_url_file() {
        let url = document.getElementById('url_entry').value.trim();
        if (url !== '') { selected_url_file = url; url_loading = true; init(); }
      }

      function clear_url() { document.getElementById('url_entry').value = ''; }

      function initialize_event_listeners() {
        const arrow_keys = [ 'ArrowUp', 'ArrowDown', 'ArrowRight', 'ArrowLeft' ];
        const activeKeys = new Set();

        window.addEventListener( 'pointerdown', (event) => {
          mouse_down = true;
          mouseDownPos.x = event.clientX;
          mouseDownPos.y = event.clientY;
        }, false);
        window.addEventListener( 'pointerup', (event) => { mouse_down = false; mouse_wheel = true; }, false);
        window.addEventListener( 'wheel', ( event ) => { mouse_wheel = true; }, false);
        window.addEventListener( 'keydown', ( event ) => {
          if (event.key === 'Escape') hideUiPanel();

          if (arrow_keys.some( k => k === event.key ) || event.ctrlKey || event.metaKey || event.shiftKey) {
            controls.listenToKeyEvents( window );
            activeKeys.add( event.key ); // Track this key
            mouse_wheel = true;
          }
        }, false);
        window.addEventListener( 'keyup', ( event ) => {
          activeKeys.delete( event.key ); // Remove this key

          if (controls && activeKeys.size === 0) {
            controls.stopListenToKeyEvents();
            mouse_wheel = false;
          }
        }, false);
      }

      function resize() {
        if (scene !== undefined) {
          mouse_wheel = true;

          ww = window.innerWidth;
          wh = window.innerHeight;

          renderer.setSize( ww, wh );

          default_camera.aspect = ww / wh;
          default_camera.updateProjectionMatrix();

          mouse_wheel = true;
        }
      }
    </script>

    <script>
      function set_back_color() {
        let bg_colors = document.getElementById('back_color').value;

        scene.background = new THREE.Color().setRGB(
          parseInt( bg_colors.substring( 1, 3 ), 16 ) / 255.0,
          parseInt( bg_colors.substring( 3, 5 ), 16 ) / 255.0,
          parseInt( bg_colors.substring( 5 ), 16 ) / 255.0
        );

        mouse_wheel = true;
      }

      function set_directional_light_intensity() {
        let dli_value = document.getElementById('directional_light_intensity').value;
        document.getElementById('dli_val').innerText = dli_value;
        directionalLight.intensity = parseFloat( dli_value );

        mouse_wheel = true;
      }

      function frame_camera() {
        bounding_box.setFromObject( gltf_obj );
        const center = bounding_box.getCenter( new THREE.Vector3() );
        const size = bounding_box.getSize( new THREE.Vector3() );

        default_camera.position.copy( center.clone().add( new THREE.Vector3( 0, 0, size.length())));
        default_camera.lookAt( center );

        // Center root
        gltf_obj.position.sub( center );

        // Frame camera to root
        const maxDim = Math.max( size.x, size.y, size.z );
        const fov = THREE.MathUtils.degToRad( camera.fov );
        const dist = maxDim + maxDim / ( 2 * Math.tan( fov / 2.0 ) );
        default_camera.position.set( 0, 0, dist );
        default_camera.lookAt( 0, 0, 0 );

        resize();
      }

      function quick_x_rotation() {
        gltf_obj.rotateX( - Math.PI / 2.0 );

        mouse_wheel = true;
      }

      function switch_camera() {
        render_requested = false;

        if (cam_id === cameras.length) {
          cam_id = 0;
          default_camera = camera;
        } else {
          default_camera = cameras[ cam_id ];
          cam_id ++;
        }

        document.getElementById('btn_cameras').innerHTML = 'C' + cam_id;

        render_requested = true;

        mouse_wheel = true;
      }

      function switch_variant() {
        if (variants_available === true) {
          if (current_variant === variants.length - 1) {
            current_variant = 0;
            document.getElementById('btn_variants').innerHTML = 'V0';
          } else {
            current_variant += 1;
            document.getElementById('btn_variants').innerHTML = 'V' + current_variant;
          }

          gltf_obj.traverse( function( child ) {
      	    if (child.isMesh && variant_materials[ child.id ]) {
              child.material = variant_materials[ child.id ][ variants[ current_variant ] ];
              child.material.wireframe = wireframe_enabled;
              child.material.flatShading = flat_shading_enabled;
              child.material.vertexColors = vertex_colors_enabled;
              child.material.needsUpdate = true;
            }
          });
        }

        mouse_wheel = true;
      }

      function animate_gltf() {
        if (animation_running === true) {
          animation_mixer.clipAction( animations[ current_animation ] ).stop();
          animation_mixer.clipAction( animations[ current_animation ] ).reset();

          if (current_animation === animations.length - 1) {
            document.getElementById('btn_animate').style.backgroundColor = 'transparent';
            current_animation = 0;
            animation_running = false;
          } else {
            current_animation += 1;
            animation_mixer.clipAction( animations[ current_animation ] ).play();
          }
        } else {
          animation_mixer.clipAction( animations[ current_animation ] ).play();
          document.getElementById('btn_animate').style.backgroundColor = 'lightgreen';
          animation_running = true;
        }

        mouse_wheel = true;
      }

      function animate_extra() {
        if (extra_running === true) {
          if (current_extra === extras.length - 1) {
            gltf_obj.traverse( function( child ) {
              if (child.isMesh) {
                if (child.id === extras[ current_extra ][ 0 ]) {
                  child.morphTargetInfluences[ extras[ current_extra ][ 2 ] ] = 0;
                }
              }
            });

            document.getElementById('btn_extras').style.backgroundColor = 'transparent';
            current_extra = 0;
            extra_running = false;
          } else {
            gltf_obj.traverse( function( child ) {
              if (child.isMesh) {
                if (child.id === extras[ current_extra ][ 0 ]) {
                  child.morphTargetInfluences[ extras[ current_extra ][ 2 ] ] = 0;
                }
              }
            });

            current_extra += 1;

            gltf_obj.traverse( function( child ) {
              if (child.isMesh) {
                if (child.id === extras[ current_extra ][ 0 ]) {
                  child.morphTargetInfluences[ extras[ current_extra ][ 2 ] ] = 1;
                }
              }
            });
          }
        } else {
          document.getElementById('btn_extras').style.backgroundColor = 'lightgreen';
          extra_running = true;

          gltf_obj.traverse( function( child ) {
            if (child.isMesh) {
              if (child.id === extras[ 0 ][ 0 ]) {
                child.morphTargetInfluences[ extras[ 0 ][ 2 ] ] = 1;
              }
            }
          });
        }

        mouse_wheel = true;
      }

      async function init() {
        if (url_loading === false && document.getElementById('file_input').files.length === 0) return;

        init_running = true;

        document.getElementById('div_message').innerHTML = 'Loading ... ' + pw;
        document.getElementById('div_message').style.display = '';

        if (scene) {
          mouse_wheel = true;

          await scene_cleanup();
          await reset_all( true );
        }

        enable_disable( true );

        if (tga_loader === undefined) {
          const { TGALoader } = await import( 'three/addons/loaders/TGALoader.min.js' );
          tga_loader = new TGALoader( manager );
          manager.addHandler( /\.tga$/i, tga_loader );
        }

        if (dds_loader === undefined) {
          const { DDSLoader } = await import( 'three/addons/loaders/DDSLoader.min.js' );
          dds_loader = new DDSLoader( manager );
          manager.addHandler( /\.dds$/i, dds_loader );
        }

        selected_gltf_file = null;
        selected_draco_file = null;
        rootPath = '';
        filesMap = {};
        userData = {};
        hasMetadata = false;
        mouse_down = false;
        mouse_wheel = true;
        local_files = null;
        local_bin_files = [];
        local_files_indexes = [];
        resource_path = '';
        variants = null;
        variant_materials = {};
        cameras = null;
        cam_id = 0;
        scenes = null;
        animations = [];
        animation_mixer = null;
        animation_running = false;
        extras = [];
        extra_running = false;
        wireframe_enabled = false;
        flat_shading_enabled = false;
        raycastableObjects = [];
        render_requested = false;
        featureHighlightMesh = null;
        mouseDownPos = { x: 0, y: 0 };
        bounding_box = new THREE.Box3();

        document.getElementById('btn_animate').disabled = true;
        document.getElementById('btn_extras').disabled = true;
        document.getElementById('btn_variants').disabled = true;
        document.getElementById('btn_cameras').disabled = true;
        document.getElementById('btn_flat').disabled = false;
        document.getElementById('btn_wireframe').disabled = false;

        console.time( 'Loading Time' );
        document.getElementById('div_error').style.display = 'none';
        document.getElementById('div_loading').style.display = 'block';
        document.getElementById('div_loading').innerHTML = 'Load & Visualize';

        manager.setURLModifier( function( url ) {
          const file = filesMap[ url ];
          if ( file ) return file;
          return url;
        });

        if (url_loading === false) {
          let image_extensions = [ '.AVIF', '.BMP', '.DDS', '.DIB', '.GIF', '.JPG', '.JPEG', '.JFIF', '.KTX2',
            '.PJPEG', '.PJP', '.PNG', '.SVG', '.TGA', '.WEBP' ];

          // Loaded file(s)
          local_files = document.getElementById('file_input').files;

          for (let i = 0; i < local_files.length; i++) {
            let fn_uc = local_files[ i ].name.toUpperCase();

            if (fn_uc.endsWith('.GLB') || fn_uc.endsWith('.GLTF') || fn_uc.endsWith('.VRM')) {
              selected_gltf_file = i;
            }
            else if (fn_uc.endsWith('.DRC')) { selected_draco_file = i; }
            else if (fn_uc.endsWith('.BIN')) { local_bin_files.push( i ); }
            else {
              if (image_extensions.some( ext => fn_uc.endsWith( ext ) )) {
                local_files_indexes.push( i );
              }

              let url = URL.createObjectURL( local_files[ i ] );
              URL.revokeObjectURL( local_files[ i ] );

              let base = THREE.LoaderUtils.extractUrlBase( url );

              fn_uc.endsWith('.JSON')
               ? filesMap[ local_files[ i ].name ] = url

      function loadFile() {
        gltf_loader.load( URL.createObjectURL( local_files[ selected_gltf_file ] ), async function( gltf ) {
          URL.revokeObjectURL( local_files[ selected_gltf_file ] );

          parser = gltf.parser;

          }

            current_variant = 0;
            variants_available = true;
            document.getElementById('btn_variants').disabled = false;
            document.getElementById('btn_variants').style.backgroundColor = 'lightgreen';
          }

          gltf_obj.traverse( async function( child ) {
            if (child.isMesh || child.isPoints || child.isLine) {
              if (!child.geometry.attributes.normal) child.geometry.computeVertexNormals();
              child.geometry.normalizeNormals();

              child.geometry.computeBoundingBox();
              child.geometry.computeBoundingSphere();

              if (child.geometry.hasAttribute( 'color' )) vertex_colors_enabled = true;

              if (child.isMesh) {
                if (child.isSkinnedMesh) child.frustumCulled = false;

                if (variants_available === true && child.material && child.userData.gltfExtensions) {
                  variant_materials[ child.id ] = {};
                  const meshVariants = child.userData.gltfExtensions[ 'KHR_materials_variants' ];

                  for (let i = 0; i < variants.length; i++) {
                    const mapping = meshVariants.mappings.find( ( mapping ) => mapping.variants.includes( i ) );

                    if (mapping) {
                      await parser.getDependency( 'material', mapping.material ).then( function( material ) {
                        variant_materials[ child.id ][ variants[ i ] ] = material;
                        if (i === 0) child.material = material;
                      });
                    }
                  }
                }
              } else if (child.isPoints) {
                child.sizeAttenuation = true;
                child.sortPoints = true;
              }

              // Check for morph targets
              if (child.morphTargetDictionary) {
                Object.keys( child.morphTargetDictionary ).forEach( ( key, index ) => {
                  extras.push( [ child.id, key, index ] );
                });
              }

              if (Array.isArray( child.material )) {
                child.material.forEach( mtl => {
                  if (child.isPoints === true) mtl.size = isMobile === true ? 0.8 : 1.25;
                  mtl.flatShading = false;
                  mtl.needsUpdate = true;
                });
              } else {
                if (child.isPoints === true) child.material.size = isMobile === true ? 0.8 : 1.25;
                child.material.flatShading = false;
                child.material.needsUpdate = true;
              }

              if (!gltf.parser.json.images) {
                // Use as a texture the first loaded image if any

                if (local_files_indexes.length > 0) {
                  let loader;

                  let uc_name = local_files[ local_files_indexes[ 0 ] ].name.toUpperCase();
                  let ext = uc_name.substring( uc_name.lastIndexOf( '.' ) + 1 );

                  switch ( ext ) {
                    case 'DDS':
                      loader = dds_loader;
                      break;

                    case 'TGA':
                      loader = tga_loader;
                      break;

                    case 'KTX2':
                      loader = ktx2_loader;
                      break;

                    default:
                      loader = texture_loader;
                      break;
                  }

                  loader.load( URL.createObjectURL( local_files[ local_files_indexes[ 0 ] ] ), function( texture ) {
                    URL.revokeObjectURL( local_files[ local_files_indexes[ 0 ] ] );

                    texture.colorSpace = THREE.SRGBColorSpace;
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.RepeatWrapping;
                    texture.needsUpdate = true;

                    // Apply texture
                    child.material.map = texture.clone();
                    child.material.needsUpdate = true;

                    texture.dispose();
                  });
                }
              }
            }
          });

          gltf_obj.name = 'local_model';

          // Add gltf model to scene
          scene.add( gltf_obj );
          gltf_obj.position.set( 0, 0, 0 );
          default_camera.lookAt( gltf_obj.position );

          finish_loading();
        }, function ( xhr ) { // onProgress
        }, function ( error ) { // onError
          URL.revokeObjectURL( selected_gltf_file );
          handle_error( error );
        });
      }

            const extensions = child.userData.gltfExtensions;

            if (extensions?.EXT_mesh_features || extensions?.EXT_instance_features) {
              hasGltfExtensions = true;

            if (child.isMesh) object_is_mesh = true;
