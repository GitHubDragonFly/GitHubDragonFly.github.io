      function highlightFeatureInstanced( instanceId ) {
        // 1. REUSE EVERYTHING
        // Instead of a new mesh every time, we just reposition the one we have
        if (!featureHighlightMesh || featureHighlightMesh?.geometry !== pickedObject.geometry) {
          if (featureHighlightMesh) {
            // Detach it from the old parent
            if (featureHighlightMesh.parent) {
              featureHighlightMesh.parent.remove( featureHighlightMesh );
            }

            featureHighlightMesh.traverse((child) => {
              if (child.geometry) child.geometry.dispose();
              if (child.material) child.material.dispose();
            });

            featureHighlightMesh = null;
          }

          const highlightGeo = pickedObject.geometry;

          featureHighlightMesh = new THREE.Mesh(
            highlightGeo,
            new THREE.MeshBasicMaterial({
              color: 0xf08080,
              transparent: true,
              opacity: 0.5,
              depthTest: true,
              depthWrite: false, 
              polygonOffset: true,
              polygonOffsetFactor: -1,
              polygonOffsetUnits: -1
            })
          );

          featureHighlightMesh.isHighlight = true;

          // Add the wireframe once
          const wireframe = new THREE.LineSegments(
            new THREE.EdgesGeometry( highlightGeo, 30 ),
            new THREE.LineBasicMaterial( { color: 0xffffff } )
          );

          featureHighlightMesh.add( wireframe );
        }

        // THE TELEPORTATION
        // Copy the specific instance's transform from the InstancedMesh
        const matrix = new THREE.Matrix4();
        pickedObject.getMatrixAt( instanceId, matrix );

        // SYNC WITH PARENT
        // If the InstancedMesh itself has a position/rotation, 
        // we must account for it so the highlight doesn't fly off to space
        featureHighlightMesh.matrix.copy( matrix );
        featureHighlightMesh.matrixAutoUpdate = false; // We handle the matrix manually now
        featureHighlightMesh.updateWorldMatrix( true, true );

        // ATTACH
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );

        featureHighlightMesh.visible = true;
        featureHighlightMesh.frustumCulled = false;
        featureHighlightMesh.children.forEach( child => child.frustumCulled = false );
      }

      function highlightFeature( highlight_id, attrName ) {
        if (!attrName) return;

        const geometry = pickedObject.geometry;

        const indexAttr = geometry.index;
        const featureAttr = geometry.getAttribute( attrName );
        const positionAttr = geometry.getAttribute( 'position' );

        if (!featureAttr || !indexAttr || !positionAttr) return;

        // Find all triangles that belong to this highlight id
        const activeIndices = [];

        for ( let i = 0; i < indexAttr.count; i += 3 ) {
          const a = indexAttr.getX( i );
          const b = indexAttr.getX( i + 1 );
          const c = indexAttr.getX( i + 2 );

          // If the first vertex of the triangle matches the ID, we take the whole triangle
          if ( a < featureAttr.count ) {
            if (featureAttr.getX( a ) === highlight_id) {
              activeIndices.push( a, b, c );
            }
          }
        }

        if (activeIndices.length === 0) return;

        // Create a new "Slice" geometry
        const highlightGeo = new THREE.BufferGeometry();
        highlightGeo.setAttribute( 'position', positionAttr );
        highlightGeo.setIndex( activeIndices );

        // Create the overlay mesh
        featureHighlightMesh = new THREE.Mesh(
          highlightGeo,
          new THREE.MeshBasicMaterial({
            color: 0xf08080,
            transparent: true,
            opacity: 0.5,
            side: THREE.DoubleSide,
            depthTest: true,
            depthWrite: false,   // Keeps the highlight from messing up the depth buffer for other transparents
            polygonOffset: true, // Physically pushes the quad slightly toward the camera
            polygonOffsetFactor: -1,
            polygonOffsetUnits: -1
          })
        );

        featureHighlightMesh.isHighlight = true;

        // Create the Wireframe Outline (The "Border")
        const wireframeGeo = new THREE.EdgesGeometry( highlightGeo, 30 );
        const wireframe = new THREE.LineSegments(
          wireframeGeo,
          new THREE.LineBasicMaterial( { color: 0xffffff, linewidth: 3 } ) // White border
        );

        // Add the wireframe to our highlight mesh so they move together
        featureHighlightMesh.add( wireframe );

        featureHighlightMesh.position.set( 0, 0, 0 );
        featureHighlightMesh.rotation.set( 0, 0, 0 );
        featureHighlightMesh.scale.set( 1, 1, 1 );
        featureHighlightMesh.updateWorldMatrix( true, true );

        // Sync transformation with the parent object
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      function highlightPoint( pointIndex ) {
        const geometry = pickedObject.geometry;
        const positionAttr = geometry.getAttribute( 'position' );

        if (!positionAttr || pointIndex === -1) return;

        // 1. Get the local position of the clicked point
        const x = positionAttr.getX( pointIndex );
        const y = positionAttr.getY( pointIndex );
        const z = positionAttr.getZ( pointIndex );

        // 2. Create a small Cube (Box) to represent the highlight
        // Adjust the size (0.05) based on your tileset scale
        const boxSize = 0.05; 
        const highlightGeo = new THREE.BoxGeometry( boxSize, boxSize, boxSize );

        const highlightMat = new THREE.MeshBasicMaterial({
          color: 0xf08080,
          transparent: true,
          opacity: 0.8,
          depthTest: false // Makes it visible even if partially buried in other points
        });

        featureHighlightMesh = new THREE.Mesh( highlightGeo, highlightMat );
        featureHighlightMesh.isHighlight = true;

        // 3. Position the cube at the point's coordinates
        featureHighlightMesh.position.set( x, y, z );

        // 4. Add a white wireframe outline for better visibility
        const wireframeGeo = new THREE.EdgesGeometry( highlightGeo );

        const wireframe = new THREE.LineSegments(
          wireframeGeo,
          new THREE.LineBasicMaterial( { color: 0xffffff } )
        );

        featureHighlightMesh.add( wireframe );
        featureHighlightMesh.updateWorldMatrix( true, true );

        // 5. Attach it to the picked object so it moves with the tileset
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      async function highlightPoints( highlight_id, attrName ) {
        if (!pickedObject || !attrName) return;

        const geometry = pickedObject.geometry;
        const featureAttr = geometry.getAttribute( attrName );
        const positionAttr = geometry.getAttribute( 'position' );

        if (!featureAttr || !positionAttr) return;

        // 1. Filter vertices for the specific feature
        const pointIndices = [];

        for ( let i = 0; i < featureAttr.count; i++ ) {
          if (featureAttr.getX( i ) === highlight_id) {
            pointIndices.push(i);
          }
        }

        if (pointIndices.length === 0) return;

        // 2. Construct Point Geometry
        // We reuse the buffer attributes but use a specific index for the points
        const pointGeo = new THREE.BufferGeometry();
        pointGeo.setAttribute( 'position', positionAttr );
        pointGeo.setIndex( pointIndices );

        // 3. Construct Point Material
        const pointMat = new THREE.PointsMaterial();
        pointMat.color.setHex( 0xf08080 );
        pointMat.size = 0.15;               // Adjust based on model scale
        pointMat.sizeAttenuation = true;   // Dots get smaller with zoom out
        pointMat.transparent = true;
        pointMat.opacity = 0.4;
        pointMat.depthTest = false;        // See points through the mesh!

        // 4. Create the Points object
        featureHighlightMesh = new THREE.Points( pointGeo, pointMat );
        featureHighlightMesh.isHighlight = true;
        featureHighlightMesh.renderOrder = 1000;

        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      function highlightLine( lineIndex ) {
        const geometry = pickedObject.geometry;
        const positionAttr = geometry.getAttribute( 'position' );
        const indexAttr = geometry.index;

        if (!positionAttr || lineIndex === undefined) return;

        const activePositions = [];

        // 1. Identify the segment vertices
        // If the geometry is indexed (common in 3D Tiles), we use the index buffer
        if (indexAttr) {
          // For LineSegments, a segment is [ i, i + 1 ]
          // We find the start of the segment based on the click index
          const startIdx = Math.floor( lineIndex / 2.0 ) * 2;
          const idxA = indexAttr.getX( startIdx );
          const idxB = indexAttr.getX( startIdx + 1 );

          const vA = new THREE.Vector3().fromBufferAttribute( positionAttr, idxA );
          const vB = new THREE.Vector3().fromBufferAttribute( positionAttr, idxB );

          activePositions.push( vA.x, vA.y, vA.z, vB.x, vB.y, vB.z );
        } else {
          // Non-indexed: the click index is the vertex itself
          const startIdx = Math.floor( lineIndex / 2.0 ) * 2;

          activePositions.push(
            positionAttr.getX( startIdx ), positionAttr.getY( startIdx ), positionAttr.getZ( startIdx ),
            positionAttr.getX( startIdx + 1 ), positionAttr.getY( startIdx + 1 ), positionAttr.getZ( startIdx + 1 )
          );
        }

        // 2. Create the highlight geometry
        const highlightGeo = new THREE.BufferGeometry();
        highlightGeo.setAttribute( 'position', new THREE.Float32BufferAttribute( activePositions, 3 ) );

        // 3. Create a thick, glowing Line material
        // Note: Standard LineBasicMaterial doesn't support 'linewidth' > 1 in many browsers (WebGL limitation)
        // But we'll use a bright color and depthTest: false to make it pop.
        const highlightMat = new THREE.LineBasicMaterial({
          color: 0xf08080,
          linewidth: 5, // Works on some systems, ignored on others
          transparent: true,
          opacity: 1.0,
          depthTest: false 
        });

        featureHighlightMesh = new THREE.LineSegments( highlightGeo, highlightMat );
        featureHighlightMesh.updateWorldMatrix( true, true );
        featureHighlightMesh.isHighlight = true;

        // 4. Attach to the parent
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      function popup_card_cleanup() {
        const card = document.getElementById('metadata-card');

        if (card) {
          card.scrollTop = 0;
          card.scrollLeft = 0;
          card.innerHTML = '';
          card.style.display = 'none';
        }

        // Clean up previous highlight
        if (featureHighlightMesh) {
          // Detach it from the old parent
          if (featureHighlightMesh.parent) {
            featureHighlightMesh.parent.remove( featureHighlightMesh );
          }

          if (pickedObject?.isInstancedMesh) {
            featureHighlightMesh.visible = false;
          } else {
            // Clean up the children (the wireframe)
            featureHighlightMesh.traverse( ( child ) => {
              if (child.geometry) child.geometry.dispose();
              if (child.material) child.material.dispose();
            });

            featureHighlightMesh = null;
          }
        }

        // --- RESTORE PREVIOUS SELECTION ---
        if (selectedObject) {
          if (selectedObject.material?.emissive !== undefined) {
            const oldColor = selectedObject.userData.originalEmissive || new THREE.Color( 0x000000 );
            selectedObject.material.emissive.copy( oldColor );
          }

          delete selectedObject.userData.originalEmissive;
          delete selectedObject.userData.hasUniqueMaterial;
        }

        if (pickedObject?.userData?.structuralMetadata)
          delete pickedObject.userData.structuralMetadata;

        if (pickedObject?.userData?.textures)
          delete pickedObject.userData.textures;

        selectedObject = null;
        pickedObject = null;
        mouse_wheel = true;
        return;
      }

      function handle_raycast_click( event ) {
        popup_card_cleanup();

        if (event.target.closest( '#fixed_menu' ) || event.target.closest( '#right_gui_position' )) {
          return;
        }

        // Calculate how far the mouse moved
        const deltaX = Math.abs( event.clientX - mouseDownPos.x );
        const deltaY = Math.abs( event.clientY - mouseDownPos.y );

        // If moved more than 5 pixels, it was likely a camera drag, not a click
        if (deltaX > 5 || deltaY > 5) return;

        if (!raycaster) {
          raycaster = new THREE.Raycaster();
          raycaster.params.Points.threshold = 0.05;
        }

        if (!mouse) mouse = new THREE.Vector2();

        const HIGHLIGHT_COLOR = new THREE.Color( 0xf08080 );

        mouse.x = ( event.clientX / window.innerWidth ) * 2 - 1;
        mouse.y = -( event.clientY / window.innerHeight ) * 2 + 1;

        raycaster.setFromCamera( mouse, default_camera );

        const targets = raycastableObjects.length > 0 ? raycastableObjects : scene.children;
        const intersects = raycaster.intersectObjects( targets, true );

        if (intersects.length === 0) return;

        const visibleIntersects = intersects.filter( hit => hit.object.visible );
        if (visibleIntersects.length === 0) return;

        const intersect = visibleIntersects[ 0 ];
        pickedObject = intersect.object;

        // QUICK GUARD: Ensure geometry and attributes exist before we dig in
        if (!pickedObject.geometry) return;

        if (userData.structuralMetadata !== undefined) {
          pickedObject.userData.structuralMetadata = userData.structuralMetadata;
        }

        if (userData.textures?.length > 0) {
          pickedObject.userData.textures = userData.textures;
        }

        selectedObject = pickedObject;

        // Prepare Material for highlighting
        if (selectedObject.material && selectedObject.material.emissive) {
          if (selectedObject.userData.originalEmissive === undefined) {
            selectedObject.userData.originalEmissive = selectedObject.material.emissive.clone();
          }

          // Ensure we only highlight this specific instance
          if (!selectedObject.userData.hasUniqueMaterial) {
            selectedObject.material = selectedObject.material.clone();
            selectedObject.userData.hasUniqueMaterial = true;
          }

          selectedObject.material.emissive.copy( HIGHLIGHT_COLOR );
        }

        const isInstanced = pickedObject.isInstancedMesh;

        const obj_userData = pickedObject.userData || {};
        const extensions = obj_userData.gltfExtensions || {};
        const structuralMetadata = extensions?.structuralMetadata || obj_userData.structuralMetadata;

        const schema = obj_userData.schema || structuralMetadata?.schema;

        const meshFeatures = extensions.EXT_mesh_features || extensions.EXT_instance_features;

        const featureMetadataList = [];
        let highlightId = null;
        let highlightAttributeName = null;

        let vertexIndex = -1;

        if (pickedObject.isPoints || pickedObject.isLine) {
          vertexIndex = intersect.index;
        } else if (isInstanced) {
          vertexIndex = intersect.instanceId;
        } else if (intersect.face) {
          vertexIndex = intersect.face.a;
        }

        /**
         * Detects and reads the correct integer type from an offset buffer.
         * @param {ArrayBuffer|Uint8Array} buffer - The hydrated offset buffer.
         * @param {number} index - The feature index to read.
         * @param {number} totalFeatures - The count of features in the table (to infer type).
         */
        function getOffsetValue( buffer, index, totalFeatures ) {
          if ( !buffer ) return 0;

          const view = new DataView( 
            buffer.buffer || buffer, 
            buffer.byteOffset || 0, 
            buffer.byteLength 
          );

          // Calculate bytes per entry: total length / (N + 1)
          const bytesPerEntry = buffer.byteLength / ( totalFeatures + 1 );

          switch ( bytesPerEntry ) {
            case 1:
              return view.getUint8( index );
            case 2:
              return view.getUint16( index * 2, true );
            case 4:
              return view.getUint32( index * 4, true );
            case 8:
              // Handle BigInt for UINT64, converting to Number for offset use
              return Number( view.getUint64( index * 8, true ) );
            default:
              return view.getUint32( index * 4, true );
          }
        }

        function getStride( type, componentType ) {
          const numComponents = TYPE_COUNT_MAP[ type ] || 1;
          const bytesPerComponent = COMPONENT_COUNT_MAP[ componentType ] || 1;
          return numComponents * bytesPerComponent;
	}

        function getMetadataString( prop, featureId, numFeatures ) {
          if ( !prop.hydratedArray || !prop.hydratedStringOffsets ) return 'No Data';

          const data    = prop.hydratedArray;
          const offsets = prop.hydratedStringOffsets;

          // 1. Use the helper for both start and end to handle variable-width offsets
          const start = getOffsetValue( offsets, featureId, numFeatures );
          const end   = getOffsetValue( offsets, featureId + 1, numFeatures );

          if ( start === end || start < 0 || end > data.byteLength ) {
            return 'No Data';
          }

          // 2. Slice data[ start : end ] as UTF-8
          const stringBuffer = new Uint8Array( data, start, end - start );
          return new TextDecoder().decode( stringBuffer );
        }

        function readBooleanValue( propData, featureId ) {
          const rawBuffer = propData.hydratedArray;
          if ( !rawBuffer ) return false;

          const view = new Uint8Array( rawBuffer.buffer || rawBuffer, rawBuffer.byteOffset || 0, rawBuffer.byteLength );

          // Each byte holds 8 booleans.
          const byteIndex = Math.floor( featureId / 8 );
          const bitIndex = featureId % 8;

          if ( byteIndex >= view.length ) {
            console.warn( `Boolean Overflow: featureId ${featureId} leads to byte ${byteIndex}, but buffer is only ${view.length} bytes.` );
            return false;
          }

          const byte = view[ byteIndex ];

          // Mask the specific bit and return as true/false
          return ( ( byte >> bitIndex ) & 1 ) === 1;
        }

        function readBinaryValue( binary, offset, type, componentType, rowIndex = 0 ) {
          // 1. Ensure we use the sliced buffer view correctly
          const view = new DataView( binary.buffer, binary.byteOffset, binary.byteLength );

          // 2. Handle Booleans (Bitstream)
          if ( type === 'BOOLEAN' ) {
            const byteOffset = offset + Math.floor( rowIndex / 8 );
            const bitIndex = rowIndex % 8;
            return ( ( view.getUint8( byteOffset ) >> bitIndex ) & 1 ) === 1;
          }

          // 3. Lookup mapping
          const cType = componentType.toUpperCase();
          const bytesPerComponent = COMPONENT_COUNT_MAP[ cType ] || 1;
          const numComponents = TYPE_COUNT_MAP[ type ] || 1;
          const stride = bytesPerComponent * numComponents;
          const method = DATAVIEW_GETTER_MAP[ cType ];

          if ( !method ) return null;

          // 4. Calculate absolute byte position in the slice
          const rowStart = offset + ( rowIndex * stride );
          const results = [];

          for ( let i = 0; i < numComponents; i++ ) {
            const currentOffset = rowStart + ( i * bytesPerComponent );

            // Safety check for buffer overflow
            if ( currentOffset + bytesPerComponent > view.byteLength ) {
              results.push( 0 );
              continue;
            }

            // Use the map to call the DataView method
            results.push( view[ method ]( currentOffset, true ) ); // true = Little Endian
          }

          return type === 'SCALAR' ? results[ 0 ] : results;
        }

        function readArrayProperty( propDef, propData, featureId, numFeatures ) {
          const rawBuffer = propData.hydratedArray;
          if (!rawBuffer) return 'N/A';

          const rawBytes = rawBuffer instanceof ArrayBuffer
            ? new Uint8Array( rawBuffer )
            : rawBuffer;

          const view = new DataView( rawBytes.buffer, 0, rawBytes.length );
          const stride = getStride( propDef.type, propDef.componentType );

          let numElements = 0;
          let startElement = 0;

          // 1. Variable-length arrays: element‑index offsets
          if (propData.hydratedArrayOffsets) {
            const offsets = propData.hydratedArrayOffsets;

            const start = getOffsetValue( offsets, featureId, numFeatures );
            const end   = getOffsetValue( offsets, featureId + 1, numFeatures );

            startElement = start;
            numElements = end - start;
          }
          // 2. Fixed-length arrays
          else if (propDef.array && propDef.count !== undefined) {
            numElements = propDef.count;
            startElement = featureId * numElements;
          }

          if (numElements <= 0) return [];

          const values = [];

          // 3. STRING array
          if (propDef.type === 'STRING' && propData.hydratedStringOffsets) {
            const stringOffsets = propData.hydratedStringOffsets;

            for ( let i = 0; i < numElements; i++ ) {
              const idx = startElement + i;
              const s = getOffsetValue( stringOffsets, idx, numFeatures );
              const e = getOffsetValue( stringOffsets, idx + 1, numFeatures ) || rawBytes.length;

              if (s >= rawBytes.length || e > rawBytes.length) continue;

              const stringBuffer = new Uint8Array( rawBytes.buffer, s, e - s );
              values.push( new TextDecoder().decode( stringBuffer ) );
            }

            return values;
          }

          // 4. BOOLEAN array
          if (propDef.type === 'BOOLEAN') {
            for ( let i = 0; i < numElements; i++ ) {
              const elementIndex = startElement + i;
              const val = readBinaryValue( rawBytes, 0, propDef.type, 'UINT8', elementIndex );
              values.push( val );
            }

            return values;
          }

          // 5. ENUM array
          if (propDef.type === 'ENUM') {
            const enumDef = schema.enums?.[ propDef.enumType ];

            // If componentType is missing default to UINT8 or UINT16
            const cType = propDef.componentType || (rawBytes.byteLength >= (numFeatures * numElements * 2) ? 'UINT16' : 'UINT8');

            for ( let i = 0; i < numElements; i++ ) {
              const elementIndex = startElement + i;
              const enumIndex = readBinaryValue( rawBytes, 0, 'SCALAR', cType, elementIndex );

              // Map the index to the Name string
              const entry = enumDef?.values.find( v => v.value === enumIndex );
              values.push( entry ? entry.name : `Unknown(${ enumIndex })` );
            }

            return values; 
          }

          // 6. Generic numeric array (SCALAR / VEC / MAT)
          for ( let i = 0; i < numElements; i++ ) {
            const elementIndex = startElement + i;
            const val = readBinaryValue( rawBytes, 0, propDef.type, propDef.componentType, elementIndex );

            // Normalize if needed
            if (propDef.normalized) {
              const divisor = NORMALIZATION_DIVISORS[ propDef.componentType ] || 255.0;

              const normalized = Array.isArray( val )
                ? val.map( v => Math.round( ( v / divisor ) * 100 ) / 100 )
                : Math.round( ( val / divisor ) * 100 ) / 100;

              values.push( normalized );
            } else {
              values.push( val );
            }
          }

          return values;
        }

        function readBinaryPropertyValue( propDef, propData, featureId, propName, numFeatures ) {
          const rawBuffer = propData.hydratedArray;
          if (!rawBuffer) return 'N/A';

          // BOOLEAN PROPERTIES
          if (propDef?.type === 'BOOLEAN') {
            return readBooleanValue( propData, featureId );
          }

          // STRING PROPERTIES
          if (propDef?.type === 'STRING' || propData.stringOffsets !== undefined) {
            return getMetadataString( propData, featureId, numFeatures );
          }

          // NUMERIC PROPERTIES
          const elementCount = TYPE_COUNT_MAP[ propDef?.type ] || 1;
          let bytesPerElement = 4; // Float32 default

          if (propDef?.componentType) {
            bytesPerElement = COMPONENT_TYPE_MAP[ propDef.componentType ].BYTES_PER_ELEMENT;
          }

          const view = new DataView( rawBuffer );
          const byteOffset = featureId * bytesPerElement * elementCount;

          if (byteOffset + ( bytesPerElement * elementCount ) > view.byteLength) {
            console.warn( `Overflow: ${ propName } offset=${ byteOffset }, len=${ view.byteLength }` );
            return 'N/A';
          }

          const method = propDef?.componentType ? DATAVIEW_GETTER_MAP[ propDef.componentType ] : 'getFloat32';
          if (!method) return 'N/A';

          const values = [];

          for ( let i = 0; i < elementCount; i++ ) {
            const offset = byteOffset + ( i * bytesPerElement );
            values.push( view[ method ]( offset, true ) );
          }

          return propDef?.type === 'SCALAR' ? values[ 0 ] : values;
        }

        function getFeatureIdFromTexture( texture, uv, channel ) {
          const buffer = texture.data;
          if (!buffer) return 0;

          const w = texture.width;
          const h = texture.height;

          const x = Math.floor( uv.x * ( w - 0.001 ) );
          const y = Math.floor( uv.y * ( h - 0.001 ) );

          // RGBA = 4 bytes per pixel
          const index = ( y * w + x ) * 4;

          const rawValue = buffer[ index + channel ];

          return rawValue;
        }

        function getPropertyFromTexture( metadata, propertyName, uv, className ) {
          if (!metadata.structuralMetadata) return 0;
          if (!metadata.structuralMetadata.textures) return 0;
          if (!metadata.structuralMetadata.propertyTextures) return 0;

          const propertyTextures = metadata.structuralMetadata.propertyTextures;
          const propTex = propertyTextures.find( pt => pt.properties[ propertyName ] );

          const sm_textures = metadata.structuralMetadata.textures;
          const sm_texture = sm_textures[ propTex.properties[ propertyName ].index ];
          if (!sm_texture) return 0;

          const buffer = sm_texture.data;
          if (!buffer) return 0;

          const w = sm_texture.width;
          const h = sm_texture.height;

          const x = Math.floor( uv.x * ( w - 0.001 ) );
          const y = Math.floor( uv.y * ( h - 0.001 ) );

          // RGBA = 4 bytes per pixel
          const index = ( y * w + x ) * 4;

          const channels = propTex.properties[ propertyName ].channels || [ 0 ];
          let rawValue = buffer[ index + channels[ 0 ] ];

          // Normalize if needed
          const propDef = schema?.classes?.[ className ]?.properties?.[ propertyName ];

          if (propDef?.normalized) {
            const divisor = NORMALIZATION_DIVISORS[ propDef.componentType ] || 255.0;

            rawValue = Array.isArray( rawValue )
              ? rawValue.map( v => Math.round( ( v / divisor ) * 100 ) / 100 )
              : Math.round( ( rawValue / divisor ) * 100 ) / 100;
          }

          return rawValue * ( propDef?.scale ?? 1 ) + ( propDef?.offset ?? 0 );
        }

        function addPropertyTableMetadata( tableIndex, attributeIndex = null, featureId, numFeatures ) {
          const table = structuralMetadata?.propertyTables?.[ tableIndex ];
          if (!table || featureId === undefined || featureId === null) return;

          // BOUNDS CHECK - prevent reading past table.count
          if (featureId < 0 || featureId >= table.count) {
            console.warn( `Feature ID ${ featureId } out of bounds for table ${ tableIndex } (count: ${ table.count })` );
            return;
          }

          const className = table.class || `PropertyTable ${ tableIndex }`;
          const properties = {};

          if (table.properties && schema?.classes?.[ table.class ]) {
            const classDef = schema.classes[ table.class ];

            for ( const [ key, propData ] of Object.entries( table.properties ) ) {
              const propDef = classDef.properties?.[ key ];
              if (!propDef) continue;

              // Safe read with bounds check
              try {
                if (propDef.array) {
                  properties[ key ] = readArrayProperty( propDef, propData, featureId, table.count );
                } else if (propDef.type === 'STRING' || propData.stringOffsets !== undefined) {
                  properties[ key ] = getMetadataString( propData, featureId, numFeatures );
                } else {
                  properties[ key ] = readBinaryPropertyValue( propDef, propData, featureId, key, numFeatures );
                }
              } catch ( err ) {
                console.warn( `Failed to read property ${ key } for feature ${ featureId }: `, err.message );
                properties[ key ] = 'N/A';
              }
            }

            if (attributeIndex !== null) properties.Attribute = attributeIndex;
            isInstanced ? properties.InstanceId = vertexIndex : properties.VertexId = vertexIndex;
            properties.ID = featureId;
          }

          featureMetadataList.push( { class: className, properties } );
        }

        let featureId, attributeName, smAttrName, smHighlightId, featureId_ok = false;

        if (meshFeatures?.featureIds?.length > 0) {
          for ( let i = 0; i < meshFeatures.featureIds.length; i++ ) {
            const info = meshFeatures.featureIds[ i ];
            const numFeatures = info.featureCount;
            const featureIdIndex = info.attribute;
            const className = info.label || ((featureIdIndex !== undefined && featureIdIndex !== null) ? `Feature ${ featureIdIndex }` : 'Feature');

            const attrName1 = `_feature_id_${ featureIdIndex }`;
            const attrName2 = `_FEATURE_ID_${ featureIdIndex }`;

            attributeName = pickedObject.geometry.hasAttribute( attrName1 )
              ? attrName1
              : pickedObject.geometry.hasAttribute( attrName2 )
                ? attrName2
                : '';

            const featureIdAttr = pickedObject.geometry.getAttribute( attributeName );

            if (info.texture !== undefined) {
              const texInfo = info.texture;
              const idTexture = obj_userData.textures?.[ texInfo.index ];

              if (idTexture && intersect.uv) {
                featureId = getFeatureIdFromTexture( idTexture, intersect.uv, texInfo.channels?.[ 0 ] || 0 );
              }
            } else if (featureIdAttr) {
              if (isInstanced && intersect.instanceId !== undefined) {
                featureId = featureIdAttr.getX( intersect.instanceId );
              } else if (intersect.face) {
                featureId = featureIdAttr.getX( intersect.face.a );
              } else if (intersect.index !== undefined) {
                featureId = featureIdAttr.getX( intersect.index );
              }
            }

            featureId_ok = (featureId !== null && featureId !== undefined && featureId !== info.nullFeatureId);

            if (!highlightAttributeName && attributeName && featureId_ok) {
              highlightAttributeName = attributeName;
              if (highlightId === null || highlightId === undefined) highlightId = isInstanced ? vertexIndex : featureId;
            }

            if (info.propertyTable !== undefined) {
              addPropertyTableMetadata( info.propertyTable, featureIdIndex, featureId, numFeatures );

              if (featureId_ok && featureMetadataList.length === 0) {
                featureMetadataList.push({
                  class: className + ': Property Table Not Found',
                  properties: { ID: featureId }
                });
              }
            } else {
              const fid_properties = {};
              if (featureIdIndex !== undefined && featureIdIndex !== null) fid_properties.Attribute = featureIdIndex;
              isInstanced ? fid_properties.InstanceId = vertexIndex : fid_properties.VertexId = vertexIndex;
              if (featureId_ok) fid_properties.ID = featureId;

              if (info.texture !== undefined && intersect.uv) {
                fid_properties.UV_Coord = new THREE.Vector2( intersect.uv.x, intersect.uv.y );
              }

              featureMetadataList.push({
                class: className,
                properties: fid_properties
              });
            }
          }
        }

        if (structuralMetadata) {
          if (vertexIndex !== -1 && structuralMetadata.propertyAttributes?.length > 0) {
            structuralMetadata.propertyAttributes.forEach( attrib => {
              const className = attrib.class || 'PropertyAttribute';
              const pa_properties = {};

              for ( const [ key, value ] of Object.entries( attrib.properties || {} ) ) {
                const vAttr = value.attribute;
                if (!vAttr) continue;

                const vAttrLower = vAttr.toLowerCase();
                const vAttrUpper = vAttr.toUpperCase();

                const aName = pickedObject.geometry.hasAttribute( vAttrLower )
                  ? vAttrLower
                  : pickedObject.geometry.hasAttribute( vAttrUpper )
                    ? vAttrUpper
                    : '';

                // Default to first attribute for highlight

                if (smAttrName === undefined || smAttrName === null) smAttrName = aName;

                const attr = pickedObject.geometry.getAttribute( aName );

                if (attr) {
                  pa_properties[ key ] = attr.getX( vertexIndex );
                  if (smHighlightId === undefined || smHighlightId === null) smHighlightId = pa_properties[ key ];
                }
              }

              if (Object.keys( pa_properties).length > 0) {
                pa_properties.VertexId = vertexIndex;
                if (featureId_ok) pa_properties.ID = featureId;
                featureMetadataList.push( { class: className, properties: pa_properties } );
              }

              if (highlightId === null || highlightId === undefined) highlightId = vertexIndex;
            });
          }

          if (vertexIndex !== -1 && structuralMetadata.propertyTextures?.length > 0 && intersect.uv) {
            structuralMetadata.propertyTextures.forEach( texture => {
              const className = texture.class || 'PropertyTexture';
              const pt_properties = {};

              for ( const propName of Object.keys( texture.properties || {} ) ) {
                const val = getPropertyFromTexture( obj_userData, propName, intersect.uv, className );
                if (val !== undefined) pt_properties[ propName ] = val;
              }

              if (Object.keys( pt_properties ).length > 0) {
                if (featureId_ok) pt_properties.ID = featureId;
                pt_properties.UV_Coord = new THREE.Vector2( intersect.uv.x, intersect.uv.y );
                featureMetadataList.push( { class: className, properties: pt_properties } );
              }
            });
          }
        }

        if (featureMetadataList.length > 0) {
          // Restore color
          if (selectedObject?.material?.emissive) {
            selectedObject.material.emissive.copy( selectedObject.userData.originalEmissive );
          }

          if (pickedObject.isInstancedMesh) {
            highlightFeatureInstanced( highlightId );
          } else if (pickedObject.isPoints) {
            if (smAttrName !== undefined && smHighlightId !== undefined) {
              highlightPoints( smHighlightId, smAttrName );
            } else {
              highlightPoint( highlightId );
            }
          } else if (pickedObject.isLine) {
            highlightLine( highlightId );
          } else if (pickedObject.isMesh) {
            if (smAttrName !== undefined && smHighlightId !== undefined) {
              highlightFeature( smHighlightId, smAttrName );
            } else if (highlightId !== undefined && highlightAttributeName) {
              highlightFeature( highlightId, highlightAttributeName );
            }
          }

          showUiPanel(
            { ...pickedObject.userData.metadata, featureMetadata: featureMetadataList },
            event,
            schema,
            pickedObject.name,
            false
          );

          return;
        }

        if (pickedObject.geometry.hasAttribute( '_batchid' )) {
          if (vertexIndex === undefined || vertexIndex === null) return;

          const batchId = pickedObject.geometry.attributes._batchid.getX( vertexIndex );
          const batchTable = pickedObject.batchTable || pickedObject.parent?.batchTable;

          const properties = { VertexId: vertexIndex, ID: batchId };
          let className = 'BatchId';

          if (batchTable) {
            className = 'Batch Table';

            if (batchTable.header) {
              for ( const key in batchTable.header ) {
                const attributeArray = batchTable.header[ key ];

                if (Array.isArray( attributeArray ) && attributeArray.length > batchId) {
                  properties[ key ] = attributeArray[ batchId ];
                }
              }
            } else if (typeof batchTable.getPropertyNames === 'function') {
              for ( const key of batchTable.getPropertyNames() ) {
                const val = batchTable.getProperty( batchId, key );

                if (val !== undefined && val !== null) {
                  properties[ key ] = val;
                }
              }
            }
          }

          featureMetadataList.push( { class: className, properties } );
          highlightFeature( batchId, '_batchid' );

          showUiPanel(
            { ...pickedObject.userData.metadata, featureMetadata: featureMetadataList },
            event,
            schema,
            pickedObject.name,
            false
          );

          return;
        }

        const data = obj_userData.metadata;
        const tilesetMetadataOnly = !data && !!pickedObject.parent;

        if (( data && !data.empty ) || tilesetMetadataOnly) {
          showUiPanel( data, event, schema, pickedObject.name, tilesetMetadataOnly, pickedObject.type );
        }
      }

      function showUiPanel( data, event, schema = null, meshName = '', tilesetMetadataOnly = false, type = '' ) {
        const card = document.getElementById('metadata-card');
        if (!card) return;

        // Enhanced resolver to handle the complex types in new JSON

        function formatArray( arr ) {
          if (arr.length === 0) return '[]';

          // If it's an array of objects
          if (typeof arr[ 0 ] === 'object' && arr[ 0 ] !== null) {
            return arr.map( ( item, idx ) => {
              let itemHtml = `<div style="margin: 4px 0 4px 5px; padding-left: 8px; border-left: 2px solid #00d4ff; background: rgba(0,212,255,0.05);">`;
              itemHtml += `<div style="font-size: 9px; color: #00d4ff; opacity: 0.7;">Part ${idx + 1}</div>`;

              for ( const [ sk, sv ] of Object.entries( item ) ) {
                const cleanSv = ( typeof sv === 'number' )
                  ? ( Number.isInteger( sv ) ? sv : sv.toFixed( 2 ) )
                  : sv;

                itemHtml += `<div style="font-size: 11px;"><span style="color: #666;">${sk}:</span> ${cleanSv}</div>`;
              }

              itemHtml += `</div>`;
              return itemHtml;
            }).join('');
          }
    
          // If it's a simple array (like [1, 2, 3])
          return `[ ${arr.map( v => {
            if ( typeof v === 'number' ) {
              return ( Number.isInteger( v ) ? v : v.toFixed( 2 ) );
            }

            return String( v );
          }).join( ', ' )} ]`;
        }

        const resolveValue = ( className, propName, val ) => {
          let processedVal = val;

          // Handle Three.js math objects (from interpolation)
          if (processedVal && typeof processedVal === 'object') {
            if (processedVal.isVector3) {
              return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )}, ${processedVal.z.toFixed( 2 )})`;
            }

            if (processedVal.isVector2) {
              return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )})`;
            }

            if (processedVal.isColor) {
              return `RGB(${processedVal.r.toFixed( 2 )}, ${processedVal.g.toFixed( 2 )}, ${processedVal.b.toFixed( 2 )})`;
            }
          }

          const propDef = schema?.classes?.[ className ]?.properties?.[ propName ];

          // Pre-check: If it's a string that looks like an array but isn't parsed
          // This handles the "[One, Two]" or "[true, false]" strings
          if (typeof processedVal === 'string' &&
            ((processedVal.startsWith( '{' ) && processedVal.endsWith( '}' )) ||
             (processedVal.startsWith( '[' ) && processedVal.endsWith( ']' )))) {

            try {
              // Try JSON parse first (handles ["One", "Two"])
              processedVal = JSON.parse( processedVal );
            } catch ( e ) {
              // Manual fallback for unquoted strings like [One, Two]
              processedVal = processedVal.slice( 1, -1 ).split( ',' ).map( s => s.trim() );
            }
          }

          if (processedVal === null || processedVal === undefined) return 'N/A';

          // A. Handle Arrays (The core of EXT_structural_metadata)
          if (Array.isArray( processedVal )) {
            if (processedVal.length === 0) return '[]';

            // Handle ENUM Arrays
            if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
              const enumValues = schema.enums[ propDef.enumType ].values;
              return `[ ${processedVal.map( v => {
                // Look up by integer value (0, 1, 2) or by string name
                const entry = enumValues.find( e => e.value == v || e.name === v );
                return entry ? entry.name : v;
              }).join(', ')} ]`;
            }

            // General Array (Booleans, Strings, etc.)
            return formatArray( processedVal );
          }

          // B. Handle Nested Objects
          if (typeof processedVal === 'object' && !Array.isArray( processedVal ) && !processedVal.isVector3) {
            let subHtml = '<div style="margin-left: 10px; font-size: 0.9em; color: #ccc;">';

            for ( const [ k, v ] of Object.entries( processedVal ) ) {
              let displayV = v;

              // 1. If it's a string, try to "un-stringify" it first
              if (typeof displayV === 'string' && ( displayV.startsWith( '[' ) || displayV.startsWith( '{' ) )) {
                try {
                  displayV = JSON.parse( displayV );
                } catch ( e ) {
                  // If it's the unquoted Cesium style [One, Two], manual split
                  if (displayV.startsWith( '[' ) && displayV.endsWith( ']' )) {
                    displayV = displayV.slice( 1, -1 ).split( ',' ).map( s => s.trim() );
                  }
                }
              }

              // 2. Now that we have the "truest" form of the data, format it for the UI
              if (Array.isArray( displayV )) {
                displayV = formatArray( displayV );
              } else if (typeof displayV === 'object' && displayV !== null) {
                // If it's still an object (deep nesting), stringify it as a fallback
                displayV = JSON.stringify( displayV );
              } else if (typeof displayV === 'number') {
                displayV = ( Number.isInteger( displayV ) ? displayV : displayV.toFixed( 2 ) );
              } else if (typeof displayV === 'boolean') {
                displayV = displayV ? 'Yes' : 'No';
              }

              subHtml += `<div><span style="color: #888;">${k}:</span> ${displayV}</div>`;
            }

            subHtml += '</div>';
            return subHtml;
          }

          // C. Handle Single Values (Non-Arrays)

          // Single Enums
          if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
            const entry = schema.enums[ propDef.enumType ].values.find( v => v.value == processedVal || v.name === processedVal );
            return entry ? entry.name : processedVal;
          }

          // Single Booleans
          if (propDef?.type === 'BOOLEAN') {
            // Treat "true", true, or non-zero numbers as "Yes"
            const isTrue = (processedVal === true || processedVal === 'true' || processedVal === 1);
            return isTrue ? 'Yes' : 'No';
          }

          // Single Numbers
          if (typeof processedVal === 'number') {
            return Number.isInteger( processedVal ) ? processedVal : processedVal.toFixed( 2 );
          }

          // Handle BigInt / Numbers
          if (typeof processedVal === 'bigint') return processedVal.toString();

          return processedVal;
        };

        let show_copy_to_clipboard = true;

        let html = '';

        // 1. Tileset Metadata - Maybe entries like author, date, tile count...

        const tileset = tilesetMetadataOnly ? pickedObject.userData?.tileset : data?.tileset;

        if (tileset?.class) {
          html += `
            <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
              <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${tileset.class}</div>
            </div>`;

          if (tileset.properties) {
            for ( const [ key, val ] of Object.entries( tileset.properties ) ) {
              const display = resolveValue( tileset.class, key, val );
              html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
           }
          }
        } else if (tilesetMetadataOnly) {
          show_copy_to_clipboard = false;

          const description = (type === 'Box3Helper') ? 'No Data (turn off bounding box)' : 'No Data';

          html += `
            <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
              <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${ description }</div>
            </div>`;
        }

        if (data && !tilesetMetadataOnly) {
          if (tileset) html += `<br>`;

          // 2. Tile Metadata - Maybe entries like district, population...

          if (data.tile?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.tile.class}</div>
              </div>`;

            if (data.tile.properties) {
              for ( const [ key, val ] of Object.entries( data.tile.properties ) ) {
                const display = resolveValue( data.tile.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }

            html += `<br>`;
          }

          // 3. Selected Object

          if (meshName !== '') {
            html += `<div style="font-size: 12px; font-weight: bold; color: #fff; line-height: 1.0;">Selected: ${meshName}</div><br>`;
          }

          // 4. Group Metadata - Maybe entries like color, priority...

          if (data.group?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.group.class}</div>
              </div>`;

            if (data.group.properties) {
              for ( const [ key, val ] of Object.entries( data.group.properties ) ) {
                const display = resolveValue( data.group.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }

            html += `<br>`;
          }

          // 5. Content Metadata - Maybe entries like vertices, materials...

          if (data.content?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 8px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.content.class}</div>
              </div>`;

            if (data.content.properties) {
              for ( const [ key, val ] of Object.entries( data.content.properties ) ) {
                const display = resolveValue( data.content.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }
          }

          // 5.5 Feature-Specific Metadata (EXT_structural_metadata)

          if (data.featureMetadata) {
            const fms = Array.isArray( data.featureMetadata ) ? data.featureMetadata : [ data.featureMetadata ];

            fms.forEach( ( fm ) => {
              html += `
                <div style="border-bottom: 1px solid #00d4ff; margin-top: 10px; padding-bottom: 4px;">
                  <div style="font-size: 10px; color: #00d4ff; font-weight: bold;">${fm.class}</div>
                </div>`;

              if (fm.properties) {
                for ( const [ key, val ] of Object.entries( fm.properties ) ) {
                  const display = resolveValue( fm.class, key, val );
                  html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
                }
              }

              html += `<br>`;
            });
          }

          // 6. FeatureId - Maybe entries from EXT_mesh_features, EXT_structural_metadata...
          // Only show if not already merged into metadata

          if (data.featureId && Array.isArray( data.featureId ) && !data.featureMetadata) {
            data.featureId.forEach( ( fid_class, index ) => {
              // Use the class name if found, otherwise use a readable layer index
              const label = fid_class.class || `Feature Layer ${index}`;
              const idValue = fid_class.id !== undefined ? fid_class.id : 'N/A';

              html += `
                <div class="feature-group" style="margin-top: 10px; border-left: 2px solid #00d4ff; padding-left: 8px;">
                  <div style="font-size: 10px; color: #aaa; font-weight: bold;">${ label }</div>
                  <div class="prop-row" style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="prop-label" style="color: #00d4ff;">ID:</span><span class="prop-value">${ idValue }</span>
                  </div>
                </div>`;
            });
          }
        }

        if (show_copy_to_clipboard) {
          // Create a shallow copy so we don't accidentally delete the real schema from the viewer
          const dataForClipboard = data
            ? { ...data }
            : object_userData?.tileset
              ? { ...object_userData.tileset }
              : {};

          // Remove the heavy schema part for popup card, it will be included for clipboard
          delete dataForClipboard.schema;

          // Add selected mesh name
          if (data && meshName) data[ 'Selected' ] = meshName;

          // A helper to make JSON.stringify handle BigInt
          const bigintReplacer = ( key, value ) => typeof value === 'bigint' ? value.toString() : value;

          const rawJson = JSON.stringify( data ? data : dataForClipboard, bigintReplacer, 2 );
          if (!rawJson) return;

          // Escape it for use inside an HTML attribute
          // We replace backslashes first, then single quotes
          safeJson = rawJson
            .replace(/\\/g, '\\\\')   // Escape backslashes
            .replace(/'/g, "\\'")     // Escape single quotes

          html += `
            <div style="padding: 3px; border-top: 1px solid #444; text-align: center;">
              <button
                style="vertical-align: middle; background: #111; color: white; border: 1px solid #00d4ff; padding: 2px; cursor: pointer; font-size: 11px; border-radius: 4px; width: 100%;"
                onclick="navigator.clipboard.writeText( safeJson ).then( () => alert( 'Metadata copied!' ) );">
                📋 Copy To Clipboard
              </button>
            </div>`;
        }

        card.innerHTML = html;
        card.style.display = 'block';

        // 7. Position Logic

        const cardWidth = 220; 
        let x = event.clientX + 15;
        let y = event.clientY + 15;

        if (x + cardWidth > window.innerWidth) x = event.clientX - cardWidth - 15;

        // If the card goes off the bottom of the screen
        if (y + card.offsetHeight > window.innerHeight) {
          y = window.innerHeight - card.offsetHeight - 15;
        }

        card.style.left = x + 'px';
        card.style.top = y + 'px';
      }

      function hideUiPanel() {
        // Restore color
        if (selectedObject?.material?.emissive) {
          selectedObject.material.emissive.copy( selectedObject.userData.originalEmissive );
        }

        popup_card_cleanup();
      }

      function show_wireframe() {
        if (gltf_obj) {
          if (wireframe_enabled) {
            document.getElementById('btn_wireframe').style.backgroundColor = 'transparent';
            wireframe_enabled = false;
          } else {
            document.getElementById('btn_wireframe').style.backgroundColor = 'lightgreen';
            wireframe_enabled = true;
          }

          gltf_obj.traverse( function( child ) {
      	    if (child.isMesh) {
              const mtl = Array.isArray( child.material ) ? child.material : [ child.material ];

              mtl.forEach( m => {
                m.wireframe = wireframe_enabled;
                m.needsUpdate = true;
              });
            }

            mouse_wheel = true;
      	  });
        }
      }

      function set_flat() {
        if (flat_shading_enabled) {
          document.getElementById('btn_flat').style.backgroundColor = 'transparent';
          flat_shading_enabled = false;
        } else {
          document.getElementById('btn_flat').style.backgroundColor = 'lightgreen';
          flat_shading_enabled = true;
        }

        // Go through all children of the loaded object and search for a Mesh
        gltf_obj.traverse( function( child ) {
          if (child.isMesh) {
            const mtl = Array.isArray( child.material ) ? child.material : [ child.material ];

            mtl.forEach( m => {
              m.flatShading = flat_shading_enabled;
              m.needsUpdate = true;
            });
          }

          mouse_wheel = true;
        });
      }

      async function render( timestamp ) {
        if (gltf_obj) {
          if (animation_running || mouse_down || mouse_wheel) {
            if (animation_running) {
              clock.update( timestamp );
              animation_mixer.update( clock.getDelta() );
            }

            controls.update();

            renderer.clear();
            renderer.render( scene, default_camera );

            if (mouse_wheel) {
              if (count > 5) {
                mouse_wheel = false;
                count = 0;
              } else {
                count ++;
              }
            }
          }
        }

        if (render_requested === true) requestAnimationFrame( render );
      }

      async function reset_all( reset = false ) {
        document.getElementById('back_color').value = '#000000';
        document.getElementById('dli_val').innerText = 3;
        document.getElementById('directional_light_intensity').value = 3;
        document.getElementById('btn_url').style.backgroundColor = 'transparent';
        document.getElementById('btn_flat').style.backgroundColor = 'transparent';
        document.getElementById('btn_animate').style.backgroundColor = 'transparent';
        document.getElementById('btn_extras').style.backgroundColor = 'transparent';
        document.getElementById('btn_variants').style.backgroundColor = 'transparent';
        document.getElementById('btn_wireframe').style.backgroundColor = 'transparent';
        document.getElementById('btn_cameras').style.backgroundColor = 'transparent';
        document.getElementById('btn_cameras').innerText = 'C0';

        document.getElementById('metadata_message').style.visibility = 'hidden';

        init_running = false;

        if (scene) {
          if (directionalLight) {
            set_directional_light_intensity();
          }
        }

        parser = null;

        // Reset the view
        if (reset === true) {
          controls.reset();
          set_back_color();

          if (variants_available === true) {
            if (variants && variants.length > 0) {
              current_variant = variants.length - 1;
              switch_variant();
              parser = null;
            } else {
              variants_available = false;
            }
          }
        } else {
          // Page (re)loading
          if (scene) {
            if (gpu && gpu === false) {
              if (scene.environmentNode) {
                scene.environmentNode.dispose();
                scene.environmentNode = null;
              }
            } else {
              if (scene.environment) {
                scene.environment.dispose();
                scene.environment = null;
              }
            }

            if (gltf_obj) {
              gltf_loader.dracoLoader.dispose();
              gltf_loader.ktx2Loader.dispose();

              await scene_cleanup();

              while (gltf_obj.children.length > 0) {
                gltf_obj.remove( gltf_obj.children[ 0 ] );
              }

              gltf_obj.children.length = 0;
              extras.length = 0;
            }

            while (scene.children.length > 0) {
              scene.remove( scene.children[ 0 ] );
            }
          }

          document.getElementById('file_input').value = '';
          document.getElementById('div_error').style.display = 'none';
          document.getElementById('btn_flat').disabled = true;
          document.getElementById('btn_wireframe').disabled = true;
          document.getElementById('btn_animate').disabled = true;
          document.getElementById('btn_extras').disabled = true;
          document.getElementById('btn_cameras').disabled = true;
          document.getElementById('btn_variants').disabled = true;
          document.getElementById('url_entry').value = '';
          selected_url_file = '';
          enable_disable( true );
        }

        disabled_changed();

        mouse_wheel = true;
      }

      async function scene_cleanup() {
        mouse_wheel = true;

        hideUiPanel();

        if (featureHighlightMesh) {
          if (featureHighlightMesh.parent) {
            featureHighlightMesh.parent.remove( featureHighlightMesh );
          }

          featureHighlightMesh.traverse( ( child ) => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
          });

          featureHighlightMesh = null;
        }

        scene.remove( gltf_obj );

        renderer.clear();

        if (animation_mixer) {
          animation_mixer.stopAllAction();

          for ( let i = 0; i < animations.length; i++ ) {
            animation_mixer.uncacheAction( animations[ i ] );
            animation_mixer.uncacheClip( animations[ i ] );
          }

          animation_mixer.uncacheRoot( animation_mixer.getRoot() );
        }

        if (wireframe_enabled) await show_wireframe();
        if (flat_shading_enabled) await set_flat();

        if (gltf_obj.skeleton && gltf_obj.skeleton.boneTexture)
          gltf_obj.skeleton.boneTexture.dispose();

        gltf_obj.traverse( function( child ) {
          if (child.isMesh || child.isPoints || child.isLine) {
            if (child.skeleton && child.skeleton.boneTexture)
                child.skeleton.boneTexture.dispose();

            if (child.material) {
              if (Array.isArray( child.material )) {
                child.material.forEach( mtl => {
                  if (mtl.uniforms) {
                    Object.keys( mtl.uniforms ).forEach( ( key ) => {
                      if (mtl.uniforms[ key ].value) {
                        let kv = mtl.uniforms[ key ].value;

                        if (Array.isArray( kv ) && kv.length > 0) {
                          kv.forEach( val => {
                            if (val.type && val.type === 1009)
                              val.dispose();
                          });
                        } else {
                          if (kv.type && kv.type === 1009)
                            kv.dispose();
                        }
                      }
                    });
                  } else {
                    for (const prop in mtl) {
                      texture_maps.forEach( tex_map => {
                        if (prop === tex_map) {
                          if (mtl[ prop ]) mtl[ prop ].dispose();
                        }
                      });
                    };
                  }

                  mtl.dispose();
                });
              } else {
                if (child.material.uniforms) {
                  Object.keys( child.material.uniforms ).forEach( ( key ) => {
                    if (child.material.uniforms[ key ].value) {
                      let kv = child.material.uniforms[ key ].value;

                      if (Array.isArray( kv ) && kv.length > 0) {
                        kv.forEach( val => {
                          if (val.type && val.type === 1009)
                            val.dispose();
                        });
                      } else {
                        if (kv.type && kv.type === 1009)
                          kv.dispose();
                      }
                    }
                  });
                } else {
                  for (const prop in child.material) {
                    texture_maps.forEach( tex_map => {
                      if (prop === tex_map) {
                        if (child.material[ prop ]) child.material[ prop ].dispose();
                      }
                    });
                  };
                }

                child.material.dispose();
              }
            }

            child.geometry.dispose();
          }
        });

        if (draco_material) {
          if (draco_material.map) draco_material.map.dispose();
          draco_material.dispose();
          draco_material = null;
        }

        THREE.Cache.clear();

        if (isMobile === false) renderer.info.reset();
      }

      function enable_disable( disable = false ) {
        document.getElementById('directional_light_intensity').disabled = disable;
        document.getElementById('btn_quick_x').disabled = disable;
        document.getElementById('btn_dc_dli').disabled = disable;
        document.getElementById('back_color').disabled = disable;
        disabled_changed();

        mouse_wheel = true;
      }
    </script>

    <script>
      async function document_ready() {
        const WebGPU = await import( "three/addons/capabilities/WebGPU.min.js" );
        const WebGL = await import( "three/addons/capabilities/WebGL.min.js" );

        gpu = WebGPU[ 'default' ].isAvailable();
        gl2 = WebGL[ 'default' ].isWebGL2Available();

        if ( gpu === true ) {
          console.log( 'WebGPU support detected' );
          document.getElementById('div_message').innerText += ' - WebGPU';
        } else if ( gl2 === true ) {
          console.log( 'WebGL2 support detected' );
          document.getElementById('div_message').innerText += ' - WebGL2';
        } else {
          document.body.appendChild( WebGPU[ 'default' ].getErrorMessage() );
          document.getElementById('fixed_menu').style.display = 'none';
          throw new Error( 'No WebGPU or WebGL2 support detected' );
        }

        isMobile = (/iPad|iPhone|iPod/.test( navigator.platform )) ||
          (/Android|webOS|iPhone|iPad|iPod|CriOS|BlackBerry|IEMobile|Opera Mini/i.test( navigator.userAgent )) ||
          (navigator.maxTouchPoints !== undefined && navigator.maxTouchPoints > 2 && /MacIntel/.test( navigator.platform ));

        texture_maps = [
          'map', 'aoMap', 'alphaMap', 'bumpMap', 'displacementMap', 'envMap', 'lightMap', 'emissiveMap', 'normalMap',
          'metalnessMap', 'roughnessMap', 'anisotropyMap', 'clearcoatMap', 'clearcoatNormalMap', 'clearcoatRoughnessMap',
          'iridescenceMap', 'iridescenceThicknessMap', 'sheenColorMap', 'sheenRoughnessMap', 'specularMap',
          'specularColorMap', 'specularIntensityMap', 'thicknessMap', 'transmissionMap'
        ];

        $('#url_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_load').click(); });
      }

      function disabled_changed() {
        $('button').each( function() {
          if (this.disabled === false ) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });

        $('input[type=color]').each( function() {
          if (this.disabled === false ) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px whitesmoke'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });
      }
    </script>
  </body>
</html>
