    <script>
      // Resource Loading Failures (404 or similar)
      window.addEventListener( 'error', function ( event ) {
        // We check if the target has a 'src' or 'href' to identify it as a resource
        if (event.target.src || event.target.href) {
          console.error( 'RESOURCE ERROR: ', {
            element: event.target.tagName,
            url: event.target.src || event.target.href,
            html: event.target.outerHTML
          });

          // If the failed resource is jQuery, show the alert immediately
          if ((event.target.src || '').includes('jquery')) {
            alert('jQuery failed to load. Limited functionality. Check your internet connection!');
          }

          if (init_running === true) {
            handle_error( 'RESOURCE ERROR' );
          } else {
            document.getElementById('div_loading').innerHTML = '!!! Resource Error !!!';
          }
        }
      }, true); // The 'true' here is vital; it enables the "capturing" phase

      // Standard JavaScript Runtime Errors
      window.onerror = function ( message, source, lineno, colno, error ) {
        console.log( 'RUNTIME ERROR CAUGHT' );

        console.log({
          message: message, // Error message
          file: source,     // The script file where it happened
          line: lineno,     // Line number
          column: colno,    // Column number
          errorObj: error   // The actual Error object (includes stack trace)
        });

        // Returning 'true' prevents the error from showing up in the browser console
        return false; 
      };

      // Unhandled Promise Rejections (Async Errors)
      window.addEventListener( 'unhandledrejection', function ( event ) {
        console.warn( 'UNHANDLED PROMISE: ', event.reason );

        // event.promise is the promise that failed
        // event.reason is usually the error object or message

        if (init_running === true) handle_error( 'UNHANDLED PROMISE: ' + event.reason );
      });
    </script>

      function show_url() {
        if (url_displayed === true) {
          url_displayed = false;
          document.getElementById('url').style.display = 'none';
          document.getElementById('btn_url').style.backgroundColor = 'transparent';
        } else {

      function load_url_file() {
        let url = document.getElementById('url_entry').value.trim();
        if (url !== '') { selected_url_file = url; url_loading = true; init(); }
      }

      function clear_url() { document.getElementById('url_entry').value = ''; }

      function initialize_event_listeners() {
        const arrow_keys = [ 'ArrowUp', 'ArrowDown', 'ArrowRight', 'ArrowLeft' ];
        const activeKeys = new Set();

        window.addEventListener( 'pointerdown', (event) => {
          mouse_down = true;
          mouseDownPos.x = event.clientX;
          mouseDownPos.y = event.clientY;
        }, false);
        window.addEventListener( 'pointerup', (event) => { mouse_down = false; mouse_wheel = true; }, false);
        window.addEventListener( 'wheel', ( event ) => { mouse_wheel = true; }, false);
        window.addEventListener( 'keydown', ( event ) => {
          if (event.key === 'Escape') hideUiPanel();

          if (arrow_keys.some( k => k === event.key ) || event.ctrlKey || event.metaKey || event.shiftKey) {
            controls.listenToKeyEvents( window );
            activeKeys.add( event.key ); // Track this key
            mouse_wheel = true;
          }
        }, false);
        window.addEventListener( 'keyup', ( event ) => {
          activeKeys.delete( event.key ); // Remove this key

          if (controls && activeKeys.size === 0) {
            controls.stopListenToKeyEvents();
            mouse_wheel = false;
          }
        }, false);
      }

      function resize() {
        if (scene !== undefined) {
          mouse_wheel = true;

          ww = window.innerWidth;
          wh = window.innerHeight;

          renderer.setSize( ww, wh );

          default_camera.aspect = ww / wh;
          default_camera.updateProjectionMatrix();

          mouse_wheel = true;
        }
      }
    </script>

    <script>
      function start_export() {
        render_requested = false;
        document.getElementById('export_names').selectedIndex = 0;
        document.getElementById('fixed_menu').style.display = 'none';
        document.getElementById('div_loading').innerHTML = pw;
        document.getElementById('div_loading').style.display = 'block';

        if (document.getElementById('div_download').style.display !== 'none') cancel_download();

        set_filename();
      }

      function set_filename() {
        if (selected_gltf_file !== null) {
          filename = local_files[ selected_gltf_file ].name.substring( 0, local_files[ selected_gltf_file ].name.lastIndexOf('.') );
        } else if (selected_draco_file !== null) {
          filename = local_files[ selected_draco_file ].name.substring( 0, local_files[ selected_draco_file ].name.lastIndexOf('.') );
        } else {
          filename = selected_url_file.substring( selected_url_file.lastIndexOf('/') + 1, selected_url_file.lastIndexOf('.') );
        }

        if (!filename || filename === '') {
          filename = 'Model';
        } else {
          filename = filename.replaceAll( '%20', ' ' );
        }
      }

      async function process_zip( ext = '' ) {
        await zip.generateAsync( { type: 'blob', compression: "DEFLATE", compressionOptions: { level: 9 } } ).then( function( zipped_file ) {
          let link = document.getElementById('link');
          link.href = URL.createObjectURL( zipped_file );
          URL.revokeObjectURL( zipped_file );
          link.download = filename + ext + '.zip';

          document.getElementById('div_download').style.display = 'block';

          finish_export();
        });
      }

      function handle_export_error( error ) {
        alert( 'Export error!' );
        console.log( error );

        finish_export();

        cancel_download();
      }

      function finish_export() {
        document.getElementById('div_loading').innerHTML = '';
        document.getElementById('div_loading').style.display = 'none';
        document.getElementById('fixed_menu').style.display = 'block';

        render_requested = true;
        mouse_wheel = true;
        render();

        zip = new JSZip();
      }

      function cancel_download() {
        document.getElementById('div_download').style.display = 'none';
        document.getElementById('link').download = '';
        document.getElementById('link').href = '#';
      }

      function set_texture_flip() {
        if (tex_flip === true) {
          document.getElementById('btn_y_flip').style.backgroundColor = 'transparent';
          tex_flip = false;
        } else {
          document.getElementById('btn_y_flip').style.backgroundColor = 'lightgreen';
          tex_flip = true;
        }
      }

      async function export_obj() {
        if (gltf_obj) {
          await start_export();

          const { OBJExporter } = await import( "../../static/jsm/exporters/OBJExporter.min.js" );

          let obj_exporter = new OBJExporter( manager );

          let options = { filename: filename, maxTextureSize: 2048, map_flip_required: tex_flip };

          await obj_exporter.parse( gltf_obj.clone(), async function( exported ) {
            zip.file( filename + '.obj', exported[ 'obj' ] );

            if (exported[ 'mtl' ]) {
              zip.file( filename + '.mtl', exported[ 'mtl' ] );

              if (exported[ 'tex' ] && exported[ 'tex' ].length > 0) {
                let processed_index = 0;

                exported[ 'tex' ].forEach( async tex => {
                  let blob = new Blob( [ tex.data ], { type: 'image/png' } );
                  zip.file( `${ tex.name }.${ tex.ext }`, blob );

                  if (processed_index === exported[ 'tex' ].length - 1) {
                    await process_zip( '_OBJ' + (tex_flip === true ? '_Y' : '') );
                  }

                  processed_index += 1;
                });
              } else {
                await process_zip( '_OBJ' );
              }
            } else {
              await process_zip( '_OBJ' );
            }
          }, function( error ) { handle_export_error( error ); }, options );
        }
      }

      async function export_ply( binary = false ) {
        if (gltf_obj) {
          await start_export();

          const { PLYExporter } = await import( "../../static/jsm/exporters/PLYExporter.min.js" );

          let ply_exporter = new PLYExporter( manager );

          let options;

          if (object_is_points === true) {
            options = { binary: binary, excludeAttributes: [ 'index' ], littleEndian: true };
          } else {
            options = { binary: binary, littleEndian: true };
          }

          await ply_exporter.parse( gltf_obj.clone(), async function( json ) {
            let blob;

            if (binary === true) {
              blob = new Blob( [ json ], { type: 'application/octet-stream' } );
            } else {
              let string = json.split( ',' );
              blob = new Blob( [ string ], { type: 'text/plain' } );
            }

            zip.file( filename + '.ply', blob );

            await process_zip( binary === true ? '_PLY_binary' : '_PLY_ascii' );

          }, options );
        }
      }

      async function export_dae() {
        if (gltf_obj) {
          await start_export();

          const { ColladaExporter } = await import( "../../static/jsm/exporters/ColladaExporter.min.js" );

          let dae_exporter = new ColladaExporter( manager );

          let result = await dae_exporter.parse( gltf_obj.clone() );

          zip.file( filename + '.dae', result.data );

          if (result.textures && result.textures.length > 0) {
            let processed_index = 0;

            result.textures.forEach( tex => {
              let blob = new Blob( [ tex.data ], { type: 'image/png' } );

              let img = new Image();

              img.onload = async function() {
                let canvas = document.createElement('canvas');

                let scale = 2048 / Math.max( img.naturalWidth, img.naturalHeight );

                canvas.width = img.naturalWidth * Math.min( 1, scale );
                canvas.height = img.naturalHeight * Math.min( 1, scale );

                const ctx = canvas.getContext( '2d' );

                // Flip image vertically, reverse logic due to regular export being flipped by default
                if (tex_flip === false) {
                  ctx.translate( 0, canvas.height );
                  ctx.scale( 1, -1 );
                }

                ctx.drawImage( img, 0, 0, canvas.width, canvas.height );

                await new Promise( resolve => canvas.toBlob( resolve ) ).then( async function( canvas_blob ) {
                  zip.file( `${ tex.name }.${ tex.ext }`, canvas_blob );
                  if (processed_index === result.textures.length - 1) {
                    let str = '_DAE';
                    if (tex_flip === true) str += '_Y';
                    await process_zip( str );
                  }
                });

                processed_index += 1;
              }

              img.src = URL.createObjectURL( blob );
              URL.revokeObjectURL( blob );
            });
          } else {
            await process_zip( '_DAE' );
          }
        }
      }

      async function export_gltf( binary = false, draco = false, meshopt = false, webp = false ) {
        if (gltf_obj) {
          await start_export();

          const { clone } = await import( "three/addons/utils/SkeletonUtils.min.js" );
          const { GLTFExporter } = await import( "../../static/jsm/exporters/GLTFExporter.min.js" );

          let gltf_exporter = new GLTFExporter( manager );

          let options;

          if (animations.length > 0) {
            options = {	binary: binary, animations: animations };
          } else {
            options = {	binary: binary };
          }

          if (userData?.textures || userData?.uris)
            options.metadataTextures = { textures: userData?.textures, uris: userData?.uris };

          if (userData?.structuralMetadata) {
            options.structuralMetadata = userData.structuralMetadata;
          } else if (userData?.gltfExtensions?.EXT_structural_metadata) {
            options.structuralMetadata = userData.gltfExtensions.EXT_structural_metadata;
          }

          options.includeCustomExtensions = true;

          gltf_exporter.parse( clone( gltf_obj ), async json => {
            let blob;

            if (binary === true) {
              let type = 'application/octet-stream';

              try {
                if (draco === true) {
                  blob = new Blob( [ await draco_compress( new Uint8Array( json ), webp ) ], { type: type } );
                } else if (meshopt === true) {
                  blob = new Blob( [ await meshopt_compress( new Uint8Array( json ), webp ) ], { type: type } );
                } else {
                  blob = new Blob( [ hasMetadata ? new Uint8Array( json ) : await simplify( new Uint8Array( json ), webp ) ], { type: type } );
                }
              } catch ( error ) {
                handle_export_error( error );
                return;
              }

              zip.file( filename + '.glb', blob );

              let str = '_GLB';
              if (draco === true) {
                str += '_DRACO';
              } else if (meshopt === true) {
                str += '_MESHOPT';
              }
              if (tex_flip === true) str += '_Y';
              if (webp === true) str += '_WEBP';

              await process_zip( str );
            } else {
              let string = JSON.stringify( json, null, 2 );
              blob = new Blob( [ string ], { type: 'text/plain' } );

              zip.file( filename + '.gltf', blob );
              await process_zip( '_GLTF' );
            }
          }, function( error ) { handle_export_error( error ); }, options);
        }
      }

      async function export_thumbnail() {
        // Create 512 x 512 thumbnail image, currently intended for 3MF exports
        // The exporter is using fflate so it is sufficient to return Uint8Array
        // The model should be centered on the screen and sized to approximately 512 x 512 pixels

        const size = 512;

        let frame_x = Math.ceil( ( renderer.domElement.width - size ) / 2.0 );
        let frame_y = Math.ceil( ( renderer.domElement.height - size ) / 2.0 );

        let canvas = document.createElement( 'canvas' );
        canvas.width = size;
        canvas.height = size;

        let context = canvas.getContext( '2d', { willReadFrequently: true } );
        context.clearRect( 0, 0, size, size );

        renderer.render( scene, default_camera );

        context.drawImage( renderer.domElement, frame_x, frame_y, size, size, 0, 0, size, size );

        const base64 = canvas.toDataURL( 'image/png', 1 ).split( ',' )[ 1 ];

        const binaryString = atob( base64 );
        const u8 = new Uint8Array( binaryString.length );

        for ( let i = 0, l = u8.length; i < l; i++ ) { u8[ i ] = binaryString.charCodeAt( i ); }

        return u8;
      }

      function frame_camera() {
        bounding_box.setFromObject( gltf_obj );
        const center = bounding_box.getCenter( new THREE.Vector3() );
        const size = bounding_box.getSize( new THREE.Vector3() );

        default_camera.position.copy( center.clone().add( new THREE.Vector3( 0, 0, size.length())));
        default_camera.lookAt( center );

        // Center root
        gltf_obj.position.sub( center );

        // Frame camera to root
        const maxDim = Math.max( size.x, size.y, size.z );
        const fov = THREE.MathUtils.degToRad( camera.fov );
        const dist = maxDim + maxDim / ( 2 * Math.tan( fov / 2.0 ) );
        default_camera.position.set( 0, 0, dist );
        default_camera.lookAt( 0, 0, 0 );

        resize();
      }

      function switch_camera() {
        render_requested = false;

        if (cam_id === cameras.length) {

      function switch_variant() {

          if (current_variant === variants.length - 1) {
            current_variant = 0;
          } else {
            current_variant += 1;
          }

          gltf_obj.traverse( function( child ) {
      	    if (child.isMesh && child.material && variant_materials[ child.id ]) {
              child.material = variant_materials[ child.id ][ variants[ current_variant ] ];
              child.material.flatShading = flat_shading_enabled;
              child.material.wireframe = wireframe_enabled; 
              child.material.needsUpdate = true;
            }
          });

        }
      }

      function animate_extra() {
        if (extra_running === true) {
          if (current_extra === extras.length - 1) {
            gltf_obj.traverse( function( child ) {
              if (child.isMesh) {
                if (child.id === extras[ current_extra ][ 0 ]) {
                  child.morphTargetInfluences[ extras[ current_extra ][ 2 ] ] = 0;
                }
              }

              mouse_wheel = true;
            });

            extra_running = false;
          } else {

                  child.morphTargetInfluences[ extras[ current_extra ][ 2 ] ] = 0;
                }
              }

              mouse_wheel = true;
            });

            current_extra += 1;

          extra_running = true;

          gltf_obj.traverse( function( child ) {
            if (child.isMesh) {
              if (child.id === extras[ 0 ][ 0 ]) {
                child.morphTargetInfluences[ extras[ 0 ][ 2 ] ] = 1;
              }
            }

            mouse_wheel = true;
          });
        }
      }

      function animate_gltf() {
        if (animation_running === true) {
          animation_mixer.clipAction( animations[ current_animation ] ).stop();
          animation_mixer.clipAction( animations[ current_animation ] ).reset();

          if (current_animation === animations.length - 1) {
            document.getElementById('btn_animate').style.backgroundColor = 'transparent';
            current_animation = 0;
            animation_running = false;
          } else {
            current_animation += 1;
            animation_mixer.clipAction( animations[ current_animation ] ).play();
          }
        } else {
          animation_mixer.clipAction( animations[ current_animation ] ).play();
          document.getElementById('btn_animate').style.backgroundColor = 'lightgreen';
          animation_running = true;
        }

        mouse_wheel = true;
      }

        document.getElementById('div_loading').style.display = 'block';
        document.getElementById('div_loading').innerHTML = 'Load & Visualize';

        manager.setURLModifier( function( url ) {
          const file = filesMap[ url ];
          if ( file ) return file;
          return url;
        });

        if (url_loading === false) {
          let image_extensions = [ '.AVIF', '.BMP', '.DDS', '.DIB', '.GIF', '.JPG', '.JPEG', '.JFIF', '.KTX2',
            '.PJPEG', '.PJP', '.PNG', '.SVG', '.TGA', '.WEBP' ];

          // Loaded file(s)
          local_files = document.getElementById('file_input').files;

          for (let i = 0; i < local_files.length; i++) {
            let fn_uc = local_files[ i ].name.toUpperCase();

            else if (fn_uc.endsWith('.DRC')) { selected_draco_file = i; }
            else if (fn_uc.endsWith('.BIN')) { local_bin_files.push( i ); }
            else {
              if (image_extensions.some( ext => fn_uc.endsWith( ext ) )) {
                local_files_indexes.push( i );
              }

              let url = URL.createObjectURL( local_files[ i ] );
              URL.revokeObjectURL( local_files[ i ] );

              let base = THREE.LoaderUtils.extractUrlBase( url );

              fn_uc.endsWith('.JSON')
               ? filesMap[ local_files[ i ].name ] = url
               : filesMap[ base + local_files[ i ].name ] = url;
            }
          };

          if (selected_gltf_file === null && selected_draco_file === null) {
            handle_error( 'No valid GLTF, GLB or DRACO file selected!' );
            return;
          }

          if (local_bin_files.length > 0) {

        if (renderer === undefined) {

          camera.add( ambientLight );

        // Add DirectionalLight to the default_camera (add it to the scene instead if not using Orbit Controls)
        if (directionalLight === undefined) {
          directionalLight = new THREE.DirectionalLight( 0xFFFFFF, 3 );

          //controls.enableDamping = true;

        // Start flashing indicator
        document.getElementById('status_indicator').style.display = 'inline-block';

        // Load DRACO or GLTF file
        (selected_gltf_file !== null) ? loadFile() : ( (selected_draco_file !== null) ? loadDRACO() : loadURLFile() );

      function loadFile() {
        gltf_loader.load( URL.createObjectURL( local_files[ selected_gltf_file ] ), async function( gltf ) {
          URL.revokeObjectURL( local_files[ selected_gltf_file ] );

          parser = gltf.parser;
          cameras = gltf.cameras;

          if (gltf.userData) userData = gltf.userData;

          if (cameras && cameras.length > 0) {
            document.getElementById('btn_cameras').disabled = false;
            document.getElementById('btn_cameras').style.backgroundColor = 'lightgreen';
          } else {
            document.getElementById('btn_cameras').disabled = true;
          }

          animations = gltf.animations;

          if (animations.length > 0) {
            animation_mixer = new THREE.AnimationMixer( gltf.scene );
            current_animation = 0;
            animations.forEach( clip => { animation_mixer.clipAction( clip ).loop = THREE.LoopRepeat; } );
          }

          if (gltf.userData.gltfExtensions && gltf.userData.gltfExtensions[ 'KHR_materials_variants' ]) {
            variants = gltf.userData.gltfExtensions[ 'KHR_materials_variants' ].variants.map( ( variant ) => variant.name );
          }

          if (variants) {
            current_variant = 0;
            variants_available = true;
            document.getElementById('btn_variants').disabled = false;
            document.getElementById('btn_variants').style.backgroundColor = 'lightgreen';
          }

          gltf.scene.traverse( async function( child ) {
            if (child.isMesh || child.isPoints) {
              if (!child.geometry.attributes.normal) child.geometry.computeVertexNormals();
              child.geometry.normalizeNormals();

              child.geometry.computeBoundingBox();
              child.geometry.computeBoundingSphere();

              if (child.isMesh) {
                if (child.isSkinnedMesh) child.frustumCulled = false;

                if (variants_available === true && child.material && child.userData.gltfExtensions) {
                  variant_materials[ child.id ] = {};
                  const meshVariants = child.userData.gltfExtensions[ 'KHR_materials_variants' ];

                  for (let i = 0; i < variants.length; i++) {
                    const mapping = meshVariants.mappings.find( ( mapping ) => mapping.variants.includes( i ) );

                    if (mapping) {
                      await parser.getDependency( 'material', mapping.material ).then( function( material ) {
                        variant_materials[ child.id ][ variants[ i ] ] = material;
                        if (i === 0) child.material = material;
                      });
                    }
                  }
                }
              } else {
                object_is_points = true;
                child.sortPoints = true;
                child.sizeAttenuation = true;
              }

              // Check for morph targets
              if (child.morphTargetDictionary) {
                Object.keys( child.morphTargetDictionary ).forEach( ( key, index ) => {
                  extras.push( [ child.id, key, index ] );
                });
              }

              const mtl = Array.isArray( child.material ) ? child.material : [ child.material ];

              mtl.forEach( m => {
                if (child.isPoints === true) m.size = isMobile === true ? 0.9 : 1.25;
                m.flatShading = false;
                m.needsUpdate = true;

      async function finish_loading() {
        frame_camera();

        enable_disable( false );

        let object_is_mesh = false;
        let hasGltfExtensions = false, hasHybrid = false;

        gltf_obj.traverse( function( child ) {
          if (child.type === 'PointLight' || child.type === 'SpotLight') {
            child.intensity *= 250;
          } else if (child.isMesh || child.isPoints || child.isLine) {
            const extensions = child.userData.gltfExtensions;

            if (extensions?.EXT_mesh_features || extensions?.EXT_instance_features || extensions?.EXT_structural_metadata) {
              hasGltfExtensions = true;
            } else if (child.geometry.hasAttribute( '_batchid' ) || child.geometry.hasAttribute( '_BATCHID' )) {
              hasHybrid = true;
            }

            if (child.isMesh) object_is_mesh = true;
          }
        });

        if (userData.structuralMetadata !== undefined || hasGltfExtensions || hasHybrid) {
          hasMetadata = true;
        }

        if (object_is_mesh === false) {
          document.getElementById('btn_wireframe').disabled = true;
          document.getElementById('btn_flat').disabled = true;
          disabled_changed();
        }

        if (animations.length > 0) {
          animation_mixer.clipAction( animations[ 0 ] ).play();
          document.getElementById('btn_animate').disabled = false;
          document.getElementById('btn_animate').style.backgroundColor = 'lightgreen';
          animation_running = true;
          disabled_changed();
        }

        if (extras.length > 0) {
          document.getElementById('btn_extras').disabled = false;
          current_extra = 0;
          disabled_changed();
        }

        if (hasMetadata) {
          document.getElementById('metadata_message').style.visibility = 'visible';
          console.log( 'Metadata Raycasting Enabled' );

          if (click_listener_added === false) {
            window.addEventListener( 'click', handle_raycast_click );
            click_listener_added = true;
          }
        } else {
          if (click_listener_added) {
            window.removeEventListener( 'click', handle_raycast_click );
            click_listener_added = false;
          }
        }

        console.timeEnd( 'Loading Time' );

        init_running = false;

        // Stop flashing indicator
        document.getElementById('status_indicator').style.display = 'none';

        document.getElementById('div_loading').style.display = 'none';

        render_requested = true;
        mouse_wheel = true;
        render();

        if (!isMobile) {
          await new Promise( resolve => setTimeout( log_info, 1000 ) );
        } else {
          await new Promise( resolve => setTimeout( hide_metadata_message, 5000 ) );
        }
      }

      function highlightFeatureInstanced( instanceId ) {
        // 1. REUSE EVERYTHING
        // Instead of a new mesh every time, we just reposition the one we have
        if (!featureHighlightMesh || featureHighlightMesh?.geometry !== pickedObject.geometry) {
          if (featureHighlightMesh) {
            // Detach it from the old parent
            if (featureHighlightMesh.parent) {
              featureHighlightMesh.parent.remove( featureHighlightMesh );
            }

            featureHighlightMesh.traverse((child) => {
              if (child.geometry) child.geometry.dispose();
              if (child.material) child.material.dispose();
            });

            featureHighlightMesh = null;
          }

          const highlightGeo = pickedObject.geometry;

          featureHighlightMesh = new THREE.Mesh(
            highlightGeo,
            new THREE.MeshBasicMaterial({
              color: 0xf08080,
              transparent: true,
              opacity: 0.5,
              depthTest: true,
              depthWrite: false, 
              polygonOffset: true,
              polygonOffsetFactor: -1,
              polygonOffsetUnits: -1
            })
          );

          featureHighlightMesh.isHighlight = true;

          // Add the wireframe once
          const wireframe = new THREE.LineSegments(
            new THREE.EdgesGeometry( highlightGeo, 30 ),
            new THREE.LineBasicMaterial( { color: 0xffffff } )
          );

          featureHighlightMesh.add( wireframe );
        }

        // THE TELEPORTATION
        // Copy the specific instance's transform from the InstancedMesh
        const matrix = new THREE.Matrix4();
        pickedObject.getMatrixAt( instanceId, matrix );

        // SYNC WITH PARENT
        // If the InstancedMesh itself has a position/rotation, 
        // we must account for it so the highlight doesn't fly off to space
        featureHighlightMesh.matrix.copy( matrix );
        featureHighlightMesh.matrixAutoUpdate = false; // We handle the matrix manually now
        featureHighlightMesh.updateWorldMatrix( true, true );

        // ATTACH
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );

        featureHighlightMesh.visible = true;
        featureHighlightMesh.frustumCulled = false;
        featureHighlightMesh.children.forEach( child => child.frustumCulled = false );
      }

      function highlightFeature( highlight_id, attrName ) {
        if (!attrName) return;

        const geometry = pickedObject.geometry;

        const indexAttr = geometry.index;
        const featureAttr = geometry.getAttribute( attrName );
        const positionAttr = geometry.getAttribute( 'position' );

        if (!featureAttr || !indexAttr || !positionAttr) return;

        // Find all triangles that belong to this highlight id
        const activeIndices = [];

        for ( let i = 0; i < indexAttr.count; i += 3 ) {
          const a = indexAttr.getX( i );
          const b = indexAttr.getX( i + 1 );
          const c = indexAttr.getX( i + 2 );

          // If the first vertex of the triangle matches the ID, we take the whole triangle
          if ( a < featureAttr.count ) {
            if (featureAttr.getX( a ) === highlight_id) {
              activeIndices.push( a, b, c );
            }
          }
        }

        if (activeIndices.length === 0) return;

        // Create a new "Slice" geometry
        const highlightGeo = new THREE.BufferGeometry();
        highlightGeo.setAttribute( 'position', positionAttr );
        highlightGeo.setIndex( activeIndices );

        // Create the overlay mesh
        featureHighlightMesh = new THREE.Mesh(
          highlightGeo,
          new THREE.MeshBasicMaterial({
            color: 0xf08080,
            transparent: true,
            opacity: 0.5,
            side: THREE.DoubleSide,
            depthTest: true,
            depthWrite: false,   // Keeps the highlight from messing up the depth buffer for other transparents
            polygonOffset: true, // Physically pushes the quad slightly toward the camera
            polygonOffsetFactor: -1,
            polygonOffsetUnits: -1
          })
        );

        featureHighlightMesh.isHighlight = true;

        // Create the Wireframe Outline (The "Border")
        const wireframeGeo = new THREE.EdgesGeometry( highlightGeo, 30 );
        const wireframe = new THREE.LineSegments(
          wireframeGeo,
          new THREE.LineBasicMaterial( { color: 0xffffff, linewidth: 3 } ) // White border
        );

        // Add the wireframe to our highlight mesh so they move together
        featureHighlightMesh.add( wireframe );

        featureHighlightMesh.position.set( 0, 0, 0 );
        featureHighlightMesh.rotation.set( 0, 0, 0 );
        featureHighlightMesh.scale.set( 1, 1, 1 );
        featureHighlightMesh.updateWorldMatrix( true, true );

        // Sync transformation with the parent object
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      function highlightPoint( pointIndex ) {
        const geometry = pickedObject.geometry;
        const positionAttr = geometry.getAttribute( 'position' );

        if (!positionAttr || pointIndex === -1) return;

        // 1. Get the local position of the clicked point
        const x = positionAttr.getX( pointIndex );
        const y = positionAttr.getY( pointIndex );
        const z = positionAttr.getZ( pointIndex );

        // 2. Create a small Cube (Box) to represent the highlight
        // Adjust the size (0.05) based on your tileset scale
        const boxSize = 0.05; 
        const highlightGeo = new THREE.BoxGeometry( boxSize, boxSize, boxSize );

        const highlightMat = new THREE.MeshBasicMaterial({
          color: 0xf08080,
          transparent: true,
          opacity: 0.8,
          depthTest: false // Makes it visible even if partially buried in other points
        });

        featureHighlightMesh = new THREE.Mesh( highlightGeo, highlightMat );
        featureHighlightMesh.isHighlight = true;

        // 3. Position the cube at the point's coordinates
        featureHighlightMesh.position.set( x, y, z );

        // 4. Add a white wireframe outline for better visibility
        const wireframeGeo = new THREE.EdgesGeometry( highlightGeo );

        const wireframe = new THREE.LineSegments(
          wireframeGeo,
          new THREE.LineBasicMaterial( { color: 0xffffff } )
        );

        featureHighlightMesh.add( wireframe );
        featureHighlightMesh.updateWorldMatrix( true, true );

        // 5. Attach it to the picked object so it moves with the tileset
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      async function highlightPoints( highlight_id, attrName ) {
        if (!pickedObject || !attrName) return;

        const geometry = pickedObject.geometry;
        const featureAttr = geometry.getAttribute( attrName );
        const positionAttr = geometry.getAttribute( 'position' );

        if (!featureAttr || !positionAttr) return;

        // 1. Filter vertices for the specific feature
        const pointIndices = [];

        for ( let i = 0; i < featureAttr.count; i++ ) {
          if (featureAttr.getX( i ) === highlight_id) {
            pointIndices.push(i);
          }
        }

        if (pointIndices.length === 0) return;

        // 2. Construct Point Geometry
        // We reuse the buffer attributes but use a specific index for the points
        const pointGeo = new THREE.BufferGeometry();
        pointGeo.setAttribute( 'position', positionAttr );
        pointGeo.setIndex( pointIndices );

        // 3. Construct Point Material
        const pointMat = new THREE.PointsMaterial();
        pointMat.color.setHex( 0xf08080 );
        pointMat.size = 0.15;               // Adjust based on model scale
        pointMat.sizeAttenuation = true;   // Dots get smaller with zoom out
        pointMat.transparent = true;
        pointMat.opacity = 0.4;
        pointMat.depthTest = false;        // See points through the mesh!

        // 4. Create the Points object
        featureHighlightMesh = new THREE.Points( pointGeo, pointMat );
        featureHighlightMesh.renderOrder = 1000;
        featureHighlightMesh.isHighlight = true;

        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      function highlightLine( lineIndex ) {
        const geometry = pickedObject.geometry;
        const positionAttr = geometry.getAttribute( 'position' );
        const indexAttr = geometry.index;

        if (!positionAttr || lineIndex === undefined) return;

        const activePositions = [];

        // 1. Identify the segment vertices
        // If the geometry is indexed (common in 3D Tiles), we use the index buffer
        if (indexAttr) {
          // For LineSegments, a segment is [ i, i + 1 ]
          // We find the start of the segment based on the click index
          const startIdx = Math.floor( lineIndex / 2.0 ) * 2;
          const idxA = indexAttr.getX( startIdx );
          const idxB = indexAttr.getX( startIdx + 1 );

          const vA = new THREE.Vector3().fromBufferAttribute( positionAttr, idxA );
          const vB = new THREE.Vector3().fromBufferAttribute( positionAttr, idxB );

          activePositions.push( vA.x, vA.y, vA.z, vB.x, vB.y, vB.z );
        } else {
          // Non-indexed: the click index is the vertex itself
          const startIdx = Math.floor( lineIndex / 2.0 ) * 2;

          activePositions.push(
            positionAttr.getX( startIdx ), positionAttr.getY( startIdx ), positionAttr.getZ( startIdx ),
            positionAttr.getX( startIdx + 1 ), positionAttr.getY( startIdx + 1 ), positionAttr.getZ( startIdx + 1 )
          );
        }

        // 2. Create the highlight geometry
        const highlightGeo = new THREE.BufferGeometry();
        highlightGeo.setAttribute( 'position', new THREE.Float32BufferAttribute( activePositions, 3 ) );

        // 3. Create a thick, glowing Line material
        // Note: Standard LineBasicMaterial doesn't support 'linewidth' > 1 in many browsers (WebGL limitation)
        // But we'll use a bright color and depthTest: false to make it pop.
        const highlightMat = new THREE.LineBasicMaterial({
          color: 0xf08080,
          linewidth: 5, // Works on some systems, ignored on others
          transparent: true,
          opacity: 1.0,
          depthTest: false 
        });

        featureHighlightMesh = new THREE.LineSegments( highlightGeo, highlightMat );
        featureHighlightMesh.updateWorldMatrix( true, true );
        featureHighlightMesh.isHighlight = true;

        // 4. Attach to the parent
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      function popup_card_cleanup() {
        const card = document.getElementById('metadata-card');

        if (card) {
          card.scrollTop = 0;
          card.scrollLeft = 0;
          card.innerHTML = '';
          card.style.display = 'none';
        }

        // Clean up previous highlight
        if (featureHighlightMesh) {
          // Detach it from the old parent
          if (featureHighlightMesh.parent) {
            featureHighlightMesh.parent.remove( featureHighlightMesh );
          }

          if (pickedObject?.isInstancedMesh) {
            featureHighlightMesh.visible = false;
          } else {
            // Clean up the children (the wireframe)
            featureHighlightMesh.traverse( ( child ) => {
              if (child.geometry) child.geometry.dispose();
              if (child.material) child.material.dispose();
            });

            if (featureHighlightMesh.geometry) featureHighlightMesh.geometry.dispose();
            if (featureHighlightMesh.material) featureHighlightMesh.material.dispose();
            featureHighlightMesh = null;
          }
        }

        // --- RESTORE PREVIOUS SELECTION ---
        if (selectedObject) {
          if (selectedObject.material?.emissive !== undefined) {
            const oldColor = selectedObject.userData.originalEmissive || new THREE.Color( 0x000000 );
            selectedObject.material.emissive.copy( oldColor );
          }

          selectedObject.material.dispose();
          delete selectedObject.userData.originalEmissive;
          delete selectedObject.userData.hasUniqueMaterial;
        }

        if (pickedObject?.userData?.structuralMetadata)
          delete pickedObject.userData.structuralMetadata;

        if (pickedObject?.userData?.textures)
          delete pickedObject.userData.textures;

        selectedObject = null;
        pickedObject = null;
        mouse_wheel = true;
        return;
      }

      function handle_raycast_click( event ) {
        popup_card_cleanup();

        if (event.target.closest( '#fixed_menu' )) {
          return;
        }

        // Calculate how far the mouse moved
        const deltaX = Math.abs( event.clientX - mouseDownPos.x );
        const deltaY = Math.abs( event.clientY - mouseDownPos.y );

        // If moved more than 5 pixels, it was likely a camera drag, not a click
        if (deltaX > 5 || deltaY > 5) return;

        if (!raycaster) {
          raycaster = new THREE.Raycaster();
          raycaster.params.Points.threshold = 0.05;

            if (processedVal.isVector2) return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )})`;
            if (processedVal.isColor) return `RGB(${processedVal.r.toFixed( 2 )}, ${processedVal.g.toFixed( 2 )}, ${processedVal.b.toFixed( 2 )})`;

            // Matrix4 / Matrix3 elements
            if (processedVal.elements && Array.isArray( processedVal.elements )) {
              return formatArray( processedVal.elements );
            }
          }

          const propDef = schema?.classes?.[ className ]?.properties?.[ propName ];

          // Pre-check: If it's a string that looks like an array but isn't parsed
          // This handles the "[One, Two]" or "[true, false]" strings
          if (typeof processedVal === 'string' &&
            ((processedVal.startsWith( '{' ) && processedVal.endsWith( '}' )) ||
             (processedVal.startsWith( '[' ) && processedVal.endsWith( ']' )))) {

            try {
              // Try JSON parse first (handles ["One", "Two"])
              processedVal = JSON.parse( processedVal );
            } catch ( e ) {
              // Manual fallback for unquoted strings like [One, Two]
              processedVal = processedVal.slice( 1, -1 ).split( ',' ).map( s => s.trim() );
            }
          }

          if (processedVal === null || processedVal === undefined) return 'N/A';

          // Handle Arrays (The core of EXT_structural_metadata)
          if (Array.isArray( processedVal )) {
            if (processedVal.length === 0) return '[]';

            // Handle ENUM Arrays
            if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
              const enumValues = schema.enums[ propDef.enumType ].values;
              return `[ ${processedVal.map( v => {
                // Look up by integer value (0, 1, 2) or by string name
                const entry = enumValues.find( e => e.value == v || e.name === v );
                return entry ? entry.name : v;
              }).join(', ')} ]`;
            }

            // General Array (Booleans, Strings, etc.)
            return formatArray( processedVal );
          } else {
            if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
              const entry = schema.enums[ propDef.enumType ].values.find( v => v.value == processedVal || v.name === processedVal );
              return entry ? entry.name : processedVal;
            }

            if (propDef?.type === 'BOOLEAN') {
              const isTrue = (processedVal === true || processedVal === 'true' || processedVal === 1);
              return isTrue ? 'Yes' : 'No';
            }
          }

          // Final Formatting based on Type
          if (typeof processedVal === 'object' && processedVal !== null) {
            // 1. CATCH NESTED MATRICES/ELEMENTS OBJECTS
            // This removes the "elements" label from the UI
            if (processedVal.elements && ( Array.isArray( processedVal.elements ) || ArrayBuffer.isView( processedVal.elements ) )) {
              return formatArray( processedVal.elements );
            }

            // 2. CATCH NESTED VECTORS (x, y, z)
            if (processedVal.x !== undefined && processedVal.y !== undefined) {
              const zStr = processedVal.z !== undefined ? `, ${processedVal.z.toFixed( 2 )}` : '';
              return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )}${zStr})`;
            }

            // 3. FALLBACK: Generic Nested Object loop
            let subHtml = '<div style="margin-left: 10px; font-size: 0.9em; color: #ccc;">';

            for ( const [ k, v ] of Object.entries( processedVal ) ) {
              subHtml += `<div><span style="color: #888;">${k}:</span> ${resolveValue( null, k, v, depth + 1 )}</div>`;
            }

            return subHtml + '</div>';
          }

          if (typeof processedVal === 'number') return Number.isInteger( processedVal ) ? processedVal : processedVal.toFixed( 2 );
          if (typeof processedVal === 'bigint') return processedVal.toString();
          if (typeof processedVal === 'boolean') return processedVal ? 'Yes' : 'No';

          return processedVal;
        }

        // --- HTML Assembly ---
        let html = '';
        let show_copy_to_clipboard = true;
        const tileset = tilesetMetadataOnly ? tileset_obj.userData?.tileset : data?.tileset;

        // 1. Tileset Section
        if (tileset?.class) {
          html += `<div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                     <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">TILESET: ${tileset.class}</div>
                   </div>`;

          if (tileset.properties) {
            for ( const [ key, val ] of Object.entries( tileset.properties ) ) {
              html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${resolveValue( tileset.class, key, val )}</span></div>`;
            }
          }
        } else if (tilesetMetadataOnly) {
          show_copy_to_clipboard = false;
          const description = (type === 'Box3Helper') ? 'No Data (turn off bounding box)' : 'No Data';
          html += `<div style="color: #fff; font-size: 11px;">${description}</div>`;
        }

        // 2. Feature / Tile / Group / Content Sections
        if (data && !tilesetMetadataOnly) {
          if (tileset) html += '<br>';

          // Tile Class
          if (data.tile?.class) {
            html += `<div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                       <div style="font-size: 10px; color: #00d4ff;">TILE: ${data.tile.class}</div>
                     </div>`;

            for ( const [ k, v ] of Object.entries( data.tile.properties || {} ) ) {
              html += `<div class="prop-row"><span class="prop-label">${k}:</span><span class="prop-value">${resolveValue( data.tile.class, k, v )}</span></div>`;
            }

            html += '<br>';
          }

          if (meshName) {
            html += `<div style="font-size: 12px; font-weight: bold; color: #fff;">Selected: ${meshName}</div><br>`;
          }

          // Group Metadata - Maybe entries like color, priority...

          if (data.group?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.group.class}</div>
              </div>`;

            if (data.group.properties) {
              for ( const [ key, val ] of Object.entries( data.group.properties ) ) {
                const display = resolveValue( data.group.class, key, val );

              }

          // Content Metadata - Maybe entries like vertices, materials...

          if (data.content?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 8px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.content.class}</div>
              </div>`;

            if (data.content.properties) {
              for ( const [ key, val ] of Object.entries( data.content.properties ) ) {
                const display = resolveValue( data.content.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }
          }

          // Feature Metadata (Structural Metadata)
          if (data.featureMetadata) {
            const fms = Array.isArray( data.featureMetadata ) ? data.featureMetadata : [ data.featureMetadata ];

            fms.forEach( fm => {
              html += `<div style="border-bottom: 1px solid #00d4ff; margin-top: 10px; padding-bottom: 4px;">
                         <div style="font-size: 10px; color: #00d4ff; font-weight: bold;">${fm.class}</div>
                       </div>`;

              for ( const [ k, v ] of Object.entries( fm.properties || {} ) ) {
                html += `<div class="prop-row"><span class="prop-label">${k}:</span><span class="prop-value">${resolveValue( fm.class, k, v )}</span></div>`;
              }

              html += '<br>';
            });
          }
        }

        // 3. Clipboard Button
        if (show_copy_to_clipboard) {
          html += `
            <div style="padding-top: 8px; border-top: 1px solid #444; text-align: center;">
              <button id="copy-btn" style="background: #111; color: #00d4ff; border: 1px solid #00d4ff; border-radius: 4px; padding: 5px; cursor: pointer; font-size: 11px; width: 100%;">
                📋 Copy Metadata (JSON)
              </button>
            </div>`;

          card.innerHTML = html;

          // --- Post-Render Logic: Clipboard & Positioning ---
          const btn = document.getElementById('copy-btn');

          // Create a "Deep Clean" copy for the clipboard
          const dataForClipboard = data
            ? { ...data }
            : tileset_obj.userData?.tileset
              ? { ...tileset_obj.userData.tileset }
              : {};

          btn.onclick = () => {
            // 1. Deep copy and BigInt handling
            const cleanData = JSON.parse( JSON.stringify( dataForClipboard, ( k, v ) => 
              typeof v === 'bigint' ? v.toString() : v
            ));

            // 2. Promotion: Convert stringified JSON into actual objects
            const deepUnescape = ( obj ) => {

              for ( const key in obj ) {
                if (typeof obj[ key ] === 'string' && ( obj[ key ].startsWith( '{' ) || obj[ key ].startsWith( '[' ) )) {
                  try {
                    obj[ key ] = JSON.parse( obj[ key ] );
                    deepUnescape( obj[ key ] );
                  } catch ( e ) {}
                } else if (obj[ key ] && typeof obj[ key ] === 'object') {
                  deepUnescape( obj[ key ] );
                }
              }
            };

            deepUnescape( cleanData );

            // 3. Metadata cleanup
            if (meshName && meshName !== 'metadata_proxy_mesh') cleanData[ 'Selected' ] = meshName;
            delete cleanData.schema;

            // 4. Formatting: Pretty-print with "airy" compact arrays
            let text = JSON.stringify( cleanData, null, 2 );
            text = text.replace(/\[\s+([\d\.\-\"\'\w\s,]+)\s+\]/g, ( match, content ) => {
              return `[ ${content.replace(/\s+/g, ' ')} ]`;
            });

            navigator.clipboard.writeText( text ).then( () => alert( '✅ Copied Airy JSON!' ) );
          };
        } else {
          card.innerHTML = html;
        }

        // Display and Measurement
        card.style.visibility = 'hidden';
        card.style.display = 'block';

        const rect = card.getBoundingClientRect();
        const vw = window.innerWidth, vh = window.innerHeight;
        let x = event.clientX + 15, y = event.clientY + 15;

        if (x + rect.width > vw) x = event.clientX - rect.width - 15;
        if (y + rect.height > vh) y = vh - rect.height - 15;

        card.style.left = Math.max( 5, x ) + 'px';
        card.style.top = Math.max( 5, y ) + 'px';
        card.style.visibility = 'visible';
      }

      /*
        glTF-Transform ALL_EXTENSIONS Entries:

        [ 0 ]   EXTMeshGPUInstancing
        [ 1 ]   EXTMeshoptCompression
        [ 2 ]   EXTTextureAVIF
        [ 3 ]   EXTTextureWebP
        [ 4 ]   KHRDracoMeshCompression
        [ 5 ]   KHRLightsPunctual
        [ 6 ]   KHRMaterialsAnisotropy
        [ 7 ]   KHRMaterialsClearcoat
        [ 8 ]   KHRMaterialsDiffuseTransmission
        [ 9 ]   KHRMaterialsDispersion
        [ 10 ]  KHRMaterialsEmissiveStrength
        [ 11 ]	KHRMaterialsIOR
        [ 12 ]	KHRMaterialsIridescence
        [ 13 ]	KHRMaterialsPBRSpecularGlossiness
        [ 14 ]	KHRMaterialsSpecular
        [ 15 ]	KHRMaterialsSheen
        [ 16 ]	KHRMaterialsTransmission
        [ 17 ]	KHRMaterialsUnlit
        [ 18 ]	KHRMaterialsVariants

        [ 20 ]	KHRMeshQuantization

      /* Simplify */

      async function simplify( arrayBuffer, webp = false ) {
        const { WebIO } = await import( "@gltf-transform/core" );
        const { ALL_EXTENSIONS } = await import( "@gltf-transform/extensions" );
        const { MeshoptSimplifier } = await import( "meshoptimizer_simplifier" );
        const { dedup, flatten, instance, join, prune, resample, simplify, sparse, weld } = await import( "@gltf-transform/functions" );

        const io = new WebIO().registerExtensions( ALL_EXTENSIONS );

        const doc = await io.readBinary( arrayBuffer ); // read GLB from ArrayBuffer

        if (object_is_points === true) {
          await doc.transform(
            dedup(),
            flatten(),
            join(),
            resample(),
            prune(),
            sparse( { ratio: 0.2 } )
          );
        } else {
          await doc.transform(
            dedup( { textures: true } ),
            instance( { min: 5 } ),
            flatten(),
            join(),
            weld(),
            simplify( { simplifier: MeshoptSimplifier, ratio: 0.0, error: 0.0001, lockBorder: true } ),
            resample(),
            prune(),
            sparse( { ratio: 0.2 } )
          );
        }

        const textures = doc.getRoot().listTextures();

        if (textures.length > 0 && (webp === true || tex_flip === true)) {
          const { compressTexture } = await import( "@gltf-transform/functions" );

          for (const texture of textures) {
            let mime_type = await texture.getMimeType();
            let blob = new Blob( [ texture.getImage() ], { type: mime_type } );

            let img = await transform_texture( blob, mime_type );
            texture.setImage( img );
            texture.setMimeType( mime_type );

            if (webp === true) {
              await compressTexture( texture, { targetFormat: 'webp' } );
              const EXTTextureWebP = ALL_EXTENSIONS.find( ( Extension ) => Extension.EXTENSION_NAME === 'EXT_texture_webp' );
              doc.createExtension( EXTTextureWebP ).setRequired( true );
            }
          }
        }

        const compressedArrayBuffer = await io.writeBinary( doc );

        for (const texture of doc.getRoot().listTextures()) { texture.dispose(); }
        for (const material of doc.getRoot().listMaterials()) { material.dispose(); }
        for (const mesh of doc.getRoot().listMeshes()) { mesh.dispose(); }

        return compressedArrayBuffer;
      }

      /* Encode with draco compression - geometry */

      async function draco_compress( arrayBuffer, webp = false ) {
        const { WebIO } = await import( "@gltf-transform/core" );
        const { ALL_EXTENSIONS } = await import( "@gltf-transform/extensions" );
        const { MeshoptSimplifier } = await import( "meshoptimizer_simplifier" );
        const { dedup, flatten, instance, join, prune, resample, simplify, sparse, unpartition, weld } = await import( "@gltf-transform/functions" );

        const io = new WebIO().registerExtensions( ALL_EXTENSIONS );

        io.registerDependencies({
          'draco3d.encoder': DracoEncoderModule(),
        });

        const doc = await io.readBinary( arrayBuffer ); // read GLB from ArrayBuffer

        if (object_is_points === true) {
          await doc.transform(
            unpartition(),
            dedup(),
            flatten(),
            join(),
            resample(),
            prune(),
            sparse( { ratio: 0.2 } )
          );
        } else {
          await doc.transform(
            unpartition(),
            dedup( { textures: true } ),
            instance( { min: 5 } ),
            flatten(),
            join(),
            weld(),
            simplify( { simplifier: MeshoptSimplifier, ratio: 0.0, error: 0.0001, lockBorder: true } ),
            resample(),
            prune(),
            sparse( { ratio: 0.2 } )
          );
        }

        const textures = doc.getRoot().listTextures();

        if (textures.length > 0 && (webp === true || tex_flip === true)) {
          const { compressTexture } = await import( "@gltf-transform/functions" );

          for (const texture of textures) {
            let mime_type = await texture.getMimeType();
            let blob = new Blob( [ texture.getImage() ], { type: mime_type } );

            let img = await transform_texture( blob, mime_type );
            texture.setImage( img );
            texture.setMimeType( mime_type );

            if (webp === true) {
              await compressTexture( texture, { targetFormat: 'webp' } );
              const EXTTextureWebP = ALL_EXTENSIONS.find( ( Extension ) => Extension.EXTENSION_NAME === 'EXT_texture_webp' );
              doc.createExtension( EXTTextureWebP ).setRequired( true );
            }
          }
        }

        const KHRDracoMeshCompression = ALL_EXTENSIONS.find( ( Extension ) => Extension.EXTENSION_NAME === 'KHR_draco_mesh_compression' );

        doc.createExtension( KHRDracoMeshCompression )
        .setRequired( true )
        .setEncoderOptions({
          method: KHRDracoMeshCompression.EncoderMethod.EDGEBREAKER,
          encodeSpeed: 5,
        });

        const compressedArrayBuffer = io.writeBinary( doc );

        for (const texture of doc.getRoot().listTextures()) { texture.dispose(); }
        for (const material of doc.getRoot().listMaterials()) { material.dispose(); }
        for (const mesh of doc.getRoot().listMeshes()) { mesh.dispose(); }

        return compressedArrayBuffer;
      }

      /* Encode with meshopt compression - geometry, morphs, animations */

      async function meshopt_compress( arrayBuffer, webp = false ) {
        const { WebIO } = await import( "@gltf-transform/core" );
        const { ALL_EXTENSIONS } = await import( "@gltf-transform/extensions" );
        const { MeshoptEncoder } = await import( "meshoptimizer_encoder" );
        const { MeshoptSimplifier } = await import( "meshoptimizer_simplifier" );
        const { dedup, flatten, instance, join, meshopt, prune, resample, simplify, sparse, unpartition, weld } = await import( "@gltf-transform/functions" );

        await MeshoptEncoder.ready;

        const io = new WebIO().registerExtensions( ALL_EXTENSIONS );

        io.registerDependencies({
          'meshopt.encoder': MeshoptEncoder,
        });

        const doc = await io.readBinary( arrayBuffer ); // read GLB from ArrayBuffer

        if (object_is_points === true) {
          await doc.transform(
            unpartition(),
            dedup(),
            flatten(),
            join(),
            resample(),
            prune(),
            sparse( { ratio: 0.2 } ),
            meshopt( { encoder: MeshoptEncoder, level: 'high' } )
          );
        } else {
          await doc.transform(
            unpartition(),
            dedup( { textures: true } ),
            instance( { min: 5 } ),
            flatten(),
            join(),
            weld(),
            simplify( { simplifier: MeshoptSimplifier, ratio: 0.0, error: 0.0001, lockBorder: true } ),
            resample(),
            prune(),
            sparse( { ratio: 0.2 } ),
            meshopt( { encoder: MeshoptEncoder, level: 'high' } )
          );
        }

        const textures = doc.getRoot().listTextures();

        if (textures.length > 0 && (webp === true || tex_flip === true)) {
          for (const texture of textures) {
            let mime_type = await texture.getMimeType();
            let blob = new Blob( [ texture.getImage() ], { type: mime_type } );

            let img = await transform_texture( blob, mime_type );
            texture.setImage( img );
            texture.setMimeType( mime_type );

            if (webp === true) {
              const { compressTexture } = await import( "@gltf-transform/functions" );

              await compressTexture( texture, { targetFormat: 'webp' } );

              const EXTTextureWebP = ALL_EXTENSIONS.find( ( Extension ) => Extension.EXTENSION_NAME === 'EXT_texture_webp' );
              doc.createExtension( EXTTextureWebP ).setRequired( true );
            }
          }
        }

        const EXTMeshoptCompression = ALL_EXTENSIONS.find( ( Extension ) => Extension.EXTENSION_NAME === 'EXT_meshopt_compression' );

        doc.createExtension( EXTMeshoptCompression )
        .setRequired( true )
        .setEncoderOptions({
          method: EXTMeshoptCompression.EncoderMethod.QUANTIZE,  // or EncoderMethod.FILTER
        });

        const compressedArrayBuffer = await io.writeBinary( doc );

        for (const texture of doc.getRoot().listTextures()) { texture.dispose(); }
        for (const material of doc.getRoot().listMaterials()) { material.dispose(); }
        for (const mesh of doc.getRoot().listMeshes()) { mesh.dispose(); }

        return compressedArrayBuffer;
      }

      async function transform_texture( blob, mimeType = 'image/png' ) {
        let buff, img = new Image();

        await new Promise( resolve => {
          img.onload = function() {
            let canvas = document.createElement('canvas');

            let scale = 2048 / Math.max( img.naturalWidth, img.naturalHeight );

            canvas.width = img.naturalWidth * Math.min( 1, scale );
            canvas.height = img.naturalHeight * Math.min( 1, scale );

            let ctx = canvas.getContext( '2d', { willReadFrequently: true } );

            // Flip image vertically
            if (tex_flip === true) {
              ctx.translate( 0, canvas.height );
              ctx.scale( 1, -1 );
            }

            ctx.drawImage( img, 0, 0, canvas.width, canvas.height );

            canvas.toBlob( blob => {
              let reader = new FileReader();
 
              reader.onloadend = function() {
                buff = new Uint8Array( reader.result );
                resolve( buff );
              };

              reader.readAsArrayBuffer( blob );
            }, mimeType, 1 );
          }

          img.src = URL.createObjectURL( blob );
          URL.revokeObjectURL( blob );
        });

        return buff;
      }

            wireframe_enabled = true;

      	    if (child.isMesh) {
              const mtl = Array.isArray( child.material ) ? child.material : [ child.material ];

              mtl.forEach( m => {
                m.wireframe = wireframe_enabled;
                m.needsUpdate = true;

        if (flat_shading_enabled) {

          flat_shading_enabled = false;
        } else {
          document.getElementById('btn_flat').style.backgroundColor = 'lightgreen';
          flat_shading_enabled = true;
        }

        // Go through all children of the loaded object and search for a Mesh
        gltf_obj.traverse( function( child ) {
          if (child.isMesh) {
            const mtl = Array.isArray( child.material ) ? child.material : [ child.material ];

            mtl.forEach( m => {
              m.flatShading = flat_shading_enabled;
              m.needsUpdate = true;

          }

      async function render( timestamp ) {
        if (gltf_obj) {
          if (animation_running || mouse_down || mouse_wheel) {
            if (animation_running) {
              clock.update( timestamp );
              animation_mixer.update( clock.getDelta() );
            }

            controls.update();

            renderer.clear();
            renderer.render( scene, default_camera );

            if (mouse_wheel) {
              if (count > 5) {
                mouse_wheel = false;
                count = 0;
              } else {
                count ++;
              }
            }
          }
        }

        if (render_requested) requestAnimationFrame( render );

            while (scene.children.length > 0) {
              scene.remove( scene.children[ 0 ] );
            }

            renderer.clear();
            renderer.dispose();
          }

          mouse_wheel = true;

          document.getElementById('btn_url').style.backgroundColor = 'transparent';
          document.getElementById('file_input').value = '';
          document.getElementById('div_error').style.display = 'none';
          document.getElementById('btn_animate').disabled = true;
          document.getElementById('btn_extras').disabled = true;
          document.getElementById('btn_variants').disabled = true;
          document.getElementById('btn_cameras').disabled = true;
          document.getElementById('url_entry').value = '';
          selected_url_file = '';
          enable_disable( true );
        }

        mouse_wheel = true;
      }

      async function scene_cleanup() {
        mouse_wheel = true;

        hideUiPanel();

        if (featureHighlightMesh) {
          if (featureHighlightMesh.parent) {
            featureHighlightMesh.parent.remove( featureHighlightMesh );
          }

          featureHighlightMesh.traverse( ( child ) => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
          });

          featureHighlightMesh = null;
        }

        scene.remove( gltf_obj );

        renderer.clear();

        if (animation_mixer) {
          animation_mixer.stopAllAction();

          for ( let i = 0; i < animations.length; i++ ) {
            animation_mixer.uncacheAction( animations[ i ] );
            animation_mixer.uncacheClip( animations[ i ] );
          }

          animation_mixer.uncacheRoot( animation_mixer.getRoot() );
        }

        if (wireframe_enabled) await show_wireframe();
        if (flat_shading_enabled) await set_flat();

        if (gltf_obj.skeleton && gltf_obj.skeleton.boneTexture)
          gltf_obj.skeleton.boneTexture.dispose();

        gltf_obj.traverse( function( child ) {
          if (child.isMesh || child.isPoints || ( child.isLine && child.geometry.type !== 'EdgesGeometry' )) {
            if (child.skeleton && child.skeleton.boneTexture)
                child.skeleton.boneTexture.dispose();

            if (child.material) {
              const mtl = Array.isArray( child.material ) ? child.material : [ child.material ];

              mtl.forEach( m => {
                if (m.uniforms) {
                  Object.keys( m.uniforms ).forEach( ( key ) => {
                    if (m.uniforms[ key ].value) {
                      let kv = m.uniforms[ key ].value;

                      if (Array.isArray( kv ) && kv.length > 0) {
                        kv.forEach( val => {
                          if (val.type && val.type === 1009)
                            val.dispose();
                        });
                      } else {
                        if (kv.type && kv.type === 1009)
                          kv.dispose();
                      }
                    }
                  });
                } else {
                  for (const prop in m) {
                    texture_maps.forEach( tex_map => {
                      if (prop === tex_map) {
                        if (m[ prop ]) m[ prop ].dispose();
                      }
                    });
                  };
                }

                m.dispose();
                m = null;
              });
            }

            if (child.geometry) {
              child.geometry.dispose();
              child.geometry = null;
            }
          }
        });

        if (draco_material) {
          if (draco_material.map) draco_material.map.dispose();
          draco_material.dispose();
          draco_material = null;
        }

        THREE.Cache.clear();

        if (isMobile === false) {
          renderer.info.reset();
          renderer.resetState();
        }
      }

      function enable_disable( disable = false ) {
        document.getElementById('directional_light_intensity').disabled = disable;
        document.getElementById('ambient_light_intensity').disabled = disable;
        document.getElementById('export_names').disabled = disable;
        document.getElementById('btn_wireframe').disabled = disable;
        document.getElementById('btn_flat').disabled = disable;
        document.getElementById('btn_quick_x').disabled = disable;
        document.getElementById('btn_dc_dli').disabled = disable;
        document.getElementById('btn_dc_ali').disabled = disable;
        document.getElementById('btn_y_flip').disabled = disable;
        document.getElementById('back_color').disabled = disable;
        disabled_changed();

        mouse_wheel = true;
      }
    </script>

    <script>
      function document_ready() {
        isMobile = (/iPad|iPhone|iPod/.test( navigator.platform )) ||
          (/Android|webOS|iPhone|iPad|iPod|CriOS|BlackBerry|IEMobile|Opera Mini/i.test( navigator.userAgent )) ||
          (navigator.maxTouchPoints !== undefined && navigator.maxTouchPoints > 2 && /MacIntel/.test( navigator.platform ));

        texture_maps = [
          'map', 'aoMap', 'alphaMap', 'bumpMap', 'displacementMap', 'envMap', 'lightMap', 'emissiveMap', 'normalMap',
          'metalnessMap', 'roughnessMap', 'anisotropyMap', 'clearcoatMap', 'clearcoatNormalMap', 'clearcoatRoughnessMap',
          'iridescenceMap', 'iridescenceThicknessMap', 'sheenColorMap', 'sheenRoughnessMap', 'specularMap',
          'specularColorMap', 'specularIntensityMap', 'thicknessMap', 'transmissionMap'
        ];

        $('#export_names').keypress( function( event ) { if (event.key === 'Enter') $(this).children(':selected').click(); });
        $('#url_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_load').click(); });

        if (navigator.userAgent.indexOf('Chrome') > -1 || navigator.userAgent.indexOf('Safari') > -1 || isMobile === true) {
          $('#export_names').change( function() { $(this).children(':selected').click(); });
        }

        document.getElementById('export_names').selectedIndex = 0;
      }

      function disabled_changed() {
        $('button').each( function() {
          if (this.disabled === false ) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });

        $('select').each( function() {
          if (this.disabled === false) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });

        $('input[type=color]').each( function() {
          if (this.disabled === false ) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px whitesmoke'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });
      }
    </script>
  </body>
