    <script>
      // Resource Loading Failures (404 or similar)
      window.addEventListener( 'error', function ( event ) {
        // We check if the target has a 'src' or 'href' to identify it as a resource
        if (event.target.src || event.target.href) {
          console.error( 'RESOURCE ERROR: ', {
            element: event.target.tagName,
            url: event.target.src || event.target.href,
            html: event.target.outerHTML
          });

          // If the failed resource is jQuery, show the alert immediately
          if ((event.target.src || '').includes('jquery')) {
            alert('jQuery failed to load. Limited functionality. Check your internet connection!');
          }

          if (init_running === true) {
            handle_error( 'RESOURCE ERROR' );
          } else {
            document.getElementById('div_loading').innerHTML = '!!! Resource Error !!!';
          }
        }
      }, true); // The 'true' here is vital; it enables the "capturing" phase

      // Standard JavaScript Runtime Errors
      window.onerror = function ( message, source, lineno, colno, error ) {
        console.log( 'RUNTIME ERROR CAUGHT' );

        console.log({
          message: message, // Error message
          file: source,     // The script file where it happened
          line: lineno,     // Line number
          column: colno,    // Column number
          errorObj: error   // The actual Error object (includes stack trace)
        });

        // Returning 'true' prevents the error from showing up in the browser console
        return false; 
      };

      // Unhandled Promise Rejections (Async Errors)
      window.addEventListener( 'unhandledrejection', function ( event ) {
        console.warn( 'UNHANDLED PROMISE: ', event.reason );

        // event.promise is the promise that failed
        // event.reason is usually the error object or message

        if (init_running === true) handle_error( 'UNHANDLED PROMISE' );
      });
    </script>

    <script type="module">
      import * as threejs from 'three';
      import * as webIFC from 'web-ifc';
      import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

      web_ifc = webIFC;

      ifcCategories = Object.fromEntries( Object.entries( webIFC )
      .filter( ( [ key, value ] ) => key.startsWith( 'IFC' ) && typeof value === 'number' && Number.isFinite( value ) ) );

      IFC_CLASSES = new Set( Object.keys( ifcCategories ) );

      THREE = threejs;

      manager = new THREE.LoadingManager();
      manager.onLoad = function() { mouse_wheel = true; }

      gui_container = document.getElementById('right_gui_position');

    <script>
      function switch_to_desktop() {
        let link = document.createElement( 'a' );
        link.style.display = 'none';
        link.href = "../IFC Viewer.html";
        link.click();
      }

      function show_url() {
        if (url_displayed === true) {
          url_displayed = false;
          document.getElementById('url').style.display = 'none';
          document.getElementById('btn_url').style.backgroundColor = 'transparent';
        } else {
          document.getElementById('btn_url').style.backgroundColor = 'lightgreen';
          document.getElementById('url').style.display = 'block';
          url_displayed = true;
        }

        resize();
      }

      function load_url_file() {
        let url = document.getElementById('url_entry').value.trim();
        if (url !== '') { selected_url_file = url; url_loading = true; init(); }
      }

      function clear_url() { document.getElementById('url_entry').value = ''; }

      function initialize_event_listeners() {
        const arrow_keys = [ 'ArrowUp', 'ArrowDown', 'ArrowRight', 'ArrowLeft' ];
        const activeKeys = new Set();

        window.addEventListener( 'pointerdown', (event) => {
          mouse_down = true;
          mouseDownPos.x = event.clientX;
          mouseDownPos.y = event.clientY;
        }, false);
        window.addEventListener( 'pointerup', (event) => { mouse_down = false; mouse_wheel = true; }, false);
        window.addEventListener( 'pointercancel', ( event ) => { mouse_down = false; mouse_wheel = false; }, false);
        window.addEventListener( 'wheel', ( event ) => { mouse_wheel = true; }, false);
        window.addEventListener( 'keydown', ( event ) => {
          if (event.key === 'Escape') hideUiPanel();

          if (arrow_keys.some( k => k === event.key ) || event.ctrlKey || event.metaKey || event.shiftKey) {
            controls.listenToKeyEvents( window );
            activeKeys.add( event.key ); // Track this key
            mouse_wheel = true;
          }
        }, false);
        window.addEventListener( 'keyup', ( event ) => {
          activeKeys.delete( event.key ); // Remove this key

          if ( controls && activeKeys.size === 0 ) {
            controls.stopListenToKeyEvents();
            mouse_wheel = false;
          }
        }, false);
      }

      function gui_reset() {
        params.brightness = 2.0;
        params.roughness = 0.5;
        params.metalness = 0.0;

        gui.reset();

        gui_container.style.display = 'none';
      }

      function set_gui_position() {
        let fixed_menu_bottom = ( parseInt( $('#fixed_menu').outerHeight( true ) ) + 2 ).toString() + 'px';
        gui_container.style.marginTop = fixed_menu_bottom;
      }

      function resize() {
        if (scene !== undefined) {
          mouse_wheel = true;

          ww = window.innerWidth;
          wh = window.innerHeight;

          renderer.setSize( ww, wh );

          camera.aspect = ww / wh;
          camera.updateProjectionMatrix();

          if (gui) set_gui_position();

          mouse_wheel = true;
        }
      }
    </script>

    <script>
      function set_back_color() {
        scene.background = null;
        document.body.style.backgroundColor = document.getElementById('back_color').value;
        mouse_wheel = true;
      }

      function frame_camera() {
        bounding_box.setFromObject( ifc_obj );
        const center = bounding_box.getCenter( new THREE.Vector3() );
        const size = bounding_box.getSize( new THREE.Vector3() );

        camera.position.copy( center.clone().add( new THREE.Vector3( 0, 0, size.length() ) ) );
        camera.lookAt( center );

        // Center root
        ifc_obj.position.sub( center );

        // Frame camera to root
        const maxDim = Math.max( size.x, size.y, size.z );
        const fov = THREE.MathUtils.degToRad( camera.fov );
        const dist = maxDim + maxDim / ( 2 * Math.tan( fov / 2.0 ) );
        camera.position.set( 0, 0, dist );
        camera.lookAt( 0, 0, 0 );
        resize();
      }

      async function init() {
        if (url_loading === false && document.getElementById('file_input').files.length === 0) return;

        if (scene) {
          mouse_wheel = true;

          if (ifc_obj) await scene_cleanup();

          await reset_all( true );
        }

        init_running = true;

        enable_disable( true );

        if (ifc_loader === undefined) {
          const { IFCSPACE } = await import( 'web-ifc' );
          const { IFCLoader } = await import( 'web-ifc-three' );

          ifc_loader = new IFCLoader( manager );
          await ifc_loader.ifcManager.setWasmPath( 'https://cdn.jsdelivr.net/npm/web-ifc@0.0.77/', true );
          await ifc_loader.ifcManager.parser.setupOptionalCategories( { [ IFCSPACE ]: false } );
          await ifc_loader.ifcManager.applyWebIfcConfig( { USE_FAST_BOOLS: true } );

          manager.addHandler(/\.ifc$/i, ifc_loader);
        }

        selected_ifc_file = null;
        spatialStructure = null;
        spatialMap = {};
        ifcFolder = null;
        mouse_down = false;
        mouse_wheel = true;
        halt_on_error = false;
        render_requested = false;
        wireframe_enabled = false;
        refitting = false;
        hasMetadata = false;
        explosionParams = null;
        featureHighlightMesh = null;
        mouseDownPos = { x: 0, y: 0 };
        bounding_box = new THREE.Box3();

        if (!params) params = { brightness: 2.0, roughness: 0.5, metalness: 0.0 };

        console.time( 'Loading Time' );
        document.body.style.backgroundImage = 'none';
        document.getElementById('div_error').style.display = 'none';
        document.getElementById('div_loading').style.display = 'block';
        document.getElementById('div_loading').innerHTML = 'Load & Visualize';

        if (url_loading === false) {
          // Loaded file
          var fi = document.getElementById('file_input');

          if (fi.files[ 0 ].name.toUpperCase().endsWith('.IFC')) { selected_ifc_file = fi.files[ 0 ]; }

          if (selected_ifc_file === null) {
            handle_error( 'No valid IFC file selected!' );
            return;
          }

          selected_url_file = '';
        } else {
          // Reset the file input
          document.getElementById('file_input').value = '';
          url_loading = false;
        }

        if (renderer === undefined) {
          renderer = new THREE.WebGLRenderer( { antialias: true, alpha: true } );
          renderer.setPixelRatio( window.devicePixelRatio < 1.5 ? window.devicePixelRatio : 2.0 );
          renderer.toneMapping = THREE.NeutralToneMapping;
          renderer.toneMappingExposure = 1.5;
          renderer.setSize( ww, wh );
          renderer.sortObjects = false;
          renderer.info.autoReset = false;
          renderer.shadowMap.enabled = true;
          renderer.shadowMap.type = THREE.PCFShadowMap;
          renderer.setClearColor( 0xFFFFFF, 0 ); // Allow setting the background color
          renderer.autoClear = false;
          renderer.setAnimationLoop( null );

          // Consider removing this for a production build
          renderer.debug.onShaderError = ( gl, program, glVertexShader, glFragmentShader ) => {
            const errorLog = gl.getProgramInfoLog( program );
            const vertexSource = gl.getShaderSource( glVertexShader );
            const fragmentSource = gl.getShaderSource( glFragmentShader );

            halt_on_error = true;
          }

          document.body.appendChild( renderer.domElement );
        }

        if (scene === undefined) scene = new THREE.Scene();

        if (!events_initialized) { initialize_event_listeners(); events_initialized = true; }

        if (camera === undefined) {
          camera = new THREE.PerspectiveCamera( 60, ww / wh, 0.5, 1e9 );
          camera.position.set( 0, 0, 250 );
          scene.add( camera );
        }

        if (controls === undefined) {
          const { OrbitControls } = await import( 'three/addons/controls/OrbitControls.min.js' );

          controls = new OrbitControls( camera, renderer.domElement );
          controls.enableZoom = true;
          controls.zoomToCursor = true;
          controls.zoomSpeed = 0.5;
          controls.rotateSpeed = 0.5;
          controls.keyPanSpeed = 0.5; 
          controls.panSpeed = 0.5;
          controls.minDistance = 0;
          controls.maxDistance = Infinity;
          //controls.enableDamping = true;
          //controls.dampingFactor = 0.3;
          //controls.enableKeys = false;
          //controls.maxPolarAngle = 2.2;
          //controls.minPolarAngle = 1.1;
        }

        if (ifc_loader) {
          // Start flashing indicator
          document.getElementById('status_indicator').style.display = 'inline-block';

          // Load the ifc file
          selected_ifc_file !== null ? loadFile() : loadURLFile();
        } else {
          handle_error( 'IFCLoader does not exist!' );
        }
      }

      function createMeshShaderMaterial() {
        const material = new THREE.ShaderMaterial({
          uniforms: {
            uOpacity:        { value: 1.0 },
            uBrightness:     { value: 2.0 },
            uRoughness:      { value: 0.5 },
            uMetalness:      { value: 0.0 },
            uExplosion:      { value: 0.0 },
            uBaseColor:      { value: new THREE.Color( 1, 1, 1 ) }
          },

          vertexShader: /* glsl */`
            uniform float uExplosion;
            attribute vec3 explodeDir;
            varying vec3 vViewPos;
            varying vec3 vNormal;

            void main() {
              vec3 explodedPosition = position + explodeDir * uExplosion;

              // view-space position
              vec4 viewPos = modelViewMatrix * vec4(explodedPosition, 1.0);
              vViewPos = viewPos.xyz;

              // view-space normal
              vNormal = normalize(normalMatrix * normal);

              gl_Position = projectionMatrix * viewPos;
            }
          `,

          fragmentShader: /* glsl */`
            uniform float uOpacity;
            uniform float uBrightness;
            uniform vec3  uBaseColor;
            uniform float uRoughness;
            uniform float uMetalness;

            varying vec3 vViewPos;
            varying vec3 vNormal;

            void main() {
              vec3 N = normalize(vNormal);
              if (!gl_FrontFacing) {
                N = -N;
              }

              // -------- lighting vectors --------
              vec3 V = normalize(-vViewPos);     // view direction
              vec3 L = vec3(0.0, 0.0, 1.0);      // camera light
              vec3 H = normalize(V + L);

              float NdotV = max(dot(N, V), 0.0);
              float NdotL = max(dot(N, L), 0.0); // Use dot(N, L) explicitly now
              float NdotH = max(dot(N, H), 0.0);

              // -------- Fresnel (Schlick) --------
              vec3 F0 = mix(vec3(0.04), uBaseColor, uMetalness);
              vec3 F = F0 + (1.0 - F0) * pow(1.0 - NdotV, 5.0);

              // -------- simple specular --------
              float shininess = exp2(5.0 * (1.0 - uRoughness) + 1.0);
              float spec = pow(NdotH, shininess);
              vec3 specular = F * spec;

              // -------- diffuse --------
              vec3 kd = (1.0 - F) * (1.0 - uMetalness);
              vec3 diffuse = uBaseColor * kd / 3.14159265;

              // -------- hybrid lighting --------
              vec3 Lo = (diffuse + specular) * NdotL;
              float simple = dot(vNormal, V) * 0.5 + uRoughness;
              float hybrid = mix(simple, Lo.r, 0.9);

              vec3 shaded = uBaseColor * hybrid * uBrightness;

              gl_FragColor = vec4(shaded, uOpacity);

              #include <tonemapping_fragment>  // Adds NeutralToneMapping support
              #include <colorspace_fragment>   // Handles sRGB conversion
            }
          `,

          transparent: false,
          depthWrite: true,
          depthTest: true,
          side: THREE.DoubleSide
        });

        return material;
      }

      let present_categories = {};
      let filtered_categories;
      let categoryParams = {};

      async function detect_present_categories() {
        const mgr = ifc_loader.ifcManager;

        for ( const [ key, type ] of Object.entries( ifcCategories ) ) {
          const ids = await mgr.getAllItemsOfType( 0, type, false );

          if (ids && ids.length > 0) {
            present_categories[ key ] = { ids };
          }
        }

        filtered_categories = Object.fromEntries(
          Object.entries( present_categories )
          .filter( ( [ key ] ) => IFC_CLASSES.has( key ) )
        );
      }

      async function setup_filtered_categories() {
        const categories = Object.keys( filtered_categories );
        const mgr = ifc_loader.ifcManager;

        for ( const key of categories ) {
          const ids = filtered_categories[ key ].ids;

          await mgr.createSubset({
            customID: key,
            modelID: 0,
            scene: ifc_obj,
            ids: ids,
            removePrevious: false
          });
        }
      }

      function show_hide_category( key, value ) {
        const subsetKey = `0 - DEFAULT - ${ key }`;
        const subsetRecord = ifc_loader.ifcManager.subsets.subsets[ subsetKey ];

        if (subsetRecord && subsetRecord.mesh) {
          subsetRecord.mesh.visible = value;
        }
      }

      const mat_cache = new Map();

      function getCachedShaderMaterial( color, opacity, transparency ) {
        const key = `${ color.getHexString() }_${ opacity }_${ transparency ? 1 : 0 }`;

        if (!mat_cache.has( key )) {
          const mat = createMeshShaderMaterial();
          mat.uniforms.uBaseColor.value.copy( color );
          mat.uniforms.uOpacity.value = opacity;
          mat.transparent = transparency;

          mat_cache.set( key, mat );
        }

        return mat_cache.get( key );
      }

      function loadFile() {
        ifc_loader.load( URL.createObjectURL( selected_ifc_file ), function( object ) {
          URL.revokeObjectURL( selected_ifc_file );

          if (halt_on_error) return;

          ifc_obj = new THREE.Object3D();
          ex_ifc_obj = object;

          hasMetadata = object.geometry.hasAttribute( 'expressID' );

          // Replace all materials with shader material

          const oldMaterials = object.material;
          const newMaterials = [];

          for ( let i = 0; i < oldMaterials.length; i++ ) {
            const lambert = oldMaterials[ i ];
            const shaderMat = getCachedShaderMaterial( lambert.color, lambert.opacity, lambert.transparent );
            shaderMat.uuid = lambert.uuid;

            lambert.dispose();
            newMaterials.push( shaderMat );
          }

          oldMaterials.length = 0;
          object.material = newMaterials;
          object.geometry.computeBoundingSphere();
          object.geometry.computeBoundingBox();

          finish_loading( object );
        }, function ( xhr ) { // onProgress
        }, function ( error ) { // onError
          handle_error( error );
          URL.revokeObjectURL( selected_ifc_file );
        });
      }

      function loadURLFile() {
        if (selected_url_file !== '') {
          if (selected_url_file.startsWith('https://www.dropbox.com') === true) {
            selected_url_file = selected_url_file.replace('www.dropbox.com', 'dl.dropbox.com');
          } else if (selected_url_file.startsWith('https://github.com') === true) {
            selected_url_file = ( selected_url_file.replace('github.com', 'raw.githubusercontent.com') ).replace('blob/', '');
          }

          // No extension checking for URL so it has to point to IFC model

          ifc_loader.load( selected_url_file, function( object ) {
            if (halt_on_error) return;

            ifc_obj = new THREE.Object3D();
            ex_ifc_obj = object;

            hasMetadata = object.geometry.hasAttribute( 'expressID' );

            // Replace all materials with shader material

            const oldMaterials = object.material;
            const newMaterials = [];

            for ( let i = 0; i < oldMaterials.length; i++ ) {
              const lambert = oldMaterials[ i ];
              const shaderMat = getCachedShaderMaterial( lambert.color, lambert.opacity, lambert.transparent );
              shaderMat.uuid = lambert.uuid;

              lambert.dispose();
              newMaterials.push( shaderMat );
            }

            oldMaterials.length = 0;
            object.material = newMaterials;

            finish_loading();
          }, function ( xhr ) { // onProgress
          }, function ( error ) { // onError
            handle_error( error );
          });
        }
      }

      async function finish_loading() {
        if (halt_on_error) return;

        await detect_present_categories();
        await setup_filtered_categories();

        scene.add( ifc_obj );
        frame_camera();

        render_requested = true;
        mouse_wheel = false;
        first_run = true;
        fr_count = 0;
        render();

        function updateUniform( name, value ) {
          if (ex_ifc_obj && ex_ifc_obj.material) {
            const mats = Array.isArray( ex_ifc_obj.material )
              ? ex_ifc_obj.material
              : [ ex_ifc_obj.material ];

            mats.forEach( m => {
              if (m.uniforms && m.uniforms[ name ]) {
                m.uniforms[ name ].value = value;
              }
            });
          }
        }

        if (gui_set === false) {
          // Add Brightness control
          gui.add( params, 'brightness', 0, 10, 0.01 ).name( 'Brightness' )
          .onChange( ( value ) => {
            updateUniform( 'uBrightness', value );
            mouse_wheel = true;
          });

          // Add Roughness control
          gui.add( params, 'roughness', 0.0, 1.0, 0.01 ).name( 'Roughness' )
          .onChange( ( value ) => {
            updateUniform( 'uRoughness', (value === 1.0 ? 0.99 : value) );
            mouse_wheel = true;
          });

          // Add Metalness control
          gui.add( params, 'metalness', 0.0, 1.0, 0.01 ).name( 'Metalness' )
          .onChange( ( value ) => {
            updateUniform( 'uMetalness', value );
            mouse_wheel = true;
          });

          set_gui_position();

          gui.open();
          gui_set = true;
        }

        const geom = ex_ifc_obj.geometry;
        const posAttr = geom.getAttribute( 'position' );
        const pcount = posAttr.count;

        if (!ifcFolder) {
          // Create a folder for IFC categories

          ifcFolder = gui.addFolder( 'Filtered IFC Categories' );

          // Add read-only raycasting state

          const raycast_obj = { state: hasMetadata ? 'Enabled' : 'Disabled' };

          raycast_label = ifcFolder.add( raycast_obj, 'state' ).name( 'Raycasting' );
          raycast_label.$input.style.color = hasMetadata ? 'lightgreen' : 'red';
          raycast_label.domElement.style.backgroundColor = 'transparent';
          raycast_label.$input.style.backgroundColor = 'transparent';
          raycast_label.$input.disabled = true;

          // Add "Explode All" slider

          if (!geom.boundingBox) {
            geom.computeBoundingBox();
            geom.computeBoundingSphere();
            geom.boundingSphere.radius *= 2; // done once so exploded elements remain visible
          }

          if (!geom.userData.originalPosition) {
            geom.userData.originalPosition = new Float32Array( posAttr.array );
          }

          const modelBox = geom.boundingBox;
          const modelCenter = modelBox.getCenter( new THREE.Vector3() );
          const modelSize = modelBox.getSize( new THREE.Vector3() );
          const maxDim = Math.max( modelSize.x, modelSize.y, modelSize.z );
          const EXPLOSION_DISTANCE = maxDim / 2.0;

          const idAttr = geom.getAttribute( 'expressID' );

          // ------------------------------------------------------------
          // SINGLE PASS: Compute Bounding Boxes for ALL elements at once
          // ------------------------------------------------------------

          const elementBounds = {}; // expressID -> { min: [ x, y, z ], max: [ x, y, z ] }

          for ( let i = 0; i < pcount; i++ ) {
            const id = idAttr.getX( i );
            const x = posAttr.getX( i );
            const y = posAttr.getY( i );
            const z = posAttr.getZ( i );

            if (!elementBounds[ id ]) {
              elementBounds[ id ] = {
                min: [ x, y, z ],
                max: [ x, y, z ]
              };
            } else {
              const b = elementBounds[ id ];
              if (x < b.min[ 0 ]) b.min[ 0 ] = x; else if (x > b.max[ 0 ]) b.max[ 0 ] = x;
              if (y < b.min[ 1 ]) b.min[ 1 ] = y; else if (y > b.max[ 1 ]) b.max[ 1 ] = y;
              if (z < b.min[ 2 ]) b.min[ 2 ] = z; else if (z > b.max[ 2 ]) b.max[ 2 ] = z;
            }
          }

          // ------------------------------------------------------------
          // COMPUTE DIRECTIONS: Turn bounds into normalized vectors
          // ------------------------------------------------------------

          const elementDirs = new Float32Array( pcount * 3 );
          const tempVec = new THREE.Vector3();

          for ( let i = 0; i < pcount; i++ ) {
            const id = idAttr.getX( i );
            const b = elementBounds[ id ];

            const cx = ( b.min[ 0 ] + b.max[ 0 ] ) / 2.0;
            const cy = ( b.min[ 1 ] + b.max[ 1 ] ) / 2.0;
            const cz = ( b.min[ 2 ] + b.max[ 2 ] ) / 2.0;

            tempVec.set( cx, cy, cz ).sub( modelCenter );
            if (tempVec.lengthSq() > 0) tempVec.normalize();

            const i3 = i * 3;

            elementDirs[ i3 ]     = tempVec.x;
            elementDirs[ i3 + 1 ] = tempVec.y;
            elementDirs[ i3 + 2 ] = tempVec.z;
          }

          geom.setAttribute( 'explodeDir', new THREE.BufferAttribute( elementDirs, 3 ) );

          // Set the same attribute on all subset meshes so GPU explosion works

          for ( const key of Object.keys( filtered_categories ) ) {
            const subsetKey = `0 - DEFAULT - ${ key }`;
            const subsetRecord = ifc_loader.ifcManager.subsets.subsets[ subsetKey ];

            if (subsetRecord && subsetRecord.mesh && subsetRecord.mesh?.geometry?.index?.count > 0) {
              subsetRecord.mesh.geometry.setAttribute( 'explodeDir', geom.getAttribute( 'explodeDir' ) );
            }
          }

          function applyExplosionScale( scale ) {
            const array = posAttr.array;
            const offset = scale * EXPLOSION_DISTANCE;
            const originalPos = geom.userData.originalPosition;

            for ( let i = 0; i < posAttr.count; i++ ) {
              const i3 = i * 3;

              // Access the flat Float32Array instead of using .get()
              const dirX = elementDirs[ i3 ];
              const dirY = elementDirs[ i3 + 1 ];
              const dirZ = elementDirs[ i3 + 2 ];

              // Apply the transformation
              array[ i3 ]     = originalPos[ i3 ]     + dirX * offset;
              array[ i3 + 1 ] = originalPos[ i3 + 1 ] + dirY * offset;
              array[ i3 + 2 ] = originalPos[ i3 + 2 ] + dirZ * offset;
            }

            posAttr.needsUpdate = true;

            // Geometry bounds updates remain the same
            geom.computeBoundingSphere();
            geom.computeBoundingBox();
          }

          explosionParams = { scale: 0.0 };
          let lastExplodeValue = 0;

          ifcFolder.add( explosionParams, 'scale', 0, 2.0, 0.01 )
          .name( 'Explode All' )
          .onChange( value => {
            if (pickedObject) popup_card_cleanup();

            const offset = value * EXPLOSION_DISTANCE;
            applyExplosionScale( value );

            if (hasMetadata && raycast_label) {
              raycast_label.object.state = 'Refitting...';
              raycast_label.$input.style.color = 'yellow';
              raycast_label.updateDisplay();
              refitting = true;
            }

            mouse_wheel = true;
          })
          .onFinishChange( async () => {
            if (lastExplodeValue !== explosionParams.scale) {
              lastExplodeValue = explosionParams.scale;

              // Collect all meshes first
              const meshes = [];

              ifc_obj.traverse( child => {
                if (child.isMesh) meshes.push( child );
              });

              if (!isMobile) console.log( `Updating bounds for ${meshes.length} parts...` );

              // Process in chunks to prevent thread-lock
              const chunkSize = 500; // Adjust based on performance

              for ( let i = 0; i < meshes.length; i += chunkSize ) {
                const chunk = meshes.slice( i, i + chunkSize );

                for ( const child of chunk ) {
                  child.geometry.computeBoundingBox();
                  child.geometry.computeBoundingSphere();

                  if (child.geometry.boundsTree) {
                    child.geometry.boundsTree.refit();
                  }

                  // Pause the loop for a split second 
                  // to let the browser breathe.
                  await new Promise( resolve => setTimeout( resolve, 0 ) );
                }
              }

              // Wrap up
              mouse_wheel = true;
              if (!isMobile) console.log( 'Raycasting bounds restored.' );
            }

            if (hasMetadata && raycast_label) {
              raycast_label.object.state = 'Enabled';
              raycast_label.$input.style.color = 'lightgreen';
              raycast_label.updateDisplay();
              refitting = false;
            }
          });

          // Add filtered categories visibility toggles

          for ( const key of Object.keys( filtered_categories ) ) {
            const subsetKey = `0 - DEFAULT - ${ key }`;
            const subsetRecord = ifc_loader.ifcManager.subsets.subsets[ subsetKey ];

            if (subsetRecord && subsetRecord.mesh?.geometry?.index?.count > 0) {
              // Initialize checkbox state
              categoryParams[ key ] = true;

              ifcFolder.add( categoryParams, key ).name( key.substring( 3 ) )
              .onChange( ( value ) => {
                show_hide_category( key, value );
                mouse_wheel = true;
              });
            }
          }
        }

        if (hasMetadata) {
          document.getElementById('metadata_message').style.visibility = 'visible';
          console.log( 'Metadata Raycasting Enabled' );

          if (click_listener_added === false) {
            window.addEventListener( 'click', handle_raycast_click );
            click_listener_added = true;
          }
        } else {
          if (click_listener_added) {
            window.removeEventListener( 'click', handle_raycast_click );
            click_listener_added = false;
          }
        }

        console.timeEnd( 'Loading Time' );

        // Stop flashing indicator
        document.getElementById('status_indicator').style.display = 'none';

        document.getElementById('div_loading').style.display = 'none';

        gui_container.style.display = 'block';
        set_gui_position();

        enable_disable( false );

        init_running = false;
      }

      async function complete_loading() {
        async function repairSpatialMap() {
          const mgr = ifc_loader.ifcManager;

          // 1. Get all containment relationships (Level -> Element)
          const containers = await mgr.getAllItemsOfType( 0, web_ifc.IFCRELCONTAINEDINSPATIALSTRUCTURE, true );

          // 2. Get all aggregate relationships (Parent -> Children)
          // We do this to find things like Curtain Wall -> Panels
          const allAggregates = await mgr.getAllItemsOfType( 0, web_ifc.IFCRELAGGREGATES, true );

          const aggregateLookup = {};

          allAggregates.forEach( agg => {
            const pID = agg.RelatingObject.value;
            if (!aggregateLookup[ pID ]) aggregateLookup[ pID ] = [];
            aggregateLookup[ pID ].push( ...agg.RelatedObjects.map( o => o.value ) );
          });

          containers.forEach( rel => {
            const levelName = spatialMap[ rel.RelatingStructure.value ];

            rel.RelatedElements.forEach( element => {
              const parentID = element.value;
              spatialMap[ parentID ] = levelName;

              // 3. CHECK FOR GRANDCHILDREN
              // Find aggregates where the current element is the "RelatingObject" (the parent)
              if (aggregateLookup[ parentID ]) {
                aggregateLookup[ parentID ].forEach( childID => spatialMap[ childID ] = levelName );
              }
            });
          });
        }

        function buildSpatialMap( node, currentStorey = 'Unknown Level' ) {
          // 1. Update the 'currentStorey' if we hit a Storey node
          let storeyName = currentStorey;

          if (node.type === 'IfcBuildingStorey') {
            storeyName = node.Name?.value || node.LongName?.value || 'Unnamed Level';
          }

          // 2. Map this specific element's ID to the level name
          // This catches windows, walls, and furniture
          spatialMap[ node.expressID ] = storeyName;

          // 3. Recurse through children
          if (node.children && node.children.length > 0) {
            node.children.forEach( child => buildSpatialMap( child, storeyName ) );
          }
        }

        if (!isMobile) {
          spatialStructure = await ifc_loader.ifcManager.getSpatialStructure( 0, true );
          await buildSpatialMap( spatialStructure );
          await repairSpatialMap();

          await new Promise( resolve => setTimeout( log_info, 1000 ) );
        } else {
          if (document.getElementById('metadata_message').style.visibility === 'visible')
            await new Promise( resolve => setTimeout( hide_metadata_message, 5000 ) );
        }
      }

      async function log_info() {
        console.log( 'Memory: ', renderer.info.memory );
        console.log( 'Render: ', renderer.info.render );

        if (document.getElementById('metadata_message').style.visibility === 'visible')
          await new Promise( resolve => setTimeout( hide_metadata_message, 5000 ) );
      }

      function hide_metadata_message() {
        document.getElementById('metadata_message').style.visibility = 'hidden';
      }

      function handle_error( error ) {
        console.timeEnd( 'Loading Time' );
        console.log( 'Error loading model!' );
        console.log( error );
        render_requested = false;
        enable_disable( true );

        gui_container.style.display = 'none';

        // Stop flashing indicator
        document.getElementById('status_indicator').style.display = 'none';

        init_running = false;

        document.getElementById('div_loading').style.display = 'none';
        document.getElementById('div_error').style.display = 'block';
      }

      function highlightFeature( highlight_id, attrName ) {
        if (!attrName) return;

        const geometry = pickedObject.geometry;

        const indexAttr = geometry.index;
        const featureAttr = geometry.getAttribute( attrName );
        const positionAttr = geometry.getAttribute( 'position' );

        if (!featureAttr || !indexAttr || !positionAttr) return;

        // Find all triangles that belong to this highlight id
        const activeIndices = [];

        for ( let i = 0; i < indexAttr.count; i += 3 ) {
          const a = indexAttr.getX( i );
          const b = indexAttr.getX( i + 1 );
          const c = indexAttr.getX( i + 2 );

          // If the first vertex of the triangle matches the ID, we take the whole triangle
          if ( a < featureAttr.count ) {
            if (featureAttr.getX( a ) === highlight_id) {
              activeIndices.push( a, b, c );
            }
          }
        }

        if (activeIndices.length === 0) return;

        // Create a new "Slice" geometry
        const highlightGeo = new THREE.BufferGeometry();
        highlightGeo.setAttribute( 'position', positionAttr.clone() );
        highlightGeo.setIndex( activeIndices );

        // Create the overlay mesh
        featureHighlightMesh = new THREE.Mesh(
          highlightGeo,
          new THREE.MeshBasicMaterial({
            color: 0xf08080,
            transparent: true,
            opacity: 0.5,
            side: THREE.DoubleSide,
            depthTest: true,
            depthWrite: false,   // Keeps the highlight from messing up the depth buffer for other transparents
            polygonOffset: true, // Physically pushes the quad slightly toward the camera
            polygonOffsetFactor: -1,
            polygonOffsetUnits: -1
          })
        );

        featureHighlightMesh.isHighlight = true;

        // Create the Wireframe Outline (The "Border")
        const wireframeGeo = new THREE.EdgesGeometry( highlightGeo, 30 );
        const wireframe = new THREE.LineSegments(
          wireframeGeo,
          new THREE.LineBasicMaterial( { color: 0xffffff, linewidth: 3 } ) // White border
        );

        // Add the wireframe to our highlight mesh so they move together
        featureHighlightMesh.add( wireframe );

        featureHighlightMesh.position.set( 0, 0, 0 );
        featureHighlightMesh.rotation.set( 0, 0, 0 );
        featureHighlightMesh.scale.set( 1, 1, 1 );
        featureHighlightMesh.updateWorldMatrix( true, true );

        // Sync transformation with the parent object
        pickedObject.add( featureHighlightMesh );
        pickedObject.updateWorldMatrix( true, true );
      }

      function popup_card_cleanup() {
        const card = document.getElementById('metadata-card');

        if (card) {
          card.scrollTop = 0;
          card.scrollLeft = 0;
          card.innerHTML = '';
          card.style.display = 'none';
        }

        // Clean up previous highlight
        if (featureHighlightMesh) {
          // Detach it from the old parent
          if (featureHighlightMesh.parent) {
            featureHighlightMesh.parent.remove( featureHighlightMesh );
          }

          // Clean up the children (the wireframe)
          featureHighlightMesh.traverse( ( child ) => {
            if (child.isLine) {
              child.parent.remove( child );
              if (child.geometry) child.geometry.dispose();
              if (child.material) child.material.dispose();
            }
          });

          if (featureHighlightMesh.geometry) featureHighlightMesh.geometry.dispose();
          if (featureHighlightMesh.material) featureHighlightMesh.material.dispose();
          featureHighlightMesh = null;
        }

        pickedObject = null;
        mouse_wheel = true;
        return;
      }

      async function handle_raycast_click( event ) {
        if (refitting) return;

        // Calculate how far the mouse moved
        const deltaX = Math.abs( event.clientX - mouseDownPos.x );
        const deltaY = Math.abs( event.clientY - mouseDownPos.y );

        // If moved more than 5 pixels, it was likely a camera drag, not a click
        // Leave previous popup card and highlight visible, if present
        if (deltaX > 5 || deltaY > 5) return;

        popup_card_cleanup();

        if (event.target.closest( '#fixed_menu' ) || event.target.closest( '#right_gui_position' )) {
          return;
        }

        if (!raycaster) {
          raycaster = new THREE.Raycaster();
          raycaster.params.Points.threshold = 0.05;
        }

        if (!mouse) mouse = new THREE.Vector2();

        const HIGHLIGHT_COLOR = new THREE.Color( 0xf08080 );

        mouse.x = ( event.clientX / window.innerWidth ) * 2 - 1;
        mouse.y = -( event.clientY / window.innerHeight ) * 2 + 1;

        raycaster.setFromCamera( mouse, camera );

        const intersects = raycaster.intersectObjects( ifc_obj.children, true );

        if (intersects.length === 0) return;

        const visibleIntersects = intersects.filter( hit => hit.object.visible );
        if (visibleIntersects.length === 0) return;

        const intersect = visibleIntersects[ 0 ];

        pickedObject = intersect.object;

        // QUICK GUARD: Ensure geometry and attributes exist before we dig in
        if (!pickedObject.geometry) return;

        const expressId = pickedObject.geometry.attributes.expressID?.getX( intersect.face.a );
        if (!expressId) return;

        const mgr = ifc_loader.ifcManager;

        const schema = await mgr.getItemProperties( 0, expressId );
        const meshFeatures = await mgr.getPropertySets( 0, expressId, true );
        const typeFeatures = await mgr.getTypeProperties( 0, expressId, true );
        const materials = await mgr.getMaterialsProperties( 0, expressId, true );

        const featureMetadataList = [];
        const seenProperties = new Set(); // Track unique property combinations

        // 1. Add basic IFC info, device dependent
        if (!isMobile) {
          const locationPath = spatialMap[ expressId ] || 'External / Unassigned';

          featureMetadataList.push({
            class: "IFC Location",
            properties: { 'Hierarchy': locationPath }
          });
        }

        featureMetadataList.push({
          class: 'IFC Identity',
          properties: {
            'Express ID': expressId,
            'Global ID': schema.GlobalId?.value || 'N/A'
          }
        });

        // Helper to process properties and avoid exact duplicates
        function processPset( pset, prefix = '' ) {
          const className = prefix + ( pset.Name?.value || 'Unnamed Pset' );
          const properties = {};

          if (Array.isArray( pset.HasProperties )) {
            pset.HasProperties.forEach( prop => {
              const key = prop.Name?.value;
              const val = prop.NominalValue?.value ?? prop.Value?.value ?? prop.value;

              if (key) {
                // Create a unique fingerprint: 'PsetName-Key-Value'
                const fingerprint = `${pset.Name?.value}-${key}-${val}`;

                if (!seenProperties.has( fingerprint )) {
                  properties[ key ] = val ?? 'N/A';
                  seenProperties.add( fingerprint );
                }
              }
            });
          }

          return { className, properties };
        }

        // Process Instance Properties (High Priority)
        if (meshFeatures && meshFeatures.length > 0) {
          meshFeatures.forEach( set => {
            const { className, properties } = processPset( set );

            if (Object.keys( properties ).length > 0) {
              featureMetadataList.push({ class: className, properties });
            }
          });
        }

        // Process Type Features
        if (typeFeatures && typeFeatures.length > 0) {
          typeFeatures.forEach( typeObj => {
            featureMetadataList.push({
              class: 'IFC Type Identity',
              properties: {
                'Type Name': typeObj.Name?.value || 'N/A',
                'Type Tag': typeObj.Tag?.value || 'N/A'
              }
            });

            if (Array.isArray( typeObj.HasPropertySets )) {
              typeObj.HasPropertySets.forEach( pset => {
                const { className, properties } = processPset( pset, 'Type: ');

                if (Object.keys( properties ).length > 0) {
                  featureMetadataList.push( { class: className, properties } );
                }
              });
            }
          });
        }

        // Process Materials
        if (materials && materials.length > 0) {
          const properties = {};

          materials.forEach( mset => {
            const mat_set = mset.Materials || mset.ForLayerSet?.MaterialLayers;

            if (!mat_set) {
              const key = mset.expressID;
              const val = mset.Name?.value;
              properties[ key ] = val || 'N/A';
            } else {
              const mat_arr = Array.isArray( mat_set ) ? mat_set : [ mat_set ];

              for ( const mat of mat_arr ) {
                const key = 'expressID ' + mat.expressID;
                const val = mat.Name?.value || mat.Material?.Name?.value;
                properties[ key ] = val || 'N/A';
              }
            }

            featureMetadataList.push( { class: 'IFC Material Identity', properties } );
          });
        }

        if (featureMetadataList.length > 0) {
          if (pickedObject.isMesh) highlightFeature( expressId, 'expressID' );

          showUiPanel(
            { featureMetadata: featureMetadataList },
            event,
            schema,
            pickedObject.name,
            false
          );
        }
      }

      async function showUiPanel( data, event, schema = null, meshName = '', tilesetMetadataOnly = false, type = '' ) {
        const card = document.getElementById('metadata-card');
        if (!card) return;

        /**
         * Helper: Formats arrays (simple or object-based) into HTML
         */
        function formatArray( arr ) {
          if (!arr || arr.length === 0) return '[]';

          // Force TypedArrays (Float32Array, etc.) into standard Arrays 
          // so .map() and .join() behave predictably
          const arrayData = ArrayBuffer.isView( arr ) ? Array.from( arr ) : arr;

          // If it's an array of objects (like matrix elements or custom structs)
          if (typeof arrayData[ 0 ] === 'object' && arrayData[ 0 ] !== null) {
            return arrayData.map( ( item, idx ) => {
              let itemHtml = `<div style="margin: 4px 0 4px 5px; padding-left: 8px; border-left: 2px solid #00d4ff; background: rgba(0,212,255,0.05);">`;
              itemHtml += `<div style="font-size: 9px; color: #00d4ff; opacity: 0.7;">Part ${idx + 1}</div>`;

              // --- Check for Matrix/Vector objects to flatten them ---
              if (item.elements && (Array.isArray( item.elements ) || ArrayBuffer.isView( item.elements ))) {
                // Just show the numbers, skip the "elements:" label
                itemHtml += `<div style="font-size: 11px;">${formatArray( item.elements )}</div>`;
              } else if (item.x !== undefined && item.y !== undefined) {
                // Just show the coordinate tuple, skip "x:", "y:", "z:" labels
                const zVal = item.z !== undefined ? `, ${item.z.toFixed( 2 )}` : '';
                itemHtml += `<div style="font-size: 11px;">(${item.x.toFixed( 2 )}, ${item.y.toFixed( 2 )}${zVal})</div>`;
              } else {
                // Fallback for normal custom structs/objects
                for ( const [ sk, sv ] of Object.entries( item ) ) {
                  const cleanSv = resolveValue( null, sk, sv );
                  itemHtml += `<div style="font-size: 11px;"><span style="color: #888;">${sk}:</span> ${cleanSv}</div>`;
                }
              }

              itemHtml += `</div>`;
              return itemHtml;
            }).join('');
          }

          // Standard simple array (numbers, strings, booleans)
          return `[ ${arrayData.map( v => {
            if (typeof v === 'number') return Number.isInteger( v ) ? v : v.toFixed( 2 );
            if (typeof v === 'bigint') return v.toString();
            return String( v );
          }).join(', ')} ]`;
        }

        /**
         * Helper: Resolves any value type into a UI-friendly string/HTML
         */
        function resolveValue( className, propName, val, depth = 0 ) {
          if (depth > 3) return '<span style="color:#666;">[Max Depth]</span>';

          let processedVal = val;

          if (processedVal === null || processedVal === undefined) return 'N/A';

          // Handle Three.js Math Objects / Matrices
          if (typeof processedVal === 'object') {
            if (processedVal.isVector3) return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )}, ${processedVal.z.toFixed( 2 )})`;
            if (processedVal.isVector2) return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )})`;
            if (processedVal.isColor) return `RGB(${processedVal.r.toFixed( 2 )}, ${processedVal.g.toFixed( 2 )}, ${processedVal.b.toFixed( 2 )})`;

            // Matrix4 / Matrix3 elements
            if (processedVal.elements && Array.isArray( processedVal.elements )) {
              return formatArray( processedVal.elements );
            }
          }

          const propDef = schema?.classes?.[ className ]?.properties?.[ propName ];

          // Pre-check: If it's a string that looks like an array but isn't parsed
          // This handles the "[One, Two]" or "[true, false]" strings
          if (typeof processedVal === 'string' &&
            (processedVal.startsWith( '{' ) || processedVal.startsWith( '[' ))) {

            try {
              // Try JSON parse first (handles ["One", "Two"])
              processedVal = JSON.parse( processedVal );
            } catch ( e ) {
              // Manual fallback for unquoted strings like [One, Two]
              processedVal = processedVal.slice( 1, -1 ).split( ',' ).map( s => s.trim() );
            }
          }

          if (processedVal === null || processedVal === undefined) return 'N/A';

          // Handle Arrays (The core of EXT_structural_metadata)
          if (Array.isArray( processedVal )) {
            if (processedVal.length === 0) return '[]';

            // Handle ENUM Arrays
            if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
              const enumValues = schema.enums[ propDef.enumType ].values;
              return `[ ${processedVal.map( v => {
                // Look up by integer value (0, 1, 2) or by string name
                const entry = enumValues.find( e => e.value == v || e.name === v );
                return entry ? entry.name : v;
              }).join(', ')} ]`;
            }

            // General Array (Booleans, Strings, etc.)
            return formatArray( processedVal );
          } else {
            if (propDef?.type === 'ENUM' && schema.enums?.[ propDef.enumType ]) {
              const entry = schema.enums[ propDef.enumType ].values.find( v => v.value == processedVal || v.name === processedVal );
              return entry ? entry.name : processedVal;
            }

            if (propDef?.type === 'BOOLEAN') {
              const isTrue = (processedVal === true || processedVal === 'true' || processedVal === 1);
              return isTrue ? 'Yes' : 'No';
            }
          }

          // Final Formatting based on Type
          if (typeof processedVal === 'object' && processedVal !== null) {
            // 1. CATCH NESTED MATRICES/ELEMENTS OBJECTS
            // This removes the "elements" label from the UI
            if (processedVal.elements && ( Array.isArray( processedVal.elements ) || ArrayBuffer.isView( processedVal.elements ) )) {
              return formatArray( processedVal.elements );
            }

            // 2. CATCH NESTED VECTORS (x, y, z)
            if (processedVal.x !== undefined && processedVal.y !== undefined) {
              const zStr = processedVal.z !== undefined ? `, ${processedVal.z.toFixed( 2 )}` : '';
              return `(${processedVal.x.toFixed( 2 )}, ${processedVal.y.toFixed( 2 )}${zStr})`;
            }

            // 3. FALLBACK: Generic Nested Object loop
            let subHtml = '<div style="margin-left: 10px; font-size: 0.9em; color: #ccc;">';

            for ( const [ k, v ] of Object.entries( processedVal ) ) {
              subHtml += `<div><span style="color: #888;">${k}:</span> ${resolveValue( null, k, v, depth + 1 )}</div>`;
            }

            return subHtml + '</div>';
          }

          if (typeof processedVal === 'number') return Number.isInteger( processedVal ) ? processedVal : processedVal.toFixed( 2 );
          if (typeof processedVal === 'bigint') return processedVal.toString();
          if (typeof processedVal === 'boolean') return processedVal ? 'Yes' : 'No';

          return processedVal;
        }

        // --- HTML Assembly ---
        let html = '';
        let show_copy_to_clipboard = true;
        const tileset = tilesetMetadataOnly ? ifc_obj.userData?.tileset : data?.tileset;

        // 1. Tileset Section
        if (tileset?.class) {
          html += `<div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                     <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">TILESET: ${tileset.class}</div>
                   </div>`;

          if (tileset.properties) {
            for ( const [ key, val ] of Object.entries( tileset.properties ) ) {
              html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${resolveValue( tileset.class, key, val )}</span></div>`;
            }
          }
        } else if (tilesetMetadataOnly) {
          show_copy_to_clipboard = false;
          const description = (type === 'Box3Helper') ? 'No Data (turn off bounding box)' : 'No Data';
          html += `<div style="color: #fff; font-size: 11px;">${description}</div>`;
        }

        // 2. Feature / Tile / Group / Content Sections
        if (data && !tilesetMetadataOnly) {
          if (tileset) html += '<br>';

          // Tile Class
          if (data.tile?.class) {
            html += `<div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                       <div style="font-size: 10px; color: #00d4ff;">TILE: ${data.tile.class}</div>
                     </div>`;

            for ( const [ k, v ] of Object.entries( data.tile.properties || {} ) ) {
              html += `<div class="prop-row"><span class="prop-label">${k}:</span><span class="prop-value">${resolveValue( data.tile.class, k, v )}</span></div>`;
            }

            html += '<br>';
          }

          if (meshName) {
            html += `<div style="font-size: 12px; font-weight: bold; color: #fff;">Selected: ${meshName}</div><br>`;
          }

          // Group Metadata - Maybe entries like color, priority...

          if (data.group?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 6px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.group.class}</div>
              </div>`;

            if (data.group.properties) {
              for ( const [ key, val ] of Object.entries( data.group.properties ) ) {
                const display = resolveValue( data.group.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }

            html += `<br>`;
          }

          // Content Metadata - Maybe entries like vertices, materials...

          if (data.content?.class) {
            html += `
              <div style="border-bottom: 1px solid #555; margin-bottom: 8px; padding-bottom: 6px;">
                <div style="font-size: 10px; color: #00d4ff; letter-spacing: 0.5px;">${data.content.class}</div>
              </div>`;

            if (data.content.properties) {
              for ( const [ key, val ] of Object.entries( data.content.properties ) ) {
                const display = resolveValue( data.content.class, key, val );
                html += `<div class="prop-row"><span class="prop-label">${key}:</span><span class="prop-value">${display}</span></div>`;
              }
            }
          }

          // Feature Metadata (Structural Metadata)
          if (data.featureMetadata) {
            const fms = Array.isArray( data.featureMetadata ) ? data.featureMetadata : [ data.featureMetadata ];

            fms.forEach( fm => {
              html += `<div style="border-bottom: 1px solid #00d4ff; margin-top: 10px; padding-bottom: 4px;">
                         <div style="font-size: 10px; color: #00d4ff; font-weight: bold;">${fm.class}</div>
                       </div>`;

              for ( const [ k, v ] of Object.entries( fm.properties || {} ) ) {
                html += `<div class="prop-row"><span class="prop-label">${k}:</span><span class="prop-value">${resolveValue( fm.class, k, v )}</span></div>`;
              }

              html += '<br>';
            });
          }
        }

        // 3. Clipboard Button
        if (show_copy_to_clipboard) {
          html += `
            <div style="padding-top: 8px; border-top: 1px solid #444; text-align: center;">
              <button id="copy-btn" style="background: #111; color: #00d4ff; border: 1px solid #00d4ff; border-radius: 4px; padding: 5px; cursor: pointer; font-size: 11px; width: 100%;">
                📋 Copy Metadata (JSON)
              </button>
            </div>`;

          card.innerHTML = html;

          // --- Post-Render Logic: Clipboard & Positioning ---
          const btn = document.getElementById('copy-btn');

          // Create a "Deep Clean" copy for the clipboard
          const dataForClipboard = data
            ? { ...data }
            : ifc_obj.userData?.tileset
              ? { ...ifc_obj.userData.tileset }
              : {};

          btn.onclick = () => {
            // 1. Deep copy and BigInt handling
            const cleanData = JSON.parse( JSON.stringify( dataForClipboard, ( k, v ) => 
              typeof v === 'bigint' ? v.toString() : v
            ));

            // 2. Promotion: Convert stringified JSON into actual objects
            const deepUnescape = ( obj ) => {

              for ( const key in obj ) {
                if (typeof obj[ key ] === 'string' && ( obj[ key ].startsWith( '{' ) || obj[ key ].startsWith( '[' ) )) {
                  try {
                    obj[ key ] = JSON.parse( obj[ key ] );
                    deepUnescape( obj[ key ] );
                  } catch ( e ) {}
                } else if (obj[ key ] && typeof obj[ key ] === 'object') {
                  deepUnescape( obj[ key ] );
                }
              }
            };

            deepUnescape( cleanData );

            // 3. Metadata cleanup
            if (meshName && meshName !== 'metadata_proxy_mesh') cleanData[ 'Selected' ] = meshName;
            delete cleanData.schema;

            // 4. Formatting: Pretty-print with "airy" compact arrays
            let text = JSON.stringify( cleanData, null, 2 );
            text = text.replace(/\[\s+([\d\.\-\"\'\w\s,]+)\s+\]/g, ( match, content ) => {
              return `[ ${content.replace(/\s+/g, ' ')} ]`;
            });

            navigator.clipboard.writeText( text ).then( () => alert( '✅ Copied Airy JSON!' ) );
          };
        } else {
          card.innerHTML = html;
        }

        // Display and Measurement
        card.style.display = 'block';
      }

      function hideUiPanel() {
        popup_card_cleanup();
      }

      function show_wireframe() {
        if (ifc_obj) {
          if (wireframe_enabled === true) {
            wireframe_enabled = false;
            document.getElementById('btn_wireframe').style.backgroundColor = 'transparent';
          } else {
            wireframe_enabled = true;
            document.getElementById('btn_wireframe').style.backgroundColor = 'lightgreen';
          }

          if (Array.isArray( ex_ifc_obj.material )) {
            ex_ifc_obj.material.forEach( m => {
              m.wireframe = wireframe_enabled;
            });
          } else {
            ex_ifc_obj.material.wireframe = wireframe_enabled;
          }

          mouse_wheel = true;
        }
      }

      async function render() {
        if (ifc_obj) {
          if (first_run || mouse_down || mouse_wheel) {
            controls.update();

            renderer.clear();
            renderer.render( scene, camera );

            // If it might be slow to render initially
            if (first_run) {
              fr_count ++;

              if (fr_count > 30) {
                mouse_wheel = true;
                first_run = false;
                fr_count = 0;
                count = 0;
                complete_loading();
              }
            } else {
              if (mouse_wheel) {
                if (count > 30) {
                  mouse_wheel = false;
                  count = 0;
                } else {
                  count ++;
                }
              }
            }
          }
        }

        if (render_requested === true) requestAnimationFrame( render );
      }

      async function reset_all( reset = false ) {
        document.getElementById('back_color').value = '#000000';
        document.getElementById('btn_wireframe').style.backgroundColor = 'transparent';
        document.getElementById('metadata_message').style.visibility = 'hidden';

        init_running = false;

        if (gui_set) gui_reset();

        // Reset the view
        if (reset === true) {
          controls.reset();
          set_back_color();
        } else {
          // Page (re)loading
          if (scene) {
            if (ifc_obj) await scene_cleanup();

            if (gui) gui.dispose();

            while (scene.children.length > 0) {
              scene.remove( scene.children[ 0 ] );
            }

            renderer.clear();
            renderer.dispose();
          }

          mouse_wheel = true;

          document.getElementById('btn_url').style.backgroundColor = 'transparent';
          document.getElementById('div_error').style.display = 'none';
          document.getElementById('file_input').value = '';
          document.getElementById('url_entry').value = '';
          selected_url_file = '';
          enable_disable( true );
        }

        mouse_wheel = true;
      }

      async function scene_cleanup() {
        if (!ifc_obj) return;

        mouse_wheel = true;

        hideUiPanel();

        if (featureHighlightMesh) {
          if (featureHighlightMesh.parent) {
            featureHighlightMesh.parent.remove( featureHighlightMesh );
          }

          featureHighlightMesh.traverse( ( child ) => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
          });

          featureHighlightMesh = null;
        }

        if (wireframe_enabled) await show_wireframe();

        // Helper for disposing materials/textures to avoid repetition

        const disposeMaterial = ( m ) => {
          if (!m) return;

          if (m.uniforms) {
            Object.values( m.uniforms ).forEach( u => {
              if (u.value && u.value.isTexture) u.value.dispose();
            });
          } else if (m.map) {
            m.map.dispose();
            m.map = null;
          }

          m.dispose();
          m = null;
        };

        await ifc_loader.ifcManager.dispose();
        ifc_loader = undefined;

        ifc_obj.traverse( ( child ) => {
          if (child.isMesh) {
            if (Array.isArray( child.material )) {
              child.material.forEach( disposeMaterial );
            } else {
              disposeMaterial( child.material );
            }

            if (child.geometry) {
              child.geometry.dispose();
              child.geometry = null;
            }
          }
        });

        scene.remove( ifc_obj );
        ifc_obj = undefined;

        if (ex_ifc_obj) {
          if (Array.isArray( ex_ifc_obj.material )) {
            ex_ifc_obj.material.forEach( disposeMaterial );
          } else {
            disposeMaterial( ex_ifc_obj.material );
          }

          if (ex_ifc_obj.geometry) {
            ex_ifc_obj.geometry.dispose();
            ex_ifc_obj.geometry = null;
          }

          ex_ifc_obj = undefined;
        }

        if (raycast_label) {
          raycast_label.destroy();
          raycast_label = null;
        }

        if (mat_cache) mat_cache.clear();

        if (ifcFolder) ifcFolder.destroy();

        renderer.clear();

        present_categories = {};
        filtered_categories = {};
        categoryParams = {};

        THREE.Cache.clear();

        if (isMobile === false) {
          renderer.info.reset();
          renderer.resetState();
        }
      }

      function enable_disable( disable = false ) {
        document.getElementById('back_color').disabled = disable;
        document.getElementById('btn_wireframe').disabled = disable;
        disabled_changed();

        mouse_wheel = true;
      }

      function document_ready() {
        isMobile = (/iPad|iPhone|iPod/.test( navigator.platform )) ||
          (/Android|webOS|iPhone|iPad|iPod|CriOS|BlackBerry|IEMobile|Opera Mini/i.test( navigator.userAgent )) ||
          (navigator.maxTouchPoints !== undefined && navigator.maxTouchPoints > 2 && /MacIntel/.test( navigator.platform ));

        $('#url_entry').keypress( function( event ) { if (event.key === 'Enter') $('#btn_load').click(); });
      }

      function disabled_changed() {
        $('button').each( function() {
          if (this.disabled === false ) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px blue'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });

        $('input[type=color]').each( function() {
          if (this.disabled === false ) {
            $(this).hover(
            function() { $(this)[ 0 ].style.border = 'solid 2px red'; },
            function() { $(this)[ 0 ].style.border = 'solid 1px whitesmoke'; });
          } else {
            $(this).unbind('mouseenter mouseleave');
          }

          mouse_wheel = true;
        });
      }
    </script>
  </body>
</html>
